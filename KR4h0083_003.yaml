body:
  text: 唐音卷三元楊士𢎞撰張震注唐詩正音二七言古詩按梁太常卿任昉序曰七言詩始漢武帝柏梁體然考之寧戚扣角之歌及百里奚妻扊扅之歌亦曰君今富貴忘我為是亦七言矣是未知果起於何時也王摩詰見前注登樓歌說文歌詠也書歌永言是也又徐曰歌長引其詩以誦之也又釋名人聲曰歌柯也謂以聲吟永如草木之有柯葉也又劉禹錫傳曰屈原作九歌即歌之所始也又文則曰歌之為體宜通暢響亮讀之使人興起也聊上君兮髙樓飛甍鱗次兮在下俯十二兮通衢緑槐參差兮車馬却瞻兮龍首前眺兮宜春王畿鬱兮千里山河壯兮咸秦舍人下兮青宫據胡床兮書空執㦸疲於下位老夫好隱兮墻東亦幸有張伯英草聖兮龍騰虬躍擺長雲兮捩回風琥珀酒雕胡飯君不御兮日將晚秋風兮吹衣夕鳥兮爭返孤砧發兮東城林薄暮兮蟬聲遠時不可兮再得君何為乎偃蹇批不用楚調自適目前詞少而意多尚覺盤谷歌意為冗又宋王之下淵明之上甚似甍晉人不知者以為氣短知之者以為琴操之餘音也飛屋棟所以承瓦者謝𤣥暉詩白日麗飛甍龍首山名在長安輿地志嘗有黑龍從南山出飲渭水其行道因山成迹故名龍首漢武紀建元三年舉籍阿城以南盩厔以東宜春苑名在上林苑東屬之南山王畿說文帝都也禮職方氏云王畿千里舍人官名漢百官志漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出論為詔令乃今中書舍人也又通典高祖武德三年改置六員皆以文章道德臺閣髦彥居之是為文士之極選諸官莫比焉青宫太子之宫也胡牀隋改曰交牀唐穆宗改曰繩牀晉謝萬據胡牀坐中庭梳髮又庾亮登南樓據胡牀玩月書空見前注執㦸前韓信傳曰臣事項王位不過執㦸又前漢紀執㦸郎侍陛楯奉最為卑職云老夫墻東漢逢萌傳避世墻東王君公蓋漢隱士王應仲也張伯英傳張芝善草書韋仲將為草聖靈帝時為太尉琥珀酒言酒色如琥珀李長吉將進酒亦云琉璃鍾琥珀濃是也雕胡飯見前菰米注夕鳥爭返淵明歸去來辭鳥倦飛而知還偃蹇史孟光要亦偃蹇承天矣說文傲也又云屯難也登樓歌三首劉須溪云龍騰虬躍擺捩雲言字勢好送友人歸山歌一本作山中人朱子序云山中人者唐尚書右丞王維之所作也維以詩名開元間遭祿山亂陷賊中不能死事平復幸不誅其人既不足言詞雖清雅亦萎弱少氣骨獨此篇與望終南迎神曲為勝云山寂寂兮無人又蒼蒼兮多木羣龍兮滿朝君何為兮空谷文寡和兮思深道難知兮行獨悅石上兮流泉與松間兮草屋入雲中兮養雞上山頭兮抱犢神與棗兮如瓜虎賣杏兮收穀愧不才兮妨賢嫌既老兮貪祿誓解印兮相從何詹尹兮可卜羣龍雜言羣賢也空谷詩在彼空谷山頭抱犢魏葛榮亂百姓抱犢於山因名山在抱犢村雲中雞列仙傳淮南王安仙去餘藥在鼎中雞犬䑛之並得飛升故雞鳴雲中犬吠天上棗如瓜列仙傳李少君字雲翼言自溟海遇仙人與之棗大如瓜虎賣杏收穀董奉候官人有道術居山不種田為人治病愈者令種杏杏熟則有虎守之置穀少而取杏多者虎輒咆逐之詹尹楚辭屈原既放乃往見太卜鄭詹尹卜之山中人兮欲歸雲冥冥兮雨霏霏劉批云㸃景處意色自别水驚波兮翠菅靡白鷺忽兮翻飛君不可兮褰衣山萬重兮一雲混天地兮不分樹暗曖兮氛氳猿不見兮空聞忽山西兮夕陽見東皋兮逺村平蕪緑兮千里眇惆悵兮思君翠菅說文小蒲草也又顔師古曰夫離也今謂葱蒲迎神曲一本作魚山送神曲說文詞曲樂書云樂有歌歌有曲曲有詞蓋曲字義如委曲故文則曰曲宜委曲協韻也迎送神曲按朱子注楚辭九歌序曰九歌者屈原之所作也昔楚南郢之邑沅湘之間其俗信鬼而好祀其祀必使巫覡作樂舞以娛神此迎送神曲其亦此意也歟然彼以寄其忠君愛國眷戀不忘之意而摩詰於忠君愛國之道誠有愧於屈原矣然朱子取之者亦必有深意存焉要在歌王維之詩而考朱子之意可也坎坎擊鼓魚山之下吹洞簫望極浦女巫進紛屢舞陳瑶席湛清酤風凄凄兮夜雨神之來兮不來使我心兮苦復苦詩坎坎鼓我魚山未詳洞簫樂書伏羲氏制編竹二十為之大者二十四管小者十六管形參差象鳯翼又長尺圍寸者亦名簫洞簫則又簫之無底極浦極說文逺也浦水濱也女巫說文巫祝也女巫紛進以舞降神也又男曰覡女曰巫周禮女巫掌嵗時祓除釁浴又楚詞帝告巫陽日有人在下我欲輔之注巫陽女巫也瑤席號玉瑱朱子注瑤美玉也清酤說文一宿酒也謂造之一夜而熟若今雞鳴酒是也送神曲紛進拜兮堂前目眷眷兮瓊筵來不語兮意不傳作暮雨兮愁空山悲急管思繁絃靈之駕兮儼欲旋倐雲收兮雨歇山青青兮水潺湲朱子所取望終南附于下晚下兮紫微悵塵事兮多違駐駟馬兮雙樹望青山兮不歸老將行按云律詩拘於聲律古詩拘於語句以是詞不能達夫謂之行者達其詞而已如古文而有韻自陳子昻一變江左之體而歌行暴於世行者詞之遣無所留滯如雲行水行曲折容曳不為聲律語句之所拘但於古詩句法中得增詩語耳又文則云行宜快直詳盡又前司馬相如傳為鼓一再行師古曰行謂引古樂府七歌行知歌行此其義也少年十五三十時步行奪取代馬騎劉須溪批云起雖矯復勝老語射殺隂山白額虎肯數鄴下黃鬚兒一身轉戰二千里一劍曾當百萬師漢兵奮迅如霹靂邊騎崩騰畏蒺藜衛青不敗由天幸李廣無功緣數竒自從棄置便衰朽世事蹉跎成白首昔時飛箭無全目今日垂楊生左肘路傍時賣故侯瓜門前學種先生栁茫茫古木連窮巷潦落寒山對虛牖畫書愈有誓令疏勒出飛泉不似潁川空使酒賀蘭山下陳如雲羽檄交馳日夕聞節使三河募年少詔書五道出將軍試拂鐵衣如雪色聊持寶劒動星文願得燕弓射天將恥令越甲鳴吳軍莫嫌舊日雲中守猶堪一戰樹功勳白額虎周處傳處殺死南山白額虎黃鬚兒魏世紀任城王彰大破烏桓歸功諸將太祖喜持彰鬚曰黃鬚兒竟大竒也魏都鄴故云鄴下如霹靂揚雄傳擊如霆震又雷合電發衛青前本傳青字仲卿其父鄭季河東平陽人以縣吏給事平陽侯家與其家僮衛媪通生青冒姓衛氏仕武帝拜太尉封列侯李廣本傳隴西成紀人仕武帝歷七郡太守而以擊胸奴無功不得封侯數竒綱目集覽云奇所其反蓋言廣命隻不偶合耳飛箭無全目齊陳顯達與桂陽王戰射中左目垂楊生左肘莊支離與渭介叔觀於冥伯之丘俄而垂楊生其左肘故侯瓜邵平種瓜見前注先生栁陶淵明種桞五株自言五桞先生疏勒前武紀疏勒西域國名在莎車東北尉頭南飛泉漢李廣利拔佩刀刺山飛泉湧出潁川使酒季布封潁川侯文帝召為御史大夫人言其使酒難近罷而不用賀蘭山在朔州馬官縣又綱目集覽磧口胸奴南界在賀人山西在成溪湧泉十里按賀人山即今朔州之賀蘭草山也又唐詩鼓吹注賀蘭山在溪陽縣西九十三里山多白遙望青白如駮北人呼駮為賀蘭鮮卑因山名為氏羽檄前注三河之士漢書謂河南河內河東五道出將軍猶言數道出兵也雲中守魏尚傳馮唐諫文帝曰魏尚為雲中守胸奴逺避虜曽一入塞尚擊之所殺甚衆上說是日令唐持節赦魏尚復為雲中守而拜唐為車騎都尉燕支行燕支今在甘州高紀東胡又欲得單于一閼氏閼氏蘇林音焉支又史記胸奴注閼氏音焉耆習鑿齒讀作燕支漢家天將才且雄來時謁帝明光宫萬乘親推雙闕下千官出餞五陵東誓辭甲第金門裏身作長城玉塞中衛霍才堪一騎將朝廷不數二師功趙魏燕韓多徑卒關西狹小何咆哱報讎只是聞嘗膽飲酒不曾妨刮骨畫㦸雕戈白日寒連旗大斾黃塵沒疊鼓遙翻瀚海波鳴笳亂動天山月麒麟錦帶佩吳鈎颯踏青驪躍紫騮拔劍已斷天驕臂歸鞍共飲月支頭漢兵大呼一當百邊騎相看哭且愁教戰雖令赴湯火終知上將先伐謀明光宫三輔黃圖在長安城中武帝太初四年建親推前馮唐傳王者命將出師天子跪而推其轂曰閫以外將軍制之雙闕見前注五陵長陵安陵陽陵茂陵平陵漢天子所葬之地甲第高紀賜大第宅孟康曰有甲乙次第故曰甲第又曰甲舍金門揚雄傳歷金門上玉堂應劭曰金馬門也武紀武帝時相馬者東門京作銅馬獻之立馬於魯班門內故以名焉身作長城宋檀道濟曰壞汝萬里長城蓋言一身可為長城以禦寇於玉塞也衛霍見前注二師漢李廣利封二師將軍報讎嘗膽史越王句踐為吳所敗反國置膽於坐臥即仰膽飲食必嘗膽曰汝忘㑹稽之恥耶醫刮骨蜀漢關羽傳為流矢貫左臂羽伸臂令醫取之臂血流漓而羽割炙飲酒自若鳴笳瀚海天山見前注吳鈎史吳歐治子作名劒五純鈎湛盧豪曹巨闕魚腸又吳越春秋吳王闔盧令國中作金鈎曰善者賞之百金有人殺其二子以血流金鑄成二鈎以獻天驕胸奴傳胡者天驕子已斷天驕臂漢張騫請與烏孫結昆弟是斷胸奴右臂也共飲月支頭漢月支傳老上單于殺月支以其頭為飲器月支西域國音居監二市反伐謀武經七書上將伐謀其次伐交桃源行武陵志晉大元中武陵漁人溪行忽逢桃花林窮林得一山從小口入行數十步土地平曠屋舍儼然田地桑竹悉如外人見漁人大驚自云先世避秦亂來絶境問今何代不知有漢晉漁人辭去訪太守告之復往尋則不見其處矣晉陶淵明韓退之皆有詩按韓詩朱子注云洪曰淵明叙桃源初無神仙之說梁在安曽為武陵紀亦祖述淵明語云曩以避秦亂邑人相率㩦妻孥隱於此厥後絶不外通何人世之多遷貿也後人不深考因謂秦人至晉猶不死遂以為地仙洪駒文云荆公東坡桃源行皆得之王摩詰退之劉夢得諸人以為神仙者非是漁舟逐水愛山春兩岸桃花夾去津坐看紅樹不知逺行盡青溪不見人山口潛行始隈隩山開曠望旋平陸遙看一處攢雲樹近入千家散花竹樵客初傳漢姓名居人未改秦衣服居人共住武陵源還從物外起田園月明松下房櫳靜日出雲中雞犬喧驚聞俗客爭來集競引還家問鄉邑平明閭巷掃花開薄暮漁樵乘水入初因避地去人間更聞成仙遂不還峽裏誰知有人事世中遙望空雲山不疑靈境難聞見塵心未盡思鄉縣出洞無論隔山水辭家終擬長游衍自謂經過舊不迷安知峯壑今來變當時只記入山深青溪幾度到雲林春來遍是桃花水不辨仙源何處尋同崔傅答賢弟洛陽才子姑蘇客杜宛殊非舊鄉陌九江楓樹幾回青一片揚州五湖白揚州時有下江兵蘭陵鎮前吹笛聲夜火人歸富春郭秋風鶴唳石頭城周郎陸弟為儔侶對舞前溪歌白苧曲几書留小吏家草堂碁賭山隂墅衣冠若話外臺臣先數夫君席上珍更聞臺閣求三語遙想風流第一人洛陽才子賈誼也誼洛陽人故云比崔傳而言也姑蘇今蘇州府杜宛見前注九江今九江府揚州今揚州府五湖見前注蘭陵鎮州域志邳州有蘭陵縣或即蘭陵鎮也富春今杭州府富陽縣石頭城在金陵今南京石城門是其故址周郎陸弟指周瑜陸遜以喻崔傳與弟也前溪樂舞名古詩舞愛前溪緑歌傳子夜長按子夜即白苧歌李白白紵詞注云白紵歌白紵舞白鳬歌白鳬舞皆吳人之歌舞也吳地出苧故興其所見以寓意焉始則田野之作後乃大樂氏用焉其音入清商調七曲有子夜吳歌者即白苧也在吳歌為白紵在雅歌為子夜梁武帝令沈約更制其詞焉曲几說文人所憑坐也廣韻按屬毛氏曰鈎挑者為几案之几不鈎挑者為几又栁子厚有斬曲几文書留小吏晉王羲之嘗詣門生家見華几滑淨因書之真草相半後其父謹刮去之門生驚懊纍日棊墅晉謝安本傳苻堅次淮淝安乃命駕出别墅與𤣥圍棊賭别墅安棊常劣於𤣥是日𤣥懼不勝安謂甥羊曇曰以墅乞汝席上珍禮儒行儒有席上之珍以待聘三語晉阮瞻傳太尉王戎問阮千里曰老莊與聖教同異答曰將旡同太尉喜其言辟為掾人號三語㧻風流晉謝安傳王儉曰風流宰相惟有謝安第一人梁劉孝綽除祕書丞帝曰第一官當與第一人送崔五太守郡守秦官漢景帝中元二年更名太守長安廏吏來到門朱文露網動行軒黃花縣西九折坂玉樹宫南五丈原褒斜谷中不容幰惟有白雲當露冕子午山裏杜鵑啼嘉陵水頭行客飯劒門忽斷蜀川開萬井雙流滿眼來霧中逺樹刀州出天際澄江巴字回使君年紀三十餘少年白皙敷城居欲持畫省郎官筆回與臨邛父老書廏天子五廏所以養馬也廏吏太僕官也黃花縣西地域志黃花川在鳳州梁泉縣又有黃花驛五丈原在鳳翔府即諸葛亮出兵之所縣有長楊五柞二宫乃秦時起皆因樹名此云玉樹宫其二宫歟褒斜谷地域志在洋州要地有三曰褒谷斜谷曰子午谷幰說文車上帳繒曰幰子午谷在洋州東百六十里梁將王神念别開乾路更名子午谷魏延請直從褒中出循秦嶺而東當子午南北不十日可到長安即此谷也嘉陵水頭地域志嘉陵江在鳯州源出大散關之西又嘉州郡亦名嘉陵劍門地理志劒門縣有梁山亦大劒山自蜀出漢中道由此故以門名蜀川蜀郡今成都府也雙流縣名屬蜀郡刀州王濬夢懸三刀又益一刀後遷益州刺史蓋三刀州字也巴江地域志在重慶府水折三回如巴字皙說文人色白也宋築者謳曰澤門之皙實興我役謂皇國甫貌白也專城居唐盧魚為陜州刺史其屬韋京師於㕔事題贊曰專城之居分陜之權畫省杜詩注趙曰省中以粉畫界之謂之畫省白樂天賀楊十二新拜省郎詩亦曰紫宫墻白粉圍郎官筆郎官尚書郎也通典尚書郎月賜赤管大筆一雙隃麋墨一丸臨邛父老書臨邛蜀郡臨邛縣漢相如傳作檄以諭臨邛父老夷門歌豫州志夷門大梁之東門有夷門山即東門山也因以為名七雄雄雌猶未分攻城殺將何紛紛秦兵益圍邯鄲急魏王不救平原君公子為嬴停駟馬執轡逾恭意逾下亥為屠肆鼓刀人嬴乃夷門抱關者非但慷慨獻良謀意氣兼將身命酬向風刎頭送公子七十老翁何所求須溪批云僅僅許可不易七雄戰國也見前注七國互相兼並故曰攻城殺將紛紛多也秦圍邯鄲網目秦伐趙圍邯鄲魏王使晉鄙救趙秦王使魏曰吾攻趙急旦暮且下諸侯敢救者必移兵先擊之魏王恐止晉鄙壁魏公子無忌車騎枉自迎侯生生直上載不讓公子執轡愈恭生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市生下見其客朱亥睥睨故久立共客語微察公子公子色愈和乃謝客就車至公子家公子引侯生上坐賓客皆驚及秦圍趙趙平原君夫人無忌姊也使者冠蓋相屬於魏讓公子公子患之數請魏王敕晉鄙救趙及賓客辨士逰說萬端王終不聽公子乃屬賓客約車騎百餘乘欲赴關以死於趙過見侯生生曰子無他端而欲赴秦軍如以肉投餒虎何功之有公子再拜問計生曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之且公子嘗為報其父仇如姬欲為公子死無所辭誠一開口則得虎符奪兵北救趙公子如其言得兵符侯生曰將在外君令有所不受有如晉鄙疑而復請之則事危矣臣客朱亥力士可與俱鄙不聽使擊之公子去侯生北面自頸以送公子鼓刀漢賢臣傳太公困於鼓刀蓋朱亥屠者故云鼓刀也抱關孟子抱關擊柝又霍光傳蕭望之為郎署東門侯王伊翁曰不肯碌碌反抱關歟故人張諲工詩善易卜兼能丹青草隸頃以詩見贈聊獲答之不逐城東游俠兒隱囊紗帽坐彈碁蜀中夫子時開卦洛下諸生解詠詩藥闌花徑衡門裏時復據梧聊隱几屛風誤㸃惑孫郎團扇草書輕內史故園高枕度三春永日垂帷絶四鄰自想蔡雍今已老更將書籍與何人帽說文小兒及蠻夷頭衣也猶冠義取䝉覆其首古者冠無幘冠下有纚以繒為之後世施帽於冠紗帽北齊平秦王歸特賜紗帽又盧同詩亦曰紗帽籠頭自煎吃彈碁梁兾少時能挽滿彈碁又漢元帝為此戲有彈碁局方二尺中心高如覆盂蜀中夫子時開卦前漢逸民傳嚴遵字君平賣卜成都市日閲數人每依卦辭教人以忠孝日得百錢足以自養則閉肆下帷而讀老子據梧莊子據槁梧而瞑隱几孟子隱几而臥又莊子東郭子綦隱几而坐云云今之隱几者非昔之隱几乎屛風誤㸃晉曹不興盡屛風誤墨㸃汚因作成蠅孫權謂是真蠅彈之團扇草書晉王羲之在山隂有老嫗持宮用竹扇賣因書扇各五字媪初有慍色羲之曰但云王右軍書求百金人競買之右軍時為山隂內史云蔡雍字伯喈性至孝三世同居漢熹平與楊賜奏定六經文字死無嗣籍不存垂帷漢董仲舒為博士下帷講誦三年不窺園隴頭吟按王僧䖍傳録相和歌楚辭五曲內有隴頭吟吟說文呻吟也又歎也文則曰吟宜深沈細永讀之使人思怨長安少年遊俠客夜上戍樓看太白隴頭明月迥臨關隴上行人夜吹笛關西老將不勝愁駐馬聽之雙涕流身經大小百餘戰麾下偏禆萬戶侯蘇武才為典屬國節旄空盡海西頭須溪批云此詩次第轉折何限又非他長篇所及也長安少年見前注戍樓邊城戍樓也太白漢天文志太白星名西方金星也金性堅剛主司兵關西老將李廣也廣隴西成紀人是為關西廣嘗自云自漢擊胸奴廣未嘗不在其中而諸妄校尉已下能不及中以軍取侯者數十人廣不為後人然終無尺寸功以得封邑者豈吾相不當封侯耶蘇武本傳武字子卿少以父任兄弟並為郎天漢元年使胸奴為其所留胸奴中十九年至昭帝始元六年歸至京師拜為典屬國秩中二千石節旄空盡海西頭單于欲降武武不屈使牧羝北海上武持節不辱老而方歸故云節旄空盡也寒食城東即事清溪一道穿桃李演漾緑蒲涵白芷溪上人家凡幾家落花半落東流水蹴踘屢過飛鳥上鞦韆競出垂楊裏少年分日作遨遊不用清明兼上已蹴踘劉向別録黃帝造以練武士及前霍去病傳去病在塞外卒乏糧不能自振而去病尚穿域踏踘也注謂穿地作踘室蹴足踏而戲踘以革為圜囊實以毛髮之屬蹴踏之即今之氣毬也鞦韆繩戲北方山戎以習輕趫者又復古編云詞人高無際作鞦韆賦蓋漢武帝後庭之戲本秋千祝壽詞訛為鞦韆又涅槃經曰罥索天寶宫中呼為半仙戲清明上已皆節名也岑參南陽人天寶中進士官由侍御史至嘉州守其詩語竒體峻意亦造竒如長風吹白茅野火燒空桑可謂逸才又山風吹空林颯颯如有人宜𥙷幽致也又參詩與李杜相頡頏歌行則流出肺肝無斧鑿痕郊島輩旬鍛月鍊者參談笑為之又朝氏曰參文本之裔孫博覽史籍尤工綴文屬詞清尚用心良苦其有所得往往挺拔孤秀度越常情歎為絶筆人競傳諷玉門關蓋將軍歌玉門關見前注蓋將軍蓋嘉運也嘉運時為河西隴右節度使蓋將軍真丈夫行年三十執金吾身長七尺頗有鬚玉門關城迥且孤黃沙萬里百草枯南磨長劍北彎弧將軍到來備不虞五千兵甲膽力粗軍中無事但歡娛暖屋繡簾紅地爐織成壁衣花氍毺燈前侍婢㵼玉壺金鐺亂㸃野駝酥紫綬金章左右趨問著即是蒼頭奴美人一雙間且都朱唇翠眉映明眸清歌一曲世所無今日喜聞鳯將雛可憐絶勝秦羅敷使君五馬謾踟蹰野草繡窠紫羅襦紅牙鏤馬對摴蒱玉盤纖手撤作盧衆中誇道不曾輸櫪上昻昻皆駿駒桃花叱撥價最殊騎將獵向城南隅臘日射殺千年狐我來塞外按邊儲為君取醉酒劇沽醉爭酒盞相喧呼忽憶高陽舊酒徒批云將軍事業祇如此深得刺諷之遺意丈夫周制八寸為尺八尺為丈人長八尺故曰丈夫執金吾漢百官表中尉更名執金吾師古曰金吾鳥名主辟不祥天子出行職主先導以禦非常故執此鳥象之因以為名玉門關見前注犬戎胸奴傳西伯昌伐犬夷師古曰犬夷即犬生戎也又山海經云黃帝生苗龍苗龍生吾吾生靈明明白犬曰犬戎北接境接胸奴也氍毺說文織毛蓐也三輔黃圖溫室規地以四罽賓毺鐺音鎗說文釡屬通俗文輔有足曰鐺又緯略曰三足溫酒器也野駝說駝負荷也以其能負荷故名槖駝格物志槖駝大於水牛牯紫色耳垂脊上有峰能知水脈能負千斤酥謂以駝乳酥又佛經言乳成酪酪成酥紫綬金章列侯印綬也蒼頭蕭望之傳蒼頭廬兒注漢謂奴為蒼頭紫綬金章左右趨問者即是蒼頭奴唐史至德年間府庫無蓋積朝廷専以官爵賞功諸將出征皆給空名告身自開府特進列大將軍以職事注名及清渠之敗復以官爵收散卒凡應募入軍者一切衣金紫至有朝士僮僕衣金紫稱大官而執賤役者故云間且都相如傳靚冶開都都謂美也秦羅敷羅敷秦氏女邯鄲人嫁邑人千乘王仁後為趙王家令敷出采桑於陌上王登臺見而悅之欲奪焉敷乃彈箏作陌上歌以自明五馬潘子真詩話禮天子六馬左右驂三公九卿駟馬左驂漢制中卿則二千石以右驂太守駟馬而已其加秩中二千石乃右驂故以五馬為太守美稱摴博鮑宏博經云古者烏曹作博以五木為子有梟盧雉犢為負勝之采博即摴蒱也晉劉毅摴蒱一擲數百萬餘人並黑犢惟毅得雉大喜攘衣繞牀呌曰非不能盧不事此爾劉裕因授五木曰老兄試為卿答既而四子俱黑一子轉躍未定裕厲聲喝之即成盧桃花叱撥洛中記異曰大宛進汙血馬一名紅叱撥二曰紫叱撥又有桃花叱撥鮑生與外弟韋生嘗以美伎換駿馬名紫叱撥千年狐鄭氏𤣥中記千嵗之狐為淫婦百嵗之狐為美女酒徒前高紀酈食其謁軍門衣儒衣冠沛公使人謝曰未暇見儒人食其按劎叱使者曰吾高陽酒徒非儒人也與獨孤漸道别長句兼呈嚴八侍御輪臺客舍春草滿潁陽歸客腸堪斷窮荒絶漠鳥不飛萬磧千山夢猶懶憐君白面一書生讀書千卷未成名五侯貴門腳不到數畝山田身自耕興來浪跡無逺近及至辭家憶鄉信無事垂鞭信馬頭西南幾欲窮天盡奉使三年獨未歸邊頭詞客舊來稀借問君來得幾日到家不覺換春衣高齊清晝卷羅幕紗帽接䍦慵不著中酒朝眠日色高彈碁夜半燈花落冰片高堆金錯盤滿堂凜凜五月寒桂林葡萄新吐蔓武城刺蜜未可餐軍中置酒夜撾鼓錦筵紅燭月未午花門將軍善胡歌葉河番王能漢語知爾園林壓渭濱夫人堂上泣羅裙魚龍川北磐溪雨鳥鼠山西洮水雲臺中嚴君於我厚别後新詩滿人口自憐棄置天西頭因君為問相思否輪臺漢武紀下輪臺之詔注輪臺國名在車師國西千餘里潁陽今潁川郡白面書生南宋沈慶之曰治國譬如治家今欲伐國而與白面書生謀之事何由濟五侯王氏五侯見前注接䍦說文接䍦白帽晉山簡倒著白接䍦謂白鷺翅背上長翰毛為之中酒漢樊噲傳軍士中酒注謂不醒不醉曰中酒彈碁漢梁兾少時能彈碁格五也金錯盤錯詩約軧錯衡注以金塗也張平子四愁詩美人贈我金錯刀亦塗金也按此金錯盤亦盤以金塗也葡萄酉陽雜俎本出大宛張騫使西域所致有白黑黃三種今云桂林未詳武城語子游為武城宰今屬高唐州刺蜜未詳花門將軍唐志甘州有花門山堡東北千里至回紇衛帳葉河番王魚龍川未詳鳥鼠山臨洮府臨洮縣有青雀山地域志云即禹貢鳥鼠同穴之地洮水地域志云洮水出西傾山之北入干河西傾在臨洮縣衛節度赤驃馬歌衛節度衛伯玉唐史伯玉廣德元年代宗幸陜以伯有幹略召拜荆南節度使封陽城郡王君家赤驃畫不得一團旋風桃花色紅纓紫鞚珊瑚鞭玉鞍錦韀黃金勒諸君鞴出看君騎尾長窣地如紅絲自矜諸馬皆不及却憶百金初買時香街紫陌鳯城內滿城見者誰不愛揚鞭驟急白汗流弄影行驕碧蹄碎紫髯蠻奴金剪刀平明剪出三騣高櫪上看時獨意氣衆中牽出偏雄豪騎將獵向南山口城南狐兔不復有草頭一㸃疾如飛却使蒼鷹翻向後憶昨看君朝未央鳴珂擁蓋滿路香始知邊將真富貴可憐人馬相輝光男兒稱意得如此駿馬長鳴北風起待君東去掃邊塵為君一日行千里批云有抑揚有褒刺善得風體驃說文黃驃馬黃白色又太宗十驥一曰飛霞驃其赤驃之類歟桃花色馬毛色如桃花也未央宫名高祖七年使蕭何治未央在雍州長安縣西北十里長安故城名未央者取詩夜未央也勤政之義也送費子歸武昌武昌在今武昌府湖廣布政司治所漢陽歸客悲秋草旅舍葉飛愁不掃秋來倍憶武昌魚夢著只在巴陵道曾隨上將過祁連離家十年恆在邊劍鋒可惜虛用盡馬蹄無事今已穿知君開館恆愛客摴蒱百金每一擲平生有錢將與人江上故園空四壁吾觀費子毛骨竒廣眉大口仍赤髭看君失路仍如此人生貴賤那得知高秋八月歸南楚東門一壺聊出祖路指鳯凰山北雲衣霑鸚鵡洲邊雨莫嘆蹉跎白髮新應須守道勿羞貧男兒何心戀妻子莫向江村老却人漢陽今漢陽府在武昌府之北武昌魚地域志武昌府嘉魚縣以魚美遂得名巴陵道今嶽州府巴陵縣祁連即天山見前注四壁司馬相如居成都家徒四壁大口孫權傳方頥大口赤髭佛書佛陀耶尊者號赤髭毗耶沙摴蒱見前注南楚即武昌舊名楚州鳯凰山在江夏縣北二里其形如鳯故名鸚鵡洲在江夏縣又鸚鵡洲即黃祖殺禰衡之地今在府城竹簲門之外大江之濱春夏水泛則沒秋冬水乾則出田使君美人如蓮花北鋌歌蓮花北鋌樂舞名未詳一作妒蓮花舞北鋌亦回旋之意如長沙定王來朝稱壽歌舞但張袖小舉曰臣國小地狹不足回旋之義也美人舞如蓮花旋世人有眼應未見高臺滿地紅氍毺試舞一曲天下無此曲羌人傳入漢諸客見之驚且歎嫚臉嬌娥纖復穠輕羅金縷花葱蘢回裙轉袖若飛雪左鋌右鋌生旋風琵琶橫笛和未匝花門山頭黃雲合忽作出塞入塞聲白草驚沙寒颯颯翻身入破如有神前見後見回回新始知諸曲不可比采蓮落梅徒聒耳世人學舞只是舞姿態豈能得如此蓮花旋言如蓮花回旋也此曲羌人傳入漢樂府解題唐人西域記云龜兹國王與臣庶知樂者於夾山間聽風聽水之聲均節成音後翻入中國如伊州涼州甘州皆龜兹國曲也詳此云然其亦龜兹傳至者耶金縷即金縷衣也琵琶釋名北人馬上所鼓推手前曰琵引手却曰琶因以為名又風俗通曰琵琶長三尺五寸法天地人與五行四弦象四時也杜摰云秦人苦於長城之役百姓弦鞉鼓琵琶又傳云琵琶之傳歷代不載作者故此云漢送烏孫公主念其行道思慕使知音者於馬上奏以慰之出塞入塞采蓮落梅皆曲名入破明皇雜録天寶中樂章多以地名曲如涼州伊州甘州之類其曲遍繁聲入破是也送魏升卿擢第歸東都回懷魏校書陸渾喬潭東都洛陽也校書漢官制校書郎官名前漢之蘭臺後漢之東觀皆藏書之室當時文學之士使校讎於其中故有校書之職至唐則以為文士起家之良選其𢎞文崇文館著作司經局並有校書之官皆為美職陸渾左氏春秋遷陸渾之戎於伊川注陸渾之戎先在秦晉西北至是秦晉誘而徙之伊川之地遂以為戎號今河南府陸渾縣是也井上梧桐雨灞亭卷秋風故人適戰勝匹馬歸山東問君今年三十幾能使香名滿人耳君不見三峰直上五千仞見君文章亦如此如君兄弟天下稀雄詞健筆皆若飛將軍金印嚲紫綬御史鐵冠重繡衣喬生作尉别來久因君為問平安否魏侯校理復何如前日人來不得書陸渾山水佳可賞蓬閣閒時日應往自料青雲未有期誰知白髮偏能長壚頭青絲白玉甁别時相顧酒如傾搖鞭舉袂忽不見千樹萬樹空蟬鳴灞亭長安東有灞陵灞水灞橋灞亭亦在三峰未詳將軍金印御史鐵冠必魏氏之家其人為是官故言之也金印紫綬見前注鐵冠漢官儀侍御史周官也為柱下史冠鐵冠名柱後以鐵為柱言其審固不撓常清峻也繡衣漢武紀暴勝之繡衣持斧巡行天下送郭乂雜言郭乂人姓名雜言則詩題也解題已見前注地上青草出經冬方始歸博陵無近信猶未換春衣憐汝不忍别送汝上酒樓初行莫早發且宿灞陵頭功名須及早嵗月莫虛擲早年已工詩近日兼注易何時過東洛早晚下孟津朝歌城邊桞軃地長安道上花撲人去年四月初我正在河朔曾上君家縣北樓樓上分明見恆嶽中山明府待君來須計行程及早回到家速覓長安使待汝書封我自開博陵地域志即中山府東洛東周也漢都於洛故曰東都孟津地域志在孟州即武王㑹兵於孟津之地又在河南府河陽縣朝歌地域志朝歌故城今在衛輝府衛縣即紂所都之地河朔地域志河北也恆嶽地域志北嶽恆山在保定府曲陽縣西北中山地域志兾州之域春秋為白狄戰國時為中山國後為趙所並輪臺歌奉送封大夫出師西征封大夫封常清也天寶四載以高仙芝為安西四鎮節度使仙芝署封常清為判官任以軍事仙芝常破小孛律王及其旁二十餘國題云西征必此時也輪臺城頭夜吹角輪臺城北旄頭落羽書昨夜過渠黎單于已在金山西戍樓西望烟塵黑漢兵屯在輪臺北上將擁旄西出征平明吹笛大軍行四邊伐鼓雪海湧三軍大呼隂山動邊塞兵氣連雲屯戰場白骨纏草根劍河風急雲片闊沙口石凍馬蹄脫亞相勤王甘苦辛誓將報主靜邊塵古來青史誰不見今見功名勝古人輪臺西域國名前西域傳二師將軍伐大宛之後於是自燉煌西至鹽澤駐兵起亭而輪臺渠黎皆有甲卒數百人置使者校尉領護以給使外國者旄頭漢天文志昴七星為旄頭與胡星渠黎西域國名金山在西涼州麗水出焉隂山見前注雪海劒河沙口未詳白雪歌送武判官歸京北風卷地白草折朔天八月即飛雪忽如一夜春風來千樹萬樹梨花開散入朱簾濕羅幕狐裘不暖錦衾薄將軍角弓不得控都護鐵衣冷難著瀚海間干千尺冰愁雲慘淡萬里凝中軍置酒飲歸客胡琴琵琶與羌笛紛紛暮雪下轅門風掣紅旗凍不翻輪臺東門送君去去時雪滿天山路山回路轉不見君雪上空留馬行處白草漢志胡中草白惟昭君冢上草青都護胡漢武紀內屬者三十六國置使者校尉領護宣帝改曰都護瀚海釋名云北海之北别有瀚海胡琴樂部中不載惟唐樂志云文宗朝內臣鄭中承善胡琴止載於琵琶部中他未詳天山即祁連山詳見前注轅門禮設軍宫轅門注君止宿險阻之處次車以為藩衛以轅表其門故曰轅門後宫中營門亦曰轅門青門歌送東臺張判官東臺見前注青門金鎖平旦開城頭日出使車回青門柳枝正堪折路傍一日幾人别東出青門路不窮驛樓宫樹灞陵東花撲征衣看似繡雲隨去馬色疑驄胡姬酒壚日未午絲繩玉缸酒如乳灞頭落花沒馬蹄昨夜微雨花成泥黃鸝翅溼飛屢低關東尺書醉懶題須臾望君不可見揚鞭飛鞍疾於箭借問使乎何時來莫作東飛百勞西飛燕青門見前注姬說文婦人之美者古詩胡姬年十五獨傍酒家壚壚說文賣酒區前食貨志令官作酒以三十石為一均率開一壚以賣又相如與卓文君臨邛賣酒文君當壚又前趙廣漢突入霍禹宅推投酒壚缸漢書注長頸甕玉缸言其貴也百勞爾雅鵙也一名博勞一名伯趙月令仲夏之月鵙始鳴又詩七月鳴鵙古詩東飛百勞西飛燕走馬川行奉送封大夫出師西征君不見走馬川行雪海邊平沙莽莽黃入天輪臺九月風夜吼一川碎石大如斗隨風滿地石亂走胸奴草黃馬正肥金山西見烟塵飛漢家大將西出師將軍金甲夜不脫半夜軍行戈相撥風頭如刀面如割馬毛帶雪汗氣蒸五花連錢旋作冰幕中草檄硯水凝代騎聞之應膽懾料知短兵不敢接車師西門佇獻捷走馬川雪海未詳所在風頭如刀綱目高昌王鞫文泰日寒風如刀五花連錢馬行毛色如五花連錢也車師西域國名又玉門關渡流沙北行二千二百里至車師為一道太白胡僧歌太白胡僧者太白中峰絶頂有胡僧不知幾百嵗眉長數寸身不制繒帛衣以草葉常持楞伽經路僻迥絶人迹罕到常有鬬虎弱者將死僧杖而解之西湫有毒龍久而為患僧器而貯之商山趙叟前年采茯苓深入太白偶值此僧宿余嘗有獨往之意余聞而悅之乃為之歌曰聞有胡僧在太白蘭若去天三百尺一持楞伽入中峰世人難見但聞鐘窗邊錫杖解兩虎牀下鉢盂藏一龍草衣不針復不線兩耳垂肩眉覆面此僧年紀那得知手種青松今十圍心將流水同清淨身與浮雲無是非商山老人已曾識願一見之何由得山中有僧人不知城裏看山空黛色太白山唐志鳯翔府闕縣有太白山録異記金星之精墜於終南圭峰西因號太白山其精化為白石狀如美玉又諺云武功太白去天三百蘭若佛寺之别名梵言阿蘭若云無諍也釋氏要覽云閒靜處也楞伽佛經名解虎藏龍見前序內函谷關歌送劉評事使關西函谷關見前注君不見函谷關崩城敗壁至今在樹根草蔓無古道空谷千年長不改寂寞無人空舊山聖朝無事不須關白馬公孫何處去青牛老人更不還蒼苔白骨空滿地月與古時常相似野花不省見行人山鳥何曾識關吏故人方乘使者車吾知郭丹今不如請君時憶關外客行到關西多寄書白馬公孫秦降王子嬰也前漢高祖紀高祖入關秦王子嬰素車白馬降於道傍青牛老人老子也史老子乘青牛西入關郭丹後漢南陽人少從師之長安從客人陳洮買符以入函谷關既入封符訖慨然曰不乘駟馬車終不出關范公藂竹歌世人見竹不解愛知君種竹府庭內此君托根幸得所種來幾時聞已大盛夏翛翛藂色寒閒宵摵摵葉聲乾能清案牘簾下見宜對琴書窗外看為君成隂將蔽日迸笋穿階踏還出守節偏凌御史霜虛心願比郎官筆君莫愛南山松樹枝竹色四時也不移寒天草木黃落盡猶自青青君始知守節梁沈約竹詩庶人賞高節御史霜杜氏通典御史為風霜之使云云虛心古詩輕筠抱虛心郎官筆見前注燉煌太守後庭歌雍州地域志燉煌古流沙郡漢為燉煌唐為流沙燉煌太守才且賢郡中無事高枕眠太守到來山出泉黃沙磧裏人種田燉煌耆舊鬢皓然願留太守更五年城頭月出星滿天曲房置酒張錦筵美人紅妝色正鮮側垂高髻插金鈿醉坐藏鈎紅燭前不知鈎在若箇邊為君手把珊瑚鞭射得半段黃金錢此中樂事亦已偏藏鈎京華勝録云京師人臘日後為藏鈎之戲分二曹鬬勝負高髻後馬康疏城中好高髻四方高一尺金鈿開元遺事明皇中秋夕賜貴妃金叉鈿合鈿說文金華飾也珊瑚本草色紅潤間有碧者生水底盤石上又云生波斯國獅子國西亭子送李司馬高高亭子郡城西直上千尺與雲齊盤崖緣壁試攀躋羣山向下飛鳥低使君五馬天半嘶絲繩玉壺為君提坐來一望無端倪紅花緑柳鶯亂啼千家萬井連君溪酒行未醉聞暮雞㸃筆操紙為君題為君題惜解攜草萋萋沒馬蹄胡笳歌送顔真卿使赴河隴唐史真卿字清臣仕至大師封魯國公諡文忠開元中遷監察御史使於河隴歸祿山反倡義討之出使陳希烈為其所害河隴河西郡名也君不聞胡笳聲最悲紫髯碧眼邊人吹吹之一曲猶未了愁殺樓蘭征戍兒涼秋八月蕭關道北風吹斷天山草崑崙山南月欲斜邊人向月吹胡笳胡笳怨兮將送君秦山遙望隴山雲邊城夜夜多愁夢向月胡笳誰喜聞胡笳說文北方之人卷蘆葉而吹名曰笳又胡笳者漢張騫使西域傳其法西京惟得摩訶兜勒一曲李延年因胡笳曲更造新聲一十八解以為武樂有出塞入塞等曲紫髯晉張遼問吳降人曰有紫髯將軍者誰樓蘭西域國名去陽關千六百里昭帝更其名曰鄯善蕭關祁連山隴山皆見前注邯鄲客舍歌客從長安來驅馬邯鄲道傷心藂臺下一旦生蔓草客舍門臨漳水邊垂楊下繫釣魚船邯鄲女兒夜沽酒對客挑燈誇數錢酩酊醉時月正午一曲長歌壚上眠藂臺九域志在磁州滏陽郡東北二里趙武靈王所築以其非一故曰藂臺又屬邯鄲郡數錢桓帝時京師童謡云河間女兒工數錢漳水在邢州任縣邯鄲女兒太白有邯鄲觀妓詩則邯鄲女兒其亦女妓云喜韓樽相過三月灞陵春已老故人相逢耐醉倒甕頭春酒黃花脂祿米只充沽酒資長安城中足年少獨共韓侯開口笑桃花㸃地紅斑斑有酒留君且莫還與君兄弟日攜手世上浮名好是閒漁父楚辭漁父者屈原之所作也漁父蓋亦當時隱遁之士或曰屈原設詞爾扁舟滄浪叟心與滄浪清不自道鄉里無人知姓名朝從灘上飯暮向蘆中宿歌竟還復歌手持一竿竹竿頭釣絲長丈餘鼓枻乘流無定居世人那得識深趣此翁取適非取魚滄浪在襄陽楚辭漁父莞爾而笑曰滄浪之水清兮可以濯吾纓偃師東與韓樽同詣景雲暉上人即事偃師河南府偃師縣上人圓覺要覽曰內有德行外有勝行在人之上故曰上人山隂老僧解楞伽潁陽歸客逺相過烟深草濕昨夜雨雨後西風度漕河空山終日塵事少平郊逺見行人小尚書磧上黃昏鐘别駕渡頭一歸鳥漕河詩土國城漕漕在衛邑尚書磧别駕渡未詳韋員外家花樹歌今年花似去年好去年人到今年老始知人老不如花可惜落花君莫掃君家兄弟不可當列卿御史尚書郎朝回花底恆㑹客花撲玉缸春酒香蜀葵花歌昨日一花開今日一花開昨日花正好今日花已老人生不得恆少年莫惜牀頭沽酒錢請君有錢向酒家君不見蜀葵花高達夫達夫名適滄州人舉有道科中第仕至彭蜀刺史年五十始為詩能以氣質自高每一篇出好事者輒傳布云又詩評適性磊落不拘小節恥預常科隱於博徒才名自逺然詩多胸臆語兼有氣骨故朝野通賞其文至如燕歌行等篇甚有竒句其余最深愛者不知肝膽向誰是令人却憶平原君燕歌行選詩補注云燕地名猶楚宛之類按伎録此相和歌詞之平調曲也又開元二十六年有從元戎出塞而還者作燕歌行以示適適因賦此以答之詩詞皆感征戍之事也漢家烟塵在東北漢將辭家破殘賊男兒本自重橫行天子非常賜顔色摐金伐鼓下榆關旌斾逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邊土代騎憑陵雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草腓孤城落日鬭兵稀身當恩遇常輕敵力盡關山未解圍鐵衣遠戍辛勤久玉筯應啼别離後小婦城南欲斷腸征人薊北空回首邊庭飄飄那可度絶域蒼茫無所有殺氣三時作陳雲寒聲一夜傳刁斗相看白刃血紛紛死節從來豈顧勳君不見沙場征戰苦至今猶憶李將軍橫行前樊噲傳願得十萬衆橫行胸奴中金鼓左宋襄公及楚人戰公子魚曰金鼓以聲氣也榆關趙地秦漢為雲州隨置榆關總𬋩大業間為榆林郡碣石地域志在北平郡驪城縣西南河口之地今平州之南也狼山前武紀遣衛青霍去病擊胸奴封狼居胥山而還集覽云狼居胥山在胸奴中又白狼山在幽州東北烏桓地中瀚海綱目集覽云西北海名在沙漠北按瀚海自是一大海名羣鳥解羽伏乳於此因名焉玉筯淚也薊北薊州今為遵化府即唐漁陽郡陳雲張巡詩戰苦陳雲深刁斗漢李廣不擊刁斗程不識擊刁斗注以銅為斗晝炊夜擊軍中擊之以謹夜也沙場古戰場也李將軍趙將李牧也守邊二十年丐奴不敢犯邊古大梁行今汴梁即河南布政司開封府古城莽蒼饒荆棘驅馬荒城愁殺人魏王宫觀盡禾黍信陵賓客隨灰塵憶昨雒都舊朝市軒車照耀歌鐘起軍容帶甲三十萬國步連營五千里全盛須臾那可論高臺曲池無復存遺墟但見狐狸跡古地空餘草木根莫天搖落傷懷抱撫劍悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黃金萬户侯寶刀駿馬填山丘年代凄涼不可問往來惟見水東流魏王宫觀史記魏畢萬之後至獻子分晉而都大梁至文侯始大信陵史魏公子無忌者魏安釐王異母弟也封信陵君軍容司馬法曰軍容不入國國容不入軍也國步詩國步斯頻注步運也朱亥夷門俱見前注同河南李七少尹畢員外家夜飲時洛陽告捷遂作春酒歌本集作春酒歌故人美酒勝濁醪故人清詞合風騷長歌滿酌惟吾曹高談正可揮麈毛半醉忽然持蟹螯洛陽告捷傾前後武侯腰間印如斗郎官無事時飲酒杯中渌蟻吹轉來甕上飛花拂還有前年持節將楚兵去年留司在東京今年復拜二千石盛夏五月西南行彭門劍門蜀山裏昨逢軍人劫奪我到家但見妻與子賴得飲君春酒數十杯不然令我愁欲死騷楚辭屈原作離騷離遭也言遭憂也今世因謂詩人為騷人蓋始此也風騷杜詩文雅涉風騷塵毛說文麈大鹿色白羣鹿隨之其尾辟塵蟹螯晉畢卓傳云左手持蟹螯右手持酒杯注蟹螯大足也武侯謂將官列侯印如斗晉周顗曰今年破諸賊奴取金印大如斗郎官指李七少尹與畢員外而言渌蟻爾雅酒有泛齊浮蟻在上泛泛然渌則言其色也持節將楚兵高適自言為彭蜀節度時留司東京自西川召拜散騎常侍復拜二千石再為節度使彭門域志彭州古彭門也有彭門山兩峰如闕相望四十步名天彭關又彭祖出入於此山因得名劍門見前注别韋參軍二十解書劍西游長安城舉頭望君門屈指取公卿國風沖融邁三五朝廷禮樂彌寰宇白璧皆言賜近臣布衣不得干明主歸來洛陽無負郭東過梁宋非吾土兔苑為農歲不登雁池垂釣心長苦世人向我同衆人惟君於我最相親且喜百年有交態未嘗一日辭家貧彈碁擊筑白日晚縱酒高歌緑栁春歡娛未盡今散去使我惆悵驚心神丈夫不作兒女别臨岐涕淚霑衣巾書劍史項羽學書不成去學劍雋不疑傳劍君子之武備可以衛身不可解國風詩有十五國風三五謂三皇五帝也禮樂者可以治天下之器而不過和節二事也白璧賜近臣史虞卿一見趙王賜白璧一雙負郭史蘇秦曰吾若有負郭二頃田安能佩六國相印乎梁見前注宋今應天府睢陽縣是即武王封微子之地也兔苑謝靈運雪賦梁王不悅遊於兔苑續漢書梁王兔園多修竹又地志云梁孝王東苑方三百里苑中有鴈池修竹彈碁見前注擊筑史漢高擊筑歌大風又漸離擊筑注筑似琴以竹為之大頭安弦十二或五絃以竹擊之封丘縣今開封府屬縣我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寧堪作吏風塵下秖言小邑無所為公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲悲來向家問妻子舉家盡笑今如此生事應須南畝田世情付與東流水夢想舊山安在哉為銜君命遲回回乃知梅福徒為爾却憶陶潛歸去來孟諸澤睢陽今歸德州博物志宋北至泗水南至睢陽有孟瀦澤即孟諸野也梅福前漢平帝時人見前注陶潛字淵明晉人見晉祚將移棄官歸隱於潯陽嘗賦歸去來辭以見意云朱子綱目書晉處士陶潛亦深著意於其不仕之志也寄宿田家田家老翁住東陂說到平生隱在兹鬢白未曾記日月山青每到識春時門前種桞深成巷野谷流泉添入池牛壯日耕十畝地人間常掃一茅茨客來滿酌清樽酒感興頻吟才子詩巖際窟中藏鼹鼠潭邊竹裏隱鸕鷀村稀日落行人少醉後無心怯路岐今夜只應還寄宿明朝拂曙與君辭門前種桞陶淵明種桞五株自號五桞先生鼹鼠格物志一名蚡鼠穿地中行鸕鷀埤雅水鳥也似鶂而黑一名鷧吐而生子峽中人號為烏鬼以之入水取魚邯鄲少年行邯鄲城南游俠子自矜生長邯鄲裏千場縱博家仍富幾處報讎身不死宅中歌笑日紛紛門外車馬如雲屯未知肝膽向誰是令人却憶平原君君不見今人交態薄黃金用盡還疏索以兹感歎辭舊遊更於時事無所求且與少年飲美酒往來射獵西山頭博慱奕摴蒱之類也報讎見前注平原君史平原君名勝趙之諸公子也賓客至數千人畫馬篇君侯櫪上驄貌在丹青中馬毛連錢蹄鐵色圖畫光輝驕玉勒馬行不動勢若來權竒蹴踏無塵埃感兹絶代稱妙手遂令談者不容口騏驎獨步自可珍駑駘萬匹知何有終未如他櫪上驄載華轂騁雙飛鴻荷君剪拂與君用一日千里如旋風權竒漢武天馬歌志倜儻精權奇騏驎格物志騏驎麕身馬足牛尾黃色圓蹄一角駑駘說文下乘之馬也華轂劉向傳王氏乘朱輪華轂者三十人注轂輻所輳處老子三十輻共一轂即此也雙飛鴻或云馬名未詳又白帖虞國為日南守行惠澤雙鴻隨軒而舞賦得還山吟送沈四山人還山吟天高日暮寒山深送君還山識君心人生老大須恣意看君解作一生事山間偃仰無不至石泉淙淙若風雨桂花松子常滿地賣藥囊中應有錢還山服藥又長年白雲勸盡杯中物明月相隨何處眠眠時憶問醒時意夢魂可以長周旋行路難君不見富家翁舊時貧賤誰比數一朝金多結豪貴百事勝人健如虎子孫成行滿眼前妻能管絃妾能舞自矜一身忽如此却笑傍人獨愁苦東鄰少年安所如席門窮巷出無車有才不肯學干謁何用年年空讀書席門窮巷前陳平陽武戶牖人也户牖富人張負有女視偉平隨至其家家乃負郭窮巷以席為門出無車又馮歡彈鋏而歌曰長鋏歸來乎出無車九月九日酬顔少府簷前白日應可惜籬下黃花為誰有行子迎霜未授衣主人得錢始沽酒蘇秦憔悴人多厭蔡澤棲遲世看醜縱使登高只斷腸不如獨坐空搔首蘇秦史周洛陽人師習鬼谷先生出游數嵗大困而歸兄弟嫂叔妻妾皆笑之後得隂符之書游說六國為從約佩六國相印蔡澤史燕人也游學干諸侯小大甚衆不遇後為秦相未幾而罷登高斷腸劉子齊景公九日遊於牛山北臨其國城而流淚曰美哉國乎鬱鬱洋洋若何謫去此國而死乎崔皓汴州人開元十一年登進士第纍官至尚書司勳郎中詩評崔皓年少題詩名陷輕薄晚節忽變常體風骨凜然窺塞垣說盡戎旅如殺人遼水上走馬漁陽歸等語可與鮑照並驅也行路難君不見建章宫中金明枝萬萬長條拂地垂二月三月花如霰九重深幽君不見艷彩朝含四寶宫香風吹入朝雲殿漢家宫女春未闌愛此芳香朝暮看來看去看心不忘攀折將安鏡臺上雙雙素手剪不成兩兩紅妝笑相向建章昨夜起春風一花飛落長信宫長信麗人見花泣憶此珍樹何嗟及我昔初在昭陽時朝攀暮折登玉墀只言嵗嵗長相對不悟今朝遙相思建章宫前武紀太初二年春作建章宫度為千門萬户東鳯闕西虎圈北太液池中有漸臺蓬萊方丈瀛洲東南玉堂璧門立神明臺井幹樓輦道金明枝四寶宫朝雲殿未詳長信宫東方朔傳長信宫太后之宫也又名長樂宫昭陽漢殿名代閨人答輕薄少年妾家近隔鳯凰池粉壁紗窗楊桞垂本期漢代金吾壻誤嫁長安游俠兒兒家夫壻多輕薄借客探丸重然諾平明挾彈入新豐日晚揮鞭出長樂青絲白馬冶遊園能使行人駐馬看自矜陌上繁華盛不念閨中花鳥闌花間陌上春將晚走馬鬭雞猶未返三時出望無消息一去那知行近遠桃李花開覆井闌朱樓落日卷簾看愁來欲奏相思曲抱得秦箏不忍彈鳯凰池晉荀勗為中書監除尚書令人賀之曰奪我鳯凰池諸君何賀晉人以中書凝邃比天上鳯凰池云金吾游俠探丸新豐長樂走馬鬭雞俱見前注然諾前灌夫傳夫不好文學喜游俠已然諾家纍數十萬食客日數千百人青絲白馬侯景事見前注冶遊園未詳又太白詩岸上誰家遊冶郎注遊貴遊冶艷冶言貴游艷冶之子也秦箏風俗通曰箏秦聲也或曰䝉恬所造又傳言箏賦上崇如天下平如地中空準六合絃柱擬十二月設之則四象該鼓之則五音發此秦箏也今之箏形如瑟不知誰制造矣渭城少年行渭城在咸陽縣東北故杜郵也詩評云此文苑英華與郭茂倩樂府止一首當從之洛陽二月梨花飛秦地行人初憶歸揚鞭走馬城南陌朝逄驛使秦川客驛使前日發章臺傳道長安春早來棠梨宮中燕初至葡萄館裏花正開念此使人歸更早三月便達長安道長安道上春可憐搖風蕩日曲江邊萬户樓臺臨渭水五陵花栁滿秦川秦川寒食盛繁華遊客春來不到家鬭雞下社塵初合走馬章臺日未斜章臺帝城稱貴里青樓日晚歌鐘起貴里豪家白馬驕五陵年少不相饒雙雙挾彈來金市兩兩鳴鞭上渭橋渭城壚頭酒新熟金鞍白馬誰家宿可憐錦瑟爭琵琶玉壺清酒就君家小婦春來不解羞嬌歌一曲楊桞花秦川章臺見前注棠梨宫未詳葡萄館在長安胸奴來朝舍之於葡萄館曲江處淇録曲江本秦豈州即﨑州唐開元中疏鑿為勝景南即紫雲樓芙蓉苑西即杏園慈恩寺花卉環列烟水明媚都人遊常盛於中和上已節凡進士玩榜大宴於此然以其屈曲故曰曲江渭水五陵鬬雞俱見前注下社未詳渭橋在長安地域志渭水所注水上有梁故曰渭橋秦制也亦曰便門橋始皇作離宫於渭水南北以象天漢又於渭上作橋故曰便橋錦瑟作於庖犧氏白虎通瑟者間也所以懲忿窒欲正人之德也其制雅瑟長八尺一寸二十三絃常用十九絃又前武紀黃帝使素女鼓五十絃而悲故止為二十五絃楊栁花元魏胡太后私楊白華後奔梁太后追思為楊白華之歌使宫人連臂歌之孟門行地域志在吉鄉縣與龍門相對題意未詳黃雀銜黃花翩翩傍簾隙本擬報君恩如何反彈射金罍美酒滿座春平原愛才多衆賓滿堂盡是忠義士何意得有讒諛人諛言反覆那可道能令君心不自保北園新栽桃李枝根株未固何轉移成隂結實君自取若問傍人那得知黃雀後漢楊寶年七嵗行於華山見一黃雀披瘡為螻蟻所傷見而惜之因取於巾箱內採黃花以飼之經十餘日瘡愈旦去暮來忽一日變為年少與玉環一雙以報曰好掌此環子孫纍世為三公平原趙平原君趙勝門下嘗有客三千餘人長安道長安甲第高入雲誰家居住霍將軍日晚朝回擁賓從路傍拜揖何紛紛莫言執手手可熱須臾火盡灰亦滅莫言貧賤即可欺人生富貴自有時一朝天子賜顔色世事悠悠應始知霍將軍霍去病也霍光兄弟皆為大將賜甲第於長安而父子兄弟皆為列侯寵盛一時七夕風俗記七月七夕謂之巧節長安城中月如練家家此夜持針線仙裙玉珮空自知天上人間不相見長信深隂夜轉幽玉階金閣數螢流班姬此夕愁無限河漢三更看斗牛持針線謂乞巧也續齊諧記陽城武丁有仙道謂其弟曰七月七日織女當渡河暫詣牽牛又荆楚記七夕婦人以彩縷穿七孔針陳瓜果於庭中以乞巧仙裙玉珮指織女牽牛而言蓋云牛女渡河惟自知其果然否天上與人間相去懸絶焉知其事之果有無也長信宫名漢長信宮太后之宫也又東方朔傳武帝五日一朝長信宫又名長樂宫班姬前本傳班姬媫妤也成帝即位選入後宫為媫妤後以趙飛燕譖退居長信宫供養太后也河漢見前注斗天文志北方七宿斗牛女虛危室壁南斗六星牽牛三星又名天鼓星在河中鴈門太守歌鴈門在代郡今大同府也鴈門古胸奴之地高山代郡東接燕鴈門之人家近邊解放胡鷹逐塞鳥能將代馬獵秋田山頭野火寒多燒霧裏孤峰濕作烟聞道遼西無鬭戰時時醉向酒家眠代郡古兾州之域唐國之域春秋為晉地其後屬趙秦為鴈門郡鴈門關山名鴈門之北皆大山故云高山代郡也代為邊地東與燕境相接其民皆胡人代馬古詩代馬依北風蓋燕代之問多出良馬云遼西秦四十郡分遼東遼西為二郡遼西即今之廣寧等處乃古之孤竹國也遼水名遼河南北千餘里東西二百里遼河居中故云川上女題意未詳川上女晚妝鮮日落青渚試輕楫汀長花滿正回船暮來浪起風轉緊自言此去橫塘近渌江無伴夜獨行獨行心緒愁無盡橫塘渌江未詳又云在金陵李頎宋州人開元中進士官至新鄉縣尉其為詩發調清新詞亦秀麗雜歌咸善𤣥理最長故其氣象往往高於衆作聽董大彈胡笳聲兼語弄寄房給事董大未詳何許人房給事房琯也胡笳聲蔡文姬胡笳十八拍也胡笳始於北人卷蘆葉吹之故曰胡笳語弄亦琴操之别名也蔡女昔造胡笳聲一彈一十有八拍北人落淚向邊草漢使斷腸對歸客古戍蒼蒼烽火寒大荒隂沈飛雪白先拂商絃後角羽四郊秋葉驚摵摵董夫子通神明深松竊聽來妖精言遲更速皆應手將往復旋如有情空山百鳥散還合萬里浮雲隂且晴嘶酸雛鴈失羣夜斷絶嬌兒戀母聲川為靜其波鳥亦罷其嗚烏珠部落家鄉逺邏逤沙塵哀怨生幽隂變調忽飄灑長風吹林雨墮瓦逬泉颯颯飛木末野鹿呦呦走堂下長安城連東掖垣鳯凰池對青瑣門高才脫略名與利日夕望君抱琴至蔡女蔡雍之女名琰字文姬博學有才藝妙於音律適河東衛仲道道死無子歸寧於家興平之亂為北人所虜沒於南胸奴左賢王生二子曹操當國以雍無後遣使贖回作胡笳十八拍拍說文板也韓退之謂之樂句唐王維有以按樂圖示者維曰此霓裳第三疊拍也蓋一拍之終為一疊十八拍即十八疊也北人落淚言聞此而怨别也漢使斷腸言漢之使臣聞而傷別也戍說文守邊也古戍言古時守邊之屯舍也烽火見前注商絃角羽琴之第二第三第五絃也秋葉摵摵此言其聲也通神明桓談新論云神農氏始削桐為琴繩絲為絃通神明之德烏珠部落後南胸奴傳烏珠南胸奴若提單于之子部落落說文居也人所聚居故謂村落屯落此言部落者烏珠所部之人屯落也邏逤唐史吐蕃都城名又新史云吐蕃號君長為贊普贊普居邏逤川故以為城都之號變調調說文樂律也墮瓦韓子師曠援琴鼓之俄而清角一奏雲從西北方來再奏大風雨裂帷幕墮廊瓦逬泉言其音如泉之逬出而流響也野鹿呦呦詩呦呦鹿鳴注呦呦鹿聲之和也長安見前注東掖垣史天官尚書太微宫垣十里東垣比上相名左掖門又左右掖垣承天子誥命權德輿傳有東西兩掖垣乃禁垣也青瑣門漢百官志青瑣户邊瑣縷也刻為連瑣文而青塗也脫略太白詩英雄初未遇其迹或脫略鳯凰池中書為鳯凰池見前注放歌行答從弟墨卿王僧䖍歌録云孤子行一曰放歌行亦相和歌詞之瑟調也小來好文恥學武世上功名不解取雖沾寸祿已後時徒欲出身事明主柏梁賦詩不及宴長楸走馬誰相數斂跡俯眉心自甘高歌擊節聲半苦由是蹉跎一老夫養雞牧豕東城隅空歌漢代蕭相國肯事霍家馮子都徒爾當年聲藉藉濫作詞林兩京客故人斗酒安陵橋黃鳥春風洛陽陌吾家令弟才不羈五言破的人共推興來逸氣如濤湧千里長江歸海時别離短景何蕭索佳句相思能間作舉頭遙望魯陽山木葉紛紛向人落好文學武漢顔駟龐眉皓髮為郎武帝輦過郎署問駟何其老也對曰文帝好文臣好武寸祿猶言微祿也後時過時也柏梁漢武元鼎二年起柏梁臺在長安城中北闕內三輔黃圖云以香柏為梁帝嘗置酒臺上詔羣臣賦詩能七言者乃得上今詩謂柏梁體者是也長楸走馬曹子建詩走馬長楸間楸木名通志楸與梓相似蓋牧馬之所或有楸故云走馬見前注養雞列仙傳祝雞翁居洛陽尸鄉下養雞百餘年雞皆有名字凡千餘頭晝日放散暮栖於樹呼其名即種别而至牧豕漢公孫𢎞菑川人少時為獄吏有罪家貧牧豕於海上年四十餘乃學春秋後為相封平津侯馮子都李長吉秦宫詩自序云嘗作詞以霍家馮子都相對云又子都古之美人也按秦宫乃漢梁兾之嬖奴則子都亦必霍家之奴而有寵者也蕭相國蕭何見前注安陵漢惠帝陵史梁孝王使人刺殺袁盎於安陵郭門外魯陽山又地域志南陽有魯陽縣又汝州有魯山縣縣有魯山或即此也的詩發彼有的詩說按射義發而不失正鵠其惟賢者乎的即正鵠也又中庸集注鵠皆侯之中射之的也緩歌行小來脫身攀貴游傾財破産無所憂暮擬經過石渠署朝將出入銅龍樓結交杜陵輕薄子謂言可生復可死一沈一浮㑹有時棄我翻然如脫屣男兒立身須自強十年閉户潁水陽業就功成見明主擊鐘鼎食坐華堂二八蛾眉梳墮馬美酒清歌曲房下文昌宫中賜錦衣長安陌上退朝歸五侯賓從莫敢視三省官僚揖者稀早知今日讀書是悔作從前狂俠兒貴遊周禮師氏凡國之貴遊子弟學焉石渠署漢施讎傳與五經諸儒雜論同異於石渠閣三輔故事閣在未央殿北以藏祕書也銅龍樓前成紀出銅龍樓門張晏曰門樓上有銅龍故名若白鶴飛廉之類是也杜陵見前注輕薄子前馬援書學杜季良不成陷為天下輕薄子脫屣猶言棄屣也閉戶孫敬字文寶閉戶讀書人號為閉戶先生潁水邑名屬潁州水在汝隂故城東南至慎縣又東南入淮河鐘鼎西京賦擊鐘鼎食列騎相遇蛾眉美人也墮馬後梁兾妻孫壽美而善為疾態作愁眉啼粧墮馬髻曲房未詳文昌宫文昌前天文志斗魁戴筐六星曰文昌宫三輔黃圖唐武氏改以尚書僕射為文昌皆丞相之任賜錦金坡遺事學士舊規十月賜錦五侯前成紀王氏五侯同日而封又後質紀延熹二年封宦者單超等五人為列侯世謂之五侯三省唐官制尚書省北齊為都省亦云北省漢靈帝時謂之中臺唐龍朔二年改尚書省為中臺中書省漢官儀中書為右曹又稱西掖唐開元中改中書省曰紫微省龍朔元年改中書省曰西臺門下省唐龍朔改門下省曰東臺垂拱間改曰鸞臺開元間曰黃門省游俠兒見前注古行路難漢家名臣楊德祖四代五公享茅土父子兄弟綰銀黃躍馬鳴珂朝建章火浣單衣繡方領茱萸錦帶玉盤囊賓客填街復滿座片言出口生輝光世人逐勢爭奔走瀝膽隳肝惟恐後當時一顧登青雲自謂生死長隨君一朝謝病還鄉里窮巷蒼苔絶知己秋風落葉閉重門昨日論交竟誰是薄俗嗟嗟難重陳深山麋鹿可為鄰魯連所以蹈東海古往今來稱達人楊德祖名修曹操主簿後為操所殺修父彪彪父賜賜父秉秉父震自震至彪四世為太尉震五子長子牧當陽守牧孫竒桓帝時為侍中故云父子兄弟也太尉漢三公之職故曰四世五公也又綱目劉備曰公路四世五公海內所歸銀黃前楊僕懷銀黃垂三組注銀印金印也修四世為三公其品第一齊職儀曰三師品第一金章紫綬進賢三梁冠絳朝服故云綰銀黃也火浣單衣有火浣布出外國漢梁兾嘗㑹客佯爭酒失杯而汙之僞怒爭燒之布得火然如灰垢盡火滅瑩然潔白茱萸錦帶謂錦文如茱萸也盤囊晉鄧攸夢水邊見一女有猛獸自後斷其盤囊片言謂一言也瀝膽隳肝蒯通傳披腹心墮肝膽魯連魯仲連齊人也好竒偉俶儻之䇿而不肯仕宦時新垣衍說趙帝秦仲連往見之曰云彼即肆然而為帝則連有蹈東海而死耳吾不忍為秦之民也送陳章甫四月南風大麥黃棗花未落桐葉長青山朝别暮還見嘶馬出門思舊鄉陳侯立身何坦蕩虬鬚虎眉仍大顙腹中貯書一萬卷不肯低頭在草莽東門沽酒飲我曹心輕萬事如鴻毛醉臥不知白日暮有時空望孤雲高長河浪頭連天黑津吏停舟渡不得鄭國遊人未及家洛陽行子空歎息聞道故林相識多罷官昨日今如何坦蕩論語君子坦蕩蕩虬鬚唐史太宗虬鬚可以掛弓又郭知運虬鬚虎眉大顙未詳貯書萬卷唐李雍閲祕閣萬卷書未幾辭去又宋朱昻篤於學有朱遵度者時號萬卷目昻為小萬卷草莽左委君貺於草莽又孟草莽之臣杜預云草莽者草生廣野莽莽然故曰草莽輕如鴻毛史記死有重於泰山或輕於鴻毛津吏左趙簡子南擊楚津吏醉不能渡按此則津即守渡之吏也鄭國今鄭州也洛陽今河南府洛陽縣見前注送劉十三十不官亦不娶時人焉識道高下房中惟有老氏書櫪上空餘少游馬往來嵩華與咸秦放歌一曲前山春西林獨鶴引閒步南澗飛泉清角巾前年上書不得意歸臥東窗兀然醉諸兄相繼掌青史第五之名齊驃騎烹葵摘果告我行落日夏雲縱復橫聞道謝安掩口笑知君不免為蒼生三十不官不娶內則曰二十而冠三十而有室四十始仕老氏書老氏老子也本傳老子名耳字伯陽皇甫謐曰周守藏之吏也見周衰遂去至關關令尹喜請為著書於是著書上下篇言道德五千餘言而去少游馬後馬援傳少游援從弟也嘗謂援曰士生一世但取衣食裁足乘下澤車御欵段馬鄉里稱善人可也嵩華嵩山華山咸陽秦京也角巾後郭林宗遇雨巾一角墊時人故折巾一角為林宗巾乂羊祐曰既定邊事當角中東洛歸臥東山謝安字安石高松戲之曰束山高臥安石不出將如蒼生何驃騎漢霍去病封驃騎將軍青史古者以青簡書事故曰青史諸兄第五之名未詳所止送康洽入京進樂府詩識子十年何不遇只愛歡遊兩京路朝吟左氏嬌女篇夜誦相如美人賦長安春物舊相宜小苑葡萄花滿枝桞色偏濃九華殿鶯聲醉殺五陵兒曳裾此夜從何所中貴由來盡相許白袂春衫仙吏贈烏皮隱几郎官與新詩樂府唱堪愁御妓應傳鳷鵲樓西上雖因長公主終須一曲武陵侯兩京西京東京也左氏嬌女篇相如美人賦未詳葡萄苑漢有葡萄苑見前注九華殿曹魏洛陽宫殿傳魏有太極芙蓉九龍九華承光等殿俱在洛陽五陵見前注曳裾鄒陽上書曰臣飾愚陋則何王之門不可曳長裾乎古從軍行白首登山望烽火黃昏飲馬傍交河行人刁斗風沙暗公主琵琶幽怨多野雲萬里無城郭雨雪紛紛連大漠胡鴈哀鳴夜夜飛胡兒眼淚雙雙落聞道玉門猶被遮應將性命逐輕車年年戰骨埋荒外空見葡萄入漢家烽火見前注交河唐志貞觀十四年平高昌以其地置四州交河郡中都督府以其河水分流繞城下因名交河刁斗見前注公主琵琶漢武帝以江都王女嫁鳥孫王昆莫為右夫人念其行道使知音者馬上奏琵琶以慰之琵琶玉門俱見前注輕車漢官後高祖命天下選能引關蹶張材力威猛者用以為輕車騎士葡萄見前注愛敬寺古藤歌寺在今京師鍾為其間梁高祖天監元年造古藤池水盤樹根左攫右拏龍虎蹲橫空直上相凌突丰茸離纚若無骨風雷霹靂連黑枝人言其下藏妖魑空庭落葉乍開合十月苦寒常倒垂憶昨花飛滿空殿密葉吹香飯僧遍南階雙桐一百尺相與年年老霜霰鮫人歌博物志鮫人水居出人間賣綃後臨去從主人索器泣而出珠與主人鮫人潛織水底居側身上下隨游魚輕綃文采不可識夜夜澄波連月色有時寄宿來城市海島青冥無極已泣珠報恩君莫辭今年相見明年期始知萬族無不有百尺深泉架户牖鳥沒空山誰復望一望雲濤堪白首送郝判官楚城木葉落夏口青山轉鴻鴈向南時君乘使者傳楓林帶水驛夜火明山縣千里送行人蔡州如眼見江連清漢東逶迤遙望荆雲相蔽虧應問襄陽舊風俗為余騎馬習家池夏口在武昌縣東青山在江東岸今青山頭是也蔡州今汝寧府古蔡州也襄陽今襄陽府也習家池晉書襄陽習郁家有大池最為竒勝故以習家名之也古意男兒事長征少小幽燕客賭勝馬蹄下由來輕七尺殺人莫敢前鬢如蝟毛磔黃雲隴底白雪飛未得報恩不得歸遼東小婦年十五慣彈琵琶解歌舞令為羌笛出塞聲使我三軍淚如雨幽燕幽州也幽皆燕地故曰幽燕七尺身長七尺也蝟說文其蟲似毫猪經云可治胃病故以蝟名又炙轂子云蝟似鼠性獰鈍物少犯近則毛棘攢起如矢遼東古肅慎氏地也在唐時為粟末靺鞨二種東夷中為最強國今懿州開原咸平蓋翕復東寧廣寧皆其地也琵琶見前注出塞入塞曲名羌笛羌人所吹之笛送劉昱八月寒葦花秋江浪頭白北風吹五兩誰是潯陽客鸕鷀山頭宿雨晴揚州郭裏暮潮生行人夜宿金陵渚試聽沙邊有鴈聲五兩淮南子曰若綄之候風也許慎曰綄候風扇也楚人謂之五兩又郭璞江賦視五兩之動靜善注謂以雞羽為之重八兩繫於檣尾以候風也潯陽今九江府潯陽縣也鸕鷀水鳥也埤雅云似鶂而黑一名鷧吐而生子峽中呼之為烏鬼楊州今揚州府也金陵渚金陵沙渚也渚爾雅小洲曰渚乂渚遮也能遮水使回也王季友河南人詩評云季友愛竒務險遠出常情之外然而白首短褐良可悲夫酬李十六岐鍊丹文武火未成賣藥販屨俱逃名出谷迷行洛陽道乘流醉臥滑臺城城下故人久離怨一歡適我兩家願朝飲杖懸沽酒錢暮餐囊有松花飯於何車馬日憧憧李膺門館爭登龍千賓揖對若流水五經發難如扣鐘下筆新詩行滿壁立談古人坐在席問我草堂有臥雲知我山儲無儋石自耕自刈食為天如鹿如麋飲野泉亦知世上公卿貴且養丘中草木年鍊丹仙家修養之術然鍊丹之說以烹鍊金石為外丹吐故納新為內丹大隱丹經曰有大小還丹言展轉循環也文武火丹法曰奮迅精神袪除雜念為武火専氣柔含光默默溫溫不絶綿綿若存為文火賣藥後韓康字伯休霸陵人采藥名山賣於長安市中口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎康笑曰本欲避名今小女子皆知有我何用藥為遂逃入山中不知所終販屨未詳又陳仲子適楚王欲以為相妻曰子織屨以為食恬然無為樂在其中乃謝使者洛陽道見前注滑臺城今滑州州有滑臺乃古之測景臺也又綱目集覽滑臺春秋本鄭之屬邑也至後魏置東郡又改滑州云杖懸沽酒錢晉阮宣常以百錢掛杖頭至酒店便獨酣暢家無儋石晏如也松花以松花作飯也李膺字元禮後漢人性簡亢無所交接仕桓帝為司𨽻校尉獨持風采以聲名自高有被其容接者名為登龍門五經發難謂發五經明滯義也扣鐘記善待問者如扣鐘扣之大者大鳴扣之小者小鳴儋石南史劉毅家無儋石之儲注齊人名小甕為甔受二斗二升云石者斗石也儋者人所負儋也代賀枝令譽贈沈千運相逢問姓名亦存别時無子今有孫山上雙松長不改百家惟有三家村村南村西車馬道一宿通舟水浩浩澗中磊磊十里石河上游泥種桑麥平坡冢墓皆我親滿田主人是舊客舉聲酸鼻問同年十人七人歸下泉分手如何更此地回頭不去淚潸然觀于舍人壁畫山水野人宿在山家少朝見此山謂山曉半壁仍棲嶺上雲開簾欲放湖中鳥獨坐長松是阿誰再三招手起來遲于公大笑向余說小弟丹青能爾為儲光羲同張侍御宴北樓今之太守古諸侯出入雙旗垂七旒朝覽干戈時聽訟暮延賓客復登樓西山漠漠崦嵫色北渚沈沈江漢流良宵清淨方高㑹繡服光輝聨皂蓋魚龍恍惚階墀下雲霧杳冥窗戶外水靈慷慨行泣珠游女飄颻思解珮蒼蒼低月半遙城落落疏星滿太清不分開襟悲楚奏願言吹笛退邊兵軒后青丘埋猰㺄周王白羽掃攙搶期君武節朝龍闕豫亦翺翔歸帝京太守秦官也秦滅諸侯以其地為郡罷侯置守秩二千石至漢景帝中元二年更名太守故曰古諸侯也雙旗記室新書曰太守之車五馬雙旌又劉禹錫送李楚州詩云緹騎朱旗入楚城七旒說文垂玉也謂冠上之覆垂以玉也周禮侯伯七旒繅玉七就繡服漢官志御史服繡衣直指主討姦猾注衣以繡者尊寵之也皂蓋續漢志二千石皆皂蓋朱轓泣珠解珮見前注楚奏前漢兵圍籍垓下四面楚歌奏詩蒙叟奏公注謂樂一更端為一奏吹笛退邊兵晉劉琨為並州刺史嘗為邊騎所圍琨乘月登樓吹胡笳賊皆流淚歔欷有懷土之思遂棄圍而去軒后黃帝也古者君皆稱后說文繼體君也象人之形施命以告四方故從􅛣一口也青丘謂山東青州古曰青社故曰青丘猰㺄說文獸名出南海外虎文龍爪食人又山海經猰㺄害人黃帝囚之疏屬之山又楚詞以之比暴人也攙搶爾雅謂彗星也周王未詳所指白羽龍闕玉京俱見前注薔薇大食國花名其花紅色其露著衣香久不散又名牛勒牛利刺紅謝眺有薔薇花詩裊裊長數尋青青不作林一莖獨秀當庭心數枝分作滿庭隂春日遲遲欲將半庭影離離正堪玩枝上嬌鶯不畏人葉底飛蛾自相亂秦家女兒愛芳菲畫眉相伴采葳蕤高處紅鬚欲就手低邊緑刺已牽衣葡萄架上朝光滿楊桞園中暝鳥飛連袂踏歌從此去風吹香氣逐人歸秦家女兒未詳畫眉葳蕤葡萄俱見前注踏歌續仙傳藍采和有踏踏歌又南陽雜俎元初士人見古屏上婦人悉於牀頭踏歌又魏太后逼幸楊白華華奔梁太后思之作楊白華歌使宫人連臂踏踏歌之新豐主人新豐見前注新豐主人新酒熟舊客還堂客滿酌香含北砌花盈樽色泛南軒竹雲散天高秋月明東家少女解秦箏醉來忘却巴陵道夢中疑似洛陽城秦箏說文樂器鼓絃竹身乂古以竹為之秦樂也因之以為名或云蒙恬所造故曰泰箏乂風俗通箏之制上圓象天下平象地中空準六合絃律十二擬十二月乃仁智之器也今並涼二箏形如瑟不知誰改也巴陵今嶽州府已見前注洛陽洛陽縣也孟浩然高陽池送朱二即習家池在襄陽昔當襄陽全盛時山公常醉習家池池邊釣女日相隨粧成照水競來窺紅波淡淡芙蓉發緑岸毿毿楊桞垂一朝物變人亦非四面荒涼人住稀意氣豪華何處在空餘草露濕人衣此地朝來餞行者翻向此中牧征馬征馬分飛日漸斜見此空為人所嗟殷勤為訪桃源客余亦歸來松子家襄陽地域志又名穀城古穀伯國也山公晉山簡也簡鎮襄陽惟酒是耽諸習有佳園池簡出游多之池上置酒輒醉名之曰高陽池桃源客松子家俱見前注送王七尉松滋松滋縣名今屬荆州府君不見巫山神女作行雲霏紅沓翠曉氛氲嬋娟流入襄王夢倐忽還隨零雨分空中飛去復飛來朝朝暮暮下陽臺愁君此去為仙尉便逐行雲去不回巫山神女行雲見前注嬋娟美好貌襄王夢見前注零雨詩靈雨既零注時雨也陽臺仙尉俱見前注夜歸鹿門歌山寺鳴鐘晝已昏漁梁渡頭爭渡喧人隨沙岸向江村余亦乘舟歸鹿門鹿門月照開烟樹忽到龎公棲隱處巖扉松徑長寂寥惟有幽人自來去龎德公居峴山之南平生不入城府漢建安中攜妻子入鹿門山採藥不返張正言名謂河南人天寶二年進士官至禮部侍郎詩評云正言代北老翁答及湖中對酒之作在物情之外但衆人未嘗說耳亦何必歷追遐探然後為冥搜云湖中對酒作夜坐不厭湖上月晝行不厭湖上山眼前一尊又長滿心中萬事如等閒主人有黍百餘石濁醪數斗應不惜即今相對不盡歡别後相思復何益茱萸灣頭歸路賖願君且宿黃翁家風光若此人不醉參差孤負東園花茱萸灣未詳黃翁家世說王戎為尚書令過黃公壚曰吾昔與嵇叔夜阮嗣宗酣暢此壚自嵇阮亡便為時所羇絏今視此壚雖近邈若河山矣贈喬林去年上策不見收今年寄食仍淹留羡君有酒能便醉羡君無錢能不憂如今五侯不待客羡君不問五侯宅如今七貴方自尊羡君不過七貴門丈夫㑹應有知已世上悠悠何足論五侯見前注七貴潘嶽西征賦窺七貴於漢庭注七貴謂吕霍上官趙丁傳王七家也知已韓詩外傳鮑叔有疾𬋩仲不食不內漿曰士為知已者用馬為知已者良鮑子死天下莫我知安用漿雖為之死亦何傷哉悠悠說文行貌古詩終是悠悠行路心常建張公子行日出乘釣舟嫋嫋垂釣竿涉淇傍荷花驄馬間金鞍使君白雲中腰間懸轆轤出門事嫖姚為君西擊胡胡兵漢騎相馳逐轉戰孤軍海西北百尺旌竿沈黑雲邊笳落日不堪聞淇水名出河內共北山東至黎陽入河一曰出隆慮通志一名清水即洚水也轆轤劍名晉灼曰古劍首以玉刻轆轤故名前霍去病為嫖姚校尉注謂􅔂徑貌古意井底玉冰洞地明琥珀轆轤青絲縈仙人騎鳯披采霞挽上銀瓶照天閣黃金作身雙飛龍口銜明月噴芙蓉一時渡海望不見曉上青樓十二重琥珀本草出罽賓國陶隱居云松脂入地千年而化轆轤說文井上汲水圓轉木也雙飛龍銜明月山海經鍾山之神名燭隂身長千里人面蛇身赤色又名燭龍天不足西北無隂陽消息故有龍銜火精以照天門也青樓十二重十洲記崑崙山有閬風苑苑中有十二玉樓劉文房字長卿河間人開元中進士為監察御史終徐州刺史聽笛歌舊游憐我長沙謫載酒沙頭送遷客天涯望月自霑衣江上何人復吹笛橫笛能令孤客愁渌波淡淡如不流商聲寥亮羽聲苦江天寂歷江楓秋靜聽關山聞一呌三湘月色悲猿嘯又吹楊栁激繁音千里春色傷人心隨風飄向何處落唯見曲盡平湖深明發與君離别後馬上一聲堪白首舊游謂平昔交游也長沙禹貢荆州之域三苗之境秦置長沙郡晉改湘州隋改潭州今復為長沙府長卿常以罪謫長沙故云遷客遷客謂遷逐之客也商聲荀子王制篇詩商歌注商哀思之音羽聲說文羽北方水音也關山楊栁皆曲名三湘即長沙又寰宇記湘潭湘鄉湘源為三湘皆屬長沙望龍山懷道士許法稜九域志太平府有龍山桓溫嘗遊其處也心惆悵望龍山雲之際鳥獨還懸崖絶壁幾千丈緑蘿嫋嫋不可攀龍山高誰能踐靈原中蒼翠晚嵐烟瀑水如向人終日迢迢空在眼中有一人披霓裳誦經山頂餐瓊漿空林間坐獨焚香真官列侍儼成行朝入青霄禮玉堂夜掃白雲眠石牀桃花洞裏居人滿桂樹山中住日長龍山高高遙相望霓裳楚辭九歌青雲衣兮白霓裳瓊漿見前注玉堂殿名漢武帝造桃花洞見前注桂樹山中楚辭桂樹叢生兮山之陽注淮南王劉安好道感八公共登山攀桂而賦有大小桂山因以為號齊一和尚影堂一公住世忘世紛暫來復去誰能分身寄虛空如過客心將生滅是浮雲蕭散浮雲往不還淒涼遺教歿仍傳舊地愁看雙樹在空堂只是一燈懸一燈長照恆河沙雙樹猶落諸天花天花寂寂香深殿苔蘚蒼蒼閒虛院昔余精念訪禪扉常接微言清道機今來寂寞無所得惟共門人淚滿衣暫來復去釋氏之教貴於去來無礙故云暫來復去也去來猶言生死也身寄虛空佛陀難提尊者曰心同虛空界身等虛空法登得虛空法無是無非法生滅傳燈録無住禪師云見境心不起名不生不生即不滅既無生滅即不被前塵所縛當得解脫雙樹涅槃經云世尊於拘尼耶城雙樹間入滅一燈維摩經無盡燈者佛如一燈然百千燈冥者皆明明終不滅恆河沙維摩經云取三千大千世界如陶家輪著右掌中擲過恆河沙世界之外諸天花玉皇經云諸天寶花零亂散落王昭君歌自矜嬌艷色不顧丹青人誰知粉繪能相負却使容華翻誤身上馬辭君嫁驕主玉顔對人啼不語北風鴈急浮雲秋萬里獨見黃河流纖腰不復漢宫寵雙娥長向霜天愁琵琶絃中苦調多蕭蕭羌笛聲相和誰憐一曲傳樂府能使千秋傷綺羅丹青人後平帝宫人多令毛延壽圖其貌按圖召幸宫人多以金繒賂毛延壽祈美其貌以希進寵獨王嬙自矜其色不賂延壽延壽圖不以實少得進見及與胸奴和王嬙以圖當行明帝見之驚其絶色然以行不可遂止乃殺延夀纖腰雙娥琵琶羌笛俱見前注銅雀臺獻帝建安十五年冬曹操作銅雀臺於鄴沈括曰今彰德城東北角舊圮橋存嬌愛更何日高臺空數層含啼映雙袖不忍看西陵漳水東流無復來百花輦路為蒼苔青樓月夜長寂寞碧雲日暮空徘徊君不見鄴中萬事非昔時古人不在今人悲春風不逐君王去草色年年舊宫路宫中歌舞已浮雲空指行人往來處西陵曹操寢園所在見前注漳水在順德府東北過巨鹿縣鄴州古相州今河南彰德府也魏都鄴中銅雀臺亦建於鄴故此云舊宫也浮雲語富貴於我如浮雲言飄忽不常也客舍喜鄭三見寄客舍逢君未授衣閉門愁見桃花飛遙想故園今已爾家人應念行人歸寂寞垂楊映深曲長安日暮靈臺宿窮巷無人鳥雀閒空庭新雨莓苔緑此中分與故交疏何幸仍回長者車十年未稱平生意好得辛勤漫讀書授衣詩七月流火九月授衣靈臺見前注長者車漢陳平少貧以席為門然門外多長者車韋應物長安道漢家宫殿含雲烟兩宫十里相連延晨霞出沒弄丹闕春雨依微自甘泉春雨依微春尚早長安貴遊愛芳草寶馬橫來下建章香車却轉避馳道貴遊誰最貴衛霍世難比何能䝉主恩幸遇邊塵起歸來甲第拱皇居朱門峩峩臨九衢中有流蘇合歡之寶帳一百二十鳯凰羅列含明珠下有錦鋪翠被之燦爛博山吐香五雲散麗人綺閣情飄飄頭上鴛鴦雙翠翹低鬟曳袖回春雪聚黛一聲愁碧霄山珍海錯棄籓籬烹犢炮羔如折葵既請列侯封部曲還將金印授廬兒歡榮若此何所苦但苦白日西南馳凌雲烟言其高也兩宫十里言其近也丹闕以丹泥塗宮闕門故曰丹闕甘泉見前注寶馬言以其寶玉飾馬也建章香車馳道見前注貴遊見後注衛霍衛青霍光二族也甲第漢胡建傳告建侵辱長公主射于甲舍門師古曰甲舍即甲第猶言甲乙丙丁之次也皇居帝京也流蘇倦遊録云帳四角所繫槃線繪繡之絿五色同心下垂也舍歡古詩裁成合歡扇蓋言兩兩相合也寶帳謂以珍寶飾其帳也一百二十鳯凰言四維周列鳯凰銜夜光之珠也以相照也錦鋪以錦鋪為席也博山考古圖博山罏象海中博山下盤貯湯潤氣蒸香象海之四環麗人美人也綺閣猶言繡閣也頭上鴛鴦言金玉刻為鴛鴦首飾翠翹東坡詩剛助斜風濕翠翹山珍山中之珍味也禮羅八珍於前是也海錯書傳錯雜山海物非一種故曰錯棄藩籬猶言棄之也犢牛犢也羔羊羔也如折葵言其多也列侯高紀通侯諸將張晏曰後改為列侯列者見序列也廬兒漢書鮑宣傳蒼頭廬兒部曲漢李廣行無部曲注大將營五部部有校尉一人部下有曲金印見前注聽鶯曲東方欲曙花冥冥啼鶯相喚亦可聽乍去乍來時近逺才聞南陌又東城忽似上林翻下苑綿綿蠻蠻如有情欲轉不轉意自嬌羌兒弄笛曲未調前聲後聲不相及秦女學箏指猶澀須臾風暖朝日暾流音變作百鳥喧誰家懶婦驚殘夢何處愁人憶故園伯勞飛過聲局促戴勝下時桑田緑不及流鶯日日啼花間能使萬家春意閒有時斷續聽不了飛去花枝猶裊裊還棲碧樹鎖千門春漏方殘一聲曉批云望而知為本色人也上林下苑見前注絲蠻鳥啼聲羌兒西人也秦女學箏見前注自綿綿蠻蠻如有情至流音變作百鳥喧皆形容鶯啼之聲也誰家懶婦至何處游人二句形容鶯聲感人之深也百勞杜詩東飛百勞西飛燕百勞說文鳥名隂氣動而鳴陽氣動而止隂賊之鳥乂名鴂又曰博勞戴勝記月令戴勝降於桑注織絍之鳥頭上毛花成勝故名也燕銜泥銜泥燕聲嘍嘍尾涎涎秋去何所歸春來復相見豈不解決絶高飛碧雲裏何為地上銜泥滓銜泥雖賤意有營畫梁朝日巢欲成不見百鳥畏人林野宿翻遭網羅俎其肉未若銜泥入華屋燕銜泥百鳥之智莫與齊嘍嘍廣韻連嘍煩貌涎涎前五行志燕燕尾涎涎說文光澤貌又廣韻好美貌秋去春來燕以秋社前則去至春社則來此詩蓋有所諷而作也橫塘行橫塘網目集覽即橫江也又金陵覽古曰自江口治淮築隄謂之橫塘也妾家住橫塘夫壻郗家郎玉盤的歷矢白魚湘簟玲瓏透象牀象牀可寢魚可食不知郎意何南北岸上種蓮豈得生池中種槿豈得成丈夫一去花落樹妾獨長夜心未平郗家未詳乂東晉時惟郗鑒家與王氏獨盛湘簟瀟湘多竹可作簟故云湘簟象牀八逸請談梁魚客性多靡以象齒檀沉造床周匝用銀鏤金花寶鈿金蓮花又以琥珀龜負床腳桞子厚古東門行按枝録續相和歌詞之瑟調曲也又桞文注鮑明逺樂府有東門行此詩蓋諷盜殺武元衡事元衡為相宅在京師靜安里元和十年六月將朝出里東陽有賊自暗中突出直刺之從者散走遂遇害於路又詩評云劉禹錫桞子厚與武元衡素不協二人之貶元衡為相之時也及盜殺元衡禹錫作靖共佳人怨以悼元衡之死其實快之子厚古東門行亦然又劉良曰長安城門即東都門離别之地漢家三十六將軍東方雷動橫陳雲雞鳴函谷客如霧貌同心異不可數赤丸夜語飛電光徼巡司𨽻眠如羊當街一叱百吏走馮敬胸中函七首凶徒側耳潛愜心悍臣破膽皆杜口魏王臥內藏兵符子西掩袂真無辜氐夷轂下一朝起敵國舟中非所擬安陵誰辨削礪工韓國詎明深井里絶胭斷骨那可補萬金寵贈不如土三十六將軍漢景帝三年七國反周亞夫將三十六將住擊之此謂吳元濟反武元衡請發兵討之王承宗李師道請宥元濟白事中書元衡斥去遂謀殺元衡雞鳴函谷史記孟嘗君逃於秦夜半至函谷關關法雞鳴方出客乃作僞雞鳴出關而去此謂承宗師道遣人入關刺元衡也貌同心異言入關客多而不可辨也赤丸前尹賞傳長安少年受贓報讎相與探丸為彈得赤丸者所武吏黑丸者斫文吏徼巡司𨽻前漢中尉掌徼巡京師古曰徼謂遮繞也司𨽻掌察三輔謂盜殺元衡邏司傳噪莫知主名如方眠之羊不能禦暴也當街一叱謂賊乘暗呼曰滅燭元衡徒御散走馮敬賈誼傳雖有悍如馮敬者適啓其口七首已陷其胸矣馮敬魏之騎將也七首漢鄒陽傳七首竊發師古曰七首短劒也其音類七便於用也凶徒謂王承宗李師道反側之徒側耳謂耳傾以聽也愜心謂快意也悍臣謂勇悍之臣杜口謂閉塞其口此言元衡既死朝臣驚懼爭勸帝罷兵吏卒不敢窮捕凶人也魏王兵符史魏將晉鄙兵符在王臥內姬竊與公子無忌發晉鄙兵以救趙也子西掩袂左楚白公反殺子西於朝子西以袂掩面而死羌夷轂下司馬相如曰是夷越起於轂下而羌夷接軫也注羌西戎牧羊人也又後光記注羌有百五十四種散處三河夷說文北狄曰起敵國舟中夷吳起曰舟中之人皆敵國也削礪工史梁孝王使人刺袁盎安陵郭門外刺者置其劍尸旁視其新治問長安中削礪工曰梁王使人來治此劍以此知而發覺之深井里刺客聶政刺殺韓相俠纍因自披面抉眼屠出腸韓取尸暴於市莫知誰子其姊嫈哭之曰是軹縣深井里聶政也絶胭謂絶項也蓋項謂咽喉也萬金寵贈謂元衡已死雖受榮贈竟何益哉行路難飛雪斷道冰成梁侯家熾炭雕玉房蟠龍吐耀虎喙張熊蹲豹躑爭低昂攢巒藂崿射朱光丹霞翠霧飄竒香美人四座回鳴璫雪山冰谷晞太陽星躔奔走不得止倐忽雙燕棲虹梁風臺露榭生光飾死灰棄置參與商盛時一去貴反賤桃笙葵扇安可常雕玉房謂以白玉雕飾之房也蟠龍虎喙熊蹲攢巒藂崿謂獸炭之形勢如此之盛也美人四座回鳴璫謂其富貴之家也雪山冰谷晞太陽謂一旦消滅而不存也星躔奔走謂炎涼之變須臾不久也燕棲虹梁謂昔時之富盛今日何在但見梁間之燕在爾風臺露榭言昔之玉房今日皆荒蕪也參商蘇武詩今為參與辰注左閼伯實沈日尋干戈以相征討后帝不遷閼伯於商丘主辰遷實沈於大夏主參注參參星也辰大火也二星常不相見故云桃笙以桃竹為笙也桃竹出巴渝間吳人謂簟為笙故曰桃笙葵扇晉謝安傳安鄉人有五萬蒲葵扇安取執之士庶競慕價增數倍漁翁漁翁夜傍西巖宿曉汲清湘然楚竹烟銷日出不見人欸乃一聲山水緑回看天際下中流巖上無心雲相逐苕溪漁隱曰元遺山集欸乃曲掉船歌聲也詩評云東坡删去後二句以為子厚復生亦必心服又云詩竒趣為宗反常合道為趣熟味此詩有竒趣然尾結二句不必亦可楊白花北史楊白花楊大眼之子容貌瓌偉魏胡太后逼幸之白花懼禍南奔於梁太后追思不已為作楊白花歌使宮人晝夜連臂踏踏歌云楊白花風吹渡江水坐令宫樹無顔色搖蕩春光千萬里茫茫曉日下長秋哀歌未斷城鴉起長秋皇后宫名王仲初名建潁川人大厯十年進士仕至祕書監丞侍御史出為陜州司馬以宫詞名家凡一百有四篇又詩評云大厯以後王建張籍樂府吾所深取北邙行北邙山頭少閒土盡是洛陽人舊墓舊墓人家歸葬多堆著黃金無置處天涯悠悠葬日促岡坂﨑嶇不停轂高張素幕繞銘旌夜唱挽歌山下宿洛陽城北復城東魂車祖馬長相逢車轍廣若長安路蒿草多於松柏樹澗底磐陀石漸稀盡向墳前作羊虎誰家古碑文字滅後人重取書年月朝朝車馬送葬回還起大宅與高臺北邙山張景陽詩北邙何纍纍高墳有四五借問誰家陵皆云漢世主又洛陽記北邙山在洛陽城北連亘四百餘里東洛九原之地也銘旌檀弓銘明旌也以死者為不可别故以其旗識之挽歌杜氏通典漢高帝時田橫死吏不敢哭但隨柩叙哀後代相承以為挽歌至武帝時李延年分為二曲薤露送王公貴人蒿里送士大夫庶人亦曰挽歌又譙子法訓莊子曰紼謳以生必於斥苦注曰紼引柩索也斥疏緩也苦用力也引紼所以有謳歌者為人用力不齊故從急之也又左魯哀公㑹吳伐齊其將公孫更命歌虞殯杜預曰虞殯送葬歌示必死也然則挽歌非起於田橫也羊虎墳前石羊石虎也祖馬白虎通祖載者始載於庭乘軸車辭祖禰故曰祖載古碑說文碑刻石紀功德者又按古宗廟立碑以繫牲耳後人因於上紀功德此碑字從石秦以來制也今云古碑其亦墓前紀功德之石若今之墓志銘是也涼州行唐人西域記云龜兹國王與臣庶知音樂者於大山間聽風聽水之聲均節成音後翻入中國如伊州涼州甘州皆龜兹國樂也又雍州地域志涼州即西戎地秦為隴西北地郡漢初為胸奴右地唐改為涼州今為西涼府涼州四邊沙浩浩漢家無人開舊道邊頭州縣盡知兵將軍别築防秋城萬里征人皆已沒年年旌節發西京多來中國收婦女一半生男為漢語番人舊日不耕犂相學如今種禾黍驅羊亦著錦為衣為惜氊裘防鬭時養蠶繅繭成匹帛那將繞帳作旌旗城頭山雞鳴角角洛陽家家學畨樂舊道史涼州皆西域之地至武帝張騫始開西域之迹其後擊破右地降渾邪休屠王遂空其地始築今居以西置酒泉等郡復置屯田校尉由是皆起亭障以為防衛按此似言東漢時也蓋東漢都洛陽為東京長安為西京防秋邊人出沒以鴈為候鴈至則秋深邊始出故曰防秋山雞爾雅名鵕䴊又名錦雞自愛其毛終口影水目眩則溺洛陽家家習邊樂蓋言涼州皆邊也今中原亦用此曲是學邊樂也溫泉宫行辛氏三秦記云秦始皇至驪山與神女遊而忤其指神女唾之遂生瘡始皇祈謝神女為出溫湯泉而洗滌後人因以為宮云十月一日天子來青繩御路無塵埃宫前內裏湯各别每箇白玉芙蓉開朝元閣向山上起城繞青山龍暖水夜開金殿看星河宫女知更月明裏武皇得仙王母去山雞晝啼宫中樹溫泉決決出宫流宫使年年修玉樓禁兵去盡無射獵日西麋鹿登城頭梨園弟子偷曲譜頭白人間教歌舞十月一日天子來網目天寶六載冬十月帝如驪山溫泉名其宫曰華清乂天寶十一載冬十月帝如華清宫十四載冬十月如華清宫按是則每年十月一日幸華清宫也青繩御路青繩未詳御路則天子所行之路即所謂馳道也又或云御路以青石甃砌如繩之直故云乂蓮經金繩界道則又或以青繩界道也宫前內裏􅣚各别宫前池則百官所浴之處內裏則宫中之池乃帝與貴妃所浴之池白玉芙蓉開芙蓉謂蓮花也明皇雜録天寶六載更溫泉宫曰華清宫治湯井為池環山列宫室外築羅城又於上建老君殿左朝元閣右長生殿又上於華清宫新廣一池制度宏麗祿山於范陽以玉龍魚鴈石梁石蓮花以獻雕鐫尤妙上大悅陳於湯中仍以石梁橫於其上而蓮花才出於水際上因幸解衣將入其魚龍鳬鴈皆奮鱗舉翼狀若飛動上恐却之蓮花石至今在宫女知更謂以宫女掌更漏也武皇譬明宗王母譬貴妃言明宗巳升遐而貴妃已死自是無復遊幸山雞入宫而啼溫泉亦流出宫牆矣宫使謂看守溫泉之官禁兵謂守衛宫城之兵去盡謂征調去盡麋鹿登城樓與麋鹿游於姑蘇之意同梨園弟子明皇雜録明皇雜受法曲選郡下好子弟三百教於梨園名梨園弟子鏡聽詞重重摩挲嫁時鏡夫壻逺行憑鏡聽回身不遣别人知人意丁寧鏡神聖懷中收拾雙錦帶恐畏街頭見驚怪嗟嗟㗫㗫下堂階獨自竈前來跪拜出門願不聞悲哀身在任郎回未回月明地上人過盡好語多同皆道來卷帷上牀喜不定與郎裁衣失翻正可中三日得相見重繡鏡囊磨鏡面鞦韆詞見前注長長絲繩紫復碧嫋嫋橫枝高百尺少年女兒重鞦韆蟠巾結帶分兩邊身輕裙薄易生力雙手向空如鳥翼下來立地重繫衣復畏斜風高不得傍人送上那足貴終賭鳴璫鬬自起回回若與高樹齊頭上寶叉從墮地眼前爭勝難為休足踏平地看始愁寒食行荆楚嵗時記清明前一日謂之寒食以禁烟而名也寒食家家出古城老人看屋少年行丘隴年年無舊道車徒散行入衰草牧童驅牛下冢頭畏有家人來灑掃逺人無墳水頭祭還引婦姑望鄉拜三日無火燒紙錢紙錢那得到黃泉但看隴上無新土此中白骨應無主寒食家家出古城言寒食掃墓也唐開元敕寒食上墓禮經無文近代相傳寖以成俗宜許上墓同拜掃禮又桞宗元書近世禮重拜掃今已闕者四年矣每遇寒食則北向長跪以首頓地三日無火以寒食禁烟而言黃泉古樂府潛寐黃泉下千載永不寤田家留客人客少能留我屋客有新漿馬有粟逺行僮僕應苦饑新婦厨中炊欲熟不嫌田家破門戶蠶房新泥無風土行人但飯莫畏貧明府上來何辛苦丁寧回語屋中妻有客勿令兒夜啼雙冢直西有縣路我教丁男送君去漿說文酢也列子吾食於十漿而五漿先饋明府唐人稱縣令曰明府丁男謂丁壯之男也唐志人生十六為中二十一為丁蓋取萬物成實之義也男說文丈夫也以田以力言用力於田畞也田家行男聲欣欣女顔悅人家不怨言語别五月雖熱麥風清簷頭索索繅車鳴野蠶作繭人不取葉間撲撲秋蛾生麥收上場絹在軸的知輸得官家足不望入口復上身且免向城賣黃犢田家衣食無厚薄不見縣門身即樂繅說文繅繭為絲繅車者繅絲之車也野蠶成繭出光武紀注非家飼之蠶也當窗織歎息復歎息園中有棗行人食貧家女大富家織翁母隔牆不得力水寒手澀絲脆斷續來續去心腸爛草蟲促促機下鳴兩日催成一匹半輸官上頭有零落姑來得衣身不著當窗却羡青樓娼十指不動衣盈箱促刺行題意未詳又貨殖傳因貧求富刺繡紋不如倚市門此言失業貧者之資也今詳詩意頗有相似然未敢必當再考促刺復促刺水中無魚山無石少年雖嫁不將歸頭白猶著父母衣四邊田宅非所有我身不及逐雞飛出門若有歸死處猛虎當衢向前去百年不遣踏君門在家誰喚為新婦豈不見他鄰家娘嫁來長在舅姑傍行見月月初生居人見月一月行月行一年十二月強半馬上看圓缺百年歡樂能幾何在家見少行見多不緣衣食相驅遣此身誰願長奔波篋中有帛倉有粟豈向天涯走碌碌家人見月望我歸正是道上思家時白紵歌題意見注中天河漫漫北斗燦宫中烏啼知夜半新縫白紵舞衣成來遲邀得吳王迎低鬟轉面掩雙袖玉叉浮動春風生酒多夜長夜未曉月明燈光兩相照後庭歌聲更窈窕白紵舞衣玉叉俱見前注館娃宮中春日暮荔枝木瓜花滿樹城頭烏栖休擊鼓青娥彈瑟白紵舞夜天燑燑不見星宮中火照西江明美人醉起無次第墮叉遺珮滿中庭此時但願可君意回晝為宵亦不寐年年奉君君莫棄館娃宮謝元暉詩再逺館娃宫又吳郡志靈岩山在平江府城西二十里吳王之别苑在焉有館娃宫琴臺響屧廊西施洞娃方言美女也荔枝白居易圖譜生巴蜀間樹形圓如帷蓋葉如冬青華如橘春榮實如丹夏熟朵如葡萄核如枇杷殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴酪乂蔡君謨荔枝之於天下惟閩粵南越巴蜀有之漢初南越王尉陀以之備方物始通中國木瓜詩投我以木瓜本草木瓜其木狀如奈花開於春末而深紅色其實大者如瓜小者如拳青娥未詳或云青年之美人也白紵舞樂府有白紵舞白紵歌白鳬舞白鳬歌並吳人之歌舞吳地出紵又江鄉水國自多鳬鶩故興其所見以寓意焉始則田野之作後乃大樂氏用焉其音入清商調故清商之曲有子夜吳歌即白紵也在吳歌為白紵在雅歌為子夜又梁武令沈約更製其詞焉曰子夜四時歌其實一也西江未詳無次第謂無行列先後之序也失叉怨貧女銅叉惜於玉失却來尋三日哭嫁時女伴與作粧頭戴此叉如鳯凰雙杯行酒六親喜我家新婦宜拜堂鏡中乍無失髻樣初起猶疑在牀上高樓翠鈿飄舞塵明日從頭一遍新精衛詞精衛誰教爾填海海邊石子青磊磊但得海水作枯池海中魚龍何所為口穿豈為空銜石山中草木無全枝朝在樹頭暮海裏飛多羽折時墮水高山未盡海未平願我身死子還生精衛山海經發鳩之山有鳥名曰精衛炎帝之女往遊於東海溺而不返化為精衛常銜西山之木石以填東海射虎行自去射虎得虎歸官差射虎得虎遲獨行以死當虎命兩人相疑終不定朝朝暮暮空手回山下緑苗已成徑逺立不教丁箭鏃聞死還來分虎肉惜留猛虎著深山射殺恐畏終身閒羽林行漢志羽林府掌送從武帝太初元年初置名曰建章營騎後更名羽林騎又取從軍死事之子孫養於羽林官教以五兵號曰羽林孤兒又劉後村詩評云此詩可與蘇州逢楊開府詩同看長安惡少出名字樓下劫商樓上醉天明下直明光宫散入五陵松柏中百回殺人身合死赦書尚有收城功九衢一日消息定鄉吏籍中重改姓出來依舊屬羽林立在殿前射飛禽惡少退之詩昨晚長鬚來下狀隔牆惡少惡難似長安惡少謂長安凶惡少年也明光宫漢武帝太初四年秋起明光宮三輔黃圖云宮在長安城中成都侯王商借明光宮避暑即此地也五陵見前注收城功武帝元朔六年有司奏請置武功賞功以寵戰士考漢兵制期門羽林之兵不預征伐順帝永和五年束羌冦三輔遣馬賢將左右羽林五校屯漢陽則羽林亦在調遣故云收城功也鄉吏籍中重改姓武帝初置羽林即九選六郡良家子補之羽林屬北軍而皆召募之兵故云雖犯死得赦乃有選補召募則復入籍以充羽林兵士也九衢見前注立在殿前兵制羽林天子禁從之兵故云耳短歌行人初生日初出上山遲下山疾百年三萬六千朝夜裏分將強半日有歌有舞聞早為昨日健於今日時人家見生男女好不知男女催人老短歌行無樂聲神樹詞我家家西老棠樹須晴即晴雨即雨四時八節上杯盤願神不離神處所男不著丁女在舍事官上下無言語老身長健樹婆娑萬嵗千秋作神主逺將歸逺將歸勝未别離時在家相見熟新歸歡不足去願車輪遲回思馬蹄速但令在家相對貧莫向天涯金繞身望夫石地域志望夫石在太平府當塗縣采石江北有石如人立於山頂望夫處江悠悠化為石不回頭山頭日日風和雨行人歸來石應語陳后山詩評望夫石詩如劉夢得終日望夫夫不歸化作孤石若相思望來已是幾千嵗只似當年初望時語雖拙而意工黃魯直以顧況此詩為第一且語意皆工然即此詩也魯直以為顧況詩此以為仲初詩未知孰是張文昌名籍和州人貞元十五年封孟伸榜及第詩評云文昌為詩長於樂府多有警句選詩補注獨取其離怨一詩云張籍工為樂府詞昌黎稱其學古淡者詩也然唐人古詩於此焉止耳或言張籍樂府昌黎既許其古淡則其可取者必多愚謂古人制作自有體格或因時高下其氣韵亦不相逺此難以言語形容在識者自能心領意㑹也今觀籍所作詞雖古淡音調則唐而已獨此離怨一篇庶幾近之餘皆似是而實非大抵貞元以後學古者類皆如此夫唐以詩名者不下三百餘家然欲求其純全合乎風雅之音響者何其不易得也嗚呼世降風移一至於此離怨詩並附於下切切重切切秋風桂花折人當少年嫁我當少年别念君非征役年年長逺途妾身甘獨沒高堂有舅姑山川豈悠逺行人不自反楚宫詞闕寄衣曲纖素裁衣獨苦辛逺因回使寄征人官家亦自寄衣去貴從妾手著君身高堂姑老無侍子不得自到邊城裏殷勤為看初著時征夫身上宜不宜征婦怨九月胸奴殺邊將漢軍全沒遼水上萬里無人收白骨家家城下招魂葬婦人依倚子與夫同居貧賤心亦舒夫死戰場子在腹妾身雖存如晝燭遼水即遼河在遼陽路瀕河南北干餘里東西二百里遼河居中招魂楚辭宋玉哀屈原魂魄散佚作招魂欲以復其精神也唐音卷三
