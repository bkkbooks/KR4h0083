body:
  text: 唐音卷七元楊士𢎞撰張震註唐詩正音六七言絶句賀季真季真名知章唐開元中選禮部侍郎集賢學士天寳中乞歸田里為道士詔許之供帳東門御製詩送之仍以其宅為千秋鴻禧觀以居而賜鏡湖剡川一曲云采蓮曲題意見前注稽山罷霧鬱嵯峨鏡水無風也自波莫言春度芳菲盡别有中流采芰荷稽山㑹稽山也在紹興府㑹稽縣越州志本名苗山大禹於此㑹諸侯之計因名㑹計鏡湖亦在越州後漢馬臻築塘以遏水因名鏡湖又若耶溪在㑹稽東南北流二十五里與鏡湖合流囘鄉偶書少小離鄉老大囘鄉音無改髮毛衰兒童相見不相識笑問客從何處來葢嘉運簇拍陸州今為郢州西去輪臺萬里餘故鄉音耗日應疎隴山鸚鵡能言語為報閨人數寄書輪臺西域國名見前注出龍山在隴州汧陽縣山髙而長故名鸚鵡鳥名大如鵲朱味鈎吻翠頂金眼𤣥頂碧羽頳足翠尾兩指向前兩指向後能作人言王摩詰送元二使安西元二杜詩注元詰也安西都䕶府在龜兹國唐武氏置渭城朝雨裛輕塵客舍青青栁色新勸君更盡一杯酒西出陽闗無故人渭城今咸陽縣東北古杜郵陽闗玉門闗在沙州夀昌縣西六里寄河上段十六與君相見即相親聞道君家在孟津為見行舟試借問客中時有洛陽人孟津洛陽俱見前注送别送君南浦淚如絲君向東州使我悲為報故人憔悴盡如今不似洛陽時東周犬戎敗幽王周乃東遷於洛邑是為東州九日憶山東兄弟唐史稱維閭門友悌事母孝觀此詩信矣維作此詩時年十七獨在異鄉為異客毎逢佳節倍思親遙知兄弟登髙處徧挿茱萸少一人挿茱萸玉燭寳典云漢武帝宫人九月九日佩茱萸食餅飲菊花酒令人長夀葢相傳自古莫知其由桓景事見前註又裕齊隨筆劉夢得云詩中用茱萸字者凡三人杜醉把茱萸仔細㸔王維云徧挿茱萸少一人朱放云學他年少挿茱萸三君所用杜為優容齊曰予觀唐人七言者又十餘家録於後王昌齡茱萸挿髩花宜夀戴所倫挿髩茱萸來未盡盧倫茱萸一朶映華簮權徳輿酒泛茱萸晚易醺白居易舞闕擺落茱萸房茱萸色淺未經霜楊衡强挿茱萸隨闕人張諤茱萸凡作幾年新耿瑋髪稀那禁挿茱萸劉商郫筒不解獻茱萸崔魯茱萸吟吹溪口香周賀茱萸城裏一尊前比之杜老為不逮矣寒食汜上作汜上縣名鄭州有氾水縣又曹州定陶縣亦有汜水縣即漢髙帝即位於氾水之陽是也廣武城邉逄暮春汶陽歸客淚霑巾落花寂寂啼山鳥楊栁青青渡水人廣武山在鄭州滎澤縣西征記曰三皇山上有三城柬曰東廣武西曰西廣武漢祖與覇王共語汶陽在兖州府奉符縣此又汝寜府南陂亦有汶水按廣武在鄭州則汶正係汶水之上葢鄭蔡地相比也戯題盤石可憐磐石隣泉水復有垂楊拂酒杯若道春風不解意何因吹送落花來賈㓜隣送李侍郎赴常州雪晴雲散北風寒楚水吳山道路難今日送君須盡醉明朝相憶路漫漫儲光羲明妃詞二首明妃即昭君也日暮驚沙亂雪飛傍人相勸易羅衣强來前殿㸔歌舞共待單于夜獵歸單于知妾不勝歸樂府皆傳漢國辭朝來馬上箜篌引稍似宫中閑夜時同金壇令武平退朝二首金壇縣在鎮江府武平名甄傳通春秋武后時隠嵩山屢召不起中宗即位召拜修文館學士朝來仙閣聴弦歌暝入花亭見綺羅池邉命酒憐風月浦口還船惜芰荷花潭竹嶼傍幽溪畫檝浮空入夜溪菱荷覆水船難進歌舞留人月易低寄孫山人新林二月孤舟還水滿清江花滿山借問故園隠君子時時來去住人間新林宣𤣥暉云宣城出新林浦向板橋浦又善長水經江西經三山入湘浦又北經新林浦王之奐并州太原人凉州詞見前注黄河逺上白雲間一片孤城萬仞山羗笛何須怨楊栁春光不度玉門闗蘆河集覽沙州西曰石環州之西鎮戎之東有葫蘆泉葫蘆磧漢明時屯甲於伊吾蘆即此地也羗笛羌人所吹之笛也楊栁樂府横吹有闗山月折楊栁等曲王門闗見前注王少伯閨怨閨闔房也選詩宵月照中閨又寒商動清閨葢深閨婦人女子所居之處此之閨怨即閨中少婦所怨也閨中少婦不知愁春日凝粧上翠樓忽見陌頭楊栁色悔教夫壻覔封侯西宫春怨西宫未詳西宫夜静百花香欲捲珠簾春恨長斜抱雲和深見月朦朧樹色隠昭陽雲和杜暮寒詩忽思髙窓㑹朱袖拂雲和春官大司樂云孤竹之管雲和之琴瑟註地名雲和産此良材長信秋詞奉帚平明金殿開且將團扇暫徘徊玉顔不及寒鴉色猶帶昭陽日影來奉帚灑掃也按媫妤賦曰奉共養於東宫兮托長信之清流共洒掃於幃幄兮永終死兮為期團扇見前註昭陽日影飛燕傳成詩帝立為皇后寵少衰女弟絶幸為昭儀居昭陽殿三體註詩意謂已與君隔不及寒鴉猶得帶昭陽日影真成薄命乆尋思夢見君王覺後疑火照西宫知夜飲分明複道奉恩時薄命前許皇后傳奈何妾薄命又曹子建樂府因妾薄命為篇名複道復道漢濤又從複道上奴得曰註音復上下有道故謂之複青樓曲白馬金鞍從武皇旌旂十萬宿長楊樓頭少婦鳴筝坐遥見飛塵入建章武皇指唐𤣥宗長楊建章皆宫名馳道楊花滿御溝紅妝謾綰上青樓金章紫綬千餘騎夫壻朝囘初拜侯金章紫綬見前註西宫秋怨芙蓉不及美人粧水殿風來珠翠香却恨含啼掩秋扇空懸明月待君王芙蓉白居易詩芙蓉如靣栁如眉芙蓉荷花又木芙蓉一名拒霜一名木連掩秋扇班媫妤詞見前註春宫曲昨夜風前露井桃未央前殿月輪髙平陽歌舞新承寵簾外春寒賜錦袍平陽武帝時有平陽公主青樓怨香幃風動花入樓髙調鳴筝緩夜愁腸斷闗山不解説依依殘月下簾鈎鳴筝闗山月俱見前注采蓮曲荷葉羅裙一色裁芙蓉向臉兩邉開亂入池中㸔不見聞歌始覺有人來出塞行白花原上望京師黄河水流無盡期窮秋曠野行人絶馬首東來知是誰白花原未詳别李浦之京故園今在覇陵西江畔逄君醉不迷小弟隣庄尚漁獵一行書寄數行啼覇陵文帝𦵏其上故曰覇陵在長安城東七十里荘猶村唐人呼別業為荘三體詩注云漁獵者少年放逸之習而小人之事也既憂其弟樂小人之事放逸在外以詩誡之又繼之以涕泣此仁人愛弟之情也孟子曰涕泣而道之者親之也此詩近之矣寄穆侍御出幽州今遵化府也一從恩譴度瀟湘塞北江南萬里長莫道薊門書信少鴈飛猶得到衡陽薊門薊州也今為遵化府恩譴瀟湘見前注重别李評事莫道秋江離别難舟船明日是長安吳姬緩舞留君醉隨意清風白露寒李倉曽宅夜飲霜天留飲故情懽銀燭金鑪夜不寒欲問吳江别來意青山明月夢中㸔觀獵角鶯初下秋草稀䥫􅍡抛鞚去如飛少年獵得平原兎馬􅀈横捎意氣歸蕭駙馬宅花燭駙馬綱目集覽駙馬天子之壻也漢武帝初置駙馬都尉官駙馬至晋尚公主者並如之花燭雙慶喜詩洞房花燭夜謂成婚之夕飲宴也青鸞飛入合懽宫紫鳯啣花出禁中可憐今夜千家裏銀漢星囘一道通青鸞韓奕詩韓侯闕左懿氏卜百兩彭彭八鸞鏘鏘紫鳯妻陳敬仲其妻占之是謂鳯凰于飛和鳴鏘鏘盖青鸞言駙馬紫鳯言公主也星囘一道通在七夕左闕也髙逹夫除夜旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里秋髩明朝又一年塞上聽吹笛雪浄邊天牧馬還月明𦍑笛戍樓間借問梅花何處落風吹一夜滿關山營州歌營州少年厭原野狐裘䝉茸獵城下魯酒千鍾不醉人健兒十歲能騎馬營州河北道栁城即本遼西地也狐裘以狐皮為裘也䝉茸毛萇曰䝉茸亂貌岑参獻封大夫破播仙凱歌四章封大夫封常清也按綱目天寶六載以髙仙芝為安西使鎮節度四仙芝署常清為刑官大破吐蕃勃律王及臭离二十餘國此詩其破勃律時作歟播仙未詳凱歌禮春官司樂王師大獻奏凱樂又凱風天地之怒氣獻奏凱樂人之怒氣已焉漢将承恩西破戎㨗書先奏未央宫天子豫開麟閣待祗今誰數貮師功漢将指封大夫言也麟閣漢武紀畫功臣於麒麟閣張晏曰武帝獲麒麟時作此閣因以為名貳師是貮師將軍貮師蕃國名也李暨勑封貮師将軍官軍西出過樓蘭營幙傍臨月窟寒蒲海曉霜凝馬尾蔥山夜雪撲旌竿樓蘭西域國名即鄯善國也漢武紀初欲通大宛使者相望於道樓蘭姑師苦辱漢使後遺從驃侯趙破匈奴樓蘭王破姑師樓蘭國最在東陲近漢當白龍堆蒲海蔥嶺西域傳孝武時始通本三十六國後稍分至五十餘皆在匈奴之西馬縣之南南北有大山山中失有河東則接洋阨以玉門陽關西則限以蔥嶺其南山東出拿城與漢南山屬焉其河有兩源一出蔥嶺山一出于闐其北流與蔥嶺沙合東注蒲昌海是也鳴笳叠鼓擁囘軍破國平蕃昔未聞丈夫鵲印揺邉月大将龍旂掣海雲鵲印後漢張顥為梁相雨後見一鵲墮地化為圓石顥推破之得金印曰忠孝侯印後為太尉龍旗杜詩旌旗日暖龍蛇動謂旗上畫為龍文詳見前注日落轅門鼓角鳴千羣靣縛出蕃城洗兵魚海雲迎陣秣馬龍堆月照營魚海未詳龍堆見前注轅門張晏曰軍行以車為陣轅相向為門故曰轅門禮天官掌㑹曰設宫車轅門又見前注玉闗寄長安主簿玉闗即玉門闗東去長安萬里餘故人那惜一行書玉闗西望堪腸斷况復明朝是嵗除苜蓿峯寄家人苜蓿峯邉逄立春葫蘆河上淚霑巾閨中只是空相憶不見沙塲愁殺人苜蓿草名苜蓿峯葫蘆河皆西蕃諸國地名不詳所止沙塲古戰塲也逄入京使故園東望路漫漫雙袖龍鍾淚不乾馬上相逄無紙筆憑君傳語報平安批云也是常語其意自好送人西原驛路掛城頭客散江亭雨未休君去試㸔汾上水白雲猶是漢時秋批云傷今感古多少不盡之意又詩法云結語善謂古今相送從此去者今後何在惟有汾水之上白雲仍似漢時其傷感之情至矣所謂哀而不傷者此歟西原長安之西原上也汾水在汾州古西河郡也春夢洞房昨夜春風起遥憶美人湘江水枕上片時春夢中行盡江南數千里酒泉太守席上醉後作酒泉太守能劍舞髙臺置酒夜擊鼓胡笳一曲斷人腸座上相㸔淚如雨洒泉郡雍州地域志漢為廿州劍舞漢祖紀髙祖見羽于覇上項莊請以劍舞胡笳見前注張正言題張主人壁世人結交須黄金黄金不多交不深縦今然諾暫相許終是悠悠行路心皇甫茂政送魏十六還蘇州秋夜沉沉此送君隂蟲切切不堪聞孤舟明日毘陵道囘首姑蘇是白雲毗陵今常州府姑蘇今蘇州府酧張繼悵望南徐登北固迢迢西塞望東關落日臨川問音信寒潮惟帶夕陽還南徐卽鎮江府北固山名在北一里上有北固樓西塞山在湖州府張懿孫楓橋夜泊楓橋蘇州府有三百九十橋楓橋其一也月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鐘聲到客船三體詩注霜夜客中愁絶故怨鐘聲之太早也盖言夜半者状其太早而甚怨之辭說者不觧詩人活語乃以為實半夜故多曲說殊不知首句月落烏啼霜滿天乃欲曙之後矣豈真半夜乎孟子曰周餘黎民靡有孑遺信斯言也是周無遺民也故説詩者不以文害詞不以詞害志斯可以言詩也閶門卽事耕夫占募逐樓船春草青青萬頃田試上吳門看郡郭清明幾處有新煙占募召募以從軍也樓船漢武置以楊僕為樓船将軍伐百粤也吳門蘇州府郡名也劉文房昭陽曲昭陽宫名見前注昨夜承恩宿未央羅衣猶帶御爐香芙蓉悵小雲屏暗楊栁風多水殿凉夫容帳長恨歌夫容帳暖度春宵水殿古詩雲間水殿候飛龍送裵郎中貶吉州吉州今吉安府古盧陵郡也猿啼客散暮江頭人自傷心水自流同作逐臣君更逺青山萬里一孤舟詩評云送别之詩只此足矣逐臣謂貶逐之臣也時文房貶長沙吉去長沙更逺二千里故云君更逺也新息道中作新息即今汝寕府息縣也縣有古息城故分今古言之蕭條獨向汝南行客路多逄漢騎營古木蒼蒼離亂後㡬家同住一孤城汝南豫州之城周武王封叔度於蔡春秋為沈蔡二國之地秦為三川郡漢改汝南郡宋為蔡州今為汝寜府漢騎營髙祖與項相持於滎陽即鄭地此與滎陽比境則必漢軍屯駐之地也贈崔九憐君一見一悲歌歲嵗無如老去何白屋漸㸔秋草沒青雲莫道故人多白屋蕭望之傳恐非國公致白屋之意注曰白屋謂白盖之屋以茅覆之賤人所居過鄭山人所居寂寂孤鶯啼杏園寥寥一犬吠桃源落花芳草無尋處萬壑千峯獨閉門杏園桃源倛見前注寄别朱拾遺天書遠召滄浪客幾度臨岐病未能江海茫茫春欲徧行人一騎發金陵滄浪客謂逐臣也楚辭滄浪之水清兮可以濯吾纓滄浪水在常德府龍陽縣二十里浪水與滄水合故號滄浪寰宇記在武陵縣西乃漁父濯纓之處臨岐謂被徴将行後以病不能去也金陵見前注尋盛襌師蘭若秋草黄花覆古阡隔林遥見起人煙山僧獨在山中老惟有寒松見少年秋草黄花傳燈録迷人不知此身無象應物現形遂喚青青翠莭道法身欝欝黄花旡非般若黄花若是般若般若即同無情翠竹若是法身法身卽同草木韋應物滁州西澗滁州梁立南譙卅又改北譙隋改為滁州獨憐幽草澗邉生上有黄鸝深樹鳴春潮帯雨晚來急野渡無人舟自横劉禹錫云白二十云夢得石頭城詩起二句我自知不及韋十九西澗起二語又評云野渡無人舟自横此語自好但韋公體出數字既新又别故貴知言也然此詩先得後半起更難得故知作者用心寒食寄京師諸弟寒食荆楚歳時記去冬至一百五日即有疾風甚雨謂之寒食雨中禁火空齋冷江上流鸚獨坐聽把酒㸔花想諸弟杜陵寒食草青青批云情是景景是情不待安排故以為美禁火初學記周書司烜氏仲春以木鐸徇火禁於國中為歲中春將出火也今厯食准節氣是仲春之末清明是三月之初然到禁火並周制也又琴操晉文公與介子綏俱亡子綏割腓股以啖文公文公復國子綏獨無所得作龍蛇之歌而隠文公求之不肯出乃燔左右木子綏抱木而死文公哀之令人五月五日不得舉火及周舉移書魏武明罰令陸翽鄴中記並云寒食斷火起於子推琴操所云子綏即推也又云五月五日與今有異皆因流俗所傳按左傳及史記並無介子推被焚之事杜陵見前注應物家於杜陵故云九日今朝把酒復惆悵憶在杜陵田舍時明年此日知何處世難還家未有期批云可悲隔世與予患同亦同予苦杜陵俱見前注休暇日訪王侍御不遇九日驅馳一日閑尋君不遇又空還怪來詩思清人骨門對寒流雪滿山登寳意寺上方舊遊寺在西安府武功縣翠嶺香䑓出半天萬家烟樹滿晴川諸僧近住不相識坐聼㣲鐘記往年批云凡語言旡趣皆實厯無趣者有味亦短登樓寄王卿踏閣攀林恨不同楚雲滄海思無窮數家砧杵秋山下一郡荆榛寒雨中批云髙規城邑真復如比開益野興甚濃此是絶意復増兩聫即情味不復如此酬柳郎中春日歸楊州南郭見别之作廣陵三月花正開花裏逄君醉一迴南北相過殊不逺暮潮從去早潮來廣陵楊州也子規啼髙林滴露夏夜清南山子規啼一聲隣家孀婦抱兒泣我獨展轉何時明盧允言山店登登山路何時盡决决谿流到處聞風動葉聲山犬吠幾家松火隔秋雲村南逄病叟雙膝過頥頂在肩四隣知姓不知年卧駈鳥雀惜禾黍猶恐諸孫無社錢韓君平寒食春城無處不飛花寒食東風御柳斜日暮漢宫傳蠟燭青煙散入五侯家唐史德宗擇知誥批曰與韓翊時有兩韓翊遂具奏復批曰春城無處不飛花云云與此韓翊傳蠟燭今所傳火也元稹所謂特勅宫中許然燭是也唐輦下歲時記清明日取椒柳之火以賜近臣也漢宫五侯五侯後宦者傳桓帝單超徐瑛其瑗左悺唐衡五人同日為侯世謂五侯自是權歸宦者朝政日亂唐自肅宗以來宦者日盛政之就衰亂侔漢賢此詩盖刺也又漢成紀王氏五侯同日而封亦云五侯江南曲長樂花枝雨㸃斜江城日莫好相邀春樓不閉葳蕤鎻淥水囘通宛轉橋長樂宮名葳㽔俱見前注錢仲文歸鴈瀟湘何事等閑囘水碧沙明兩岸苔二十五弦彈夜月不勝清怨却飛來瀟湘見前註衡陽有囘鴈峯鴈至此即囬不南去二十五弦瑟也漢書黄帝使素女鼔五十弦瑟聲悲帝禁不勝鼓瑟為二十五弦不勝清怨三體詩注云瑟中有歸鴈操詩意謂瀟湘佳境水碧沙明何事即囬豈我瑟夜彈方怨却飛來乎又一說云以二十五弦弹夜月為瀟湘妃鼓瑟詩意謂瀟湘佳境鴈不應回乃湘瑟之怨不可替耳此詩人發興之言其說亦通郎君胄聽隣家吹笙鳯吹聲如隔采霞不知壖外是誰家重門深鎻無尋處疑有碧桃千樹花栢林寺南望谿上遥聞精舍鐘泊舟㣲徑度深松青山霽後雲猶在盡在西南三四峯司空文明峽口送友人峽口綱目集覧春秋鄧國西陵即夷陵也又曰峽口今峽州是也峽口花飛欲盡春天涯去住各霑巾來時萬里同為客今日翻成送故人江村即事罷釣歸來不繫船江村月落正堪眠縱然一夜風吹去只在蘆花淺水邉崔峒博陵人大厯才子官至右補闕題蘭若絶頂茅菴老此生寒雲孤木伴經行世人那得知幽逕遥向青峯禮磬聲李端長信宫見前註金壺漏盡禁門開飛燕昭陽侍寝囘隨分獨眠秋殿裏遥聞笑語自天來飛燕趙飛燕昭陽宫名俱見前注衛象古詞鵲血調兮濕未乾鸊鵜新淬劍光寒遼東老将鬂成雪猶向旄頭夜夜㸔鵲血調兮未詳鸊鵜李賀詩鸊鵜花淬白鵰尾鸊鵜鳥名以其脂膏磨劍則瑩發光芒旄頭晉天文志昻星旄頭星也其星明有邊兵起戴㓜公湘南即事盧橘花開楓葉衰出門何處望京師沅湘日夜東流去不為愁人住少時對月答元明府山下孤城月上遲相留一醉本無期明年此夕逰何處縦有清光知對誰送吕少府共醉流光獨歸去故園髙士曰相親深山古路無楊栁折取桐花寄逺人楊栁古樂府有折楊栁曲言别離之意戎昱旅次寄湖南張郎中寒江近户慢流聲竹影當牕亂月明歸夢不知湖水濶夜來還到洛陽城移家别湖上亭好是春風湖上亭栁條籐蔓繫離情黄鸝乆住渾相識欲别頻啼四五聲故事拾遺韓滉鎮淮西戎昱為部内刺史有官妓善歌色亦閑好昱情屬至厚韓聞其名召至籍中昱為詞以案之云好是春風湖上亭云云妓至歌此曲滉聞之即持以歸昱云顧逋翁題葉道士山房水邉楊栁赤欄橋洞裏神仙碧玉簫近得麻姑書信否潯陽江上不通潮麻姑顔魯公麻姑壇記王方平過蔡經家與麻姑相聞有頃麻姑至乃是年十八九女子不通潮乃論潮至潯陽而囬三體詩注謂詩意道路不通音問莫致故借麻姑與潮為喻也然按是詩雖云寄道士亦是自嘆不遇若麻姑之與方平五百年方一㑹及别去又不得一通音問也宿昭應武帝祈靈太乙壇新豐樹色統千官那知今夜長生殿獨閉空山月影寒太乙壇見前注此武帝指𤣥宗言新豐在驪山之下古驪戎之國秦曰驪邑漢祖徙豐民居之命曰新豐𤣥宗分置㑹縣尋改曰昭應長生殿王建詩云武帝自知身不死㸔修玉殿號長生此詩盖亦諷𤣥宗求仙之事而竟無益前日之盛事有今日之荒凉也李君虞夜上受降城聞笛輿地志受降城有三一在雲中即榆林縣東北八里一在秦九原郡後更名五原一在豐州西北八十里囘樂峯前沙似雪受降城外月如霜不知何處吹蘆管一夜征人盡望鄉囘樂峯在榆林縣南蘆管笳也北人合蘆管吹之也聴角角邉霜昨夜墮闗榆吹角江城片月孤無限塞鴻飛不度西風吹入小單于小單于大單于皆曲名早發破訥沙破訥沙頭鴈正飛鸊鵜泉上戰初歸平明日出東南地滿磧寒光生䥫衣破訥沙鸊鵜未詳送客還幽州幽州禹貢分燕以北為幽州今北京惆悵秦城送獨歸薊門烟樹遶依依秋來莫射南來㕍縦遣乗春更北飛薊門古薊州今為遵化州宫怨露濕晴花春殿香月明歌吹在昭陽似將海水添宫漏共滳長門一夜長長門宫漢武陳皇后别在長門宫愁思相如為賦以寤上意秦公緒名系㑹稽人天寳之亂客居泉州之九日山與劉長卿善以詩相贈答權得輿曰長卿自以為五言長城系以偏師攻之年老益壮題明惠上人房簷前朝暮雨添花八十吳僧飯熟麻入定幾時還出不知巢燕汚袈裟出定入定謂僧坐襌出入定大藏經云有九次禪定飯熟麻乃謂胡麻也武伯蒼汴州聞角汴州豫州之域殷仲丁遷於囂即其地今為開封府何處金笳月裏悲悠悠邉客夢先知單于城上闗山月今日中原搃觧吹闗山月曲名見前注楊巨源字景文蒲中人和練師索秀才楊柳水邉楊柳綠烟絲立馬煩君折一枝惟有東風最相惜殷勤更向手中吹柳子厚柳州二月榕葉盡落偶題榕木名初如葛藟緣木後乃成柎生於南方宦情羈思共悽悽春半如秋意轉迷山城過雨百花盡榕葉滿庭鸚亂啼酬曺侍御過象縣見寄破額山前碧玉流騷人遥駐木蘭舟春風無限瀟湘意欲采蘋花不自由破額山未詳木蘭舟述異記桂陽中多木蘭又木蘭本草木髙數丈葉似茵桂皮如板桂有縦横之文七里舟中有魯般刻木蘭為舟至今在洲中騷人言曹侍御也採蘋花者喻自獻也左蘋蘩荇藻可羞扵王公盖曹在湖湘暫過栁州象縣三體詩注詩意謂栁自獻於曹懐意無限而拘於罪謫不自由也銅魚使赴都寄親友行盡闗山萬里餘到時閭井是荒墟附庸惟有銅魚使此後無因寄逺書銅魚使唐髙祖頒銀兎符後改銅魚符以起軍旅易守長嶺南支郡無綱官考典悵典等悉因都府至京故此亦云又𤣥宗時折衝府皆有相契銅魚朝廷徵發下勑書契魚都督府余驄皆合然後遺之與浩初上人同㸔山寄京華親故栁子厚送浩初上人序稱其閑其性安其情日通易論詮意浩初長沙龍安寺如海禪師弟子也海畔尖山似劍鋩秋來處處割愁腸若為化得身千億散上峯頭望故鄉身千億佛經釋伽佛千百億化身夏晝偶作南州溽暑醉如酒隠几熟眠開北牖曰午獨覺無餘聲山童隔竹敲茶臼溽暑説文濕熱也南方謂栁州即子厚之貶所也陳羽江東人貞元八年陸贄榜及弟二人登科厯官至東宫尉韓公有落葉迸陳羽詩伏翼西洞送人伏翼洞未詳洞裏春情花正開㸔花出洞㡬時囘殷勤好去武陵客莫引世人相逐來武陵客桃源事見前注竇胄卿名庠官至東都判官上陽宫在東都洛城外唐張柬之舉兵討武氏之亂立之中宗酈武氏於上陽宫即此也愁雲漠漠草離離太乙勾陳處處疑日暮毁垣春雨裏殘花猶發萬年枝勾陳四都賦曰周以勾陳之位注曰勾陳王者法之以行宫隨勾陳天文志勾陳六星在紫宫中故天子殿前亦有勾陳太液漢武紀帝於建昌宫北浚大池曰太液上陽宫未應有太液然未央宫有漸䑓而魯靈光亦有漸䑓則上陽宜亦或有太液也毁垣西征賦毁垣兮延佇注垣墻也萬年枝方勺治宅編曰宋徽宗興畫學嘗試試生以萬年枝上太平雀為題無中程者或宻扣中貴答曰冬青樹也太平雀頻伽鳥也竇友封名鞏元和間進士官至武昌副使南㳺感興傷心欲問前朝事惟見江流去不囬日暮東風春草綠鷓鴣飛上越王䑓鷓鴣說文鳥名出南越又嶺表異錄臆前有白圓㸃背上間紫赤毛其大如小野雞多對啼惟翔必東南然開翅之始必先南自呼鈎輈格榮越王䑓在廣州府城北漢南越王趙佗所築也王仲初宫中詞宴詞凡百首天下傳誦效此體者雖有數家然建為之祖魚藻宫中鎻翠娥先皇行處不曽過如今池底休鋪錦菱角雞頭積漸多魚藻宫未詳又憲宗元和十五年八月浚魚藻池或於池上作宫遂以為名云池底鋪錦德宗奢靡毎於宫中引流泉先於池底鋪錦金吾除夜進儺名畫袴朱衣四隊行院院燒燈如白日沉香火裏坐吹笙三體詩注此詩皆隋宫事隋用齊制季冬晦選樂人二百四十人為儺赤幘褠衣赤布袴以逐惡鬼於禁中其日戍夜三唱雞上水一刻皇帝御殿儺入春秋冬皆儺冬八隊春秋四隊燒燈如白日南郡新書除夜儺入前殿然燭熒煌如畫沉香火續世說太宗問蕭后隋主何如后曰每除夜前殿設火山數十每一山焚沉香數車㷔起數丈用沉香百餘車太宗刺其奢心服其盛沉香本草書南海諸國其木類椿梓多節葉似橘花白子似㯽榔又似桑根避暑昭陽不擲盧井邉含水噴鴉雛内中數日無呼喚榻得滕王蛺蝶圖昭陽擲盧見前注滕王名嬰湛然善畫峽蝶樹頭樹尾覔殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風三體詩注云此詩盖比而興也殘紅色衰也東西分飛君與己初背也貪慕也結子有寵有成也五更風君心之飄忽也詩意謂使我不貪結子而入宫則安得今日之愁不可恨君也色衰罷去矣然惟自咎其初心不以怨君盖亦厚之至也荆公最愛此詩云金殿當頭紫閣重仙人掌上玉夫容太平天子朝元日五色雲車駕六龍玉芙蓉玉盃也漢武故事曰上作盛露盤仙人掌擎玉盃以取雲表之露和玉屑服之求不死三輔黄啚謂仙掌在甘泉宫通天䑓上按古人把注之器多作芙蓉如華清池中玉芙蓉是也太平天子見前注雲中本集作雲車者是今從本集五色雲車畫雲氣五色於車也郊祀志文成言上欲與神通宫室被服非家神今不至乃作畫雲氣車甲丙戊庚壬日各以其色駕之六龍易時乗六龍以御天又甘泉賦曰於乘輿乃登鳯凰兮翳華之駟蒼螭兮六素虬注曰六馬也三體詩注曰此篇乃全用甘泉宫事以刺世主違禮而好怪禮竒器不入宫君不乘竒車况作非禮之器為服食以求不死御鬼神之車服以滛祀乎辭惟序事而譏自見此杜元凱所謂因文見意者也多以宫詞為情者非也按建宫詞百萹有情者有事者有怨者有刺者指不一也而或者概以情怨說宫詞誤矣唐昌觀玉蘂花唐昌觀未詳玉蘂花后土祠中玉蘂花也名橘蕋詩崑山采瓊蕋可以鍊魂其花未詳一樹蘢䓗玉刻成飄廊㸃地色輕輕女冠夜覓香來處惟見階前碎月明女冠女道士也若唐之金仙玉真二公主之類是也詳唐昌觀亦女冠脩道之觀若玉眞公主修道處賜名延真觀者是也綺繡宫在東都永寕縣西五里顯慶三年置玉樓傾側粉墻空重叠青山繞故宫武帝去來紅袖盡野花黄蝶領春風三體詩註云武帝謂𤣥宗也天子崩謚曰某有功德上廣號曰某宗以為不遷之廟至漢猶然然則某宗者非謚也及唐則不論功德廟號皆曰某宗盖臣稱其主猶或以尊號中最下一字曰某皇帝如則天稱太宗為文皇帝詩人稱𤣥宗為武皇帝是也至宋則直稱曰某宗無稱某皇帝者矣紅袖姬羙人也此言𤣥宗已前復逰幸宫中羙人已盡惟野花黄蝶而已也江陵使至汝州江陵荆州屬縣也汝州吉戎蠻子之邑漢為梁縣今亦為汝州也囬看巴路在雲間寒食離家麥熟還日莫數峯青似染商人說是汝州山華清宫酒幔髙樓一百家宫前楊柳寺前花内園分得温湯水二月中旬已進𤓰三體詩注云寺風俗通曰尚書御史所止皆曰寺天寳四載置百司於闕湯所故有寺温湯見前注二月進𤓰唐置溫湯監監丞種𤓰蔬隨時貢奉𤓰夏方熟二月而進盖譏明皇違時及物求口腹竒巧之奉以悅婦人杜牧華清云一騎紅塵妃子笑無人知是荔枝來亦譏其以口腹勞人也或問子說嘉矣奈二月非𤓰時答曰惟驪山溫湯地煖闕力為之按衛宏古文竒字曰秦始皇令人種𤓰驪山硎谷中實成使人上書曰𤓰冬有實乃詔諸生徃眎因坑之然則溫湯方冬已𤓰矣何待二月也張文昌送蜀客蜀客南行聼碧雞木綿花發錦江西山頭日晚行人少時見猩猩樹上啼碧雞集覧金馬碧雞之神金形似馬碧形如雞其神祠在益州金馬坊也書島夷卉服注卉草也葛越木綿之属木綿樹髙不滿五尺葉如楓五月有花花落為桃八九月間桃開吐綿如綿故曰木綿猩猩錦江俱見前注木綿花逄賈島僧房逄着款冬花出寺行吟日已斜十二街中春雪徧馬蹄今去入誰家本草欵冬花根紫色莖青紫葉開黄花青紫蕚出雍州南山及華州出寺吟行島初為僧號無本此詩有僧房出寺之語當是島未加衣冠時作十二街鮑昭詩京城十二街與賈島閒㳺水北原南草色新雪消風暖不生塵城中車馬應無數能觧閑行有幾人三體詩註按張衡子四愁詩序云效楚詞以香草比君子以雪霏水深比小人此詩用其體以欵冬花耐寒寂比島以春雪比小人以斜日比時昏而傷已與島未知所託也宿誰家杜云風濤暮不穏捨棹宿誰家全用杜意寄李渤渤字濬之隠廬山後徙居少室山元和中召拜右拾遺不就號白鹿先生云五度谿頭躑躅紅嵩陽寺裡講時鐘春山處處行應好一月看花到幾峯五度谿在嵩山常建云仙人得道處盖渤隠嵩山少室躑躅本草即杜鵑花羊食則死見之躑躅以此得名看花到幾峯嵩陽有三十六峯故云秋思洛陽城裏見秋風欲作家書意萬重復恐匆匆說不盡行人臨發又開封批云常言常語冩得思盡感春遠客悠悠任病身誰家池上又逄春明年各自東西去此地看花是别人蠻中瘴水蠻中入洞流人家多住竹棚頭一山海上無城郭惟見松牌記象州蠻中本集作蠻江瘴番禺雜編嶺外二三月為青草瘴六七月為新木瘴八九月為黄茅瘴又醫書曰山嵐瘴氣盖熱病也凡百粤之地皆為蠻中孫覿象州詩云瘴雲如海蹴天浮柳子厚詩亦曰瘴江南下水如湯盖嶺表之地多熱故瘴氣亦多也象州古象郡也今為馴象衛古無城郭惟以松牌記其州名於山頭耳然亦因郡有象山象䑓得名閒行老身不計人間事野寺秋晴毎獨過病眼較來猶斷酒却嫌行處菊花多春别曲長江春水綠堪染荷葉出水大如錢江頭橋樹君自種那不長繫木蘭船木蘭船見前注成都曲古梁州之域漢改益州今作成都府題意未詳錦江近西春水緑新雨山頭荔支熟萬里橋邉多酒家游人愛向誰家宿萬里橋在成都縣秦曰成都也寒塘曲寒塘沉沉栁葉踈水暗人語驚栖鳬舟中少年醉不起持燭照水射㳺魚鳬格物論野鴨也山禽山禽毛如白練帶栖我庭前栗樹枝獼猴夜半來取栗一雙中林向月飛白練帶鳥名尾上有白毛三五根長二三尺如白練帶故名凉州詞西域記龜兹國王與臣庶知樂者於天山間聴風聴水之聲均節成音後翻入中國如伊州凉州甘州皆龜茲之境也邉城莫雨鴈飛低蘆笋初生漸欲齊無數鈴聲遥過磧應䭾白練到安西鳯林闗裏水東流白葦黄榆六十秋邉將皆承主恩澤無人解道取梁州劉夢得自朗州至京戱贈㸔花諸君子朗州漢武陵郡今常州府夢得常為刺史紫陌紅塵拂靣來無人不道㸔花囘𤣥都觀裏桃千樹盡是劉郎去後栽陌史南北為阡東西為陌又三輔黄啚長安九陌八街再遊𤣥都觀杜題本尊師松樹障子歌下注𤣥都長安子午谷有𤣥都塘又㑹要云京師朱雀街有𤣥都觀百畆庭中半是苔桃花淨盡菜花開種桃道士歸何處前度劉郎又獨來詩評云夢得逐淩又為主客郎中復作𤣥都觀看花二詩言始謫十年還京師道士種桃甚盛若霞又十四年過之無復一存惟兎葵燕麥動揺春風耳盖以諷權近也又云大厯凌夢得之絶句吾所深取一作又獨來烏衣巷在金陵近朱雀橋朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家朱雀橋晋孝武所建上有兩銅雀故以此名去烏衣巷不遠或謂今京師武定橋即舊朱雀橋烏衣巷在秦淮南今織錦坊是也王謝王導謝安皆江左大臣中興勲貴也按此詩亦有刺風非偶然之作也石頭城在金陵今京師石城門是其地輿地志云石頭城六朝形勝所必争之地也山圍故國周遭在潮打空城寂寞囘淮水東邉舊時月夜深還過女墻來故國指吳晋宋齊梁陳六朝也淮水今京師秦淮橋水也批云山在朝在月在惟六國不在而空城耳是亦傷古興懐之作云耳聼舊宫人穆氏歌曽隨織女度天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多織女見前注此亦借言有所指也貞元德宗年號夢得貞元時入仕元和初謫二十四年方歸故有是語天河見前注與歌者何勘何勘盧氏雜錄歌曲之妙元和中有朱嘉榮何勘二十餘年别帝京重聞天樂不勝情舊人惟有何勘在更與殷勤唱渭城天樂史秦穆公夢至帝所觀鈞天廣樂又史扁鵲傳趙簡子曰我之帝所與百神逰於廣樂九奏萬舞渭城王維詩見本注蹋歌詞蹋歌未詳春江月出大隄平隄上女郎連袂行唱盡竹枝懽不見紅霞映樹鷓鴣鳴大隄見前注歡不見指所懐人而言竹枝詞杜詩竹枝歌公自注云巴渝之遺音惟峽人善唱又本集中引曰余來建平里中聯歌竹枝吹笛擊鼓以赴節含思宛轉有淇澳之致作竹枝歌山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等間平地起波瀾瞿塘峽名在䕫州東一里舊名西陵峽乃三川之門山上層層桃李花雲間煙火是人家銀釧金釵來負水長刀短笠去燒畬楊柳青青江水平聞郎江上唱歌聲東邉日出西邉雨道是無情還有情批云自是竹枝楊柳枝詞花蕚樓前初種時羙人樓上鬬腰枝如今抛擲長街裏露葉如啼欲恨誰花蕚樓唐元宗於興慶宫西南置樓西曰花蕚相輝之樓腰肢以柳枝如細腰也焬帝行宫汴水濵數株殘柳不勝春晚來風起花如雪飛入宫墻不見人焬帝隋君也行宫即離宫也汴水見前注阿嬌怨漢武帝生數歲長公主抱問兒欲得婦否曰欲得主指女曰阿嬌好否笑曰若得阿嬌當以金屋貯之望見葳㽔舉翠華試開金屋掃庭花須㬰宫女傳來信言幸平陽公主家平陽公主家武帝時平陽公主言延年有女弟則公主似武帝公主也元和甲午歲詔書盡徴江湘逐客余自武陵赴京宿於都亭有懐續來諸君子禹鍚以永貞元年二月貶至元和甲子詔還武陵今常徳府桃源縣也古荆州之域殷周時蠻所居單漢為武陵郡隋改辰州唐改朗州禹鍚謫居朗州十五年都亭未詳所指又相如傳傳舍都亭雷雨江湘起卧龍武陵樵客躡仙踪十年楚水楓林下今夜初聞長樂鐘雷而言詔書卧龍諸葛孔明事此盖以自喻諸被逐者若龍之臥困未伸時也武陵樵客自喻也楚水楓林楚辭湛湛江水以上有楓林又阮嗣宗詩湛湛長江水上有楓樹林長樂苑在長安之東也杜牧之本傳名牧有竒節不為齪齪小謹詩情豪邁人號為小杜以别杜甫大和初崔郾試進士牧作阿房宫賦甚有警㧞吳武公袖獻崔請以第一處之㑹昌遷中書舍人詩評云言詩則李賀杜牧李商隠皆卓然以所長為一世冠其可尚已登樂逰原在杜陵西北宣帝神雀三年建長空澹澹孤鳥沒萬古銷沉向此中㸔取漢家何似業五陵無樹起秋風五陵見前注漢江見前注溶溶漾漾白鷗飛渌浄春深好染衣南去北來人自老夕陽長送釣船歸泊秦淮秦淮水在建康秦望氣者言東南有天子氣故鑿斷地脉方山是其斷處水為秦淮今在京師城中有秦淮橋煙籠寒水月籠沙夜泊秦淮近酒家商女不知亡國恨隔江猶唱後庭花後庭花見前注商女商客之女也赤壁三體詩注鄂州蒲圻縣西北岸烏林與赤壁相對卽周瑜敗曹操處又按方輿勝覧黄州府亦有赤壁水經載赤鼻治周瑜破曹處及東坡赤壁賦亦指黄州者是及按烏林與赤壁相去二百餘里盖赤壁初戰時操軍不利引次江北而後有烏林之敗今其上有東坡雪堂及臨臯亭折㦸沉沙䥫未銷自將磨洗認前朝東風不與周郎便銅雀春深鎻二喬周郎吳周瑜也本傳瑜年二十四吳中呼為周郎孫䇿攻皖城得喬公二女皆有國色䇿納大喬瑜納小喬又瑜與曹遇於赤壁曹在北岸瑜在南岸瑜將黄盖以船載薪燒北船時東南風急曹公敗走又曹公於鄴作銅雀臺置妓於上詩意謂非東風助順則瑜不勝家必為曹公所虜矣秋夕銀燭秋光冷畫屛輕羅小扇撲流螢天階夜色凉如水卧看牽牛織女星牽牛織女二星名見前注宫怨監宫引入蹔開門隨例雖朝不是恩銀鑰却收金鎻合月明花落又黄昏批云哀而不傷寄揚州韓綽判官青山隐隐水迢迢秋盡江南草木凋二十四橋明月夜玉人何處教吹簫二十四橋輿地志歐公自揚州移汝西詩曰都將二十四橋月換作西湖十頃秋送隐者無媒徑路草蕭蕭自古雲林遠市朝公道世間惟白髪貴人頭上不曽饒將赴吳興登樂游原吳興統紀歸命侯寳鼎元年分吳郡立吳興郡今湖州是也此必牧之出守吳興時作清時有味是無能閒愛孤雲静愛僧欲把一麾江海去樂游原上望昭陵一麾顔延年詩屢薦不入官一麾乃出守麾斥也昭陵唐太宗陵在醴泉縣西樂游原西京雜記太平公主於樂游原上置亭四望舊史云牧自負才畧兄悰隆盛於時而牧居下位心常不樂望昭陵者不得志於時而思明君之世盖怨也首言清時反辭也江南春千里鸚啼綠暎紅水邨山郭酒旗風南朝四百八十寺多少樓臺烟雨中杭州府唐盛時有四百八十寺云懐吳中馮秀才吳中蘇州府郡名長洲花外草蕭蕭却算逰程歳月遥惟有别時今不忘暮煙秋雨過楓橋批云寫得别懐盡長洲苑寰宇記蘇州長洲縣吳長洲苑也啚經曰在西南七十里孟康曰以水州為苑也楓橋寺在吳縣西十里退宫人閑吹玉殿昭華管醉折黎園縹蒂花十年一夢歸人世絳縷猶封繫臂紗昭華笛名縹蔕綠青白色絳縷繫臂晉武帝選士女庶子有姿色者以絳綵繫其臂齊安郡後池齊州今黄州府也古黄子國楚滅之南齊改為齊安隋改為黄州煬帝改永安郡今為黄州府菱透浮萍綠錦池夏鶯千囀㺯薔薇盡日無人看㣲雨鴛鴦相對浴紅衣題城樓嗚軋江樓角一聲㣲陽㶑㶑落寒汀不用憑欄苦囘首故鄉七十五長亭長亭一亭十里也李義山龍池池在興慶宫明皇逰翫之地也池本平乗拱材因雨水流漂成小池至景龍中彌亘數頃深至數丈常有雲氣因見黄龍故名龍池賜酒敞雲屛羯鼓聲高衆樂停夜半燕歸宫漏永薛王沉醉壽王醒批云如何不怨羯鼔羯鼓錄明皇嘗聼琴未終遽止之曰速令花奴持羯鼓來為我觧穢盖羯鼔乃明皇所製樂名薛王明皇之兄也壽王明皇之子也貴妃壽王之妃天寳四載或言壽王妃楊氏之羙上見而悦之乃令妃自乞為女宫號太貞别為壽王册妃韋氏故云瑶池瑶池阿母綺忩開黄竹歌聲動地哀八駿日行三萬里穆王何事不重來阿母王母也黄竹歌聲周穆王逰黄䑓之丘獵於苹澤大寒雪凍乃作黄竹詩三章八駿見前注草下隂蟲葉上霜朱䦨迢逓壓湖光兎寒蟾冷桂花白此夜嫦娥應斷腸兎寒張衡靈憲日月中之精積而成獸象兎兎隂類也蟾冷羿請不死藥於西王母姮娥竊之奔月宫托身於月是為蟾儲又戰國䇿月魄象蟾兎爾雅蟾似蝦蟆三足居陸地又抱朴子蟾儲壽三千歲者頭有角頷下丹書八字桂花天寳遺事云𤣥宗游月宫見素娥十餘人乗白鸞舞於桂樹下又酉陽雜爼月中有桂樹高五百丈又吳剛月中斫桂事見前注偶題水亭閑眠㣲醉消小榴海栢枝相交冰絃簟上琥珀枕傍有墮釵䨇翠翹簟篾席也琥珀枕太白詩且留琥珀枕又按曹操時有獻琥珀枕者唐音巻七
