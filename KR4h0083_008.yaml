body:
  text: 唐音巻八元楊士𢎞撰張震註唐音遺響一王無功名績絳州人隋大業中舉孝亷還鄉種黍蒔藥酿酒自供以周易老子置床頭自號東臯子唐武徳初待詔門下省官給酒一斗自著五斗先生傳及醉鄉記過酒家此日長昏飲非闗養性靈眼㸔人盡醉何忍獨為醒靈説文善也神也此云養性靈者即老子治心養性養神之謂也盡醉獨醒楚辭漁父屈原曰衆人皆醉我獨醒章懐太子太子唐髙宗長子賢字明允初封雍王上元二年武氏酖殺太子𢎞立之為太子永隆元年亦為武氏廢為庶人立英王哲為太子嗣聖元年武氏令丘神績殺之黄臺瓜辭黄臺未詳種瓜黄臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸按此詩章懐傷武氏既殺太子忠又殺太子𢎞而至己為太子恐亦不免於禍故作是詩以諷武氏未㡬太子亦為武氏所殺良亦慘㢤王適幽州人韓文王適懐竒負氣聞金吾将軍李惟簡喜士造門造曰天下竒男子王適願見將軍白事一見論合薦為恭軍遷監察御史詠江濱梅忽見寒梅色開花漢水濱不知春色早疑是㺯珠人㺯珠人交甫事見前註李義甫唐太宗召見詠鳥詩云上林無限樹不得一枝棲太宗曰當全枝借汝髙宗朝拜叅政險狡忌克人謂笑中有刀柔而割物號曰李猫後以貶死詠烏日裏颺朝彩琴中半夜啼上林如許樹不借一枝棲日裏颺光張衡靈憲曰日中烏有三足又廣雅曰日一名陽烏故有日中烏之説云琴中夜啼琴操有烏夜啼曲張説之名説字道濟又字説之洛陽人永昌中武氏䇿賢良方正開元中為中書令封燕國公與蘇頲皆以文章著名時號燕許大筆云蜀道後期客心争日月來往預期程秋風不相待先至洛陽城詩評云説既謫岳州而詩亦悽惋人謂得江山助云喬知之仕武氏官至右同郎中武承嗣所譛之為武氏族殺折楊栁題意註見前可憐濯濯春楊柳攀折將來就纎手妾容與此同盛衰何必君恩獨能久濯濯詩濯濯厥靈註光澤貌何必謂何可必能也張子壽字九齡韶州曲江人七歳知屬十三以書干王方慶慶嘆曰是必致遠擢進士次道侔伊吕科䇿封第𤣥宗時官至中書侍郎封曲江公謚文獻魚游樂深池鳥栖欲高枝嗟爾蜉蝣羽薨薨聚何為有生豈不化所感奚若斯神理日㣲㓕吾心安得知浩蕩楊朱子徒然泣路岐選詩補註云曲江所為詩多雅淡而魚游樂深池與漢上有游女尤得古風人之音格耳又云子壽魚游樂深池之詩可見世道之難進取所志莫伸感嘆而作是詩語盖意含蓄似有不可得而盡者蜉蝣楊朱泣路岐俱見前註孤鴻海上來池潢不敢顧側見雙翠鳥巢在三珠樹矯矯珍木巔得無金丸懼羙服患人指髙眀逼神惡今我游𠖇㝠弋者何所慕翠鳥巢珠樹俱見前註珍木珍竒之木金丸彈也亦見前註㝠㝠保黙之完弋者語弋不射宿弋謂以生絲繫矢而射也按此詩之意保欲自晦以避祸患豈九齡罷相而李林甫作相時詩耶盖林甫隂忌九齡常欲中傷之九齡既作海燕詩以見意及帝賜白羽扇則獻賦以自喻云茍效用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩於篋中則公之忠節豈林甫中傷之是懼哉然則小人進而君子退且不自保者如此良可悲哉齊洗心名澣交州人𤣥宗時官至中書侍郎出為平陽太守長門怨長門見前註㷀㷀孤思逼寂寂長門掖妾妬亦知非君恩那不惜擕琴就玉階詞悲聲未諧將心托明月流影入君懐吳貞節名筠華州華隂人隐居嵩山不仕歩虛詞異苑錄神仙聲清逺遒亮道士效作歩虚聲備言衆仙縹緲輕舉之事扶桑誕初景羽葢凌晨霞倐歘造西域嬉遊金母家碧津湛洪源灼爍敷荷花煌煌青琳宫璨璨列玉華真氣溢絳府自然思無邪俯矜區中士夭濁良可嗟扶桑見前註初景日初出時也羽盖人王母卽西王母俱見前註琳宫道觀也玉華真詰鹿皮公吞玉華絳府真浩心宫也真氣北斗經曰五方降真氣盖真氣者本身自然之心氣也思無邪語曰一言以蔽之曰思無邪程子曰思無邪者誠也闕壽短濁昏中也夭濁夭年濁也瓊䑓却為仭孤暎大羅表常有三素雲凝光自飛繞羽童汎明霞升降何縹緲鸞鳯嘯雅音栖翔絳林標玉虛無晝夜靈景何皎皎一覩太上京方知衆天小刼仭度人經緲緲刼仭大羅天也上帝所居之處玉虛大闕亦無晝夜仙經丹丘無晝夜靈景日月也太上京天帝之京也三素雲真秘言立春清明日北望闕二氣播萬有化機無停輪而我操其端乃能出陶鈞寥寥大漠上所遇皆清真澄瑩含元和氣同自相親絳樹結丹實紫霞流碧津以兹保童嬰水用超形神二氣隂陽二氣也萬有萬物也化機天地二氣運行妙用也大漠天也清真真闕也元和氣也張廵鄧州南陽人身長七尺餘鬚髯若神讀書不過三遍終身不忘為文章操筆立書未嘗起藁守睢陽賊屢破之及城䧟守節不屈而死夜聞笛岧嶤試一臨虜騎俯城隂不辨風塵色安知天地心門開邉月近苦戰陣雲深旦夕更樓上遙聞横笛音朱子註韓文張中丞傳後序曰廵開元二十四年進士劉夢得嘉話載其謝加金吾表云主辱臣死當臣致命之時惡稔罪盈是賊㓕亡之日激厲將士賦詩有云褁瘡猶出陣飲血更登陴又夜笛聲有云營開星月近戰苦陣雲深余觀此則廵之文章可見矣廵守睢陽詩全章云接戰春來苦孤城日漸危合圍侔月暈分守效魚麗毎厭黄塵起時將白羽麾褁瘡猶出陣飲血更登陴忠信因難敵堅貞自不移無人報天子心計欲可施按傳闕節上貫日月固不侍文章以為身顯闕文章乎士之氣聞之尚使人興起而感慕之不闕故於此并附此詩以為讀書者勸云盧緯卿名象汜水人詩評云盧象詩雅而不素有大體得國士之風鄉賦後自鞏還田家因謝隣友見過之作鄉賦謂輸鄉之賦稅畢而還也鞏縣闕屬河南府鷄鳴出東邑馬倦登南蠻落日見桑柘翳然丘中寒隣家多舊識投暝來相看且問春稅苦兼陳行路難園塲近隂壑草木易凋殘峯暗雪猶積澗深冰已團浮名知何用歲晏不成懽置酒共君飲當歌聊自寛陶翰潤州人詩評云唐代詞人詩筆雙羙者鮮矣翰實眼之旣多興象復滿風骨三百年闕前方可論其體裁也古塞下曲進軍飛狐北窮㓂勢將變日落塵沙昏背河更一戰騂馬黄金勒雕弓白羽箭射殺左賢王歸奏未央殿欲言塞下事天子不召見東出咸陽門哀哀淚如霰飛狐道在蔚州飛狐縣北入嬀州懐成縣卽漢酈食其所謂塞飛狐之口者是也敗落之衆故曰窮㓂騂馬赤馬也左賢王匃奴中有左賢王未央殿卽未央宫也咸陽門咸陽城門也燕歌行題意見前請君留楚調聼我吟燕歌家在遼水頭邉風意氣多出身為漢將正值戎未和雪中凌天山冰上度交河大小百餘戰封侯竟蹉跎歸來霸陵下故舊無相過雄劍委塵匣空門惟雀羅玉篸還趙姝瑶琴付齊娥昔日不為樂時哉今奈何雄劍鮑詩雙劍將别離先在匣中鳴雌沉吳江裏雄飛入楚城劉眘虛江東人詩評云眘虛情幽興遠思苦語竒忽有所得便驚衆聼頃東南髙唱者數人然聲律宛態無出其右惟氣骨不逮諸公自永明已還可傑立江表至若松色空照水經聲時有人等句並方外之語惜其不永石碎國寳暮秋揚子江寄孟浩然木葉紛紛下東南日烟霜林山相晚暮天海空青蒼暝色空復久秋聲亦何長孤舟兼㣲月獨夜仍越鄉寒笛對京口故人在㐮陽詠思勞今夕漢江遥相望京口見前註又啚經其城因山為壘緣江為境爾雅丘絶髙曰京故名㐮陽漢江見前註江南曲羙人何蕩漾湖上風日長玉手欲有贈徘徊雙明璫歌聲隨淥水怨色起青陽日暮還家望雲波横洞房薛據荆南人為人骨鯁有志其為文亦自蕩不違因㸔古興詩云投珠志自疑抱玉但垂泣怨情頗深良可悲也按杜子美有聞薛三據法司議即未審即據否出青門往南山别業舊居在南山夙駕自城闕榛莾相蔽虧去爾漸超忽散􅲾餘雪晴蒼茫季冬月寒風吹長林白日原上没懐抱曠莫伸相知阻吳越弱年好栖隠鍊藥在嚴窟及此離垢氛興來亦因物末路期赤松斯言庶不伐賀蘭進眀綱目至徳五載江賀蘭進明為可止目使詩評稱其博雅好古經籍滿腹其著述百餘篇頗究天人之際為古詩八十首大體符於阮公又阮詩憂國將亡述詩寄懐進明鎮臨淮擁兵不救睢陽之急當此之時天人之際安在而體阮之詩亦不過美于甘辭耳古意崇蘭生澗底香氣滿幽林采采欲為贈何人是同心日暮徒盈抱徊徊幽思深慨然紉雜珮重奏丘中琴行路難君不見門前栁榮耀㡬時蕭索乆君不見陌上花狂風吹去落誰家隣家思婦見之歎蓬首不梳心厯亂盛年夫壻長别離歲暮相逄色凋換又君不見芳樹枝春花落盡蜂不窺君不見梁上泥秋風始髙燕不栖蕩子從軍事征戰蛾眉婵娟守空閨獨宿自然堪下淚况復時聞烏夜啼沈如筠潤州句容人寄張徴古寂厯逺山意㣲暝半空碧綠蘿無冬春彩烟竟朝夕張子海内竒耐為巖中客聖君勞夢想安得老松石閨怨鴈盡書難寄愁多夢不成願隨孤月影流照伏波營後漢馬援字文淵光武建武中拜伏波將軍擊交趾李嶷少年行樂府遺聲逰俠三十一曲有少行年行又陸士衡有結客少年場十八羽林郎戎衣侍漢王臂鷹金殿側挾弹玉輿傍馳道春風起陪遊出建章羽林郎前百官表羽林有郎有騎士有羽林孤兒漢皇武帝也馳道建章見前註侍獵長楊下承恩更射飛塵生馬影㓕箭落鴈行稀薄霧隨天仗聨翩入鎻闈長楊宫名以其地有長楊因以為名天仗鎻闈俱見前註玉劍膝邉横金盃馬上傾朝遊茂陵道夜宿鳯凰城豪吏多猜忌毋勞問姓名丁僊之閏州曲阿人江南曲長干斜路北近浦是兒家有意來相訪明朝出浣紗發向横塘口船開值急流知郎舊時意且請攏船頭昨暝遶南陵風聲波浪阻入浦不逄人歸家誰信汝未暝已成粧乗潮去茫茫因從京口渡使報邵陵王始下夫容樓言發瑯琊岸急為打船開惡許傍人見長干京口浣紗西施事横塘集覧卽横江也又金陵覧闕曰自江口沿淮築塘謂之横塘闕子闕有南闕有陵縣萬寧國府邵陵王名綸梁武帝子侯景亂奔魏封梁王後為魏所闕夫容樓未詳琅琊郡名益都沂闕破城邑本漢地志云今兖州沂州察州皆古琅琊地又今除州有琅琊山此言瑯琊岸盖除州瑯琊山也吳象之陽春歌歌錄陽春歌楚曲也卽時十五曲之一又陽春白雪簾低曉露濕簾捲鶯聲急欲起抱箜篌如疑彩弦澁孤眠愁不轉㸃淚聲相及净掃階上花風來更吹入張潮潤州阿人㐮陽行樂府正聲清啇曲有㐮陽闕不闕王誕闕為㐮陽守夜聞諸女歌謡因為之辭焉又宋劉道彦為雍州有惠政百姓歌之謂之㐮陽非此地玉盤轉明珠君心無定凖昨見㐮陽客剰說㐮陽好無盡㐮漢水峴山垂漢水東流風北吹只言一世長嬌寵那悟今朝見别離君渡清𦍑渚知人獨不語君見木栖林憶君相思深莫作雲間鴻離聲顧儔侣尚如匣中劍分形㑹同處是君婦識君情怨君恨君為此行下床一宿不可保况乃萬里㐮陽城㐮陽傳近大堤北君到㐮陽莫廽惑大堤諸女児憐錢不憐德峴山漢水匣中劍大堤女俱見前註清𦍑渚未詳江南行茨菰葉爛别西湾蓮子花開猶未還妾夢不離江水上人傳郎在鳯凰山茨菰書無所載今所在池塘有之葉長上尖小大作人字分四五六月間白花四瓣根下有子如圓眼大可食孟雲卿平陽人按杜詩註陶峴闕城子孫也開元間完昆山豐田疇游江湖製三舟一自載二賔客三飲饌與進士孟彦深樊口進士孟雲卿布衣焦遂人置僕妾女樂一部奏清商曲遊於江湖中時號水仙及按公集有觧悶詩云孟子論文更不疑自註云孟子授校書郎孟雲卿是也又有湖城遇孟雲卿詩古别離樂錄古别離十九曲之一也朝日上髙䑓離人怨秋草但見萬里天不見萬里道君行本遥遠苦樂良難保宿昔夢同衾憂心夢傾倒含酸欲誰訴展轉傷懐抱結髪年已遲征行去何早寒暄有時謝顦顇難再好人皆闕唐音卷八
