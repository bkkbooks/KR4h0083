body:
  text: 唐音卷八元楊士𢎞撰張震注唐音遺響一王無功名績絳州人隋大業中舉孝亷還鄉種黍蒔藥釀酒自供以周易老子置床頭自號東臯子唐武德初待詔門下省官給酒一斗自著五斗先生傳及醉鄉記過酒家此日長昏飲非關養性靈眼看人盡醉何忍獨為醒靈説文善也神也此云養性靈者即老子治心養性養神之謂也盡醉獨醒楚辭漁父屈原曰衆人皆醉我獨醒章懷太子太子唐髙宗長子賢字明允初封雍王上元二年武氏鴆殺太子𢎞立之為太子永隆元年亦為武氏廢為庶人立英王哲為太子嗣聖元年武氏令丘神績殺之黃臺瓜辭黃臺未詳種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸按此詩章懷傷武氏既殺太子忠又殺太子𢎞而至己為太子恐亦不免於禍故作是詩以諷武氏未幾太子亦為武氏所殺良亦慘哉王適幽州人韓文王適懷竒負氣聞金吾將軍李惟簡喜士造門造曰天下竒男子王適願見將軍白事一見論合薦為恭軍遷監察御史詠江濱梅忽見寒梅色開花漢水濱不知春色早疑是㺯珠人㺯珠人交甫事見前注李義甫唐太宗召見詠鳥詩云上林無限樹不得一枝棲太宗曰當全枝借汝髙宗朝拜參政險狡忌克人謂笑中有刀柔而割物號曰李貓後以貶死詠烏日裏揚朝彩琴中半夜啼上林如許樹不借一枝棲日裏揚光張衡靈憲曰日中烏有三足又廣雅曰日一名陽烏故有日中烏之説云琴中夜啼琴操有烏夜啼曲張説之名説字道濟又字説之洛陽人永昌中武氏䇿賢良方正開元中為中書令封燕國公與蘇頲皆以文章著名時號燕許大筆云蜀道後期客心爭日月來往預期程秋風不相待先至洛陽城詩評云説既謫嶽州而詩亦悽惋人謂得江山助云喬知之仕武氏官至右同郎中武承嗣所譛之為武氏族殺折楊栁題意注見前可憐濯濯春楊柳攀折將來就纎手妾容與此同盛衰何必君恩獨能久濯濯詩濯濯厥靈注光澤貌何必謂何可必能也張子壽字九齡韶州曲江人七歲知屬十三以書干王方慶慶嘆曰是必致遠擢進士次道侔伊吕科䇿封第玄宗時官至中書侍郎封曲江公諡文獻魚遊樂深池鳥栖欲高枝嗟爾蜉蝣羽薨薨聚何為有生豈不化所感奚若斯神理日微滅吾心安得知浩蕩楊朱子徒然泣路岐選詩補注云曲江所為詩多雅淡而魚遊樂深池與漢上有遊女尤得古風人之音格耳又云子壽魚遊樂深池之詩可見世道之難進取所志莫伸感嘆而作是詩語蓋意含蓄似有不可得而盡者蜉蝣楊朱泣路岐俱見前注孤鴻海上來池潢不敢顧側見雙翠鳥巢在三珠樹矯矯珍木巔得無金丸懼美服患人指髙眀逼神惡今我遊冥冥弋者何所慕翠鳥巢珠樹俱見前注珍木珍竒之木金丸彈也亦見前注冥冥保默之完弋者語弋不射宿弋謂以生絲繫矢而射也按此詩之意保欲自晦以避禍患豈九齡罷相而李林甫作相時詩耶蓋林甫隂忌九齡常欲中傷之九齡既作海燕詩以見意及帝賜白羽扇則獻賦以自喻云茍效用之得所雖殺身而何忌又曰縱秋氣之移奪終感恩於篋中則公之忠節豈林甫中傷之是懼哉然則小人進而君子退且不自保者如此良可悲哉齊洗心名浣交州人玄宗時官至中書侍郎出為平陽太守長門怨長門見前注煢煢孤思逼寂寂長門掖妾妬亦知非君恩那不惜擕琴就玉階詞悲聲未諧將心托明月流影入君懷吳貞節名筠華州華隂人隱居嵩山不仕步虛詞異苑録神仙聲清逺遒亮道士效作步虛聲備言衆仙縹眇輕舉之事扶桑誕初景羽蓋凌晨霞倐歘造西域嬉遊金母家碧津湛洪源灼爍敷荷花煌煌青琳宫璨璨列玉華真氣溢絳府自然思無邪俯矜區中士夭濁良可嗟扶桑見前注初景日初出時也羽蓋人王母即西王母俱見前注琳宫道觀也玉華真詰鹿皮公吞玉華絳府真浩心宫也真氣北斗經曰五方降真氣蓋真氣者本身自然之心氣也思無邪語曰一言以蔽之曰思無邪程子曰思無邪者誠也闕壽短濁昏中也夭濁夭年濁也瓊臺却為仭孤映大羅表常有三素雲凝光自飛繞羽童泛明霞升降何縹眇鸞鳯嘯雅音栖翔絳林標玉虛無晝夜靈景何皎皎一覩太上京方知衆天小劫仭度人經眇眇劫仭大羅天也上帝所居之處玉虛大闕亦無晝夜仙經丹丘無晝夜靈景日月也太上京天帝之京也三素雲真祕言立春清明日北望闕二氣播萬有化機無停輪而我操其端乃能出陶鈞寥寥大漠上所遇皆清真澄瑩含元和氣同自相親絳樹結丹實紫霞流碧津以兹保童嬰水用超形神二氣隂陽二氣也萬有萬物也化機天地二氣運行妙用也大漠天也清真真闕也元和氣也張巡鄧州南陽人身長七尺餘鬚髯若神讀書不過三遍終身不忘為文章操筆立書未嘗起藁守睢陽賊屢破之及城陷守節不屈而死夜聞笛岧嶤試一臨虜騎俯城隂不辨風塵色安知天地心門開邉月近苦戰陳雲深旦夕更樓上遙聞橫笛音朱子注韓文張中丞傳後序曰巡開元二十四年進士劉夢得嘉話載其謝加金吾表云主辱臣死當臣致命之時惡稔罪盈是賊滅亡之日激厲將士賦詩有云褁瘡猶出陳飲血更登陴又夜笛聲有云營開星月近戰苦陳雲深余觀此則巡之文章可見矣巡守睢陽詩全章云接戰春來苦孤城日漸危合圍侔月暈分守效魚麗每厭黃塵起時將白羽麾褁瘡猶出陳飲血更登陴忠信因難敵堅貞自不移無人報天子心計欲可施按傳闕節上貫日月固不侍文章以為身顯闕文章乎士之氣聞之尚使人興起而感慕之不闕故於此并附此詩以為讀書者勸云盧緯卿名象汜水人詩評云盧象詩雅而不素有大體得國士之風鄉賦後自鞏還田家因謝鄰友見過之作鄉賦謂輸鄉之賦稅畢而還也鞏縣闕屬河南府雞鳴出東邑馬倦登南蠻落日見桑柘翳然丘中寒鄰家多舊識投暝來相看且問春稅苦兼陳行路難園場近隂壑草木易凋殘峯暗雪猶積澗深冰已團浮名知何用歲晏不成歡置酒共君飲當歌聊自寬陶翰潤州人詩評云唐代詞人詩筆雙美者鮮矣翰實眼之既多興象復滿風骨三百年闕前方可論其體裁也古塞下曲進軍飛狐北窮寇勢將變日落塵沙昏背河更一戰騂馬黃金勒雕弓白羽箭射殺左賢王歸奏未央殿欲言塞下事天子不召見東出咸陽門哀哀淚如霰飛狐道在蔚州飛狐縣北入媯州懷成縣即漢酈食其所謂塞飛狐之口者是也敗落之衆故曰窮寇騂馬赤馬也左賢王丐奴中有左賢王未央殿即未央宫也咸陽門咸陽城門也燕歌行題意見前請君留楚調聼我吟燕歌家在遼水頭邉風意氣多出身為漢將正值戎未和雪中凌天山冰上度交河大小百餘戰封侯竟蹉跎歸來霸陵下故舊無相過雄劍委塵匣空門惟雀羅玉篸還趙姝瑶琴付齊娥昔日不為樂時哉今奈何雄劍鮑詩雙劍將别離先在匣中鳴雌沉吳江裏雄飛入楚城劉眘虛江東人詩評云眘虛情幽興遠思苦語竒忽有所得便驚衆聼頃東南髙唱者數人然聲律宛態無出其右惟氣骨不逮諸公自永明已還可傑立江表至若松色空照水經聲時有人等句並方外之語惜其不永石碎國寶暮秋揚子江寄孟浩然木葉紛紛下東南日煙霜林山相晚暮天海空青蒼暝色空復久秋聲亦何長孤舟兼微月獨夜仍越鄉寒笛對京口故人在襄陽詠思勞今夕漢江遙相望京口見前注又啚經其城因山為壘緣江為境爾雅丘絶髙曰京故名襄陽漢江見前注江南曲美人何蕩漾湖上風日長玉手欲有贈徘徊雙明璫歌聲隨淥水怨色起青陽日暮還家望雲波橫洞房薛據荆南人為人骨鯁有志其為文亦自蕩不違因看古興詩云投珠志自疑抱玉但垂泣怨情頗深良可悲也按杜子美有聞薛三據法司議即未審即據否出青門往南山别業舊居在南山夙駕自城闕榛莾相蔽虧去爾漸超忽散􅲾餘雪晴蒼茫季冬月寒風吹長林白日原上沒懷抱曠莫伸相知阻吳越弱年好栖隱鍊藥在嚴窟及此離垢氛興來亦因物末路期赤松斯言庶不伐賀蘭進眀綱目至德五載江賀蘭進明為可止目使詩評稱其博雅好古經籍滿腹其著述百餘篇頗究天人之際為古詩八十首大體符於阮公又阮詩憂國將亡述詩寄懷進明鎮臨淮擁兵不救睢陽之急當此之時天人之際安在而體阮之詩亦不過美于甘辭耳古意崇蘭生澗底香氣滿幽林采采欲為贈何人是同心日暮徒盈抱徊徊幽思深慨然紉雜珮重奏丘中琴行路難君不見門前栁榮耀幾時蕭索久君不見陌上花狂風吹去落誰家鄰家思婦見之歎蓬首不梳心厯亂盛年夫壻長别離歲暮相逄色凋換又君不見芳樹枝春花落盡蜂不窺君不見梁上泥秋風始髙燕不栖蕩子從軍事征戰蛾眉嬋娟守空閨獨宿自然堪下淚况復時聞烏夜啼沈如筠潤州句容人寄張徴古寂厯逺山意微暝半空碧緑蘿無冬春彩煙竟朝夕張子海內竒耐為巖中客聖君勞夢想安得老松石閨怨鴈盡書難寄愁多夢不成願隨孤月影流照伏波營後漢馬援字文淵光武建武中拜伏波將軍擊交趾李嶷少年行樂府遺聲逰俠三十一曲有少行年行又陸士衡有結客少年場十八羽林郎戎衣侍漢王臂鷹金殿側挾彈玉輿傍馳道春風起陪遊出建章羽林郎前百官表羽林有郎有騎士有羽林孤兒漢皇武帝也馳道建章見前注侍獵長楊下承恩更射飛塵生馬影滅箭落鴈行稀薄霧隨天仗聨翩入鎖闈長楊宫名以其地有長楊因以為名天仗鎖闈俱見前注玉劍膝邉橫金杯馬上傾朝遊茂陵道夜宿鳯凰城豪吏多猜忌毋勞問姓名丁仙之閏州曲阿人江南曲長干斜路北近浦是兒家有意來相訪明朝出浣紗發向橫塘口船開值急流知郎舊時意且請攏船頭昨暝繞南陵風聲波浪阻入浦不逄人歸家誰信汝未暝已成粧乘潮去茫茫因從京口渡使報邵陵王始下夫容樓言發琅琊岸急為打船開惡許傍人見長干京口浣紗西施事橫塘集覽即橫江也又金陵覽闕曰自江口沿淮築塘謂之橫塘闕子闕有南闕有陵縣萬寧國府邵陵王名綸梁武帝子侯景亂奔魏封梁王後為魏所闕夫容樓未詳琅琊郡名益都沂闕破城邑本漢地志云今兖州沂州察州皆古琅琊地又今除州有琅琊山此言琅琊岸蓋除州琅琊山也吳象之陽春歌歌録陽春歌楚曲也即時十五曲之一又陽春白雪簾低曉露濕簾捲鶯聲急欲起抱箜篌如疑彩弦澀孤眠愁不轉點淚聲相及淨掃階上花風來更吹入張潮潤州阿人襄陽行樂府正聲清啇曲有襄陽闕不闕王誕闕為襄陽守夜聞諸女歌謡因為之辭焉又宋劉道彥為雍州有惠政百姓歌之謂之襄陽非此地玉盤轉明珠君心無定凖昨見襄陽客剩説襄陽好無盡襄漢水峴山垂漢水東流風北吹只言一世長嬌寵那悟今朝見别離君渡清羌渚知人獨不語君見木栖林憶君相思深莫作雲間鴻離聲顧儔侣尚如匣中劍分形會同處是君婦識君情怨君恨君為此行下床一宿不可保况乃萬里襄陽城襄陽傳近大堤北君到襄陽莫廽惑大堤諸女兒憐錢不憐德峴山漢水匣中劍大堤女俱見前注清羌渚未詳江南行茨菰葉爛别西灣蓮子花開猶未還妾夢不離江水上人傳郎在鳯凰山茨菰書無所載今所在池塘有之葉長上尖小大作人字分四五六月間白花四瓣根下有子如圓眼大可食孟雲卿平陽人按杜詩注陶峴闕城子孫也開元間完昆山豐田疇遊江湖製三舟一自載二賔客三飲饌與進士孟彥深樊口進士孟雲卿布衣焦遂人置僕妾女樂一部奏清商曲遊於江湖中時號水仙及按公集有解悶詩云孟子論文更不疑自注云孟子授校書郎孟雲卿是也又有湖城遇孟雲卿詩古别離樂録古别離十九曲之一也朝日上髙臺離人怨秋草但見萬里天不見萬里道君行本遙遠苦樂良難保宿昔夢同衾憂心夢傾倒含酸欲誰訴展轉傷懷抱結髮年已遲征行去何早寒暄有時謝憔悴難再好人皆闕唐音卷八
