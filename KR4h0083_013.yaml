body:
  text: 唐音卷十三元楊士𢎞編張震注唐詩遺響六賈浪仙名島初為僧名無本後還俗赴舉京師一日於驢上得句云鳥宿池邊樹僧敲月下門始欲著推字又欲著敲字鍊之未定於驢上吟哦引手作敲推之勢時退之權京尹騎方出賈不覺行至第三節尚為手勢未巳左右擁至尹前島具對所以且云神遊象外不知回避退之立馬久之謂島曰敲字佳遂並轡而歸共論詩留連纍日因為布衣交有詩贈之云云又托言云元和中元白尚於淺島獨變格入僻以矯艷雖行坐寢食吟咏不輟常跨驢張蓋橫絶天衢時秋風正厲黃葉可掃島忽吟曰落葉滿長安求作一聨杳不可得不知身之所從也因之唐突京尹劉栖楚被繫一夕而釋旅遊此心非一事書札若為傳舊國别多日故人無少年空巢霜葉落疏牖水螢穿留得林僧宿中宵坐默然默與默通漢成帝臨朝淵默說文靜也又不說也山中道士頭髮梳千下休糧帶瘦容養雛成大鶴種子得喬松白石通宵煮寒泉盡日舂不曽離隱處那得世人逢休糧謂辟穀也白石列仙傳焦先煮白石食之或與人食味如芋又言鮑靚得道入海遇風飢甚煮白石食之題李嶷幽居閒居少鄰並草徑入荒園鳥宿池邊樹僧敲月下門過橋分野色移石動雲根暫去還來此幽期不負言移石動雲根張協詩雲根起人極又元命苞雲之為言運也觸石而起膚寸而生故云移石動雲根也送朱可久歸越中朱可久即朱慶餘越中今紹興府石頭城下泊北固瞑鐘初汀鷺衝潮起船窗過月虛吳山侵越衆隨栁入唐疏日欲供調膳辟來何府書石頭城北固俱見前注供調膳謂奉親也辟來何府書唐制凡曹官皆得自辟用壯士吟壯士不曽悲去即無回期如何易水上未歌淚先垂易水上荆軻事已見前注宿村家亭子床頭枕是溪中石井底泉通竹下池宿客未眼過夜半獨聞山雨到來時渡桑乾在薊縣燕慕容雋常都于此又燕地理志桑乾縣名屬代郡又曰桑乾河客舍并州巳十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉并州今山西太原府也三月晦日三月正當三十日風光别我苦吟身共君今夜不須睡未到曉鐘猶是春溫飛卿名庭筠并州人仕至國子助教少敏悟工詩與李商隱齊名號溫李韋莊奏其有竒才宜加封贈又庭筠作賦不起草但籠袖憑几每一韻一吟而巳故場中謂之溫八吟西州詞今漢陽府也石頭東北築五城以遏敵勢以鐵騎八百陳於西州之西悠悠復悠悠昨日下西州西州風色好遙見武昌樓武昌何鬱鬱儂家定無匹小婦被流黃登樓撫瑶瑟朱絃繁復輕素手真凄清一彈三四解掩抑似含情南樓登且望西江廣復平艇子搖兩槳催過石頭城門前烏桕樹慘淡天將曙鸂䳵飛復還郎隨早帆去回頭語同伴定復負情儂去帆不安幅作抵使西風他日相尋索莫作西州客西州人不歸春草年年碧武昌見前注流黃衣色如硫黃也朱絃琴瑟也三四解漢李延年有樂府新聲十解南樓武昌即庾亮之事見前注烏桕樹南方謂之夜光樹其子可以作油鸂䳵石頭城俱見前注又石城在竟陵出唐禮樂志湘宫人歌湘宫宋王彧常為湘東王及即位以故第名湘宫寺未審是此否宋冇湘東王彧後為宋王齊有湘東王寶晊湘宫未詳又或梁有湘東王繹又湘東王為湘州刺史或其所建之宫又今南京有湘宫寺或言湘宫池塘芳意濕夜半東風起生緑畫羅屏金壺貯春水黃粉楚宫人芳花玉刻麟娟娟照棊燭不語兩含嚬黃粉未詳又黃山谷詩楚宫嬌額半塗黃碧澗驛曉思香燈伴殘夢楚國在天涯月落子規歇滿庭山杏花郭處士擊甌歌甌說文小盆也又漢成帝欲立飛燕謝后歌歸風送逺之曲以文犀筯繫玉甌佶栗金虬石潭古勺陂瀲灧幽修語湘君寶馬上神雲碎珮藂鈴滿烟雨吾聞三十六宫花離離軟風吹春星斗稀玉晨泠磬破昏夢天露未乾香著衣蘭叉委墜垂雲髮小響丁當逐回雪晴碧烟滋重疊山羅裙半掩桃花月太平天子駐雲車龍爐勃鬱雙蟠拏宫中近臣抱扇立侍女低鬟落翠花亂珠觸續正跳蕩傾頭不覺金烏斜我亦為君長歎息緘情逺寄愁無色莫沾香夢緑楊絲千里春風正無力佶栗金虬勺陂玉晨泠磬俱未詳湘君寶馬太平天子雲車俱見前注又勺陂杜氏通典後王景為廬江太守郡部安豐有孫叔敖所起芍陂佶栗言其聲也金虬甌上制作之形也石潭以甌喻也又勺陂蓋云一勺之水也皆以喻擊甌之音聲感動也張靜婉采蓮曲蘭膏膩髮紅玉春燕叉拖頸拋盤雲城西楊栁向嬌晚門前溝水波粼粼麒麟公子朝天客珂馬堂堂度春陌掌中無力舞衣輕剪斷鮫綃破春碧抱月飄烟一尺腰麝臍龍髓憐嬌嬈秋羅拂水碎光動露重花多香不銷鸂䳵交交塘水滿緑芒如粟蓮莖短一夜西風送雨來粉痕零落愁紅淺船頭折藕絲暗牽藕根蓮子相留連郎心似月月易缺十五十六清光圓燕叉洞真記漢起招靈閣有神女留一燕叉帝以賜趙媫妤至昭帝時宫人謀欲碎之明日視叉匣惟見白燕升天宫人因作玉燕叉曲麒麟公子杜徐卿二子歌並是天上麒麟兒宋徐陵母夢五色鳳集左肩遂生陵年數嵗沙門寶志摩其頂曰天上石麒麟也掌中舞衣趙飛燕能作掌中舞言身輕也抱月飄煙言腰細而身輕也舞衣曲藕腸纎縷抽輕春烟機漠漠嬌蛾嚬金梭淅瀝透空薄剪落交刀吹斷雲張家公子聽秋雨夜向蘭堂思楚舞蟬衫麟帶壓愁香偷得鶯簧鎖金縷管含蘭氣嬌語悲胡槽雪腕鴛鴦絲芙蓉力弱應難定楊栁風多不自持回嚬笑語西窗客星斗寥寥波脈脈不逐秦王卷象床滿樓明月梨花白藕腸言藕也纎縷抽輕春藕中之絲也此以喻舞衣輕細也烟機言絲淨而細如烟之在機而漠漠然也嬌娥言美女之擲金梭而成此舞衣也張家公子未詳蟬衫言其輕薄也麟帶言帶上繡成麒麟也鶯黃鎖金管謂笙也胡槽琵琶也開元中賀懷智㺯琵琶以石為槽鴛鴦絲言雙絃如鴛鴦也芙蓉力弱楊栁風多言美人貌如芙蓉腰如楊栁也秦王卷象床未詳湖隂詞晉永昌元年王敦反移鎮姑孰進屯于湖湖隂漢丹陽郡地晉分丹陽郡置于縣湖隂必其屯軍之地也祖龍黃鬚珊瑚鞭鐵驄金面青連錢虎髯拔劍欲成夢日壓賊營如血鮮海旗風急驚眠起甲重光搖照湖水蒼黃追騎塵外歸森索妖星陳前飛五陵愁碧春萋萋灞川玉馬空中嘶羽書如電入青瑣雪腕如槌催畫鞞白虬天子金煌鋩高臨帝座回龍章吳波不動楚山晚花壓闌干春晝長祖龍始皇三十六年使者從關東夜過華隂平舒道有人持璧遮使者曰為吾遺高池君明年祖龍死此喻晉明帝也虎髯喻王敦也日壓賊營世說晉王敦作逆明帝騎巴真馬齎一金鞭至湖隂察軍形敦晝夢日繞其城忽然驚覺曰營中有黃鬚鮮卑奴來何不縛取命騎追之不及矣未幾而敦死妖星若旄頭之類是也灞川玉馬未詳懊惱曲晉隆安有懊惱歌俗間訛謡之曲藕絲作線難勝針蘂粉染黃那得深玉白蘭芳不相顧青樓一笑輕千金莫言自古皆如此健劍刜鐘鉛繞指三秋庭緑盡迎霜唯有荷花守紅死廬江小吏朱斑輪栁縷吐芽香玉春兩股金叉巳相許不令獨作空成塵悠悠楚水流如馬恨紫愁紅滿平野野土千年怨不平至今燒作鴛鴦瓦鉛繞指古詩昔為百鍊鋼今為繞指柔廬江小吏晉賈后荒淫放恣洛南尉部小吏端麗美容止行逢一媪以簏箱納之車上載入宫中與賈后共寢數夕而去朱斑輪後輿服志天子二金根輪朱斑皇太子皇子皆安車朱斑輪又諸使車皆朱斑輪四輻赤衡軛云鴛鴦瓦銅雀臺上瓦皆鴛鴦形晚歸曲格格水禽飛帶波孤光斜起夕陽多湖西山淺似相笑麥刺惹衣攢黛蛾青絲繫船向江水蘭芽出土吳江曲水極晴搖泛艷紅草平春染連綿緑玉鞭騎馬楊叛兒刺金作鳳光參差丁丁暖漏滴花影催入景陽人不知彎堤弱栁遙相矚雀扇團團掩香玉蓮塘艇子歸不歸栁暗桑穠聞布穀楊叛兒樂録楊叛兒亦曰西曲楊叛兒本童謠也齊隆昌時女巫之子曰楊旻隨母入內及長為太后所寵愛童謡云楊婆兒共戲來語訛轉婆為叛也景陽陳後主投景陽井中見前注布穀鳥名曉仙謡玉妃喚月歸海宫月色淡白涵春空銀河欲轉星靨靨雪浪疊山埋早紅宫花有露如新淚小苑茸茸入寒翠綺閣空傳唱漏聲網軒未辨凌雲字遙遙珠帳連湘烟鶴扇如霜金骨仙碧簫曲盡綵霞動下視九州皆悄然秦王女騎紅尾鳳乘空回首晨雞㺯霧蓋狂塵億兆家世人猶作牽情夢凌雲字魏明帝立凌雲觀誤先釘榜以籠盛韋仲將書扁轆轤引之去地二十五丈既下鬚鬢皓白綺開陳後主作臨春結綺等三閣秦王女見前注春愁曲紅絲穿露珠簾冷百尺啞啞下纎綆逺翠愁山入卧屏兩重雲母空烘影涼簪墜髮春眠重玉煴氤栁如夢錦疊空牀委墜紅颸颸掃尾雙金鳳蜂喧蝶駐俱悠揚栁拂赤䦨纖草長覺後梨花委平緑春風和雨吹池塘紅絲穿露形容珠簾也逺翠愁山形容愁眉也雲母言屏也玉言月也委墜紅言錦疊空床如委棄也雙金鳳言錦上之紋也梨花委平緑自恨之辭也湘東宴曲未詳題意今長沙府及荼陵州衡州府古為湘州又曰臨湘皆在湘水之東故為湘東郡也湘東夜宴金貂人楚女含情嬌翠嚬玉管將吹插鈿帶錦囊斜拂雙麒麟重城漏斷孤帆去唯恐瓊籖報天曙萬戶沈沈碧樹圓雲飛雨散知何處欲上香車俱脈脈清歌響斷銀屏隔堤外紅塵蠟炬稀樓前淡月連江白湘東齊梁皆有湘東王此云湘東未詳所指金貂人晉阮孚金貂換酒唐百官制散騎常侍中書官皆冠貂蟬為八貂楚女必湘宫妃女湘楚地故云楚女也鈿帶以鈿飾帶文鈿今襄陽出玉石碧色黑文謂之碧鈿婦人女子多取之以飾首飾也玉管前律厯志黃帝作律以玉為管又玉管簫笛也錦囊錦鞶囊麒麟帶上繡飾也俱見前注瓊籤報天曙禮雞人司漏傳更籖又陳文帝勤儉每宫人伺漏傳籤殿中者令投於石上鎗然有聲令驚覺也璚籤言以玉石為之也雲飛雨散言朝雲暮雨之事也香車銀屏俱見前注錦城曲錦城古蜀郡益州今之成都府是也蜀山攢黛留晴雪簝笋蕨芽縈九折江風吹巧剪霞綃花上千枝杜䳌血杜䳌飛入巖下藂夜呌思歸山月中巴水漾情情不盡文君織得春機紅怨魄求歸芳草死江頭學種相思子樹成寄與望鄉人白帝荒城五千里簝笋蕨芽縈九折喻山水之形勢嶮峻也巧剪霞綃喻山花之美麗也杜䳌血紅也亦以喻花也夜呌思歸杜䳌呌聲不如歸故云杜䳌即怨魄巴水文君見前注相思子蜀中有相思樹其木色如胭脂子如大豆亦與木同色今人皆云相思子白帝城夔州府是漢公孫僣號以白帝自號故人以白帝稱其城云蘭塘辭未詳題意塘水汪汪鳬唼喋憶上江南木蘭楫繡頸金絲蕩倒光團圓皺緑雞頭葉露凝荷卷珠淨圓紫菱剌短浮根鮮小姑歸晚紅粧淺鏡裏芙蓉映水妍東溝潏潏勞回首欲寄一杯瓊液酒知道無郎却有情長教月照相思栁繡頸金絲鴛鴦也雞頭芡也似荷葉浮水葉文皆皺起子如雞頭剝開中有子故名雞頭蓮芙蓉荷花也織錦辭丁東細漏侵瓊瑟影轉高梧月初出簇蔌金梭萬縷紅鴛鴦艷錦初成匹錦中百結皆同心蘂亂雲盤相間深此意欲傳傳不得玫瑰作柱朱絃琴為君裁破合歡被星斗迢迢共千里象齒熏爐未覺秋碧池巳有新蓮子玫瑰相如傳注火齊珠赤色即南方出火珠又璚瑰石之次玉者象齒象牙也熏爐見前注塞寒行燕弓弦徑霜封瓦檏䔩寒鵰睇平野一㸃黃塵起鴈喧白龍堆下千蹄馬河源怒觸風如刀剪斷朝雲天更高晚出榆關逐征北驚沙飛近衝貂袍心許凌烟名不滅年年錦字傷離别彩亳一畫竟何榮空使青樓淚成血白龍堆河源榆關凌烟俱見前注彩毫畫筆也謂以綵筆畫像於凌烟閣也春洲曲韶光染色如蛾翠緑濕紅鮮水容媚蘇小慵多蘭渚閒融融浦日鵁鶄寐紫騮蹀躞金銜嘶岸上揚鞭烟草迷門外平橋連栁堤歸來晚樹黃鶯啼蘇小白樂天詩栁色春藏蘇小家注蘇小錢塘樂妓女子也古樂府有錢塘蘇小小歌鵁鶄說文似鳬腳高有毛冠能辟火災陽春曲雲母空窗曉寒薄香昏龍氣凝暉閣霏霏霧雨杏花天簾外春威著羅幕曲欄伏檻金麒麟沙苑芳郊連翠茵廄馬何能嚙芳草路人不敢隨流塵春曉曲家臨長信往來道乳燕雙雙掠烟草油壁車輕金犢肥流蘇帳曉春雞早籠中嬌鳥暖猶睡簾外落花閒不掃衰桃一樹近前池似惜紅顔鏡中老長信宫見前注油壁車未詳流蘇帳前所垂同心結帶也蓮浦謡鳴橈軋軋溪溶溶潑緑平烟吳苑東水清蓮媚兩相向鏡裏見愁愁更紅白馬金鞭大堤上西江日日多風浪荷心有靈似驪珠不是真圓亦搖蕩經陳琳墓陳琳字孔璋為曹操記室嘗草檄呈操方頭風疾卧起讀曰此愈我疾建安八子琳其一也墓在下邳今淮安府曾於青史見遺文今曰飄蓬過古墳詞客有靈應識我霸才無主始憐君石麟埋沒惟春草銅雀荒涼有暮雲莫怪臨風倍惆悵欲將書劍學從軍青史劉向别録曰治青竹作簡曰青史王洙曰史臣以記事者霸才無主琳初為何進主簿諫不納進敗依袁紹紹敗歸曹操故云石麟杜詩高冢卧麒麟西京雜記五柞宫西青雲觀柏樹下有石麒麟二枚各刋其額為文字是始皇墓上物也頭高一丈五尺又富貴之家冡前有石麒麟銅雀見前注瑶瑟怨冰簟銀床夢不成碧天如水夜雲輕鴈聲逺過瀟湘去十二樓中月自明瀟湘十二樓俱見前注車駕西游因而有作宣曲長楊瑞氣凝上林狐待秋鷹誰將詞賦陪雕輦寂寞相如卧茂陵長楊上林相如茂陵俱見前注贈彈筝者天寶年中事上皇曽將新曲教寧王鈿蟬金鴈皆零落一曲伊州淚萬行天寶𤣥宗年號上皇言𤣥宗也寧王𤣥宗兄開元四年封也鈿蟬金鴈劉禹錫云河南房處士得善筝人而夭作傷妹行曰玫瑰寶柱秋鴈行又溫庭筠鈿筝絃絶鴈行稀蓋鈿蟬者筝之飾金鴈者筝之柱也伊州類要云天寶中西京節度孟嘉運進北庭伊州摴蒱三曲經故袁學士居劍逐驚波玉委塵謝安門下更何人西州城外花千樹盡是羊曇醉後春劍逐驚波雷煥事謝安見前注羊曇謝安之甥也安與姪𤣥睹墅顧謂曇曰以墅乞汝安墅在西州城外安殁後曇嘗醉至西墅所輒慟哭而回李涉李渤之兄洛陽人太和中為博士號蒲溪子六歎題意未詳綺羅香風翡翠車晴明獨傍芙蓉渠上有雲鬟洞仙女乘羅掩縠烟中語風月頻驚桃李時滄波久别鴛鴦侣欲傳一札孤飛翼山長水逺無消息却鎖重門一院深半夜空庭明月色深院梧桐夾金井上有轆轤青絲索美人清晝汲寒泉寒泉欲上銀瓶落迢迢碧甃千餘尺竟日倚䦨空歎息惆悵不來照明鏡却掩洞房花寂寂二詩事俱見前注牧童詞朝牧牛牧牛下江曲夜牧牛牧牛村口谷荷蓑出林山雨細蘆管卧吹沙草緑亂插蓬蒿箭滿腰不怕猛虎欺黃犢過襄陽寄上于司空司空于頔也頔字允元憲宗時拜司空平章鎮襄陽頔為政酷暴故涉以此諷之方城漢水舊城池陵谷依然世自移歇馬獨來尋故事逢人唯說峴山碑方城房州竹山縣有方城山有城十餘里漢水在嶓冢是水有四名曰漾曰沔曰漢曰滄浪陵谷見前注峴山碑晉羊祐鎮襄陽既死民為建碑于峴山望其碑者為之下淚杜預名為墮淚碑從秦城回再題武關武關即秦執懷王之地又漢祖自武關入伐秦之處綱目集覽云在南陽冠軍縣西今商州商洛縣嶢關又在武關西嶢關即藍田關也秦城長安逺别秦城萬里游亂山高下入商州關門不鎖寒溪水一夜潺湲送客愁商州有七盤十二繞其地險隘屬京兆府題鶴林寺僧室鶴林寺在鎮江府黃鶴山舊名仰鶴山終日昏昏醉夢間忽聞春盡强登山因過竹院逢僧話又得浮生半日閒春晚遊鶴林寺寄使府諸公野寺尋花春巳遲背巖惟有兩三枝明朝攜酒猶堪賞為報春風且莫吹開元寺𤣥宗開元二十六年詔天下州郡各建一大寺以紀年為號曰開元寺宿雨初收草木濃羣鴉飛散下堂鐘長廊無事僧歸院盡日門前獨看松竹枝詞十二峯頭月欲低空澪灘上子規啼孤舟一夜東歸客泣向東風憶建溪十二峯在巴州臨江縣即巫山十二峯也空澪灘在歸州建溪在建寧府出武夷山涉嘗謫武陵故有是作張承吉名祐南陽人為處士居蘇州令狐楚嘗薦之白樂天守杭州江東進士多於杭取解時張祐自負詩名以冠為己任徐凝後至同㑹郡中祐曰僕為解元宜矣凝曰君冇佳句祐曰甘露寺詩曰日月光先到山河勢盡來金山寺詩曰樹影中流見鐘聲兩岸聞凝曰善則善矣奈何野人有句云千尺長如白練飛一條界破青山色祐愕然凝果為首選穆護砂未詳玉管朝朝㺯清歌日日新折花當驛路寄與隴頭人折花范曄詩折梅逢驛使寄與隴頭人思歸樂萬里春歸盡三江鴈亦稀連天漢水廣孤客未言歸金殿樂入夜秋砧動千聲起四鄰不緣樓上月應為隴頭人墻頭花蟋蟀鳴洞房梧桐落金井為君裁舞衣天寒剪刀冷讀曲歌不見心相許徒忘腳謾勤摘荷空摘葉是底采蓮人昭君怨萬里邊城逺千山行路難舉頭惟見日何處是長安見日晉元帝問太子曰日與長安孰近對曰舉頭見日不見長安車遙遙東方曨曨車軋軋地色不分新去轍閨門半掩床半空斑斑枕花殘淚紅君心若車千萬轉妾身如轍遺漸逺碧川凄凄山宛宛馬蹄在耳輪在眼桑間女兒情不淺莫道野蠶能作繭題金山寺金山寺在鎮江揚子江中去城七里唐李錡鎮潤州表石因裴頭陀開山得金故名宋真宗夢遊此寺後改名龍游寺今仍舊也一宿金山寺微茫水國分僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞自悲在城市終日醉醺醺詩評云唐人題西山寺詩終古礙新月半江無夕陽人謂冠絶古今以其盡得西山景趣也金山寺留題亦多而絶少佳句惟寺影中流見鐘聲兩岸聞又天多剩得月缺衝夜行夜行無月時古路多荒榛山鬼遙把火自照不照人鬼火杜詩隂房鬼火青淮南子人血為燐許慎注兵死之血為鬼火燐者鬼火之名幼女詞幼女才六歲未知巧與拙向夜在堂前學人拜新月效古興金雀無舊叉緗綺無舊裾惟有一寸心長貯萬里夫南軒夜蟲織巳促北牖飛蛾繞殘燭只言衆口鑠黃金誰信獨愁銷片玉不知嵗晚歸不歸又將啼眼縫征衣金雀叉頭作金雀形緗綺說文云淺黃色鄒陽傳衆口鑠金積毁銷骨李文山字羣玉澧州人太和中𢎞文館校書傷思八月白露濃夫容抱香死紅枯金粉墮寥落寒塘水西風團葉下疊縠參差起不見棹歌人空垂緑房子白露八月半為白露節芙蓉荷花也八月荷花巳開盡矣故云抱香死縠說文皺紗也此云疊水紋如紗之皺起也古詞一合相思淚臨江灑素秋碧波如㑹意却與向西流雨夜呈長官逺客坐長夜雨聲孤寺秋請量東海水看取淺深秋火爐前坐孤燈照不寐風雨滿西林多少關心事書灰到夜深黃陵廟即湘妃廟在湘隂縣八十里韓愈作廟碑云湘江有廟曰黃陵自前古立以祀舜之二妃庭有二碑晉太康九年立小姑洲北浦雲邊二女明粧共儼然野廟向江春寂寂古碑無字草芊芊東風近墓吹芳芷落日深山哭杜鵑猶似含嚬望巡狩九疑如黛隔湘川二女娥皇女英也見前注巡狩書五載一巡狩注云天子巡狩者巡其所守也九疑山名在道州寧縣亦名蒼梧山九峯相似望而疑之故云湘川今衡州府也又綱目集覽九疑一文明二石城三石樓四娥皇五舜源六女英七簫韶八桂林九梓林太史公曰舜南巡狩死於蒼梧之野而歸葬于江南之九疑峯也又黃陵廟前莎草春黃陵女兒茜裙新輕舟短棹唱歌去水逺山長愁殺人莎草名爾雅翼云葉似三稜根周匝多毛謂之香附子一名雀頭香茜草名可以染紅南莊春晚草暖沙長望去舟微茫烟浪向巴丘沅湘寂寂春歸盡水緑蘋香人自愁巴丘沅湘俱見前注鮑德源名溶元和中進士采蓮曲弄舟朅來南塘水蓮葉映身摘蓮子暑衣鮮淨鴛鴦喜作浪舞花驚不起殷勤護惜纖纖指水菱初熟多新刺襄陽懷古襄陽太守沈碑意身後身前幾年事襄江千嵗未為陵水底魚龍應識字襄陽太守晉杜預也預宇元凱平吳封當陽侯還鎮襄陽立碑二道以紀平吳功一在峴山一沈萬山潭以為陵谷變遷則不泯墜贈楊煉師唐六典云道士修行其德高思精謂之煉師魏李順興嘗著道士冠時人號為煉師此煉師之所始也道士夜誦蕊珠經白鶴下繞香烟聽夜深經盡人上鶴天風吹入秋冥冥蕊珠經即黃庭經也經云閒居蕊珠位上元是也大白請開珠蕊宫紫烟衣上繡春雲清隱仙書小篆文明月在天將鳳管夜深吹向玉宸君紫衣唐代宗時李泌乞為道士賜紫衣道士衣紫自此始清隱書太洞玉經云清隱書在九華宫中道書云碧篆之文紫庭之誥鳳管見前注玉宸君黃庭經曰太上大道玉宸君誥曰太上者即玉宸大道君也陸魯望名龜䝉舉進士不中居松江甫里少高放通六經大義號江湖散人甫里先生又號天隨子古意逺心莫淡薄妾意方棲託願得雙車輪一夜生四角江南曲魚戲蓮葉間參差隱葉扇鵁鶄􅡝鳿窺瀲灔無因見屬玉相如賦駕鵝屬玉注似鴨而大掌頸赤目紫紺色雙吹管長短裁浮筠參差作飛鳳高樓明月夜吹出江南㺯東飛鳬裁得尺錦書欲寄東飛鳬翅短頸亦短雌雄戀菰蒲鄴宫魏所建石氏慕容氏高氏皆居之此詩用石氏事花飛蝶駭不愁人水殿雲廊别置春曉日靚粧千騎女白櫻桃下紫綸巾靚粧張楫謂粉白黛黑也白櫻桃有實白者有花白者花白如于武陵所賦是也實白如郭義恭所賦是也又廣志曰櫻桃有三種有白色多子者是也宫中多植櫻桃如洛陽宫殿簿曰顯陽殿前櫻桃六株是也千騎鄴中記曰石季龍常以女騎千人為鹵簿著紫色綸巾熟錦袴詩意謂花飛春去不足愁别有春在白櫻桃下千騎女是也杜牧之九日齊山登高齊山在池州府貴池縣南山有十餘峯相等故名牧之常官于此故有作焉江涵秋影鴈初飛與客擕壺上翠微塵世難逢開口笑菊花須插滿頭歸但將酩酊酬佳節不用登臨怨落暉古往今來只如此牛山何必淚霑衣翠微即齊山開口笑莊子人生上夀百嵗中夀八十下夀六十除病死喪憂患其中開口而笑者一月之中不過三四日而巳牛山列子齊景公遊于牛山北望其國而流涕曰美哉國乎鬱鬱洋洋若何謫去此國而死乎使古而無死者寡人將去斯而何之史孔梁丘據從之泣晏子獨笑于旁曰吾君方將披簔衣立于畎畝之中不之恤何暇念死乎景公慙寄題甘露寺北軒唐李德裕所建有甘露降因以為名在鎮江府城東角土山上臨大江曽上蓬萊宫裏行北軒䦨檻最留情孤高堪㺯桓伊笛縹眇宜聞子晉笙天接海門秋水色烟籠隋苑暮鐘聲他年㑹著荷衣去不向山僧道姓名桓伊笛桓伊字叔夏小字野王善音樂江左第一初與王子猷不相識偶相遇對之據胡床三㺯笛而去晉大元中官封永縣侯子晉王子晉見前注海門隋苑荷衣俱見前獨酌窗外正風雪擁爐開酒缸何如釣船雨篷底睡秋江歸家稚子牽衣問歸來何太遲共誰爭嵗月贏得鬢成絲齊安郡中偶題齊安黃州府也兩竿落日溪橋上半縷輕烟栁影中多少緑荷相倚恨一時回首背西風過華清宫長安回望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來事見前注息夫人廟見前注細腰宫裏露桃新脈脈無言幾度春至竟息亡緣底事可憐金谷墜樓人細腰後漢書云楚王好細腰宫中多餓死細腰美人也金谷墜樓人晉石崇財富不資别館在洛陽金谷有愛妾名緑珠孫秀欲奪之緑珠墜樓而死念昔遊李白題詩水西寺古木回巗樓閣風半醒半醉遊三日紅白花開烟雨中水西寺在寧國府涇縣山行逺上寒山石徑斜白雲生處有人家停車坐愛楓林晚霜葉紅於二月花宣州開元寺松寺曽同一鶴栖夜深臺殿月高低何人為倚東樓柱正是千山雪漲溪三體詩注一鶴栖沈傳師為宣州辟牧從事後又為宣州判官此詩蓋再至時作故曰曽同一鶴栖為倚猶言共倚也千山雪三體詩注或謂月色高低如千山之雪者非也此詩乃雪夜月霽登樓孤賞思昔日之歡遊而歎今夕之無侣詳味詞意情思殊甚首句所謂同鶴栖者或是與婦人同宿托名鶴耳唐人多如此退之庭花巷栁商隱錦瑟韓翃章臺栁皆此類也許用晦塞下夜戰桑乾北秦兵半不歸朝來有鄉信猶自寄征衣桑乾河名見前注緱山廟王子晉廟見前注王子求仙月滿臺玉簫清轉鶴徘徊曲終飛去不知處山下碧桃春自開王子王子晉也玉簫碧桃具見前注送宋處士處士者謂出處有道故云賣藥修琴歸去遲山風吹盡桂花時世間甲子須臾事逢著仙人莫看棊桂花枝詠隱者多言桂蓋本招隱所謂桂樹叢生兮山之幽也甲子一甲子六十日絳縣老人曰臣生正月甲子二百四十五甲子矣看棊事見前注客有卜居不遂薄游汧隴者汧隴今汧州與隴西郡也海燕西飛白日斜天門遙望五侯家樓臺深鎖無人到落盡春風第一花五侯家見前注謝亭送客勞歌一曲解行舟紅樹青山水急流日暮酒醒人巳逺滿天風雨下西樓秋思琪樹西風枕簟秋楚雲湘水憶同遊高歌一曲掩明鏡昨日少年今白頭吕延濟曰琪樹玉樹也然經云建康府寶林寺有琪樹則謂樹色緑如玉昨日少年今白頭三體詩注謂詩意以為思少年之時如昨日而今日頭白矣不可便作昨日少年而今日白頭要在讀之不以辭害意也李義山無題八嵗偷照鏡長眉巳能畫十嵗去踏青芙蓉作裙衩十二學彈筝銀甲不曽卸十四藏六親懸知猶未嫁十五泣春風背面秋千下銀甲杜詩銀甲彈筝用謂以銀代作指甲也踏青畫眉俱見前注西溪悵望西溪水潺湲奈爾何不驚春物少只覺夕陽多色染妖嬈栁光含窈窕蘿人間從到海天上莫為河鳳女彈瑶瑟龍孫撼玉珂京華他夜夢好好寄雲波鳳女謂帝重素女好作如鳳之裙也龍孫杜詩先帝子孫盡龍準龍種自與常人殊此言帝王之子孫故以龍鳳比之也樂遊原向晚意不適驅車登古原夕陽無限好只是近黃昏悼傷後赴東蜀辟至散關遇雪散關在鳳州梁泉縣係極邊秦蜀要路諸葛亮出散關圉陳倉即此地也劍外從軍逺無家與寄衣散關三尺雪回夢舊鴛機劍外鴛機俱見前注巴江栁巴江可惜栁栁色緑侵江好向金鑾殿移隂入綺窗巴江金鑾殿俱見前注早起風露淡清晨簾間獨起人鶯花啼又笑畢竟是誰春微雨初隨林靄動稍共夜涼分窗過侵燈冷庭虛近水聞絶句滯雨長安夜殘燈獨客愁故鄉雲水地歸夢不宜秋栁枝木是丁香樹春條結始生欲作彈碁局中心亦不平丁香杜詩丁香體柔弱亂結枝相樛又其樹類桂高數丈秋冬不雕花細圓白色或紫色一云盛冬生花子至次年春開彈碁見前注畫屏繡步障物物自成雙如何湖上望只是見鴛鴦步障王愷作緑絲步障四十里又王凝之弟獻之常與賓客談論辭理將屈嫂道韞遣婢白獻之欲與小郎解圍乃施青綾步障自蔽申前議客不能屈又石崇作錦步障五十里鴛鴦見前注燕臺詩秋月浪衝天天宇濕凉蟾落盡疏星入雲屏不動掩孤頻西樓一夜風筝急欲織相思花寄逺終日相思却相怨但聞北斗聲回環不見長河水清淺金魚鎖斷紅桂春古時塵滿鴛鴦茵堪悲小苑作長道玉樹未憐亡國人瑤瑟愔愔藏楚㺯越羅冷薄金泥重簾鈎鸚鵡夜驚霜喚起南雲繞雲夢雙璫丁丁聨尺素內記湘川相識處歌唇一世銜雨看可惜馨香手中故月浪月光也天宇韓詩天宇浮修眉天地四方曰宇凉蟾月也秋月故曰凉雲屏見前注風筝筝聲也連昌宮詞鳥啄風筝碎珠玉又太白詩四角吹風筝注簷鈴也金魚金鎖也茵說文車重席也鴛鴦茵言織文為鴛鴦也小苑漢有宜春小苑玉樹陳後主曲名玉樹後庭花亡國人俱見前注南雲未詳尺素見前注湘川相識處銜雨看未詳湖中曲閶門日中吳歌逺陂路緑菱香滿滿後溪暗起鯉魚風船旗閃斷芙蓉幹輕身奉君畏身輕雙橈兩槳尊酒清莫因風雨罷團扇此曲斷腸惟此聲低樓小徑城南道猶是金鞍對芳草閭門蘇州府有閶門鯉魚風李賀詩鯉魚風起芙蓉老注九月風也身輕明妃外傳明皇謂貴妃曰漢成帝獲飛燕身輕不禁風又石季倫所愛婢數十人常屑沈香末布象床上使所愛者踐之無迹則賜珠有迹則節其飲食使體輕團扇漢班媫妤事見前注寫意燕鴈迢迢隔上林高秋望斷正長吟人間路有潼江險天上山惟玉壘深日向花間留返照雲從城上結層隂三年巳制思鄉淚更入新年恐不禁上林漢有上林苑見前注潼江潼川水也潼川古廣漢郡今潼川地志左帶涪水右挾中江居水陸之衝窮又樟潼水出劍州故云險也玉壘山名在蜀中代贈楊栁路盡處芙蓉湖上頭雖同錦障步獨映鈿箜􅔃鴛鴦可羡頭俱白飛去飛來烟雨秋錦步障鈿箜􅔃鴛鴦俱見前注寄令狐郎中嵩雲秦樹久離居雙鯉迢迢一紙書休問梁園舊賓客茂陵秋雨病相如嵩雲嵩山之雲也秦樹秦地之樹也雙鯉古詩客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書梁園茂陵相如事俱見前注寄成都高苗二從事家近紅蕖曲水濱全家羅襪起秋塵莫將越客千絲網網得西施别贈人羅襪曹子建洛神賦陵波微步羅襪生塵注喻體輕也越客千絲網未詳西施見前注送王三十校書分司多少分曹掌祕文洛陽花雪夢隨君定知何遜緣聨句每到城東憶范雲分曹漢書食貨志乃分遣御史廷尉正監分曹注曰曹輩也分輩而出為使也唐有祕書監故書曰祕文何遜字仲言梁天監中作揚州法曹與隂鏗齊名世號隂何又與何長瑜羊璿之等為文章四友亦號羊何范雲字彥龍善屬文如流風回雪仕于齊歸梁為吏部尚書李衛公唐史李靖字藥公貞觀中出將入相封衛國公圗形凌烟閣又李德裕亦封衛公此衛公未知何指絳紗弟子音塵絶鸞鏡佳人舊㑹稀今日致身歌舞地木綿花發鷓鴣飛絳紗晉韋逞母宋氏傳父之業得周官義㫖立講堂書生百餘人隔絳紗帳幔授業焉又後漢馬融施絳紗帳教授生徒鸞鏡見前注唐音卷十三
