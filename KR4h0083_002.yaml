body:
  text: 唐音卷二元楊士𢎞編張震注唐詩正音五言古詩嚴滄浪詩評云五言始於李陵以其在漢故云古詩又選詩演義云蘇武使胸奴與陵贈别亦皆五言是一時之人皆為五言矣謂始於李陵恐未必然又古詩十九首以為始於枚乘則詩中遊戲宛與洛驅車上東門等語又似東漢時語以為始於枚乘亦未為穩大抵三百篇之變則為漢魏五言則云始於漢者有必然之理矣陳子昂字伯玉梓州人武氏竒其才召見金鑾殿擢為麟臺正字又文藝傳云唐興承徐庾遺風至子昂始變正雅為感遇二十八首王適云子昂感遇詩為海內文宗誠知言也感遇二十四首感遇云者謂有感於心而寓於言以攄其意也又云感之於心遇之於目情發於中而寄於言如莊子寓言之類是也微月生西海幽陽始化升圓光正東滿隂魄已朝凝太極生天地三元更廢興至精諒斯在三五誰能徴微月初生之月所謂上弦者是也揚子曰月未望載魄於西故曰生西海蓋以喻中宗初即位如月之初生明也幽陽陽太陽也太陽以喻君而言幽陽者以其幽晦而不明以譬武氏之僣居君位也圓光月望則光圓於東方故曰東滿也隂魄月至望後則明死而魄生楊子日月既望則終魄於西故曰朝凝凝者結也太極易云易有太極是生兩儀注太極是天地未生之前元氣混而為是太初太一也兩儀即天地三元春秋傳人君體元以居正故古者人君即位必建元以新天下之耳目如夏以寅為人元殷以丑為地元周以子為天元更廢興謂迭以興也至精謂天道也如帝王建極之理三綱五常之道皆天地之間至精之理也諒信也蓋言此理信此而在未有所損也三五三皇五帝也誰能徵徵者驗也言三皇五帝歷代相承之道其理固在未嘗有昧但人不能取以為驗而戒其篡奪之不可為按此詩是亦刺武氏不知是理而徒取篡奪之名也蘭若生春夏芊蔚何青青幽獨空林色朱蕤冒紫莖遲遲白日晚嫋嫋秋風生歲華盡搖落芳意竟何成蘭說文香草也楚辭朱子注本草云蘭與澤蘭相似生水旁紫莖赤節髙四五尺緑葉光潤尖長有岐微小紫花紅白色有香五六月盛若桂若說文香草也楚辭注似葵而香葉似馬蹄故俗云馬蹄香也主春夏言得其時也按楚辭王逸注曰離騷之文依詩取則引類譬喻故善鳥香草以配忠貞惡鳥臭物以比讒佞靈妃美人以比於君宓妃佚女以比賢臣虬龍鸞鳳以比君子飄風雲霓以比小人然則此托興蘭若蓋子昂自喻有忠貞之節也芊蔚說文草木茂盛貌青青言生意之美也幽獨言幽靜而貞獨也空選詩補注云空如馬羣遂空之空空字義林色比衆人也朱㽔花也紫莖幹也冒如書注天子以刻處冒其圭頭之義也白日比言君也晚言君道之晦而不明也秋風比小人也生則言其茹征之象也歲華猶言年華也歲華之邁如草木之華搖落雖有芳美之意亦不能有所施也按此詩子昂自惜有忠貞之節幽靜之德且生遇其時而才冠於人足以行其志而不得用於時又選詩補注以為此詩子昂未仕時作蓋恐歲月遂暮而無成也白日每不歸青陽時暮矣茫茫吾何思林卧觀無始衆芳委時晦鶗鴂鳴悲耳鴻荒古已頽誰識巢居子青陽爾雅春為青陽萬物發生無始易萬物資始此言無始則萬物未生之初也又莊子曰與日無始鶗鴂鳥名楚辭恐鶗鴂之先鳴兮使夫百物為之不芳即詩所謂七月鳴鵙者也其聲惡隂氣至則先鳴而百草死也鴻荒三五厯紀未有天地之時混沌如雞子溟涬始芽鴻濛滋萌即揚子所謂鴻荒之世也頺說文墜也廣川王傳曰日崔隤時不再巢居子逸士傳巢父堯時隱人年老以樹為巢而寢其上故人號為巢父堯之讓許由也由以告巢父巢父曰汝何不隱汝形藏汝光按此詩子昂歎中宗之廢不得復位而在已則年華已邁不可再來而君子道喪小人道長不復可如上古鴻荒之世君臣盡揖讓之風矣則不若巢父之藏形韜光以自晦於亂世也聖人祕元命懼世亂其真如何嵩丘輩談譎誤時人先天誠為美階亂禍誰因長城備邊寇嬴禍發其親赤精既迷漢子牟何救秦去去桃李花多言死如麻元命大命是即夭命也亂其真謂如王莽擬周公攝天子位及曹文帝曰堯舜之事我知之矣之類皆假此嵩丘未詳談譎說文譎權詐也又梁益曰謬欺天下人曰譎先天史𤣥宗初即位改元先天誠為美言𤣥宗即位之初焚珠玉及錦繡於殿前能自刻厲以求至治固足美也階亂猶言基禍也長城史記秦紀盧生謂始皇曰亡秦者胡也始皇命蒙恬北築萬里長城以備邊人然不知王子胡亥已應其䜟竟亡秦國所謂嬴禍伐其親也赤精漢髙帝紀髙祖至蛇所遇老母哭之曰吾子為赤帝子所殺故哭之故漢推五行以火德王是曰赤精子牟未詳何救秦言無足以救秦之滅亡也桃李不言下自成蹊蓋言桃李雖不能言然其下自成蹊徑也按此詩意謂𤣥宗當即位之初親監中宗韋氏之禍而撥亂反正求為至治固為美矣而晚節不終親蹈中宗蹤迹奪夀王妃深寵犖山幾至亡國而末復自喻欲誅則及於禍反不如桃李之無言為愈也深居觀元化悱然爭朵頤羣動相啖食利害紛㘈㘈便便夸毗子榮耀更相持務光讓天下周賈競刀錐巳矣行采芝萬世同一時元化大化也謂天地隂陽運行則為大化悱說文心欲也朵頤說文頤頷也易頤之初九舍爾靈龜觀我朵頤本傳為朵動其頤頷言人見食而欲之則動頤垂涎也羣動陶詩日入羣動息㘈㘈說文無聞見之象便便口辨給也夸毗說文夸大毗輔也詩無為夸毗蓋小人之態不為大言以夸世則為毗言以輔人也務光莊子篇湯伐桀克之以讓務光務光不受抱石沈水以死周賈周公賈誼也刀錐左錐刀之末將盡爭之又江淹書錐刀爭利也採芝商山四皓見秦虐政乃逃入藍田山作歌曰曄曄紫芝可以療飢萬世世謂三十年為一世又父子相承為一世按此詩謂人尚利爭相夸毗以取榮於一世而不知揖讓之美雖千萬世猶同一時也蓋亦以喻武氏之篡奪而當世姦諛之徒更相夸大毗附以助其惡而取笑於後世也吾愛鬼谷子青溪無垢氛囊括經世道遺身在白雲七雄方龍鬬天下亂無君浮雲不足貴遵養晦時文舒之彌宇宙卷之不盈分豈徒山木夀空與麋鹿羣鬼谷先生風俗通曰六國時縱橫家又索隱曰鬼谷地名扶風池陽穎川陽城並有鬼谷墟蓋其人所居因號馬樂臺注鬼谷子云蘇秦欲神祕其道故假名鬼谷也又考索曰鬼谷先生周之髙士姓名不聞也鬼谷子姓王名詡隱居青溪鬼谷因以自號青溪山在荆州沮縣山東囊括易括囊無咎廣韻括結也謂結其囊口過秦論曰囊括四海經世道謂治世之道也白雲陶𢎞景詩云山中多白雲隱者自怡悅七雄謂韓魏燕趙齊楚秦之七國也龍鬬左鄭大水龍鬬於時門之外又光武紀四七之際龍鬬于野龍鬬謂七國爭戰如龍鬬也浮雲不足貴語不義而富且貴於我如浮雲舒之卷之易放之則彌六合卷之則退藏於密山木夀莊子行於山中見大木枝葉茂盛伐木者止其旁而不取問其故曰無所可用莊子曰此木以不才得終其天年麋鹿羣史舜居深山與鹿豕同遊按此詩寓言抱負才器不得致用之辭也樂羊為魏將食子炫軍功骨肉且相薄他人安得忠吾聞中山相乃屬放麑翁孤獸猶不忍況以奉君終食子古韓非子曰樂羊事魏文侯為將以伐中山時羊有子在中山中山君烹其子而遺之羮羊啜之而攻拔中山相中山趙地今定州即古中山也相郡守也按選詩補注云中山相當作孟孫傳韓非子曰孟孫獵得麑使秦西巴載之歸其母隨之而歸西巴弗忍而與之孟孫怒而逐之三月復召之使為子傅曰夫不忍乎麋又豈能忍吾子乎按此詩亦為武氏而作初髙宗見武氏而悅之時蕭叔妃方有寵王后欲奪其寵潛令武氏長髮納之後宫以間淑妃及武氏大幸遂殺其女以誣王后而奪其位故此云爾謂既殺其子不如西巴不忍麋之子則於他人其能忍乎市人矜巧智於道若童蒙傾奪相夸侈不知身所終不見𤣥冥子觀世玉壺中窈然遺天地乘化入無窮市人謂市井牙儈耆利之人顔延年詩營營市井人矜誇也巧黠慧也智巧詐也道經世之大道童蒙易童蒙求我本義云童䝉謂幼稚而䝉昧也𤣥冥子禮月令其神𤣥冥注水神也又𤣥冥為雨師然𤣥冥莊大宗師臾區聞之𤣥冥𤣥冥聞之參寥此云𤣥冥子又似神仙之類未詳玉壺列仙傳王方平有十二玉壺乘化之化即卲子所謂觀化謂化去也無窮廣成子曰余將去汝入無窮之門又莊子內篇若夫乘天地之正御六氣之辨以遊無窮者彼且惡乎待哉按此詩謂市井小人罔然所知方且爭權奪利喪身亡家不知所終而君子之人自潔其身髙蹈逺舉以避其禍也吾觀龍變化乃是至陽精石林何冥密幽洞無留行古之得仙道信與元化并𤣥感非象識誰能測淪冥世人拘目見酣酒笑丹經崑崙有瑤樹安得采其英龍禮鱗蟲之長爾雅有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍未升天曰蟠龍變化易乾之初九潛龍勿用本傳龍之為物靈變不測又說文龍鱗蟲之長能小能大能長能短能幽能明春分而登天秋分而入川即此可以見其變化之大非鱗蟲之所能及也變化至陽精易本傳乾以龍為象則卦之六爻皆陽故曰至陽精也石林謝靈運詩石林豈為難仙道度人經仙道難得蓋延年尸解之道也元化天地之大化并合也𤣥感𤣥默也感通也謂默相感通也非衆識謂非可以形象而喻也淪冥謂幽深而𤣥逺不可以窺測也拘目見謂拘拘於耳目之所及酣酒謂酣酗於酒醴而不知所以醒也笑丹經抱朴子曰余昔授鄭君金液丹經謂煉丹之書也崑崙瑤樹楚辭登崑崙兮食玉英注登崑崙言其所居之髙食玉英言其所養之潔也按此詩以龍喻君變化以喻其在天位而尊顯不可䙝也古之得仙道以喻臣職元化并則臣之得與天合以見君臣際遇之道出乎自然而不可以窺度也拘目見笑丹經謂小人不知此道而反相讒間崑崙瑤樹亦楚辭之意言欲髙蹈逺舉潔身以自養也呦呦南山鹿罹罟以媒和招搖青桂樹幽蠧亦成科世情甘近習榮耀紛如何怨憎未相復親愛生禍羅瑤臺傾巧笑玉杯殞雙娥誰見孤城樹青青成斧柯呦呦說文鹿鳴聲詩呦呦鹿鳴南山則為陽而光明之所也罹罟陷於網罟也媒和求援也招搖漢書招搖申動貌青桂廣韻桂叢生合浦巴南山峯間無雜木葉長尺餘冬夏長青故曰青桂幽蠧木中之蟲也楚辭桂蠧不知所淹留兮幽則言其蠧之深也瑤臺西王母所居之處玉杯列仙傳茅君學道能令金案玉杯自來人前殞雙娥未詳按此詩首四語蓋喻王后憎蕭妃之有寵乃求武氏以奪之且言武后貞固之德如桂之長青而不知更遭武氏之蠧遂使怨憎之精未有報復反為武氏所殺雖然武氏既殺二妃而髙宗獨處於上如孤城之樹人將伐之為斧柯乃自伐之也林居病時久水木淡孤清閒卧觀物化悠悠念無生青春始萌達朱火巳滿盈殂落方自此感歎何時平物化死也注物化者悅然而蛻所係也又莊子內篇大宗師又況萬物之所係而一化之所待乎無生莊至樂察其始而本無生釋經云大家團欒頭共說無生話朱火謂夏也按此詩蓋謂萬物變化生息之理才長於春而已盈於夏復殂落於秋矣感萬物之生化嗟時之易邁此所以興歎不平也臨岐泣世道天命良悠悠昔日殷王子玉馬遂朝周寶鼎淪伊穀瑤臺成古丘西山傷遺老東陵有故侯岐泣淮南子楊朱見岐路而泣謂可以南可以北天命書天命靡常言天命悠逺而不可常也殷王子書紂之庶兄微子也微子見紂之無道遂奉殷之玉馬以朝於周而存宗祀也寶鼎三足兩耳所以和五味者也前郊祀志黃帝鑄寶鼎以象天地人也至禹收九牧之金以鑄九鼎象九州武王克商遷之洛邑及周之哀鼎遂淪伊穀二水之間矣西山遺老史記伯夷叔齊恥食周粟隱於首陽山即西山也東陵故侯史記秦亡東陵侯種瓜于長安西門即東陵也貴人難得意賞愛在須㬰莫以心如王采他明月珠昔稱夭桃子今為舂市徒鴟梟悲東國麋鹿泣姑蘇誰見鴟夷子扁舟去五湖如玉詩生芻一束其人如玉明月珠李斯書夜光之璧明月之珠夭桃子未詳詩桃之夭夭之子于歸毛萇注曰夭夭少壯貌無過言其美如夭桃之艷冶也舂市徒未詳鴟梟悲東國史管蔡流言周公居東作鴟梟之詩以遺成王麋鹿泣姑蘇左子胥諫吳王曰臣見麋鹿復遊於姑蘇矣姑蘇者吳王所造姑蘇臺在蘇州府長熟縣鴟夷子左范蠡相越王勾踐伐吳而歸泛扁舟以遊五湖因自號鴟夷子皮鴟夷鄒陽傳注鴟夷榼形今盛酒器也又李白詩注云自號鴟夷子言若盛酒之器多所容受而可卷懷與時張弛五湖太湖射陽湖洞庭湖丹陽湖彭蠡湖又五湖之名不一周禮揚州其浸五湖按張勃吳録曰五湖者太湖之别名以其周行五百里二萬六千頃乃以五湖名之此說良是也此詩蓋謂恩幸不可久恃若周公尚不免管蔡之流言范蠡尚畏越王之不可以共安樂也幽居觀大運悠悠念羣生終古代興沒豪聖莫爭能三季淪周赧七雄滅秦嬴復聞赤精子提劍入咸京炎光既無象晉宋復縱橫堯禹道巳昧昏虐世方行豈無當世雄天道戒佳兵咄咄安可言時醉而未醒仲尼溺東夏伯陽遁西溟大運自古來旅人胡歎哉大運國語五行氣化流轉之名又運祚也漢髙祖贊漢承堯運謂厯數也代興沒謂興者必有衰天命靡常不可恃也賢聖莫能爭言天運所歸非可爭得故聖如周孔賢如顔孟皆不得以居之也三季夏商周之未也周赧史周赧王也五十九年為秦所滅無諡故稱赧王赧者慚也七雄見前注秦嬴秦姓也說文秦之光世為堯主畜畜多賜姓嬴氏言七雄為秦所滅也赤精子見前注提劍入咸京前髙紀提三尺劍入咸陽定天下炎光漢赤帝之子以火德王故稱炎光無象言漢之哀亡為魏所篡而晉又滅魏矣鶉首賜嬴秦劉淵石勒之類也堯禹道巳昧謂堯授舜舜授禹皆以揖讓而有天下今巳昧昧不復可見而虐昏之道方行於世矣咄咄晉殷浩被黜但書空作咄咄怪事四字時醉未醒楚辭舉世皆醉我獨醒之意也當世雄謂當代豪傑之士天道與闕道而蓋亦寓言爾仲尼溺東夏謂聖人不得位以承天老于東周也伯陽老聃也老子見周之衰西去入關故曰遁西溟也天道大運興衰之理自古如此旅衆也言衆人何必歎哉詳此亦以喻武氏篡位賢人去世以避其亂之意也𤣥天幽且默羣議曷嗤嗤聖人教猶在世運久陵遲一繩將何繫憂醉不能持去去行采芝勿為塵所欺𤣥天莊在宥鴻蒙曰亂天之經逆物之情𤣥天弗成注若天順物性而不治則情不逆而經不亂𤣥默成而自然得矣嗤嗤說文笑也選詩受嗤於拙目聖教先古聖人之教化也世運謂當世之運化也陵遲詩大東禮義陵遲注謂如丘陵之勢漸慢也又或言陵遲與陵夷其意一也一繩何繫譬言世運之去豈一繩所能繫猶大厦將頺非一木所支之意也憂醉不持言如心之憂而且醉不能自禁持也采芝見前注勿為塵所欺謂勿為塵世之所譏笑也按此詩亦歎世道之陵夷不可復支而思欲遁隱也蜻蛉遊天地與物本無患飛飛未能止黃雀來相干穰侯富秦寵金石比交歡出入咸陽裏諸侯莫敢言寧知山東客激怒秦王肝布衣取卿相千載為辛酸蜻蜓說文蟲名飲露六足四翼趐薄如蟬翼亭午則停故名黃雀說文依人小鳥也亦名家賓穰侯史記姓魏名冉秦王稷之母異父弟也自惠王武王時為秦相後弒王之嫡母及王之兄弟而專秦政封穰侯寵遇極隆盛威震諸侯金石喻其堅固也咸陽秦所都也山東客范睢也范雎齊人以客入秦讒穰侯於秦王王遂黜穰侯而雎奪其位布衣喻客也此詩喻人臣功成而不知退寵盛而不知避遂以讒間身亡家破故千載之下為之悲酸也𤣥蟬號白露兹嵗已蹉跎羣物從大化孤英將奈何瑤臺有青鳥逺食玉山禾崑崙見𤣥鳯豈復歎雲羅蟬說文蟲名無口而嗚飲而不食以其體黑故曰𤣥蟬孤英說文革榮而不實者曰英又曰孤芳也瑤臺見前注青鳥漢武紀七月七日忽有青鳥飛集殿前東方朔曰此西王母欲來也玉山即崑崙山也蓋玉出于崑山故云崑崙水經在西北去嵩山五萬里地之中也瑤樹淮南子崑崙山有增城九重玉樹瑤樹不死樹在其西按選詩補注以此詩為子昂既仕之後不得已而隨時就祿嗟以清髙孤潔之志不得如青鳥之見𤣥鳯者矣翡翠巢南海雄雌珠樹林何知美人意嬌愛比黃金殺身炎州裏委羽玉堂隂旖旎光首飾葳蕤爛錦衾豈不在遐遠虞羅忽見尋多材信為纍歎息此珍禽翡翠說文青羽雀也出鬱林爾雅注似燕赤羽曰翡青羽曰翠翠小如燕毛青黑色翎深青有光彩飛水上食魚翡大如鳩毛紫赤翎㸃青不深無光彩林棲不食魚南海郭璞贊翠雀鷸鳥越在南海賈害以采珠樹林淮南子崑崙山有增城九重珠樹玉樹在其西南海美人嬌愛漢武贊翠羽之珍盈於後宫炎州即謂南海州郡也選詩補注以此為既仕之後所作雖以武后愛其才而擢用之終有自惜之意也荒哉穆天子好與白雲期宫女多怨曠曾城閉蛾眉日耽瑤臺樂豈傷桃李時青苔空委絶白髮生羅帷荒說文幽亂曰荒人孟子從獸無厭謂之荒書內作色荒穆天子周穆王滿也穆王得八駿馬使造父御以游瑤池從西王母宴荒於國事故以荒哉言之也蛾眉謂眉如蠶蛾之眉蓋言美也瑤池見前注桃李時謂陽春之時蓋是時桃李之色方盛以喻年少色美之時也此詩亦喻髙宗寵於武氏荒於國事而賢者惜時之邁不得展其用也朝發宜都渚浩然思故鄉故鄉不可見路隔巫山陽巫山緑雲沒髙丘正微茫竚立望巳久涕淚霑衣裳豈兹越鄉感憶昔楚襄王朝雲無處所荆國亦淪亡宜都縣名在夷陵郡巫山䕫州府巫山縣凡十二峯上有巫山神女廟陽雲臺髙一百二十丈楚襄王有巫山登陽臺夢與神女遇謂襄王曰妾巫山神女朝為行雲暮為行雨按此詩亦刺髙宗荒淫於武氏將如楚襄王以亡具國也朅來豪游子勢利禍之門如何蘭膏歇感激自生寃衆趨明所避時棄道猶存雲泉既巳失羅網與誰論箕山有髙節湘水有清源惟應白鷗鳥可與洗心言朅來說文發語辭蘭膏楚辭注以蘭香煉膏照明也箕山地域志在許州逸士傳堯以天下讓許由由不受歸隱于箕山許州志地有巢由清風之節湘水地域志在衡陽水自衡陽發源至零陵而營水會之二水合流謂之瀟湘即屈原自沈之地白鷗水鳥蒼頡解詩一名水梟在江湖間形色似白鴿小而羣飛洗心易繫辭聖人以此洗心按此詩蓋亦刺當時仕進不知趨避而遭患害者如蘭之膏而自焚故後引許由之隱去屈原之自沈千古之下清風徑節不可得而泯滅故末句引惟應若鷗鳥忘機於五湖者方可言此可憐瑤臺樹灼灼佳人姿碧華映朱實攀折青春時豈不盛光寵榮君白玉墀但恨紅芳歇雕傷感所思瑤臺見前注灼灼花盛貌詩灼灼其花白玉墀說文墀階上地也以白玉甃砌故曰白玉墀杜詩陽春度玉墀紅芳花也按此詩蓋謂王后之廢而太子亦以母廢而為武后所殺故前四句興起有此灼灼美盛之佳人而華實又相映而光美矣惜當青春之時而攀折以損其花并損其實也後二句則言前以䝉君恩而光寵矣結二句則又自言太子因母廢而亦被殺故因有所感而不勝其悲思之惜也朔風吹海樹蕭條邉巳秋亭上誰家子哀哀明月樓自言幽燕客結髮事逺遊赤丸殺公吏白刃報私讐避仇至海上被役此邉州故鄉三千里遼水復悠悠每憤邊兵入常為漢國羞何知七十戰白首未封侯結髮漢李廣傳結髮與胸奴戰蓋言初束髮也赤丸漢紀長安年少相與探丸得赤丸殺武吏白丸殺文吏白刃漢李陵傳士張空弮冒白刃白刃報私讐太白詩云東海有勇婦云云捐至軀報私仇萬死不願生白刃耀霜雪蒼天感精誠避仇海上周禮地官謂父之仇避諸海上又漢趙岐為京兆功曹時中常侍唐衡凡玹為虎牙都尉郡人以進不由德輕侮之岐又數為貶議玹後為京兆尹盡殺岐家屬岐逃難四方江淮海岱靡所不歷又匿姓名賣餅北海市中七十戰李廣傳大小七十戰未嘗敗北然白首未得封侯何也仲尼探元化幽鴻順陽和大運自盈縮春秋遞來過盲颷忽號怒萬物相紛劘冥海皆震蕩孤鳯其如何元化大運見前注盈縮猶言進退也育颷風也禮月令仲秋盲風至按宋朝氏曰子昂以豪俠使氣及冠折節為文字精究墳籍耽愛黃老易象尤善屬文唐興文章承徐庾餘風至是始變雅正故雖無風節而唐之名人無不推之又柳儀曹曰張說以著述之餘攻比興而莫能極張九齡以比興之暇攻著述而不能備唐興以來稱是選而不作者子昂而巳又宋人劉後村曰唐初楊王沈宋擅名然不脫齊梁之體獨陳拾遺之詩髙雅冲淡之皆一掃六朝之纎弱超於黃初建安矣太白韋栁繼起皆自子昂發之如世人拘目見酣酒笑丹經崑崙有瑤樹安得采其英林居病時久水木淡孤清閒卧觀物化悠悠念羣生青春始萌達朱火已滿盈務光讓天下商賈兢刀錐巳巳行采芝萬世同一時吾愛鬼谷子青溪無垢氛臨岐泣世道天命良悠悠昔日殷王子玉馬遂朝周等作皆蟬蛻翰墨畦徑讀之使人有眼空四海神遊八極之興然按所許固為切當然子昂之作其以感遇為詞則其忿武氏之篡奪哀天子之失位患小人之弄權閔君子之道喪意出言表則朝氏所謂豪俠使氣者其子昂之所以不遇者歟鴛鴦篇崔豹古今注鴛鴦水鳥鳬類雌雄未嘗相離人得其一則一者相思死故謂匹鳥又詩注鴛鴦止則相偶飛則成雙又梁元帝賦勝林鳥之同心邁池魚之比目魂上相思之樹文生織錦之機按是詩其以鴛鴦托喻君臣相須不可相離之意後李德裕亦有此篇亦詠此意也飛飛鴛鴦鳥舉翼相蔽虧俱來緑潭裏共向白雲涯音容相眷戀羽翮兩逶迤蘋萍戲春渚霜霰繞寒池浦沙連岸淨汀樹拂潭乘年年此遊玩嵗嵗來追隨鳯凰起丹穴獨向梧桐枝鴻雁來紫塞空憶稻梁肥烏啼倦永夕鶴鳴傷别離豈若此雙禽飛翻不異林刷毛清江浦交頸紫山岑文章負竒色和鳴皆好音聞有鴛鴦綺復有鴛鴦衾持為美人贈朂此故交心蔽虧子虛賦日月蔽虧猶言掩映也緑潭言所處深也白雲言其所棲髙潔也眷戀言其懷思也逶迤說文委曲也言其盡誠也蘋說文大萍也又韓詩外傳采蘋注沈曰蘋浮曰藻又項氏曰白蘋水生似萍青莖又陸佃云似槐葉而連生道傍淺水中與萍離生則紫今謂之紫薸又爾雅五月有花白色故謂白蘋萍說文水草也爾雅翼曰言無定性漂流隨風而巳萍善化生一夜七子又世說云楊花入水化為浮萍鳯凰見前注丹穴山海經丹穴之山有鳥狀如鶴五色而文名曰鳯凰又卷阿詩注鳯之性非梧桐不棲烏說文鳥有二等陳伯辨曰慈烏比他烏微小反哺之聲可聽琴操中有烏夜啼曲鶴爾雅仙禽大如鵝長三尺腳青黑髙三尺朱頂赤目喙長四寸白羽黑裳傷别離者有别鶴操故云陶詩上弦驚别鶴鴛鴦綺古詩客從遠方來遺我一端綺文彩雙鴛鴦裁為合歡被按此詩蓋喻君臣道合志同千載一遇如鴛鴦不離其偶而雌雄相合始終不渝故末言持為君子贈朂此故交心則願君臣保其始終而不使有間也修竹篇竹說文冬生草也又字書云竹草也而冬不死考之於詩淇澳一篇二章皆以緑竹起興而美衛武公之德首章曰猗猗以竹始之美盛興其學問自修之進益也二章曰青青以竹之堅剛茂盛興其服飾之尊嚴而見其德之稱也三章曰如簀以竹之至盛興其德之成就而又言其寬廣而自如和易而中節也則竹可以托喻君子之德者尚矣故唐蕭穎士亦曰竹為君子惟其秉心正直而晉王徽之寄居空宅中便令種竹嘯咏其下曰不可一日無此君今按子昂詩中之意蓋亦自托其有正直之德可比於君子而不用於朝廷以展其自修之德也歟龍鍾生南嶽孤翠鬱亭亭峯嶺上崇崒烟雨下冥冥夜聞鼯鼠呌晝聒泉壑聲春風正淡蕩白露巳清冷哀響激金奏密色滋玉英嵗寒霜雪苦含彩獨青青豈不厭凝冽羞比春木榮春木有榮歇此節無凋零始願與金石終古保堅貞不意伶倫子吹之學鳯鳴遂偶雲和師張樂近天庭妙曲方千變簫韶亦九成信蒙雕琢美常願事仙靈驅馳翠虬駕伊鬱紫鸞笙結交嬴臺女吟弄升天行攜手登白日逺遊戲赤城低昂𤣥鶴舞斷續彩雲生永隨衆仙去三山遊玉京龍鍾廣韻竹名又戴凱之竹譜云鍾龍之美受自崑崙南嶽地域志南嶽衡山在衡洲即舜至於南嶽之地乃荆州之鎮山也鼯鼠說文鼠狀如小孤肉翅似蝙蝠亦謂之飛鼠一曰五伎鼠毛紫色金奏周禮大司樂鍾師掌金奏又左楚子享郤至金奏作于下注擊鍾奏樂也玉英謂玉生如草木之英華青青淇澳注堅剛茂盛也凝冽說文寒嚴也金石謂鍾磬也孟子金聲而玉振之伶倫子史黃帝命伶倫為律取竹於嶰谷吹之作鳯鳴雲和周禮春官太師樂奏孤竹之管雲和之琴瑟千變如周禮大司樂八變而地示出之類蓋言千變者以見曲之妙不可以紀極也蕭韶舜樂總名九成九變也書蕭韶九成鳯凰來儀雕琢莊雕琢復朴翠虬揚子獨不思翠虬綘螭之將登乎天紫鸞笙秦臺女見前注升天行古選鮑照有升天行曲薛嗣通唐史嗣通名稷薛收之從子好古博雅文如良金美玉與兄耀俱以詞章目名纍遷中書舍人黃門侍郎參知機務歷太子少保封晉國公按稷為人恃才不知所依始則附易之僥幸未敗未則附太平竟以殺身有才無德古之所戒而稷犯之惜哉秋日還京陜西十里作杜少陵題薛稷少保書畫壁詩曰少保有古風得之陜郊篇即此詩也驅車越陜郊北顧臨大河隔河見鄉邑秋風水增波西登咸陽途日暮憂思多傅巖既鬱紆首山亦嵯峨操築無昔老采薇有遺歌客遊既回換人生知幾何陜郊陜州之西郊陜即𢎞農郡古虢國王季之子所封周召伯分陜之地大河黃河也在陜之北咸陽縣名在關之西秦建都之地傅巖即傳說版築之地在虞虢之間其地有窟人稱為聖人窟首山夷齊遁居之所在偃師縣昔老指傳說遺歌指夷齊而言夷齊諫武王伐紂不聽隱于首陽山采薇而食之薇說文菜也似藿菜之微者又爾雅薇生於水濱而枝葉垂於水者又詩采薇注曰今桵芽也三秦記夷齊食之三年顔色不變采薇歌夷齊所作曰登彼西山兮采其薇矣選詩注云此篇能從容於古法之中而托音簡逺自非拘拘模擬者所可及也然按嗣通此詩其自喻之意雖有凛然不可犯之色然卒死於太平之黨而言不掩行良可悲也儲光羲魯人天寶末為監察御史與王維同時工詩又光羲詩格髙調逸趣逺情深削盡常言挾風雅之迹浩然之氣者也又選詩補注云詩有沖淡之趣時人與王維並稱其詩同美矣然其為人躁進不忠是亦可醜也樵父詞詞說文通作辭易修辭立其誠情見乎辭蓋言情之所發則為詞也故文則亦曰詞宜喜怒哀樂各極其情而範之以理也山北饒朽木山南多枯枝枯枝作采薪爨室私自知詰朝礪斧尋視暮行歌歸先雪隱薜荔迎暄卧茅茨清澗日濯足喬林時曝衣終年登險阻不復憂安危蕩漾與神遊莫知是與非爨室說文炊室也詰朝左詰朝相見謂平旦也先雪謂雪未下時先隱於薜荔薜荔說文革也楚辭披薜荔兮女蘿茅茨說文以茅蓋屋曰茨蕩漾說文游浮也神遊莊子神游八極之表是非荀子是是非非之謂知非是是非之謂愚漁父詞澤魚多鳴水溪魚好上流漁梁不得意下渚潛垂鈎亂荇時礙楫新蒲復隱舟靜言念終始安坐看沈浮素髮隨風揚逺心與雲遊逆浪還極浦信潮下滄洲非為徇形役所樂在行休漁梁孟澤梁無禁注云絶水取魚者澤水而闕空以笱承其空故曰魚梁雲游宋王僧達傳云禇先生與白雲游舊矣逆浪逆音迎說文迎也又鄭康成傳曰自下而上曰逆即泝也形役歸去來辭曰既自以心為形役牧童詞不言牧田逺不道牧陂深所念牛馴擾不亂牧童心圓笠覆我頂長蓑披我襟方將憂暑雨亦以懼寒隂大牛隱曾坂小牛穿近林同類相鼓舞觸物成謳吟取樂須㬰間寧問聲與音陂說文坡也謳說文齊聲而歌也又謳為歌聲之别歌為謳之總名聲五聲宫商角徴羽也音八音金石絲竹匏土革木也采蓮詞題意見前注淺渚荇花繁深潭菱葉疏獨往方自得恥邀淇上姝廣江無術阡大澤絶方隅浪中海童語林下鮫人居春雁時隱舟新萍復滿湖采采乘日暮不思賢與愚淇上姝衛風靜女篇曰靜女其姝注姝美色也地志淇上衛地也而此詩注謂淫奔期㑹之詩廣江大江也術說文邑中道也阡漢志路南北曰阡又路皆曰阡又壟也澤說文陂澤也左深山大澤龍蛇生焉方四方也隅說文陬也又方也角也海童未詳鮫人博物志鮫人水居出人間賣綃采菱詞菱說文芰也楚謂之芰秦謂之薢若爾雅翼云葉披水上其花黃色其食餌之可以斷穀又武陵記四角三角曰芰兩角曰菱花紫晝合宵放隨月轉移濁水菱葉肥清水菱葉鮮義不浮濁水志士多苦言潮沒具區藪潦深雲夢田朝隨北風去暮逐南風旋浦口多漁家相與邀我船飯稻以終日蓴羮方永年方冬水物窮又欲休山樊盡室相隨從所貴無憂患志士多苦言古選陸土衡詩志士多苦心潮臨安志潮之為說不一大抵天包水上承地地在天中水浮天之外而一元之氣升降於大空之中地依水力以自持與氣升降氣升而地沈則海溢氣降而地浮則海縮晝夜之氣再升再降故一日之間潮汐皆再也具區周禮職方氏楊州澤藪曰具區即蘇州之太湖也藪說文大澤也又風俗通藪有草木魚鱉所以名也又周禮大宰四曰藪注澤小曰藪雲夢說文澤書雲土夢作又即漢髙祖僞游之地在武昌方七百里今德安府有雲夢縣蓴說文水葵也葉似鳬葵浮水上莖堪噉晉張翰見秋風起而思蓴羮即此也山樊說文山邉也射雉詞雉說文鳥名爾雅雉絶有力最健鬬也詩語雉種不一要皆雞屬其為物有别有倫其羽文明可用為羽儀晉潘嶽有射雉賦曝暄理新翳迎春射鳴雉原田遙一色臯陸曠千里遙聞咿喔聲時見雙飛起羃䍥疏蒿下陪鰓深藂裏顧敵已忘生爭雄方决死仁心貴勇義豈能復傷此超遙下故墟迢遞回髙峙大夫昔何苦取笑歡妻子曝說文晞也暄說文溫也理新翳說文去草之蒙蔽也羃䍥說文烟貌陪鰓一作毰毸說文張羽貌又文選敷藻翰之陪鰓注怒貌大夫取笑晉叔向云昔賈大夫惡娶妻而美三年不言不笑御以如臯射雉獲之其妻始笑而言也猛虎詞選詩補注云按伎録相和歌詞之平調曲也古詞云飢不從猛虎食但取首二字命題寒亦不憂雪飢亦不食人人肉豈不甘所惡傷明神太室為我宅孟門為我鄰百獸為我膳五龍為我賓蒙馬一何威浮江亦以仁彩章耀朝日爪牙雄武臣髙雲逐氣浮厚地隨聲震君能賈餘勇日夕長相親大室嵩山記嵩山有太室少室二山孟門地域志在吉州與龍門相對五龍易六爻而五爻皆以龍為象故曰五龍蒙馬左莊十年齊宋師次于稷公子偃自雩門竊出蒙臯比而先犯守之大敗宋師按臯比即虎皮也浮江宋均為九江太郡多暴虎均下令去陷穽其後虎相與度江而去賈餘勇賈說文售也左成二年髙固入晉師曰欲勇者賈余餘勇野田黃雀行王僧䖍伎録為相和歌瑟調三十六曲內有野田黃雀行乃魏樂奏也晉曰伯益言赤鳥銜書有周以興今聖皇受命神雀來也又選詩補注云此詩陳思王所作而後人擬之嘖嘖野田雀不知軀體微閒穿深藂裏爭食復爭飛窮老一頺舍棗多桑葉稀無棗猶可食無桑何以衣蕭條空倉暮相引時來歸斜路豈不捷渚田豈不肥水長路且壞惻惻與心違效古二首亦擬古之詞也晨登涼風臺暮走邯鄲道曜靈何赤烈四野無青草大軍北集燕天子西居鎬婦人役州縣丁男事征討老幼相别離哭泣無昏早稼穡既殄絶川澤復枯槁曠哉遠此憂冥冥南山皓涼風臺未詳邯鄲道郡名趙所都之地今順德府邯鄲縣是也又前地理志邯鄲山名在東城下今屬洛州洛州肥鄉縣本邯鄲地有邯溝曜靈張衡西京賦曜靈忽其西藏蓋日也鎬史記武王復都豐鎬在長安近上林苑中豐東二十五里南山皓南山指商顔而言商顔在商州上洛縣長安之南南山皓即四皓也四皓上洛縣人東園公綺里季夏黃公角里先生四人避秦亂隱於商山老而不仕故以四皓目之也東風吹大河河水如倒流河洲塵沙起有若黃雲浮頳霞燒廣澤洪曜赤髙丘野老泣相語無地可䕃休翰林有客卿獨負蒼生憂中夜起躑躅思欲獻厥謀君門峻且深踠足空夷猶雜詩選詩補注李善曰不拘流例遇物即言故曰雜言坯渾本無象未路多是非達士志寥廓所在能忘機耕鑿時未至還山聊采薇虎豹對我蹲鸑鷟傍我飛仙人空中來謂我勿復歸格澤為君駕虹霓為君衣西遊崑崙墟可與世人違坯渾郭璞江賦云坯渾之未凝言天地如雞卵之未分無象言無形象也寥廓說文開朗也忘機機者機心也列子海翁忘機鷗乃不去耕鑿史堯之時民歌曰鑿井而飲耕田而食帝力何有於我哉采薇見前注鸑鷟說文鳯屬神鳥也格澤音鶴鐸星名一曰妖氣選相如賦建格澤之修竿虹霓螮蝀也程子曰蝃蝀氣之交映日而光朝西暮東又朱子曰日與雨交倐然成質乃不當交而交天地之淫氣楚辭青雲衣兮白霓裳崑崙墟見前注選詩補注云此詩感世道之不古托仙人之辭以為宜髙舉而遠蹈也田家雜興八首雜興亦雜言之義春至倉庚鳴薄言向田墅不能自力作黽勉取鄰女既念生子孫方思廣田圃閒時相顧笑喜悅好禾黍夜夜登嘯臺南望洞庭渚百草被霜露秋山響砧杵却羡故年時中情無所取鶬鶊說文黃鸝也田墅說文曰廬也又圃也黽勉詩黽勉求之言强力為也嘯臺未詳所在紹熙府冨義門外一里有孫登嘯臺又福建漳州府有嘯臺鳯州有嘯歌臺洞庭在嶽州府巴陵縣西西吞赤壁南連青草綿亘七八百里日月若出沒其中衆人恥貧賤相與尚膏腴我情既浩蕩所樂在畋漁山澤時晦暝歸家暫閒居滿園種葵藿繞屋樹桑榆禽雀知我閒翔集依我廬所願在優游州縣莫相呼日與南山老兀然傾一壺膏腴晉史王國寶謝安壻安補為尚書郎國寶曰中興以來膏腴惟作吏部不作銓曺固辭不拜南山老未詳所指逍遙阡陌上逺近無相識落日照秋山千巖同一色網罟繞深莽鷹梟始輕翼獵馬既如風奔獸莫敢息駐旗滄海上犒士吳宫側楚國有夫人性情本貞直鮮禽徒自美終嵗竟不食阡陌漢志路南北曰阡東西曰陌又史秦商鞅廢井田而開阡陌網說文庖犧氏所結以漁也又周易始作網罟以畋以漁者蒙覆取之也罟說文網也又罟者綱之總名也鷹說文鳥也一曰題肩一曰征鳥又陸佃云一年曰黃鷹二嵗曰鷹三嵗曰鶬鷹今通謂之角鷹頂有毛角故名梟詩有梟萃止說文鴟梟也今人謂之鵂鶹亦曰怪鴟陸佃云大如班鳩緑色其占有禍又名鵩即入賈生舍者是也犒士說文犒勞也左秦伐鄭及滑鄭商人弦髙遇之以乘韋先牛十二犒師吳宫吳王之宫在今姑蘇楚國有夫人左楚樊姫莊王之夫人王即位好狩獵樊姫諌不止乃不食禽獸之肉王遂改悟勤於政事梧桐䕃我門薜荔網我屋超超兩夫婦朝出暮還宿稼穡既自種牛羊還自牧日旰懶耕鋤登髙望川陸空山足禽獸墟落多喬木白馬誰家兒翩翩相馳逐白馬誰家兒見前注楚山有髙士梁國有遺老築室既相鄰同田復同道糗糒常共飯兒孫每更抱忘此耕耨勞魏彼風雨好蟪蛄鳴空澤鶗鴂傷秋草日夕寒風來衣裳苦不早選詩補注云此詩末四句感時傷巳之詞意味含蓄可玩髙士遺老不詳所指然大抵寓意云耳糗說文熬米麥也糒說文乾糗也耨說文薅器也孟子曰深耕易耨纂文曰耨如鏟柄長三尺刃廣二寸以刺地除草蟪蛅說文蟬屬莊蟪蛅不知春秋注春生者夏死夏生者秋死又孔子曰違山十里蟪蛄之聲猶在耳鶗鴂見前注日夕寒風來衣裳苦不早詩七月云云十月蟋蟀入我床下注謂蟋蟀之依人則知寒之將至矣又七月流火九月授衣注謂九月霜降始寒而蠶績之功亦成故授人以衣使禦寒也貧士養性情不復知憂樂去家行賣畚留滯南陽郭秋至黍苗黃無人可刈穫孺子朝未飯把竿逐鳥雀忽見梁將軍乘車出宛洛意氣軼道路光輝滿墟落安知負薪者嘻嘻笑輕薄賣畚王猛家貧賤以賣畚為業嘗貨畚於洛陽有一人往買其畚令隨取直猛隨至一深山見一老父十倍與直遣人送出及回顧乃嵩髙山也畚說文蒲器所以盛種者南陽郭輿地志今南陽府今屬河南郡都司也孺子說文云詩和樂且孺乳子也程子曰親慕之意小兒親慕父母謂之孺子蓋幼少之稱也梁將軍托指梁冀而言也漢書梁冀字伯卓梁商之子商卒拜大將軍時上常目之曰此跋扈將軍也宛地域志南陽郡宛縣也光武起於宛都於洛故以為稱也洛地輿志即河南府洛陽縣東漢為東都也輕薄東漢馬援傳學季良不成陷為天下輕薄子種桑百餘樹種黍三十畝衣食既有餘時時㑹賓友夏來菰米飯秋至菊花酒孺人喜相逢稚子解趨走日暮閒園裏團團䕃榆栁酩酊乘夜歸涼風吹户牖清淺望河漢低昂看北斗數甕猶未開明朝能飲否菰米飯禮內則注雕胡也即今之菱米苗也孺人禮大夫之妻曰孺人注孺之為言屬也稚子說文幼夭也詩彼有不穫稚劉氏曰穗之低小刈所不及又閟宫植稚菽麥注云後種先熟曰植稚故人物幼小亦曰稚子河漢詩倬彼雲漢為章于天物理論星者元氣之英水之精也氣發而升精華上浮宛轉隨流名曰天河一曰雲漢衆星出焉古選河漢清且淺又宋之問詩萬里無雲河漢明北斗前漢五行志北斗君象也又史天官斗為帝車運於中央臨照四方分隂陽建四時均五行移節度又晉天文志魁四星為旋璣杓三星為玉衡也田家趨隴畝當晝掩虛關鄰里無烟火兒童共幽閒桔橰懸空圃雞犬滿桑間時來農事隙采藥遊名山但念所采多不言路險艱人生如蜉蝣一往不可攀君看西王母千載美容顔桔橰說文莊子貢謂漢隂丈人曰有械于此挈水若抽其名桔橰蜉蝣爾雅渠略也又甲蟲朝生暮死又郭璞曰似蛣蜣身俠而長有角叢生糞土上甲下有翅能飛又陸佃曰似天牛而小有甲角長三四寸又通志似蜣蜋而小冇文采生覆水上尋死隨流有浮游之義故名西王母仙傳拾遺記云金母道氣無為自然先以東華至真之氣化生木公即東王公又以西華至妙之氣化生金母即西王母男子得道者名𨽻木公女子得道者名𨽻金母按此詩雖以田家雜興命題而詩中若百草被霜露秋山響砧杵衆人恥貧賤相與尚膏腴楚國有夫人終嵗竟不食空山足禽獸墟落多喬木白馬誰家兒忽見梁將軍乘車出宛洛安知負薪者嘻嘻笑輕薄清淺望河漢低昂看北斗采藥遊名山等語要皆感時傷古托興取喻而言也誠哉選詩補注所謂云云者信不虛也同王十三維偶然作二首野老本貧賤冒雨鋤瓜田一畦未及終樹下髙枕眠荷蓧者誰子皤皤來息肩不復問鄉墟相見但依然腹中無一物髙話羲皇年落日臨曾城逍遙望秦川使婦提蠶筐呼兒榜魚船悠悠泛渌水去摘浦中蓮蓮花艷且妍使我不得還野老光羲自謂也一畦說文一區也蓧說文田器語有荷蓧者皤皤老人頭髮白也人曰鬢白斑曰皤皤班固詩皤皤國老息肩選詩息肩弛擔又左子駟謂息肩於晉榜說文進船也仲夏日中時草木看欲燋田家惜工力把鋤來東皋顧望浮雲隂征征誤傷苗歸來悲困極兄嫂共相饒無錢可沽酒何以解劬勞夜深星漢明庭宇虛寥寥髙栁三五株可以獨逍遙又同王十三作北山種松柏南山種蒺藜出入雖同趣所向各有宜孔丘貴仁義老氏好無為我心若虛空此道將安施暫過伊闕間晼晚三伏時髙閣入雲中夫容滿清池要自非我室還望南山陲蒺藜易困於蒺藜說文草名其實多刺孔丘宣聖名也老氏老子也無為老子論德篇上德無為又遍用篇云是以知無為之有益伊闕河南縣地志曰闕塞山一名伊闕而俗名龍門又唐志河南自龍門山東抵天津有伊水故名伊闕云晼說文日落貌潘安仁懷舊賦日晼晚而將暮夫容說文荷花也田家即事蒲葉日已長荇花日巳滋老農要看此貴不違天時迎晨起飯牛雙駕耕東菑蚯蚓土中出田烏隨我飛羣合亂啄噪嗷嗷如道飢我心多惻隱顧此兩傷悲撥食與田烏日暮空筐歸親戚更相誚我心終不移飯牛史寧戚飯牛車下扣角而歌說文以食食牛也荇詩注接余也根生水砥莖如叉股上青下白葉紫尖圓徑寸餘浮在水面天時蓋言耕耨之時也東菑選取東菑田一嵗曰菑蚯蚓說文側行者以其為物不息引而後伸一名曲蟺一名土龍善鳴於土上其出則天必將雨也惻隱孟子惻隱之心仁之端也兩傷悲謂傷蚓為鳥食與鳥之飢也遊茅山四首茅山地域志在句容縣南五十里漢時有三山有大茅山中茅山小茅山三茅君得道於此因名山焉十年别鄉縣西去入皇州此意在觀國不言空逺遊九衢平若水利往無輕舟北洛反初路東江還故丘春山多秀木碧澗盡清流不見子桑戶當從方外求西去唐都長安故云西入皇州也觀國易觀之六四曰觀國之光利用賓於王衢說文四達謂之衢子桑戶莊大宗師子桑戶孟子反子琴此三人相與友方外同上孔子曰彼遊方之外者也而丘遊方之內者也平生非作者望古懷清芬心以道為際行將時不羣兹山在人境靈貺久傳聞逺勢一峯出近形千嶂分冬春有茂草朝暮多鮮雲此去亦何極但言西日曛作者語作者六七人心以道為際謂在得志以行其道也行將時不羣謂有行道之志而非其時也人境陶詩結廬在人境靈貺貺陽也前武紀靈貺既西日曛言日將暮矣昔賢居柱下今我去人間良以直心曠兼之外視閒垂綸非釣國好學異希顔落日登髙嶼悠悠望逺山溪流碧水去雲帶清隂還想見中林士巖扉長不關柱下史老子周武王時為柱下史又前張蒼為柱下史百官表以其在殿柱之間故御史為柱下史也釣國謂吕望釣于渭上後為文王師故曰釣國也希顔謂學為顔子也嶼說文山有石在水中也名嶽徴仙事清都訪道書山門入松柏天路極空虛南極見朝采西潭聞夜漁逺心尚雲宿浪跡出林居為巳存實際忘形同化初此行良巳矣不樂復何如清都列仙傳周穆王傳執人裾騰而上者數十人咸以為清都紫微鈞天廣樂帝之所居也南極晉天文志老人星又名夀星尚雲宿言心之所尚與雲宿也浪迹選江文通詩浪迹無蚩妍為巳語古之學者為巳實際佛經真如實際化初猶言生化之始也按光羲遊茅山詩首章則言求士之志與歸休之意二章言求仕所以行道而志與時不偶三章言昔人則得時而出仕我則失志而來歸第四章則托言求仙而逺遊忘形而遁世然托興幽逺語意簡潔實可法也終南幽居獻蘇侍郎二首終南山名地理志扶風郡有武功縣縣東有大山古文以為終南指地志云終南一名中南一名太乙一名橘山一名周南一名地肺又福地記云終南東接驪山太華西連太白隴山北去長安八十里南入楚塞連蜀東西數百里乃長安之南山也中嵗尚微道始知將谷神抗策還南山水木自相親深林開一道青嶂成四鄰平明去采薇日入行刈薪雲歸萬壑暗雪罷千巖春始看𤣥鳥來巳見瑤華新寄言褰芳者無乃後時人中嵗言中年人生五十為中年又曰中身書無逸文王受命惟中身注中身者文王九十七而終即位時年四十七言中身者舉全數也將詩天不我將注養也谷神老子谷神不死注谷養也人能養神則不死也神謂五藏之神也南山終南山也嶂說文山髙如屏障者又曰山之髙險者𤣥鳥燕也以其色𤣥故名𤣥鳥詩商頌𤣥鳥篇曰天降𤣥鳥言春分則𤣥鳥至也瑤花言雪也蹇芳猶言采芳也卜築青巖裏雲蘿四垂隂虛室若無人喬木自成林時有清風至側聞樵采音鳯凰鳴南岡望望隔曾岑既言山路逺復道溪流深偓佺空中游虬龍水中吟何當見輕翼為我達逺心鳯凰鳴南岡詩鳯凰鳴矣于彼髙岡偓佺列仙傳偓佺堯時采藥父也好食松曰體毛數寸能飛行逐走馬以松子遺堯女不服時受服者皆三百嵗虬龍說文虬龍子無角者又前注有角曰虬龍夜到京口入黃河京口今鎮江府也河洲多青草朝暮增客愁客愁惜朝暮枉渚暫停舟中宵大川靜解纜逐歸流浦溆既清曠㳂洄非阻修登艫望落月擊汰悲新秋儻遇乘槎客永言星漢游枉渚謝靈運詩弭棹薄枉渚艫說文舳艫也李斐曰艫舟須刺棹處擊汰楚辭齊吳榜兮擊汰注汰水波也又船不進亦凝滯流落之意也乘槎客星漢遊漢書張蹇奉使大夏乘槎到河源見一婦人織一丈夫牽牛將去女與一石回問嚴君平曰此織女支機石也按河源即星漢也行子苦泊夾舟貽潘少府行子苦風潮維舟未能發宵分卷前幔卧視清秋月四澤蒹葭深中洲烟火絶蒼蒼水霧起落落疏星沒所遇盡漁樵與言多楚越其如念極浦又以思明哲常若千里餘沈沈異鄉别宵分言中夜也明哲詩既明且哲使過彈箏峽作彈箏峽在平涼府山峽之內常有彈箏之聲蓋水流風吹音韻自成律吕故名鳥雀知天雪羣飛復羣鳴原田無遺粟日暮滿空城達士憂世務鄙夫念王程晨過彈箏峽馬足凌兢行雙璧隱靈曜莫能知晦明皚皚堅氷白漫漫隂雲平始信古人言苦節不可貞過新豐道中新豐在長安今臨潼縣是也漢紀漢太上皇生於豐沛及髙祖即位即臨潼改街里象豐迎太上皇居之因名新豐又地理志既作新豐并徙田社放犬羊雞鴨於通衢競識其家西下長樂坂東入新豐道雨多車馬稀道上生秋草大隂閟皋陸不知晚與早雷雲杳冥冥川谷漫浩浩詔書植嘉木衆言桃李好自愧無此容歸從漢隂老長樂地域志在長安之西秦始皇於上建長安宫因名桃李好謂桃李有容色足以媚人也漢隂老漢隂文人也詔書植嘉木天寶二十八年有詔種果故云仲夏入園東陂陂說文池也又禮月令水畜曰陂方塘深且廣伊昔俯吾廬環岸垂緑栁盈潭發紅蕖上延北原秀近屬幽人居暑雨若混沌清明如空虛此鄉多隱逸水陸見樵漁廢賞亦何貴為歡良易攄且言重觀國當此賦歸歟紅蕖荷花也吾廬陶詩衆鳥欣有托吾亦愛吾廬混沌說文元氣未判也莊子日鑿一竅七日而混沌死歸歟語歸歟歸歟喫茗粥作當晝暑氣盛鳥雀靜不飛念君髙梧隂復解山中衣數片逺雲度曾不蔽炎暉淹留膳茶粥共我飯蕨薇敝廬既不逺日暮徐徐歸蕨說文鱉也爾雅蕨鱉郭璞云初生無葉可食陸佃云初生似鱉腳故名周秦曰蕨齊魯曰鱉又蕨初生小兒拳名蕨拳薇見前注敝廬左傳云有先人之敝廬在下妾不得與郊弔釣魚灣垂釣渌灣春春深杏花亂潭清疑水淺荷動知魚散日暮待情人維舟緑楊岸題太𤣥觀在長安門外車馬喧門裏宫殿清行即翳若木坐即吹玉笙所喧既非我真道其冥冥若木淮南子云灰野之山有樹名若木吹玉笙列仙傳王子晉周靈王太子也好吹笙作鳯凰鳴道士浮丘公接以上嵩山又陳子昂别中嶽二三真人序云幽棲牝谷玉笙吹鳯瑤裝駐催真道言大道也冥冥言幽深也述華清宫即溫泉宫在昭應縣唐貞觀十八年建至𤣥宗改為華清宫今在臨潼縣上林神君言此地即明庭山開鴻濛色天轉招搖星三雪報大有孰謂非我靈上林神君未詳又漢有上林苑武帝所作在長安神君漢喬智明為縣令民愛之號為神君招搖星謂北斗第七星也三雪即三白也嵗前有三白則兆為豐年也幽居幽人下山徑去去夾青林滑處莓苔濕暗中蘿薜深春朝烟雨散猶帶浮雲隂王摩詰名維九嵗知屬辭仕𤣥宗為尚書右丞詩詞清秀調雅意新理愜在泉為珠著壁為繪一句一字皆出常境又髙岑王之詩悲壯讀之使人感慨孟詩刻苦誦之使人不歡又東坡云摩詰詩中有畫畫中有詩又文藝傳侍從酬奉則李嶠宋之問沈佺期王維皆卓然為一家藍田山石門精舍釋迦譜云息心所棲曰精舍又藝文類集云留其精舍妙良由精練行者所居也落日山水好漾舟信歸風玩竒不覺逺因以緣源窮遙愛雲木秀初疑路不同安知清流轉偶與前山通捨舟理輕策果然愜所適老僧四五人逍遙䕃松柏朝梵林未曙夜禪山更寂道心及牧童世事問樵客晤宿長林下焚香卧瑤席澗芳襲人衣山月映石壁再尋畏迷誤明發更應歷笑謝桃源人花紅復來覿藍田山在藍田縣地理志藍田在長安之東南華州去八十里精舍事物紀原漢明帝立精舍以處攝摩騰即白馬寺此精舍之所始梵說文西域種號出浮圖書又梵者清淨正言寂淨又梵唄羌戎吟聲也禪浮圖記咒靜也傳燈録禪有五一曰外道禪二曰凡夫禪三曰小乘禪四曰大乘禪五曰最上乘禪瑤席楚辭瑤席兮玉填言以美玉為席也桃源地志在桃源州山下有桃州西南一里即桃源洞又梁任安武陵記淵明云邑人先世避秦亂相率攜妻孥隱此厥後絶不外通自秦歷晉方有漁人入洞而後世人遂以為仙也贈房盧氏琯房琯字次律𤣥宗幸蜀時以為平章事盧氏縣名在嵩州達人無不可忘巳愛蒼生豈復小十室絃歌在兩楹浮雲日巳歸偶坐視農耕桑榆鬱相望邑里多雞鳴秋山一何淨蒼翠臨寒城視事兼偃卧對書不簪纓蕭條人吏散鳥雀下空庭鄙夫心所向晚節異平生將從海嶽居守靜解天刑或可纍安邑茅茨君試營無不可語無莫也注云無不可也蒼生民也謂蒼然而生也十室小邑之稱弦歌漢髙帝幸魯問弦歌之聲贈祖三詠祖詠洛陽人蠨蛸掛虛牖蟋蟀鳴前除嵗晏涼風至君子復何如髙館閴無人離居不可道閒門寂巳閉落日照秋草雖有近音信千里阻河關中復客汝潁去年歸舊山結交二十載不得一日展貧病子既深契闊余不淺仲秋雖未歸暮秋以為期良㑹詎幾日中心長相思蠨蛸說文蟲名小如蜘蛛長腳牖說文穿壁以木為交窗也又在墻曰牖蟋蟀郭璞曰今之趣織也陸機云似蝗而小正黑有光澤如漆有角翅除說文殿陛也又王粲賦循階除而下降汝潁南潁川是也契濶說文疏逺也又勤苦也戲贈張五弟諲吾弟東山時心尚亦何逺日髙猶自卧鐘動始能飯頭上髮未梳床頭書不卷清川與悠悠空林對偃蹇青苔石上淨細草松下軟窗外鳥聲閒階前虎心善徒然萬慮多淡爾太虛緬一知與物平自顧為人淺對君忽自得浮念不煩遣鐘動始能飯劉須溪批云不必其人直自輸寫浮念不煩遣謂浮生念慮不能自遣也東山未詳所指必張諲所居之處心尚言心之所尚者逺且大也虎心善言其馴熟也太虛緬莊子道大游太虛緬說文逺也休暇還舊業便飯休暇說文閒暇無事也滕王閣記十旬休暇舊業謂􅜁川也謝病始告歸依依入桑梓家人皆佇立相候柴門裏時輩皆長年成人舊童子上堂家慶畢願與姻親齒論舊忽餘悲目存且相喜田園轉蕪沒但有寒泉水衰栁日蕭條秋光清邑里入門乍如昨休騎非便止中飯顧王程離憂從此始謝說文辭去也言以病而辭官也桑梓詩維桑與梓必恭敬之注桑者母之所事以養蠶絲梓者父之所事以代琴瑟家慶父母俱存曰家慶又詩室家相慶成人巳冠之後也宿鄭州鄭州記古豫州之域周初封管叔於鄭即此地也又曰榮陽郡朝與周人辭暮投鄭人宿他鄉絶儔侣孤客親僮僕宛洛望不見秋霖晦平陸田父草際歸村童雨中牧主人東臯上時稼繞茅屋蟲思機杼鳴雀喧禾黍熟明當渡京水昨晚猶金谷此去欲何言窮邉狥微祿洛陽為東周東周去鄭州不遠故朝發而暮可至也機杼織器又杼乃機之持緯者王丹贈友人詩曰如丹此詩出自機杼京水金谷園在河陽縣晉石崇之别館也昨晚金谷園蓋有藹然戀闕之情爾觀别者青青楊栁陌陌上别離人愛子游燕趙髙堂有老親不行無可養行去百憂新切切委兄弟依依向四鄰都門帳飲畢從此謝賓親揮淚逐行侣含悽動征輪車從望不見時時起行塵余亦辭家者看之淚滿巾不行無可養行去百憂新批云寫得别意出送别聖代無隱者英靈盡來歸遂令東山客不得顧采薇既至君門逺孰云吾道非江淮度寒食京洛縫春衣置酒臨長道同心與我違行當浮桂棹未幾拂荆扉逺樹帶行客孤城當落暉吾謀適不用勿謂知音稀東山客晉謝安始有隱東山之志後命屢臻勢不獲已乃出仕采薇見前注不得顧言不遂其隱居之志也左晉士㑹在秦晉人謀歸之及行秦大夫繞朝贈之以策曰吾謀適不用勿謂知音稀猶無謂秦無人也冬日遊覽步出城東門試騁千里目青山橫蒼林赤日團平陸渭北走邯鄲關東出函谷秦地萬方㑹來朝九州牧雞鳴咸陽市冠蓋相追逐丞相過列侯羣公餞光祿相如方老病獨歸茂陵宿茂陵史記司馬相如姓司馬字長卿蜀郡成都人仕武帝為郎後以病告歸茂陵而卒來朝九州牧批云平實悲壯古意雅詞樂府所少獨歸茂林宿批云更似不須語言列侯史以列侯奉朝請光祿後漢百官志正卿九光祿勳其一也掌宿衛宫殿門户典謁署郎更直執㦸考其行而進退之崔濮陽兄季重前山興山西去亦對維門秋色有佳興況君池上閒悠悠西林下自識門前山千里橫黛色數峯出雲間嵯峨對秦國合沓藏荆關殘雨斜日照夕嵐飛鳥還故人今尚爾歎息此頺顔自識門前山批云思議不到有道之言過李楫宅閒門秋草色終日無車馬客來深巷中犬吠寒籬下散髮時未簪道書行尚把與我同心人樂道安貧者一罷冝城酌還歸洛陽社籬一作林宜城縣屬襄陽府洛陽社未詳又東坡詩冠蓋傾洛社渭川田家渭川在長安斜光照墟落窮巷牛羊歸野老念僮僕倚杖候荆扉雉雊麥苗秀蠶眠桑葉稀田夫荷鋤立相見語依依即此羡閒逸悵然歌式微式微詩式微式微胡不歸選詩補注云或稱右丞詩清雅有蕭散之趣今考其集中措語峭厲殊非古調其規模氣度亦未有能過人者獨此篇稍平淡有趣姑録之以見古作者之難得也春中田家作屋上春鳩鳴村邉杏花白持斧伐逺楊荷鋤覘泉脈新燕識舊巢舊人看新厯臨觴忽不御惆悵逺行客惆悵逺行客批云卷耳之後不意得此諷詠齊州送祖三即前祖詠也相逢方一笑相送還成泣祖帳已傷離荒城復愁入天寒逺山淨日暮長河急解纜君巳遙望君猶佇立荒城復愁入批云只是眼前道不盡者贈劉藍田必為藍田令者也籬中犬迎吠出屋候柴扉嵗晏輸井稅山村人夜歸晚田始家食餘布成我衣詎肯無公事煩君問是非歎白髮我年亦何長鬢髮日巳白俯仰天地間能為幾時客惆悵故山雲徘徊空日夕何事與時人東城復南陌李陵詠漢家李將軍三代將門子結髮有竒䇿少年成壯士長驅塞門兒深入單于壘旌旗列相向簫鼓悲何巳日暮沙漠垂戰聲烟塵裏將令徑敵滅豈獨名王侍既失大軍援遂嬰穹廬恥少小蒙漢恩何堪坐思此深衷欲有報投軀未能死引領望子卿非君誰相理李陵字少卿祖廣父敢及陵三世為將陵少為侍中天漢二年將步卒五千人深入單于壘矢盡救兵不至遂降于虜深𠂻欲有報上以問司馬遷遷盛言陵奮不顧身以徇國家之急其素所蓄積也有國士之風彼之不死宜欲得當以報漢也引領引首也子卿蘇武字也蓋言陵自言其𠂻心惟子卿知之爾穹廬前胸奴傳穹盧游帳也其形穹隆故云西施詠艷色天下重西施寧久微朝為越溪女暮作吳宫妃賤日豈殊衆貴來方悟稀邀人傅脂粉不自著羅衣君寵益嬌態君憐無是非當時浣紗伴莫得同車歸持謝鄰家女效顰安可希西施寰宇記西施施其姓也㑹稽諸暨縣有東施家西施家又諸䀈縣東十里有土城山勾踐得諸暨采薪女西施鄭旦令習禮於土城山以獻吳王山邉有石是西施浣紗石效顰西施病心而顰其里之醜人見而美之亦奉心而顰里人富人見之閉門而不出貧人見之挈妻子而去之蓋彼知美顰而不知顰之所以美也羽林騎閨人天文志天有羽林大將軍之星言羽翼鷙擊之意喻若林木故以名武官閨人婦人此言羽林騎官之閨婦也秋日臨髙城城中管絃思離人堂上愁稚子階前戲出門復映戶望望青絲騎行人過欲盡狂夫終不至左右寂無言相看共垂淚孟浩然字浩然襄陽人少好節義隱鹿門山游京師王維邀入禁署𤣥宗忽至維以實對帝問所作再拜自誦至不才明主棄之句上曰卿自棄朕朕何嘗棄卿奈何誣我由是失意又浩然詩如訪梅尋栁偏入佛寺又浩然諸公之詩諷詠之久有金石宫商之音又浩然骨貌清淑風神散朗學不為儒務掇菁藻文不按古匠心獨妙又浩然學力去退之甚逺而其詩獨出退之之上者一味妙悟也又浩然文采丰茸經緯綿密力追雅調全削凡體如衆山遙對酒孤嶼共題詩無論興象兼復故實尋香山湛上人香山寺在廬山朝游訪名山山逺在空翠氛氳亘百里日入行始至谷口聞鐘聲林端識香氣杖策尋故人解鞍暫停騎石門殊豁險篁徑轉森邃法侣欣相逢清談曉不寐平生慕真隱纍日探幽異野老朝入田山僧暮歸寺松泉多逸響苔壁饒古意願言投此山身世兩相棄林端識香批云幽致政在裏許空翠隂亮山行曰空翠爽人肌膚泉流清人耳目題終南翠微寺空上人房翠微寺太白詩注蕭贇曰貞觀十二年終南太和宫改為翠微宫宫邊有金沙泉乃近寺之泉也此云寺不知何年改為寺或泉上寺亦名翠微寺歟翠微終南裏雨後宜返照閒門久沈冥杖策一登眺遂造幽人室始知靜者妙儒道雖異門雲林頗同調兩心喜相得畢景共談笑暝還髙窗眠時見逺山燒緬懷赤城標更憶臨海嶠風泉有清聽何必蘇門嘯批云不刻深懷抱如洗嘯說文吹聲也又蹙口出聲也蘇門笑阮籍於蘇門山遇孫登與商略古今皆不應籍退之半嶺聞有聲若鸞嘯音乃登之嘯也發漁浦潭在襄陽府東旭早光芒諸禽巳驚聒卧聞漁浦口橈聲暗相撥批云别是一種清景可掬日出氣象分始知江路濶美人常晏起照影弄流沫飲水畏驚猿祭魚時見獺舟行自無悶況值晴景豁批云美人常晏起著此空濶又别其超衆作者以此也流沫莊達生篇孔子觀於吕梁縣水三十仞流沫四千里祭魚禮月令孟春之月魚上氷獺祭魚漢中漾舟漢中江漢之中也今襄陽府皆漢中也蓋漢水所出云耳漾舟遊何處神女漢臯曲雪罷氷復開春潭千丈渌輕舟恣往來探玩無厭足波影搖妓叉沙光逐人目傾杯魚鳥醉聨句鶯花續良㑹難再逢日入須秉燭聨句鶯花續批云好此雖清事微近俗意知此可以語詩神女漢臯曲漢臯漢水邉也昔鄭交甫於漢皋遇二神女解珮與交甫龍泉精舍神僧傳龍泉精舍乃僧慧逺所建在潯陽匡廬山初逺辭師道安南遊見廬峯清淨足以息心始住于此然山逺無水遠乃以杖卓地清流湧出其後亢旱逺於池側讚海龍王經忽有巨蛇從池上天須㬰大雨因號精舍為龍泉焉亭午聞山鐘起行散愁寂尋林采芝去谷轉松蘿密旁見精舍開長廊飯僧畢石渠流雪水金丸曜霜橘竹房思舊遊過憩終永日入洞窺石髓傍崖采蜂蜜日暝辭逺公虎溪相送出批云長廊飯僧畢此豈待賦之乃佳又虎溪相送出廬山記惠逺禪師送客過溪虎輒鳴號後送陶元亮陸修靜與語道合不覺送過虎溪因大笑世傳為虎溪三笑圖云石髓晉稽康遇王烈共入山烈見石裂得髓食之因攜少許與康巳成青石冉往視之石復合矣又仙經云神仙五百年一開石髓出服之與天齊夀登蘭山寄張立蘭山未詳其處又敘州僰溪縣有蘭山北山白雲裏隱者自怡悅相望始登髙心隨飛雁滅愁因薄暮起興是清秋發時見歸村人平沙度嶺歇天邉樹若薺江畔舟如月何當載酒來共醉重陽節批云興是清秋發淡而不厭平沙度嶺歇批云其俚至此薺淮南子薺水菜冬水而生夏土而死乂甘菜其枝葉細縻謂之䕷蕪詩其甘如薺又月令十月薺菜生陶𢎞景詩山中何所有隴上多白雲只可自怡悅不堪將贈君西山尋辛諤漾舟乘水便因訪故人居落日清川裏誰言獨羡魚石鏡窺洞徹沙岸歷紆餘竹嶼見垂釣茅齊聞讀書欵言忘景夕清興屬涼初回也一瓢飲賢哉常晏如批云其為詩必實境賢哉常晏如自言其趣亦頗簡佚羡魚謂貪欲也回也姓顔字子淵語賢哉回也一簟食一瓢飲在陋巷人不堪其憂回也不改其樂南亭懷辛子山光忽西落池月漸東上散髮乘夕涼開軒卧閒敞荷風送香氣竹露滴清響欲取鳴琴彈恨無知音賞感此懷故人中宵勞夢想山光西日也恨無知音賞列子鍾子期沒伯牙絶琴曰世無知音者賞說文嘉尚之也宿業師山房待丁公不至夕陽度西嶺羣壑倐巳暝松月生夜涼風泉滿清聽樵人歸欲盡烟鳥棲初定之子期宿來孤琴候蘿徑批云景物滿眼而清淡之趣更自浮動非寂寞者耶溪泛舟即若耶溪在今紹興府㑹稽縣東南北流二十五里與照鏡湖合浴景餘清暉輕棹弄溪渚澄明愛水物臨泛何容與白首垂釣翁新妝浣紗女看看似相識脈脈不得語批云諸詩皆極洗錬而枮瘁又在蘇州前清溪麗景閒逺餘情不欲犯一字綺語自是白首垂釣翁史太公望年八十釣於渭濱浣紗女西施越溪浣紗女也聽鄭五愔琴阮籍推名飲清風坐竹林半酣下衫袖拂拭龍唇琴一杯彈一曲不覺夕陽沈余意在山水聞之諧夙心首句至夕陽沈批云作者作者余意至末批云朴而不俚風韻尚存阮籍字嗣宗任情不羈尤好老莊能嘯能言嗜酒放曠聞步兵尉有酒三百斛乃求為步兵校尉與阮咸及嵇康諸人為竹林七賢我志在山水吕氏春秋伯牙鼓琴鍾子期善聽伯牙志在山子期曰善哉巍巍乎志在髙山洋洋乎志在流水此言亦在乎山水之間既聞其音遂與夙昔之心相諧也萬山潭地志萬山在襄陽府西有解珮渚即鄭交甫遇龍女解珮之地潭在萬山下即沈碑潭也垂釣坐磐石水清心亦閒魚行潭樹下猿卧島藤間遊女昔解珮傳聞於此山求之不可得沿月棹歌還批云蛻出風露古始未有又古意淡韻終不可以衆作律之而衆作愈不可及嵗暮海上作仲尼既已沒余亦浮於海昏見斗柄回方知嵗星改虛舟任所適垂釣非有待為問乘槎人滄洲復何在批云竒壯淡蕩少許自足浮海語乘桴浮於海斗柄北斗之第七星當十二月則斗柄回指於丑嵗星木星也木星行度一嵗一周天故云乘槎人見前注此詩蓋志不得行而思起歸與之歎者歟送從弟落第後歸㑹稽㑹稽縣名屬紹興府史記㑹計也吳越春秋㑹計修國之道因以名山而縣以山名疾風吹征帆倐爾向空沒千里去俄頃三江坐超忽向來共歡娛日夕成楚越落羽更分飛誰能不驚骨首二句批云發興甚苦楚謂荆楚越謂甌越也三江禹三江既入注三江者唐仲初吳都賦注松江下七十里分流東北入海者為婁江東南流者為東江并松江為三江是地今亦名三江口采樵作采樵入深山山深水重疊橋崩卧槎擁路嶮垂藤接日落伴將稀山風拂蘿衣長歌負輕策平野望烟歸此詩亦寄興於思歸之意采樵左無捍采樵者以誘之樵注樵薪也卧槎說文槎水中浮木也月下有懷秋空明月懸光彩露霑濕驚鵲棲未定飛螢卷簾入庭窗寒影疏鄰杵夜深急佳期曠何許望望空佇立批云亦自纎麗與疏雨滴梧桐相似謂其詩枯淡非也晚泊潯陽望香爐峯地志潯陽今九江府潯陽縣也香爐峯在廬山太白詩東望香爐生紫烟即此是也挂席幾千里名山都未逢泊舟潯陽郭始見香爐峯嘗讀遠公傳永懷塵外蹤東林精舍近日暮坐聞鐘批云不經意造作遠公釋惠逺也本姓賈氏雁門人入恆山從道安落髮後棲廬山與陶淵明為白蓮社云東林廬山有東林寺峴潭作地志峴山名在襄陽去城十里即羊祜立碑之地潭在峴山之下也石潭傍隈隩沙岸曉夤緣試垂竹竿釣果得槎頭鯿美人騁金錯纎手膾紅鮮因謝陸內史蓴羮何足傳批云其詩風味可愛如此槎頭鯿襄陽地記襄陽漢水鯿甚美禁采以槎斷水因謂槎頭縮項鯿金錯刀名陸內史未詳何人蓴羮晉記翰因秋風起思吳中菰米蓴羮鱸魚棄官而歸大堤行寄萬七古今樂録大堤曲隋王誕為襄州時作又樂府遺聲都邑三十六曲有大堤曲又古詩朝發襄陽城暮投大堤宿大堤諸女兒花艷嬌人目又張東之詩南國多佳人莫若大堤女大堤行樂處車馬相馳突嵗嵗春草生踏青二三月王孫挾珠彈遊女矜羅襪攜手今莫同江花為誰發大堤在襄陽襄陽在漢水之隂大堤乃漢水之堤古今之大堤詩皆以美女為言則必娼妓所居之地故稱行樂處也王孫古詩公子王孫芳樹下又韓信傳漂母曰吾哀王孫而進食珠彈莊談王篇以隋侯之珠彈千仞之雀世必笑之羅襪曹子建洛神賦云淩波微步羅襪生塵常建建詩似初發通莊却尋野徑百里之外歸大道所以其旨逺其興僻佳句輒來無論意表仙谷遇毛女意知是秦宫人毛女字玉姜在華隂山中山客獵師世世見之形體生毛自云秦始皇宫人秦亡入山食松實遂不飢寒地志華山有毛女洞理或然也溪口水石淺泠泠明藥藂入溪雙峯峻松栝梳幽風垂嶺枝嫋嫋翳泉花濛濛夤緣霽人目路盡心彌通磐石橫陽崖前臨殊未窮回潭清雲影瀰漫長天空水邉一神女千載為玉童羽毛經漢代珠翠逃秦宫目覿神巳寓鶴飛言未終祈君青雲祕願謁黃仙翁嘗以耕玉田龍鳴西頂中金梯與天接幾日來相逢松栝栝說文揉曲也夤緣說文連絡又循也青雲祕列仙傳雲笈七籖乃道書之最妙者又乃五嶽真君之祕籙也黃仙翁未詳又按列仙傳黃初平入金華山得道後改名赤松子亦曰黃仙翁也玉田未詳又藍田生玉亦曰玉田西頂金梯未詳龍鳴淮南子夫蛟龍伏潛于淵而卵剖於陵雌鳴上風雄鳴下風而化者形精之至也夢太白峯地志太白山在長安武功縣界俗云武功去天三百里冬夏積雪望之浩然又地域志太白山在鳯翔湄縣録異記金星之精墜於漢南圭峯之西號為太白夢寐升九崖杳靄逢元君遺我太白峯寥寥辭垢氛結宇在星漢冥林閉氤氲簷楹覆餘翠出岫生片雲時往溪水間孤亭晝仍曛松峯引天影石瀨清霞文恬目緩舟趣霽心投鳥羣春風又搖櫂潭島花紛紛元君列仙傳九華真妃乃太虛上真元君李夫人之少女又南嶽有紫虛魏元君又北斗經亦有北斗七元君皆女仙之號遺我棄我也恬目恬說文安也莊以恬養智蓋言目之安靜也霽心明霽說文雨止而晴也謂心若雨止而晴明也送楚十少府微風吹霜氣寒影明前除落日未能别蕭蕭林木虛愁烟閟千里仙尉其何如因送别鶴操贈之雙鯉魚鯉魚在金盤别鶴哀有餘心事則如此請君開素書仙尉史梅福為南昌尉王莽初一朝解印去官人以為仙因謂仙尉别鶴操古琴操也嵇叔夜琴賦蔡氏五曲王昭楚妃千里别鶴又云牧犢子作又陶淵明詩上弦驚别鶴下弦操孤鸞雙鯉魚古詩客從逺方來遺我雙鯉魚素書同上詩云呼童烹鯉魚中有尺素書晦日馬鐙曲稍次中流作夜寒宿蘆葦曉色明西林初日在川上便澄遊子心青天無纎翳郊野浮春隂波靜隨釣魚舟小緑水深出浦見千里曠然諧逺尋扣舷應漁父因唱滄浪吟扣舷楚辭漁父莞爾而笑鼓枻而去乃歌曰滄浪之水清兮可以濯吾纓滄浪之水濁兮可以濯吾足鼓枻即扣舷也塞上曲樂録樂府塞上曲者古征戍十五曲之一也翩翩雲中使來問太原卒百戰苦不歸刀頭怨明月塞雲隨陳落寒日傍城沒城下有寡妻哀哀哭枯骨雲中冀州之域堯及周屬并州春秋為北狄戰國屬趙漢為雁門郡平城縣今為大同府又即古白登漢髙帝被圍處太原冀州之域禹貢曰既修太原乃髙平縣也古為并州元冀寧路今為山西布政司治所刀頭古樂府何當大刀頭破鏡飛上天寡妻哭列女傳齊莊公襲莒杞梁殖戰死梁妻枕尸而哭於城下哀誠動人道路過者莫不為之揮淚十日而城為之崩昭君墓漢宫豈不死異域傷獨沒萬里䭾黃金蛾眉為枯骨回車夜出塞立馬皆不發共恨丹青人墳上哭明月昭君王嬙也漢王穰之女漢元帝時胸奴入朝詔以昭君配之號寧胡閼氏一說元帝後宫人多得常見者少乃使畫工圖其形按圖召幸宫人皆賂畫工多至十萬金少者不滅五萬金昭君自恃其貌獨不與及胸奴入朝選宫人配之昭君以圖當行入辭光彩射人竦動左右天子重信于外國悔恨不及窮按其事有畫工毛延夀為人形老少必得其真安陵陳敞新豐劉白龔寬並工狗馬衆勢人形不逮延夀杜陵楊望樊青龍工布色皆同日棄市籍其資財漢人憐昭君遠嫁為作歌詩昭君服毒死舉國葬之胡中胡地草白而其墓上之草獨青故號為青冢弔王將軍墓嫖姚北伐時深入强千里戰餘落日黃軍敗鼓聲死嘗聞漢飛將可奪單于壘今與山鬼鄰殘兵哭遼水批云屬思既古詞亦警絶潘嶽歎云能叙悲怨未見如此章也嫖姚前霍去病為嫖姚校尉音頻妙羊召切徑疾貌荀悅漢紀亦作去聲用獨杜詩三用皆平聲押韻去病六出擊胸奴皆北伐也漢飛將漢李廣為北平太守胸奴號曰漢飛將軍避之數嵗不入界嘗與胸奴遇兩入胸奴營殺其射雕將并白馬將軍胸奴遂遁去山鬼鄰亦指墓而言遼水即遼沙在今遼東都司之北送陸擢聖代多才俊陸生何考槃南山髙松樹不合空摧殘九月湖上别北風秋雨寒殷勤歎孤鳯早食金琅玕考槃詩考槃在澗碩人之寬刺莊公言賢者退而窮處也朱子注考成也槃桓槃之意謂成其隱處之室也又陳氏曰考扣也槃器名蓋扣之以節歌如鼓盆拊缶之樂也琅玕荀子注崑崙出有琅玕樹又本草云琅玕璃流之類有五色火德瑞也又云琅玕數種生於海砥初出水紅久而青黑枝柯似珊瑚竅如蟲蛀擊之作金石聲以金言之蓋喻其珍貴也江上琴興江上調玉琴一絃清一心冷冷七絃遍萬木澄幽隂能使江月白又令江水深始知梧桐枝可以徽黃金徽黃金琴有十三徽其貴者以金玉為徽也送李十一尉臨溪泠泠花下琴君唱渡江吟天際一帆影豫懸離别心以言神仙尉因致瑤華音回軫拊商調越溪澄碧林仙尉梅福事見前注回軫回旋琴軫也調說文音調樂律也商月令仲秋其音商商調言商音也拊拊琴宿王昌齡隱居字少伯漬溪深不測隱處惟孤雲松際露微月清光猶為君茅亭宿花影藥院滋苔紋余亦謝時去西山鸞鶴羣操中孤鸞别鶴是也閒齊卧病行藥至山館稍次湖亭二首旬時結隂霖簾外初白日齊沐清病容心魂畏虛室閒梅照前戶明鏡悲舊質同袍四五人何不來問疾行藥至石壁東風變萌芽主人山門緑小隱湖中花時物堪獨往春帆宜别家辭君向滄海爛漫從天涯春詞宛宛黃栁絲濛濛雜花垂日髙紅籹卧倚樹春光遲寧知傍淇水騕裊黃金羈宛宛茂貌淇水今衛輝府淇縣騕裊史相如傳罥騕裊注神馬名黃金羈羈馬絡頭以金為之也翳翳陌上桑南枝交北堂美人金梯出素手自提筐非但畏蠶飢盈盈嬌路傍翳說文隱也詩其菑其翳謂草木藤蔓所蔽翳也韋應物唐史應物代宗朝為蘇州太守居常自愧閔閔有慨俗之心其詩如深山采藥飲泉坐石日宴忘歸又韋詩潤澤如玉與孟詩意趣相似然出處不同又王維應物詩亦自有蕭散處又志林李杜之後詩有逺韻而才不逮意獨應物王維栁子厚發纎濃於簡古寄至味於淡泊非餘子所及也又選詩補注云其詩清潤閒淡而調格不減沈謝云朱子云韋蘇州詩髙於王維孟浩然詩以其無聲色臭味也擬古五首選詩補注云蒼山曾原嘗曰擬詩如學畫當識家數要先得其筆意運規制於胸中然後下筆乃可若展畫臨貌雖似亦下矣前人擬古既用其意又用其字是謂之盜也非擬也此論最為切當愚按晉人如張孟陽陸士衡皆不免此獨陶靖節脫古繩墨直抒所藴可謂度越前輩矣今應物所擬亦能不拘拘模倣如自成一家語者則為可尚若云韻格髙下係乎世降之遠近愚不敢論辭君遠行邁飲此長恨端巳謂道里逺如何中嶮艱流水赴大壑孤雲還暮山無情尚有歸行子何獨難驅車背鄉國朔風卷行跡嚴冬霜斷肌日入不遑息憂歡客髮變寒暑人事易中心君詎知氷玉徒貞白批云前四句隱然有意外不可言之意讀之慘然又古别離多矣此作真古以其有清淡自然之意如秋風曠野殆難為懷謝云此意擬行行重行行云流水赴大壑說文水通谷曰壑也無情謂流水與孤雲以其無情尚知赴壑而行子乃不能歸然此心君豈知之乎故以氷玉自喻其清潔而剛貞也春至林木變洞房夕含清單居誰能裁好鳥對我鳴良人久燕趙新愛移平生别時雙鴛綺留此千恨情碧草生舊跡緑琴歇芳聲思將魂夢歡反側寐不成攬衣迷所次起望空前庭孤影中自惻不知雙涕零批云流動自然復非苦冷所得又耿耿之情適然不假外物而見又此章擬凛凛嵗云暮云魂夢歡一云歡指人而言劉夢得踏歌詞唱盡新詞歡不見是也孤影中自惻言自梘孤影而中心為之惻怛也月滿秋夜長驚烏號北林天河橫未落斗柄當西橫寒蛩悲洞房好鳥無遺音商飈一夕至獨宿懷重衾舊交日千里隔我浮與沈人生豈草木寒暑移此心此擬明月皎夜光月滿則月圓之時北斗杓三星為斗柄西橫西指斗杓建申酉之月正秋時也寒蛩爾雅悉率今促織也亦曰趨織語趨織鳴懶婦驚陸璣云似蝗而小正黑有光澤如漆有角翅商飈秋風也浮沈猶言生死也黃鳥何關關幽蘭亦靡靡此時深閨婦日照紗窗裏批云誰不能道而㸃綴搜索自無以加娟娟雙青娥微微啓玉齒自惜桃李年誤身遊俠子無事久别離不知今生死批云柔腸欲裂而有不可犯之色又結語沈著傷懷不為妍蕩怨曠之態又此詩深復深而語淺妙按此章擬青青河畔草黃鳥詩黃鳥哀三良也刺秦穆公以人從死又黃鳥刺宣王隂禮教親而不至聨兄弟而不固也青娥美人也玉齒郭璞遊仙詩燦然啓玉齒桃李年猶言容華方美之時也遊俠子見前注有客天一方寄我孤桐琴迢迢萬里隔託此傳幽音氷霜中自結龍鳯相與吟絃以明直道漆以固交深按此詩擬客從逺方來按客從遠方來選詩演義以為美朋友交道合也然此詩似臣無處忠於君之意也幽音謂忠誠也氷霜自結節操貞潔之意龍鳯和吟喻君臣相須之義絃以明直道喻以直道而事君漆以固交喻君臣之相合也送終喪內人也奄忽逾時節日月獲其良蕭蕭車馬悲祖載發中堂生平同此居一旦異存亡斯須亦何益終復委山岡行出國南門南望鬱蒼蒼日入乃云還慟哭宿風霜晨遷俯𤣥廬臨訣但遑遑方當永潛翳仰視白日光俯仰遽終畢封樹已荒涼獨留不得還欲去結中腸童稚知所失啼號捉我裳即事猶倉卒嵗月始難忘哀傷如此豈有和哉而低昂條達愈緩愈長祖載見後王仲初注𤣥廬慕室也封樹謂墓上之樹也宴别幼遐與君貺兄弟乖閡意方弭安知忽來翔纍日重歡宴一旦復離傷置酒慰兹夕秉燭坐華堂契闊未及展晨星出東方征人慘已辭車馬儼成裝我懷自無歡原野滿春光羣水含時澤野雉鳴朝陽平生有壯志不覺淚霑裳況自守空宇日夕但倣徨晨星今所謂曉星也天原發微曰星經曰太白晨星附日而行速則先日遲則後日速而先日昏見西方遲而後日晨見東方今曰晨星必指此星而言也歟留别洛京親友握手出都門駕言適京師豈不懷舊廬惆悵與子辭麗日坐髙閣清觴宴華池昨遊倐已過後遇良未知念結路方永嵗隂野無暉單車我當前暮雪子獨歸臨流一相望零淚忽霑衣都門洛陽之門東漢建都於洛故曰都門京師長安也長安唐建都之地故曰京師嵗隂謂嵗暮之時也西郊燕集濟濟衆君子髙燕及時光羣山靄遐矚緑野布熙陽列坐遵曲岸披襟襲蘭芳野庖薦嘉魚激澗泛羽觴衆鳥鳴茂林緑草延髙岡盛時易徂謝浩思坐飄揚眷言同心友兹遊安可忘羽觴晉束晳傳曰觴輕如鳥羽之飛又觴作龜爵形有頭尾羽翼故云移疾㑹詩客元生與釋子法朗因始諸曹對此嘉樹林獨有戚戚顔抱瘵如曠職淹旬非樂閒釋子來問訊詩人亦扣關道同意暫遣客散疾徐還園徑自幽靜𤣥蟬噪其間髙窗瞰逺郊暮色起秋山吾曺幸休睱悢悢心所攀嘉樹晉韓子聘魯宴于李氏有嘉樹焉宣子譽之武子曰敢不植此嘉樹以無忘角弓抱瘵謂抱病也釋子沙門也釋子彌沙塞律云汝等比丘雜類出家皆捨本姓同稱釋子又晉僧道安授業圖澄以師莫大於佛遂以釋為姓中夏沙門以釋為姓者蓋自道安始問訊釋子相見則合掌問訊龍門遊眺龍門見前伊闕注鑿山導伊流中斷若天闢都門遙相望佳氣生朝夕素懷出塵意適有攜手客精舍繞曾阿千龕鄰峭壁緣雲路猶緬憩澗鐘已寂桃樹發烟華淙流散石脈長笑招逺風臨潭漱金碧日落望都城人間何役役伊流伊水也精舍僧寺也千龕說文塔下室也淙說文水流貌古詩懸岩巨石飛流淙登西南岡卜居遇雨尋竹浪至澧壖縈帶數里清流茂樹雲物可賞登髙創危構林表見川流微雨颯已至蕭條川氣秋下尋密竹盡忽曠沙際遊紆直水分野綿延稼盈疇寒花明廢墟樵枚笑榛丘雲水成隂淡竹樹更清幽適自戀佳賞復兹永日留藍嶺精舍藍嶺藍田山也精舍見前注絶壁精舍髙排雲聊直上佳遊愜始願忘嶮得前賞崖傾景方晦谷轉川如掌緑林含蕭條飛閣起𢎞敞道人上方至深夜還獨往日落羣山隂天秋百泉響所嗟纍巳成安得長偃仰道人智度論云得道者名為道人余出家者未得道者亦名道人上方見前注夏夜憶盧嵩靄靄髙館暮開軒滌煩襟不知湘雨來蕭灑入幽林炎月得涼夜芳樽誰與斟故人南北居纍月間徽音人生無間日歡㑹當在今反側候天旦層城苦沈沈幽居貴賤雖異等出門皆有營獨無外物牽遂此幽居情微雨夜來過不知春草生似癡得之青山忽已曙鳥雀繞舍鳴時與道人偶或隨樵者行自當安蹇劣誰謂薄世榮古調本色寄子西夏景巳難度懷賢思方續喬樹落疏隂微風散煩燠傷離枉芳札欣遂見心曲藍上舍已成田家雨新足託鄰素多欲殘秩猶見束日夕上髙齊但望東原緑出還昔出喜還家今還獨傷意入室掩無光銜哀寫虛位悽悽動幽幔寂寂驚寒吹幼女復何知時來庭下戲咨嗟日復老錯莫身如寄家人勸我餐對案空垂淚批云唐人詩氣短蘇州氣平平與短甚懸絶及其悼亡自不能不短短者不欲使人再讀虛位亡者之靈席也幽幔護靈綀幕也寒吹寒風也身如寄史禹紀生寄也死歸也同德寺雨後寄元侍御李博士川上風雨來須㬰滿城闕巖嶤青蓮界蕭條孤興發前山遽巳淨隂靄夜來歇喬木生夏涼流雲吐華月嚴城自有限一水非難越相望曙河逺髙齊坐超忽青蓮界法華經有人聞是品能隨喜讀善者是人口中當出青蓮香又青蓮寺碑湖州法華山樵夫得青蓮一枝掘地有石匣藏一童子舌根不壞花自舌出是人誦法華經致此勝因因以青蓮名其山善福精舍示諸生湛湛嘉樹隂清露夜景沈悄然羣物寂髙閣似隂岑方以𤣥默處豈為名跡侵法妙不知歸獨此抱沖襟齊舍無餘物陶器與單衾諸生時列坐共愛風滿林批云甚有佳致可誦文韋齊云結二語與淵明采菊東籬下悠然見南山同一關軸何則詩人貴動口直致爾湛湛澄靜也嘉樹見前注隂岑說文山髙而小曰岑隂岑獨言山髙而幽深也𤣥默謂深居而忘言也沖襟沖說文和也深也陶器說文瓦器也又禮有虞氏陶注以陶去其土而為之故謂之陶器陪王卿郎中遊南池鴛鴻俱失侣同為此地遊露浥荷花氣風散栁園秋烟草疑衰嶼星漢泛歸流林髙初上月塘深未轉舟清言屢往復華尊始獻酬終憶秦川賞端坐起離憂酬盧嵩秋夜見寄喬木生夜涼月華滿前墀去君咫尺地勞君千里思素秉棲遁志況貽招隱詩坐見林木榮願赴滄洲期何能待嵗晏攜手當此時招隱楚辭朱子注招隱士者淮南小山所作也晉左太沖亦有招隱詩滄洲杜詩含情更覺滄洲遠謂仙境也與友生野飲效陶體陶淵明也攜酒花林下前有千載墳兩句便盡中間欵乃政在觴半於時不共酌奈此泉下人始自玩芳物行當念徂春聊舒遠世蹤坐望還山雲批云此語傳淵明之道也歟且遂一歡笑焉知賤與貧批云古詩多此效陶彭澤霜露悴百草時菊獨妍華物性有如此寒暑其奈何兩句似達似怨甚好掇英泛濁醪日入㑹田家盡醉茅簷下一生豈在多批云蘇州詩去陶甚近至效陶體則復喜用陶語故知晉人無不有風致可愛掇英泛濁醪楚辭餐秋菊之落英與韓庫部㑹王祠曺宅作韓㑹愈之宗兄閒門䕃堤栁秋渠含夕清微風送荷氣坐客散塵纓守默共無吝抱沖俱寡營良時頗髙㑹琴醖共開情南塘泛舟㑹元六昆季端居倦時燠輕舟泛回塘微風飄襟散橫吹繞林長雲淡水容夕雨微荷氣涼一寫悁勤意寧用訴華觴初發揚子寄元大校書揚子即揚子江也悽悽去親愛泛泛入烟霧批云便是韋公筆意至濃至淡歸棹洛陽人殘鐘廣陵樹今朝此為别何處還相遇世事波上舟沿洄安得住廣陵今揚州府波上舟自喻無定止也沿洄即往來往來安足取對芳樹迢迢芳園樹列映清池曲對此傷人心還如故時緑風條灑餘靄露葉承新旭佳人不再攀下有往來躅夏日已謂心苦傷如何日方永無人不晝寢獨坐山中靜悟淡將遣慮學空庶遺境積俗易為侵愁來復難憗閒齊對雨幽獨自盈抱隂淡亦連朝空齊對髙樹疏雨共蕭條巢燕翻泥濕蕙花依砌消端居念往事倐忽若驚飈春日郊居寄萬年吉少府中孚三原元少府偉夏侯校書審吉中孚夏審大厯十才子萬年縣在京兆今改為威寧縣三原縣漢屬馮翊唐屬京兆谷鳥時一囀田園春雨餘光風動林早髙窗照日初獨飲澗中水吟詠老氏書城闕應多事誰噫此閒居老氏書即道德經五千言也秋夜南宫寄灃上二弟及諸生灃上灃水之上地域志灃水在扶鄠縣終南山今永興軍鄠縣山也書灃水攸同即此也暝色起烟閣沈抱積離憂況兹風雨夜蕭條梧葉秋空宇感涼至頽顔驚嵗周日夕遊闕下山水憶同遊夏景端居即事北齊有涼氣嘉樹對層城重門永日掩清池夏雲生遇此庭訟閒始聞蟬初鳴逾懷故園愴默默以緘情義演法師西齊結茅臨絶岸隔水聞清磬山水曠蕭條登臨散情性稍指緣原騎還尋汲澗徑長嘯倚庭樹悵然川光暝起度律師同居東齊院律師律抄解題云佛言善解一字名律師一字者律字也又寶志經云具足十法名律師釋子喜相偶幽林俱避喧語有仙風道骨安居同僧夏清夜諷道言對閣景恆晏步庭隂始繁逍遙無一事松風入南軒僧夏禪房清僧寺每以四月十五日起結夏至七月十五日解夏夕次盱眙縣盱眙縣今泗洲旴眙縣也落帆逗淮鎮停舫臨孤驛浩浩風起波冥冥日沈夕人歸山郭暗雁下蘆洲白獨夜憶秦關聽鐘未眠客淮鎮楊州域志晉元帝使劉隗守淮隂為晉重鎮也寄全椒山中道士全椒縣今屬鳯陽府今朝郡齊冷忽念山中客澗砥束荆薪歸來煮白石欲持一杯酒逺慰風雨夕落葉滿空山何處尋行跡煮白石列仙傳焦先煮白石食之或與人味如芋又鮑靚靚得道入海煮白石服之神靜師院青苔幽巷遍新林露氣微經聲在深竹髙齊獨掩扉憩樹愛嵐嶺聽禽悅朝暉方耽靜中趣自與塵世違淮上即事寄廣陵親友前舟巳渺渺欲渡誰相待秋山起暮鐘楚雨連滄海風波離思深批云足以涵初别之情宿昔容鬢改獨鳥下東南廣陵何處在批云偶然景偶然語亦不容再得廣陵今揚州府也長安遇馮著客從東方來衣上灞陵雨問客何為來采山因買斧冥冥花正開揚揚燕新乳昨别今巳春鬢絲生幾縷批云不能詩者亦知是好灞陵地域志在長安之東燕新乳說文鳥及人生子曰乳暮相思朝出自不還暮歸花盡發批云誦此則頃刻中不能為懷彼安知作者用心之苦即暮歸花盡發五字亦未易喻豈無終日㑹惜此花間月空館忽相思微鐘坐來歇批云結二句神情悄然得於實境乃有情之語有情之色送楊開府楊開府未詳何人又開府官名漢樊噲為右將軍開府杜子美詩亦曰清新庾開府必官名也少事武皇帝無賴恃恩私身作里中橫家藏亡命兒朝持摴蒱局暮竊東鄰姫司𨽻不敢捕立在白玉墀批云縷縷如不自惜寫得仗氣動蕩見者偏憐太白亦云托身白刃裏殺人紅塵中其即此詩豪縱不羈之意也耶驪山風雪夜長楊羽獵時一字都不識飲酒肆頑癡武皇升仙去憔悴被人欺批云寫得竒怪隊仗逼真舊見詩評以為不類蘇州平生不知其深意轉換正在武皇升仙起興能令讀者墮淚讀書事巳久提把筆晚學詩兩府始收跡南宫謬見推批云雖出於果然正是狡獪非才果不容出守撫􅑱嫠忽逢楊開府論舊涕俱垂坐客何由識惟有故人知批云古今如此創意轉竒極是有數妙在語實使人自喻乂按此詩乃蘇州身在三衛目擊其類如此非自謂也正可與王建羽林行並看韋詩格律深妙流盡肺肝非學力所及世言其所至掃地焚香而坐不應為人老少頓異可見韋詩寓言耳司𨽻後漢百官表司𨽻校尉一人比二千石初置持節掌察舉百官以及京師百官有犯法者白玉墀天子殿陛丹墀也武皇帝托喻𤣥宗皇帝也漢髙紀大人常以臣無賴謂多狡詐又釋之傳尉窘無聊賴又李績傳年十二三為無賴賊橫說文不順理也又孟子待我以橫逆里中橫蓋言在鄉里作事多不順理也亡命張耳傳亡命遊大梁注命名也又原涉傳亡命嵗餘逢赦書摴蒱說文摴蒱戲也博物志老子入湖作令人擲之為戲也詳見說文驪山地域志在京兆府臨潼縣山有溫泉宫長楊三輔黃圖長楊宫宫在京兆府盩厔縣漢武帝建長楊揚雄長楊賦羽獵揚雄傳漢武帝羽獵雄作羽獵賦獵白虎通逐禽獸為田除害故曰田獵又凡獵皇帝乘馬南行有司奉大駕以從諸公王以下皆乘馬帶弓矢陳於前而三驅皆以弓矢為事故曰羽獵也成帝獵於長楊故言長楊羽獵時也升仙軒轅鑄鼎於荆山鼎成騎龍上天後世因以帝崩謂之升仙兩府漢百官志武帝以劉屈氂為丞相分交屬為兩府又漢杜周傳常與兩府及廷尉分章注丞相御史府也南宫唐職林舊說禮部郎中掌省中文翰謂之南宫舍人􅑱嫠說文孤寡也送李十四山東遊聖朝有遺逸披膽謁至尊豈是貿榮寵持將救元元權豪非所便書奏寢禁門髙歌長安酒忠憤不可吞歘來客河洛日與靜者論濟世翻小事丹砂駐精魂東遊無復繫梁楚多大藩髙論動侯伯踈懷脫塵喧送君都門野飲我林中樽立馬望東道白雲滿梁園踟蹰欲何贈空是平生言遺逸者隱逸之士猶書所謂遺賢也權豪史游俠傳郭解持生殺之權注事任也豪淮南子智過百人謂之豪此謂有權勢豪傑之臣也非所便謂不便於巳也寢漢書其議遂寢注息也禁門天子禁中之門也精魂易精氣為物游魂為變注精真氣也魂陽氣也丹砂見前注元元漢文紀元元之民又光武紀下為元元所仰師古云善意也謂黎庶也貿詩抱布貿絲注交易也梁國西京雜記梁孝王好營宫室苑囿之樂作曜華之宫築兔園兔園中則有山石竒獸亘延若干里日與宫人賔客弋釣其中此梁國之名所由始也地域志在今淮陽城七十里是也河洛洛水河水也地志洛水出𢎞農郡上洛縣冢嶺山水至鞏縣入於河也送鄭長源少年一相見飛轡河洛間歡遊不知罷中路忽言還冷冷鵾絃哀悄悄冬夜閒丈夫雖耿介逺别多苦顔君行拜髙堂速駕難久攀雞鳴儔侣發朔雪滿河關須㬰在今夕樽酌且循環河洛間河洛二郡名鵾絃唐賀懷智以鵾雞筋作琵琶絃送李儋别離何從生乃在親愛中反念行路子拂衣自西東日昃不留宴嚴車出崇墉行遊非所樂端憂道未通春野百卉發清泚思無窮芳時坐離散世事誰可同歸當掩重關默默想竒容崇墉詩皇矣以伐崇墉注墉城垣地又城築土壘壁曰墉相逢行王僧䖍技録相和歌清調六曲有相逢狹路行亦曰長安有狹斜行亦曰相逢行二十登漢朝英聲邁今古適從東方來又欲謁明主猶酣新豐酒尚帶灞陵雨邂逅兩相逢别來問寒暑寧知白日晚暫向花間語忽聞長樂鐘走馬東西去批云極似快意又似鬼語新豐灞陵俱見前注長樂鐘唐人詩長樂鐘聲花外盡又劉禹錫詩今夜初聞長樂鐘注長樂宫名見前注栁子厚字宗元文章卓偉第進士博學宏詞科貞元中拜監察御史元和中為栁州刺史世號栁栁州又子厚五言古詩在韋蘇州上豈元白同時諸公所可望也滄浪詩品大厯以後吾所深取者李長吉栁子厚劉長史權德輿李深李益耳又選詩補注云栁子厚詩世計其發纎濃於簡古寓至味於淡泊與韋應物並稱宜矣然必較其等蓋如子厚之名工徽乃不若蘇州之蕭散自然也田家三首蓐食徇所務驅牛向東阡雞鳴村巷白夜色歸暮田札札耒耜聲飛飛來烏鳶竭兹筋力事持用窮嵗年盡輸助徭役聊就空自眠子孫日以長世世還復然籬落隔烟火農談四鄰夕庭際秋蟲鳴疏麻方寂歷蠶絲盡輸稅機杼空倚壁里胥夜經過雞黍事筵席各言官長峻文字多督青東鄉後租期車轂陷泥澤公門少推恕鞭朴恣狼籍努力慎經營肌膚真可惜迎新在此嵗唯恐踵前跡古道饒蒺藜縈回古城曲蓼花被堤岸陂水寒更渌是時收穫竟落日多樵牧風髙榆栁疏霜重梨棗熟行人迷去住野鳥競棲宿田翁笑相念昏黑慎原陸今年幸少豐無厭饘與粥蒺藜草名其實多刺易团於蒺藜覺衰久知老㑹至不謂便見侵批云眼前事眼前語能道人所不能道今年宜未衰稍巳來相尋齒疏髮就種奔走力不任咄此可奈何未必傷我心彭聃安在哉周孔亦巳沈古稱夀聖人曾不留至今但願得美酒朋友常共斟是時春向暮桃李生繁隂日照天正緑杳杳歸鴻吟出門呼所親扶杖登西林髙歌足自快商頌有遺音髮就種左傳盧蒲嫳曰余髮如此種種注髮短也彭列仙傳彭鏗即彭祖也為商大夫年八百嵗聃老子也周謂周公孔謂孔子也夀聖人指彭𣆀周孔言云古稱有夀且聖曾不留至今言有生必有死也歸鴻吟嵇康詩手揮五絃目送歸鴻商頌原憲曵杖拖履行歌商頌天子不得臣諸侯不得友南澗中題不知所旨按子厚有石澗記未詳是否秋氣集南澗獨遊亭午時回風一蕭瑟林影久參差始至若有得稍深遂忘疲羈禽響幽谷寒藻舞淪漪去國魂巳逺懷人淚空垂孤生易為感失路少所宜索寞竟何事徘徊秪自知誰為後來者當與此心期選詩補注云初秋首兩語頗新巧猶未免沈謝南澗中獨遊亭午時一句自是唐語讀者當識之回風楚辭悲回風之搖蕙兮心寃結而內傷朱子注回風旋轉之風也淪漪朱子注水文也說文水波為淪引詩河水清且淪漪去國謂謫去也失路喻罷官也初秋夜坐贈吳武陵武陵唐元和中為大常博士稍稍雨侵竹翻翻鵲驚藂美人隔湘浦一夕生秋風積霧杳難極滄波浩無窮相思豈云逺即席莫與同若人抱竒音朱絃縆枯桐清商激西皓泛灧凌長空自得本無幾天成諒非功希聲閟太撲聾俗何由聰美人謂武陵也淮南子大絃縆則小絃絶又楚辭縆瑟兮交鼓注縆急張絃也枯桐琴也清商選枚乘七啓動朱唇發清商又琴調中有清商清角等調天成猶言天然也希聲老子太音希聲閟說文閉也又深也幽也朴前酷吏傳斫雕為朴說文素也注質也西皓漢西皓歌曰西皓流暘秋氣肅殺晨詣超師院讀禪經汲井漱寒齒清心拂塵服閒持貝葉書步出東齊讀真源了無取妄跡世所逐遺言冀可冥繕性何由熟道人庭宇靜苔色連深竹日出霧露餘青松如膏沐淡然離言說悟悅心自足貝葉西域有貝多樹國人以其葉截剪而寫書謂之貝葉書又繕性莊子繕性主繕治也道人指超師言贈江華長老老僧道機熟默語心皆寂去嵗别春陵沿流此投跡空室無侍者巾屨唯掛壁一飯不願餘跏趺便終夕風窗疏竹響露井寒松滴偶地即安居滿庭芳草積春陵今道州也跏足坐也趺足也佛法結跏趺坐義聲論云以兩足趺跏致雨如蟠龍結念誦經云全趺是如來坐半趺是菩薩坐禪室發地結菁茅團團抱虛白山花落幽户中有忘機客涉有本非取照空不待析萬籟俱緣生窅然喧中寂心境本同如鳥飛無遺跡發與伐同謂開地為基也菁茅書包匭菁茅注江淮間一茅而三脊名曰菁茅涉有猶言說有也釋氏以虛無為教故婆沙論曰欲有色有無色有有者何謂切有漏酒是佛言若業能合後生相續是有云生滅故名有照空猶言照破諸空也釋氏以苦空為宗故佛經云色即是空空即是色又有覺無空是凡夫法有空無覺是三乘法籟說文三孔籥又簫亦為籟此云萬籟即莊子所謂地籟則衆籟是也中夜起望西園值月上覺聞繁露隊開戶臨西園寒月上東嶺冷冷疏竹根石泉逺逾響山鳥時一喧倚楹遂至旦寂寞將何言秋曉行南谷經荒村杪秋霜露重晨起行幽谷黃葉覆溪橋荒村唯古木寒花疏寂歷幽泉微斷續機心久已忘何事驚麋鹿唐音卷二
