body:
  text: 唐音巻十一元楊士𢎞撰張震註唐詩遺響四郎士元塞下曲寳刀塞下兒輕身百戰曾百勝壯心竟未嫖姚知白草山頭日初沒黄沙戍下悲歌發蕭條盡夜邊風吹獨倚營門望秋月嫖姚見前注戴㓜公去婦怨出户不敢啼風悲日悽悽心知恩義絶誰忍分明別下坂車轔轔畏逄鄉里親空持床前㡢却寄家中人忽辭王吉去為是秋胡死若此今日情煩寃不相似王吉字子陽漢宣帝時為博士諫議大夫妻取東家棗啖食吉乃去婦秋胡魯秋胡子納妻五日而官於陳後歸未至家見路傍有美婦人采桑秋胡悦之下車顧托桑隂下婦人采桑不顧胡曰力田不如逄年力桑不如見郎今吾有金願與夫人婦人不受胡乃歸母呼其婦乃向采桑者乃數胡之罪而自投於河詩意其亦去國懐君之辭也女耕田行乳燕入巢笋成竹誰家二女種新穀無人無牛不及犂持刀斫地翻作泥自言家貧母年老長兄從軍未娶嫂去年災疫牛囤空截絹買刀都市中頭巾掩面畏人識以刀代牛誰與同姊妹相擕心正苦不見路人唯見土䟽通畦隴妨亂田整頓溝塍待時雨日正南崗下餉歸可憐朝雉擾驚飛東隣西舍花發盡共惜餘芳淚滿衣朝飛雉吳兢樂府觧題云齊宣王時牧犢子七十無妻出薪于野見雉雌雄相隨意動心怨乃援琴而歌曰雉朝飛兮鳴相和後因以雉朝飛為琴操云桞花歌送客徃桂陽桂陽隋為郴州唐改桂陽滄浪渡頭桞花發斷續因風飛不絶揺烟拂水積翠間綴雪含霜誰忍攀夾岸紛紛送君去鳴棹孤尋到何處移家深入桂水源種桞新成色更繁定知別後消散盡却憶今朝傷旅魂滄浪渡常州府龍陽縣二水相合謂之滄浪水即漁父濯纓處按桂陽地與桂林相接水亦自桂林而發也故云戎昱苦哉行妾家清河邊七葉承貂蟬身為最小女偏得渾家憐親戚不相識幽閨十五年有時最逺出秪到中門前前年邊騎來懼死翻生全今秋官軍至豈意遭戈鋋匈奴為先鋒長鼻黄髪拳彎弓獵生人百歩牛羊氊脱身落虎口不及歸黄泉苦哉難重陳暗哭蒼蒼天清河縣名今屬淮安府七葉貂蟬左大冲詩金藉舊業七葉珥貂蟬前張安世傳宣帝立以定䇿功拜大司馬自宣元以來金張之家七葉皆侍中百官志侍中皆有貂蟬故云貂䑕屬北方寒以貂皮煖額因為侍中冠餙亦取其内勁悍外温潤蟬崔貂古今注齊后怨王而死亦為蟬以其飾冠取其清髙飲露云采蓮曲雖聽采蓮曲誰識采蓮心漾檝愛花逺囘船愁浪深烟生極浦色日落半江隂同似憐波静看粧墮玉簪涔陽女兒花滿頭􅆴􅆴同泛木蘭舟秋風日暮南湖裏争唱菱歌不肯休涔陽澧州見前注木蘭舟見前注菱歌有采菱曲塞上曲慘慘寒日沒北風巻蓬根將軍領疲兵却入古塞門迴首指隂山殺氣成黄雲蓬根説文蒿也又陸佃云草之不理者葉散生遇風輙㧞根旋轉不定隂山見前注樓上畵角哀即知兵心苦試問左右人無言淚如雨何意休明時終言事鼙鼓長安秋夜八月更漏長愁人起常早閉門寂無事滿院生秋草昨宵西窓夢夢入荆南道逺客歸去來在家貧亦好客堂秋夕隔窓螢影㓕復流北風微雨虛堂秋蟲聲竟夜引鄉淚蟋蟀何知人自愁四時不得一日樂以此方悲客㳺惡寂寂江城無所聞梧桐葉上偏蕭索顧逋翁日晚歌朱子楚辭序曰日晚歌者唐著作即顧况之所作也况詩有集然皆不及其見於韋應物詩集者之勝歸來録其楚語三章以為可與王維相上下予讀之信然然其朝上清者有曰和為舟兮露為馬因乗之觴於瑶池之上兮三光羅列而在下則意非維所能及然他語殊不近故不得取而獨采此篇以為氣雖短淺而意若差健云日窅窅兮下山望佳人兮不還花落兮屋上草生兮階間日日兮春風芳菲兮欲歇老不可兮更少君胡為兮輕别短歌行城邊路今人犂田昔人墓岸上沙昔時江水今人家今人昔人共長歎四序相催節囘換明月皎皎入華池白雲離離度清漢文苑中無此詩古意新繫青絲百尺繩心在君家轆轤上我心皎潔君不知轆轤一轉一惆悵青絲繩汲井索也轆轤井上汲水轉木也詳見前注陳羽公子行金覊白馬郎何處踏青來馬驕郎半醉􅉜蹀望樓臺似見樓上人玲瓏窓户開隔花聞一笑落日不知囘楊巨源大堤詞太白詩注云大堤曲隨王証為襄陽時作又樂府遺聲都邑三十四曲有大堤曲按郡記襄陽城乃大堤城也二八嬋姢大堤女開壚枂對依江渚侍客登樓向水看邀即巻㡢臨花語細雨濛濛濕芰荷巴東商旅駐帆多自傳芳酒飜紅袖誰調妍粧囘翠娥珍簟華鐙夕陽後當壚理瑟矜纎手月落星微五鼔聲春風揺蕩窓前桞嵗嵗逄迎沙岸間背人多整緑雲鬟無端嫁與五陵少離別烟波傷玉顔大堤女震之大堤曲曰南國多佳人莫若大堤女又古辭云朝發襄陽城暮至大堤宿大堤女兒花艷驚郎目餘事俱見前注巴東今歸州也王廣津宫詞白雪猧兒拂地行慣眠紅毯不曽驚深宫更有何人到只向金堦吠曉螢白雪猧兒説文犬名紅毯晉張軌傳紅布三萬匹毛席織五絲又白樂天有錦毯歌乂唐人別離詩云只因一着親情却不得紅絲毯一眠劉夢得淮隂行二首船頭大銅鐶摩挲光陣陣早晚使風來沙頭一眼認何物令儂羡羡郎船尾鷰衘泥趂檣竿宿食長相見武昌老人説笛歌武昌老人七十餘手把瘦令相問書自言少小學吹笛早事曹王曽賞激徃來征鎮戍蘄州楚山蕭蕭笛竹秋當時買材恣搜索典却身上烏貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音隨指發水中龍應雲行絶曽將黄鶴樓上吹一聲占盡秋江月如今老去語猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹武昌老人瘦令未詳曹王名臯唐史德宗興元十四年除衡州刺史建中四年敗李希烈兵㧞黄蘄州漢蘄春縣也蘄皆楚地故云楚山蘄州多美竹烏貂裘見前注商聲五音水中龍應聲玉笛賦曰近出雙筍從羗起羗人移竹未及而龍鳴水中不見色云云故本四孔後以一君明所加孔後出是謂商聲五音畢行雲絶列子薛譚學謳於秦清未窮技而辭歸清餞於郊無節悲歌聲遏行雲黄鶴樓在武昌城頭黄鶴樓上吹未詳或云仙人吕洞賓常於樓上吹鐵笛樓側至今有鐵笛亭鐵笛管其大如椽人莫敢吹平蔡州唐憲宗元和闕年吳元濟反于蔡州十二年李愬入蔡州擒元濟蔡州平汝南晨鷄喔喔鳴城頭鼔角音和平路傍老人憶舊事相與感激皆涙零老人收淚前致詞官軍入城人不知忽驚元和十二載重見天寳承平時汝南今汝南府即古蔡州也官軍入城人不知元和十二年冬十月夜大風雪夜半雪愈甚行七十里至蔡州城四鼓愬至無一人知者鷄鳴雪止愬入居元濟外宅執元濟送京師斬之及迎裴度入城先是吳元濟父少陽父子阻兵禁人偶語燃燭有以酒食相過從者罪死度除其禁蔡人始知有王民之樂故曰元和十二載重見天寳承平時也堤上行三首酒旗相望大堤頭堤下連檣堤上樓日暮行人争渡急槳聲幽軋滿中流江南江北望烟波入夜行人相應歌桃葉傳情竹枝怨水流無限月明多桃葉古今樂録王獻之二妾名桃葉桃根獻之作桃葉歌竹枝怨竹枝詞見本注長堤繚繞水裵徊酒舍旗亭次第開日晚上簾招賈客軻峩大艑落帆來洛中逄韓七中丞之吳興口號吳興今潮州也昔年意氣結羣英幾度朝囘一字行海北天南零落盡兩人相見洛陽城和令狐相公別牡丹令狐相公名楚平章宅裏一欄花臨到開時不在家莫道兩亰非逺别春明門外即天涯平章即令狐楚也元和十四年皇甫鏄與楚同年進士至是鏄引以為相同平章事春明門長安門也瀟湘曲斑竹枝斑竹枝淚㾗㸃㸃寄相思楚客欲聽瑶瑟怨瀟湘深夜月明時俱見前注唐音巻十一
