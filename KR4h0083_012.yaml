body:
  text: 唐音卷十二元楊士𢎞撰張震注唐詩遺響五李長吉長吉名賀系出鄭王後七嵗能辭章仕至協律郎辭尚竒詭所得皆驚邁絶去翰墨畦徑當時無能效者樂府數十篇雲韶諸工合之絃管又玉川之怪長吉之詭天地之間自欠此體不得又大厯以後吾所深取者李長吉桞子厚劉言史權德輿李涉李益杜牧之使賀未死少加以理奴僕命騷可也又雞跖集李賀文體如崇巖峭壁萬物崛起人多效之又陸魯望云吾聞淫畋漁者謂之暴殄天物天物既不可暴又可決摘刻削露其情狀乎使自萌卵至於稿死不得隱伏天能不致罰耶長吉夭東野窮玉川之官不挂朝藉而死正坐是哉又李賀能探前事今古未曾經道者又杜牧之序云元和中韓吏部亦頗取其歌詩云云蓋騷之苗裔理不及詞實過之朱子云李賀較怪得些子不如太白自在又曰賀詩巧感諷合浦無明珠龍洲無木奴足知造化力不給使君須越婦未織作吳蠶始蠕蠕縣官騎馬來獰色虬紫鬚懷中一方板板上數行書不因使君怒焉得詣爾廬越婦拜縣官桑牙今尚小會待春日晏絲車方擲掉越婦通言語小姑具黃粱縣官踏餐去簿吏復登堂合浦縣名屬亷州郡志縣海曲有珠池出美珠木奴橘也李衡種樹千頭於龍陽洲謂其子曰吾有千頭木奴嵗可收絹千匹明珠出於合浦木奴生於龍洲今謂無者蓋反其詞以致刺諷之意也白帖李衡種千樹橘號千頭木奴吳蠶吳都賦鄉貢八蠶之絲注吳地多蠶故云蠕蠕動貌荀蠕蠕之蟲注虬鬚魏闕琰對客虬鬚直指方板即方册之謂也蓋以木作方板以記事爾絲車繅絲之車也黃粱粱米具膳也粱米名似粟而大赤黃青白皆有之簿吏掌簿書之吏也申胡子觱栗歌觱栗北人所吹葭管也顔熱感君酒含嚼蘆中聲花娘篸綏妥休睡夫容屏誰截太平管列點排空星直貫開花風天上驅雲行今夕嵗華落令人惜平生心事如波濤中坐時時驚朔客騎白馬劒弝懸蘭纓俊健如生猱肯拾蓬中螢蘆中聲即吹葭也夫容屏見前注生猱獼猴老者蜀國絃楓香晚花靜錦水南山影驚石墜猿哀竹雲愁半嶺涼月生秋浦玉沙粼粼光誰家紅淚客不忍過瞿塘楓香今云楓香脂乃楓樹汁結成者本草云白膠香即是也錦水瞿塘俱見前注仙人彈琴石壁上翻翻一仙人手持白鸞尾夜掃南山雲鹿飲寒澗下魚歸清海濵當時漢武帝書報桃花春白鸞尾天寶遺事明皇逰於月宫見素娥十餘人乘白鸞舞於桂樹下武帝書報桃花春未詳馬詩寶玦誰家子長聞俠骨香堆金買駮骨將送楚襄王寶玦説文玉珮也白虎通月子能斷珮玦金買駿骨燕闕華云楚襄王未詳又楚莊王有愛馬衣以文闕置屋下席以露床啖以棗脯馬死欲以大夫禮葬之香襆赭羅新盤龍蹙鐙鱗回看南陌上誰道不逄春赭羅闕羅也龍盤蹙鐙謂龍盤馬鐙也汙血到王家隨鸞感玉珂少君騎每上人見是青騾杜詩闕留作駒已汗血注漢大宛國多善馬汗血言其先天馬子也李少君云隨鸞即鑾也蓋云隨鑾和而行且搖感玉珂也塘上行選詩補注云乃相如歌詞之瑟調也按鄴都故事魏文帝甄皇后為郭后所譛賜死臨終詩蒲生我池中即此曲也藕花涼露濕花缺藕根澀飛下雌鴛鴦塘水聲溘溘秦宫詩自序云漢秦宫將軍梁冀之嬖奴也秦宫得寵內舍故以驕名大譟於人豫􅀈舊作長詞辭以馮子都之事相對望又云昔有之詩越羅衫袂被春風玉羽騏驎腰帶紅樓頭曲宴仙人語帳裏吹笙香霧濃人間酒暖春茫茫花枝入簾白日長飛窗復道傳籌飲午夜朦朧膩燭黃秃襟小袖調鸚鵡紫繡麻霞踏哮虎斫桂燒金待曉筵白鹿青蘇夜半煮桐英永巷騎新馬內屋深屏生色畫開門爛用水衡錢卷起黃河內身寫皇天厄運猶繒製秦宫一生花底活鸞箆得不還人醉睡氍毹滿堂月批云秦宫似秦宫又云闕可見作者妙闕商谷闕虎奴態人所不能盡喻也梁冀本傳字伯闕梁之子體質帝專權自恣天子恭已百僚側自帝目之闕霍扈將軍後闕以立闕與中郎侍單超等誅之馮子都光家闕喻秦宫也又集闕目梁冀愛監奴秦闕一角夀所刺史二千石皆謁辭之麒麟闕身馬足牛尾角端肉髙丈二五蹄牝曰麒牡曰麒王刻以闕刻其粦為腰帶也鸚鵡見前注水衡食􅋽武帝置水衡都尉掌上闕苑一曰主平稅紫繡麻霞燒金未詳斫桂見前注白鹿明皇闕一白鹿王闕人識之曰漢闕也青蘇詩山有扶闕林闕未詳永巷見前注生色畫謂以五色闕前注生動活鸞箆未詳氍毹見金銅仙人辭漢歌魏明帝青龍元年八月詔宫官牽車西取漢孝武捧露盤仙人欲立置前殿宫官既拆盤仙人臨載澘然淚下唐諸王孫李長吉遂作金銅仙人辭漢歌茂陵劉郎秋風客夜聞馬嘶曉無迹畫欄桂樹懸秋香三十六宫土花碧魏官牽車指千里東關酸風射眸子空將漢月出宫門憶君清淚如鉛水衰蘭送客咸陽道天若有情天亦老擕盤獨出月荒􅋽渭城已逺波聲小茂陵劉郎漢武帝也茂陵武帝葬處故云方八月取盤故云桂香蓋八月桂花方發也土花碧言宫中無人青苔方長也魏官牽車言魏主遣官取盤也綱目魏王青龍四年徙長安鍾簴槖駝銅人承露盤於洛陽盤折聲聞數十里銅人重不可致大發銅鑄注銅人二於司馬門外咸陽渭城見前浩歌南風吹山作平地帝遣天吳移海水王母桃花千遍紅彭祖巫咸幾回死青毛驄馬參差錢嬌春楊桞含細煙筝人勸我金屈巵神血未凝身問誰不須浪飲丁都護世上英雄本無主買絲繡作平原君有酒惟澆趙州土漏催水咽玉蟾蜍衛娘髮薄不勝梳看見秋眉换新緑二十男兒那刺促天吳杜詩天吳及紫鳯顛倒在短褐注水神山海經云天吳水獸二首八足尾背青黃彭祖列仙傳祖名鏗帝頊玄孫至殷之末世年七百餘嵗而不衰少好恬靜惟以養神治事為事巫咸莊子鄭有神巫曰季減知人之死生人見之皆棄而走列子見之而闕王母桃花漢武外傳王母謂武帝曰此桃三千年一開花三千年一結實金屈巵夢華録御宴酒盂皆金屈巵如蔡碗而有手把子神血未詳丁都護古今樂録丁都護歌者彭城內史徐逹為魯軌所殺髙祖使都護丁眸收殯之逹妻髙祖長女也呼眸至閣下自問斂送之事母問輒嘆息曰丁都護其聲哀切後人因其聲廣其曲焉平原君見前注趙州古趙國所都之地今屬真定府衛娘未詳刺促見前刺足行注李憑箜篌箜篌見前注吳絲蜀桐張髙秋空山凝雲頽不流江娥啼竹素女愁李憑中國彈箜篌崑山玉碎鳳凰呌夫容泣露香蘭笑十二門前融冷光二十三絲動紫皇女蝸鍊石補天處石破天驚逗秋雨夢入神山教神嫗老龍跳波瘦蛟舞吳質不眠倚桂樹露腳斜飛濕塞兔吳絲蜀桐言箜篌乃蜀桐所置絃則用吳蠶之絲為之也江娥啼竹湘妃事素女彈瑟事凝雲不梳秦青歌遏行雲事俱見前注崑山玉崑岡三注云在荆山其地産玉山之脊曰岡晉郤詵所謂昆山片玉蓋本者此又楚人卞和善別玉於荆山昆岡得一玉璞將進楚文王工者以為石而刖和足及武王時又獻之又為所刖和遂抱玉泣於荆山之下泣盡繼之以血至成王和又進之使人琢之果得美玉乃號為連城玉鳯凰見前注玉碎鳳呌皆以喻其聲十二門長安城門也二十三絲箜篌之絃也紫皇言天子也女蝸鍊石補天三注列陽問篇云昔者女蝸氏鍊五色石以補天神山神嫗未詳老龍跳波瘦蛟舞亦喻箜篌之音也吳質酉陽雜爼月中有桂髙五百丈下有一人常斫之樹創隨合其人姓吳名質西河人學道有過謫其伐桂也天上謡天河夜轉漂回星銀浦流雲學水聲玉宫桂樹花未落仙妾采香垂佩瓔秦妃卷簾北窗曉窗前植桐青鳳小王子吹笙鵝管長呼龍耕煙種瑶草粉霞紅綬藕絲裙青洲步拾蘭苕春東指羲和能走馬海塵新生石山下天河物理論天者元氣之流行之精也氣發而天精華上浮宛轉隨流名曰天河一曰雲漢衆星出焉夜轉言隨天之運轉也銀浦亦天河也玉宫桂樹言月中仙桂也秦妃未詳王子吹笙王子晉吹笙見前注羲和書咨爾羲和蓋羲氏和氏二官名主厯數授時之官也又廣雅日名耀靈日御曰羲和氏羲和氏主日海塵神仙傳麻姑曰見東海三變為桑田矣云云東海行復揚塵乎石山下言蓬萊三神山也春坊正字劍子歌春坊史漢宫有九子坊太子坊曰春坊正字官名先輩匣中三尺水曾入吳潭斬龍子隙月斜明刮露寒練帶平鋪吹不起蛟胎皮老蒺藜刺鸊鵜淬花白鷴尾直是荆軻一片心莫教照見春坊字桵絲團金懸䍡􅝹神光欲截藍田玉是出西方白帝驚嗷嗷鬼母秋郊哭匣謂藏劍匣也郭元振古劍歌云琉璃寶匣吐蓮花三尺漢髙紀提三尺取天下又杜詩三尺獻龍泉吳潭斬龍未詳又吳潭斬龍子晉周處字隱吳人常於長橋下斬蛟隙月練帶皆以喻劍蛟胎皮老蒺黎刺皆未詳鸊鵜爾雅水鳥似鳬而小匣中瑩刀白鷴鳥名説文羽族之闕介者形類雞白質黑章尾長四五尺休備闕距八純白鷴尾亦以喻劍之瑩潔者荆軻衛人燕太子丹使之亟匕首刺秦王切藍田玉列子周穆王得昆吾赤刀寶劍切玉如泥西方白帝劍金精也金屬西方金故云爾鬼母佛經昔老佛降鬼子母李夫人史漢武帝宫人也李延年之妹夫人本以娼進初夫人兄延知音善歌舞武帝愛之每為新聲常侍上前舞曰北方有佳人絶世而獨立云云上嘆息曰蓋世豈有此人乎平陽主因言延年有女弟乃召見實妙麗善舞由是得幸夫人少而早卒上憐矜圖畫其形於甘泉宫方士齊人少君言能致其神夜張燈設帷幄陳酒肉而令上於他帳遙望見好女如夫人之貌上愈相思悲感作詩令樂府諸音家絃歌之紫皇宫殿重重開夫人飛入瓊瑶臺緑香繡帳何時歇青雲無光宫水咽翩聯桂花墜秋月孤鸞驚啼商絲發紅壁闌珊懸佩璫歌臺小妓遙相望玉蟾滴水雞人唱露華蘭葉參差光紫皇以天帝居紫極故言紫皇也瑶臺王母玉蟾俱見前注此云玉蟾滴水蓋以宫漏言也又云玉蟾月也天將曙則露下如月之時升華故云露華蘭葉參差光也鴈門太守行鴈門見前注本傳云賀初謁退之投以文卷首篇鴈門太守行愈時會旋方罷倦甚門吏以卷呈解帶旋讀方至首二句遽束帶邀入喜甚黑雲壓城城欲摧甲光向月金鱗開角聲滿天秋色裏塞土胭脂凝夜紫半卷紅旗臨易水霜重鼓聲寒不起報君黃金臺上意提擕玉龍為君死易水在今維縣水東徑容城縣故城南又東徑易城南黃金臺見前注玉龍劍名貴主征行樂奚騎黃銅連鎖甲羅旗香幹金畫葉中軍留醉河陽城驕嘶紫燕踏花行春雲騎將如紅玉走馬捎鞭上空緑女垣素月角咿咿牙帳未開分錦衣奚通作㜎女𨽻也禮奚八人古者從坐男女沒入縣官為奴其小才知以為奚今之侍史官婢也奚騎則奚奴之車馬也鎖甲以黃銅為鎖甲也中軍中軍帳也河陽見前注紫燕馬名神絃別曲巫山小女隔雲別春風松花山上發緑蓋獨穿芳徑歸白馬花竿前孑孑蜀江風淡水如羅墮蘭誰泛相經過南山桂樹為君死雲衫淺汙紅脂花巫山神女見前注江南弄江中緑霧起涼波天上疊巘紅嵯峨水風浦雲生老竹渚暝蒲帆如一幅鱸魚千頭酒百斛酒中倒卧南山緑吳歈越吟未終曲江上團團帖寒玉吳歈説文歌也渝水之人善歌舞漢髙帝伐秦巴人從軍歌舞陷陳髙祖來其聲後人因加此字一曰六歌一曰歈少年樂方草落花如錦地二十長逰醉鄉裏紅纓不重白馬驕垂桞金絲香拂水吳娥未笑花不開緑鬢聳墮蘭雲起陸郎倚醉牽羅袂奪得寶叉金翡翠醉鄉王績事見前注陸郎未詳又陸象先娶賀梅女相者曰陸郎位極人臣夢天老兔寒蟾泣天色雲樓半開璧斜白玉輪軋露濕團光鸞珮相逄桂香陌黃塵清水三山下更變千年如走馬遙望齊州九點煙一泓海水杯中㵼兔蟾月也黃塵見前注璧玉輪皆以喻月齊州謂天下九州之大正如九點煙四海之廣如一泓之水㵼傾也胡蝶舞題意未詳楊花撲帳春雲熱龜甲屏風醉眼纈東家胡蝶西家飛白騎少年今日歸批云好質而不俚麗而不浮以司體以合曲不厭其碎胡蝶語最妙也龜甲謂玳瑁也玳瑁生南海大者如籧篨身似龜首尾如鸚鵡里有文章可作器醉眼纈東坡詩亦云却比初闕也生眼纈説文纈綵纈又曽韻曰文繒也昌谷北園新笋斫取青光寫楚辭膩香春粉黑離離無情有恨何人見露壓煙啼千萬枝青光古人無紙惟取竹作䇿而書之故云盧同號玉川子唐詩人如月蝕詩茶歌皆世所稱道又同居東都愈為河南令愛其詩厚禮之嘗為月蝕詩以譏切元和逆黨愈稱其工又詩評云盧同月蝕詩韓愈進學解莫不拔地倚天向今欲活讀之如赤手捕長蛇不施控勒騎生馬急不得下莫可捉搦朱子云詩須是平淡不費句法混成如唐人玉川子輩句語雖險怪意思亦自有混成氣象新月仙宫雲箔卷露出玉簾鈎清光無所贈相憶鳳凰樓雲箔今簾箔也有所思當時我醉美人家美人顔色嬌如花今日美人棄我去青樓朱箔天之涯娟娟嫦娥月三五二八盈又缺翠眉蟬鬢生别離一望不見心斷絶心斷絶幾千里夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不見愁人心含愁更奏緑綺琴調髙絃絶無知音美人兮美人不知為暮雨兮為朝雲相思一夜梅花發忽到窗前疑是君美人以擬君上也美人家朝廷也姮娥青樓朱箔翠眉巫山雲湘江水緑綺琴暮雨朝雲蟬鬢俱見前注樓上女兒曲誰家女兒樓上頭指揮婢子挂簾鈎林花撩亂心之愁卷却羅袖彈箜篌箜篌歷亂五六絃羅袖掩面啼向天相思向天情不斷落花紛紛心欲穿心欲穿憑闌干相憶桞條緑相思錦帳寒直緣感君恩愛一回顧使我雙淚長珊珊我有嬌靨待君笑我有嬌娥待君掃鶯花爛漫君不來及至君來花已老心腸寸斷誰得知玉階羃歷生青草思君吟我思君兮河之壖我為河中之泉君為河中之青天天青青泉泠泠泉含青天天隔泉我思君兮心亦然此心復在天之側我心為風兮淅淅君身為雲兮羃羃此風引此雲兮雲不來風兮雲兮何悠哉與我身心雙徘徊壖説文江河之邊也按此及以上三章詩意皆君思致身不遇之詞也寄蕭三十三赴歙州昏期僕客揚州早春書寄一絶歙州今歙縣屬微州府淮上客情殊冷落蠻方春早客何如相思莫道無來使回鴈岑前好寄書回鴈峯在今衡州府城南逄鄭三逰山相逄之處花茸茸峭壁攢峰千萬重他日期君何處好寒流石上一株松孟東野名郊湖州武康人年五十得進士第性介少諧仕至溧陽尉郊為詩有理致最為愈所稱然思苦竒澀李觀亦論其詩曰髙處在古無上平處下顧二謝云又東野喫了飽飯思量到人不到處聯句中被他牽得亦著如此做又劌目鉢心物迎縷解鈎章棘句搯擢胃腎言得句之難也又唐人工於詩而陋於聞道郊詩有云食薺腸亦苦強歌聲無歡出門即有礙誰謂天地寬郊耿介之士雖天地之大無以容其身起居飲食有戚戚之憂是以卒窮至死又孟郊之詩憔悴枯稿其氣局促不伸退之之許如此何耶詩道本正大郊自為艱阻耳又韓能古文孟郊長於五言詩時號為孟韓唐之晚年詩人類多窮士如孟賈之徒皆以刻琢窮苦之言為上或謂郊島孰貧曰島為甚也曰何以知之以其詩知之郊曰種稻耕白水負薪斫青山賈曰市中有樵山客舍寒無煙耕底有甘泉釡中常苦乾孟氏薪米自足而賈家俱無以是知之耳然及其至也清絶髙逺殆非常人可到唐之詩稱此兩人為最至於竒警之句往往有之如雞聲茅店月人迹板橋霜則羈窮愁想之在目桞塘春水漫花塢夕陽遲則春物融怡人心和暢有言不能盡之意亦未可以為小道無取也張文潛集與韓愈李翺張籍别李翺韓公門人朱絃奏離別華燈少光輝物色豈有異人心顧將違客情殊未巳嵗華忽然微秋桐故葉下寒露新鴈飛逺逰起重恨送人念先歸夜集類羈鳥晨光失相依馬迹繞川水鴈書還閨闈常恐親朋阻獨行知慮非古薄命不惜十指絃為君千萬彈常恐新聲至坐使故聲殘棄置今日悲即是昨日歡將新變故易持故為新難青山有靡蕪淚葉長不乾空令後代人來掇幽思攢古樂府雜怨貧女鏡不明寒花日少容暗蛬有虛織短線無長縫浪水不可照狂夫不可從浪水多散影狂夫多異蹤持此一生薄空成萬恨濃怨別一別一回走志士白髮早在富易為容居貧難自好沉憂損性靈服藥亦枯稿秋風逰子衣落日行逺道君問去何之賤身難自保逰終南南山塞天地日月石上生髙峯夜留景深谷晝未明山中人自正路險心亦平長風驅松柏聲拂萬壑清到此悔讀書朝朝近浮名送淡公銅斗飲紅酒醉拍銅斗歌儂是柏浪兒飲則拜浪婆腳踏小船頭獨速舞短蓑笑伊漁陽操空持文章多間倚青竹竿白日奈我何銅斗東坡注史趙襄子使厨人操銅斗擊殺代王未詳漁陽操琴曲名短蓑不怕雨白鷺相爭飛短楫畫菰蒲鬬作豪橫歸笑伊水健兒浪戰無光輝不如竹枝兮射鴨無是非東坡注云溧陽有射鴨堂孟郊為尉時造逰子吟逰子將有行役母為縫衣慈者仁愛也故謂之慈母慈母手中線逰子身上衣臨行密密縫意恐遲遲歸難將寸草心報得三春暉和氣也所以發育草木故比慈母塘下行塘邉日欲斜年少早還家徒將白羽扇調妾木蘭花不是城頭樹那棲來去鴉征婦怨君淚濡羅巾妾淚滴露塵羅巾去在手今得隨妾身路塵如得風得上君車輪漁陽千里道近如中門限中門有時踰漁陽長在眼生在緑羅下不識漁陽道良人自戍來夜夜夢中到古別欲別牽郎衣問郎逰何處不恨歸日遲莫向臨卭去臨卭卓文君事古怨試妾與君淚兩處滴池水看取芙蓉花今年為誰死樂府戲贈陸大夫十二丈蓮葉未開時苦心終日卷春水徒蕩漾荷花未開展閨怨妾恨比斑竹下蟠煩寃根有笋未出土中已含淚䀶斑竹湘妃事見前行出門行長河悠悠去無極百齡同此可嘆息秋風白露沾人衣壯心凋落奪顔色少年出門將訴誰川無梁兮路無岐一聞陌上苦寒奏使我佇立驚且悲君今得意厭粱肉豈復念我貧賤時海風瀟瀟天雨霜窮愁獨坐夜何長驅車忽憶太行險始知逰子悲故鄉美人相思隔天濶長望雲端不可越手持琅玕欲有贈愛而不見心斷絶南山峩峩白石爛碧海之中波浩漫參辰出沒不相待我欲橫天無羽翰太行險琅玕見前注南山白石寧戚扣牛角而歌曰南山嶸白石爛長夜漫漫何時旦參辰見前注闕劉阮山劉晨阮肇剡溪人漢永平中入天台山採藥見溪口桃花流出遂尋源而入遇二女與為壻忽思歸二女送之出洞重尋無路矣芙蓉脂肉緑雲鬟罨畫樓臺青黛山千樹桃花萬年藥不知何事憶人間聞樂天左降江州殘鐙無焰影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒忩白自云使他人誦尚不堪况僕自誦之乎重贈商玲瓏兼寄樂天休遣玲瓏唱我辭我辭多是寄君詩明朝又向江頭別月落潮平是去時脞説云商玲瓏杭州歌者樂天作郡曰作歌與之元微之在越厚幣邀至月餘使盡唱歌所唱之曲作詩送行之詩兼寄樂天憶事夜深間到戟門邉桞繞行廊又獨眠明月滿庭池水渌桐花垂在翠簾前戟門見前注白樂天名居易其先太原人徙居下邽弱冠以詩謁顧况讀至野草詩曰野火燒不盡東風吹又生况曰吾謂斯文遂絶今復得子矣至元中擢進士拔萃仕至禮部尚書又居易文章精切然最工詩初頗以規諷得失及其多下偶俗好至數千篇初與元稹酬詠故曰元白與劉禹錫齊名又號劉白又居易在元和長慶與元稹俱有名最長於詩他文未能稱是唐以來所未有也又平園周氏曰香山詩語平易文體清駛闕若信手而成者問觀遺藁則竄定甚多新辭霽色鮮金殿秋聲脆管絃聖明千載樂嵗嵗似今年池上小娃撑小艇偷采白蓮回不解藏蹤迹浮萍一道開尋郭道士不遇郡中乞假來相訪洞裏朝元去不逄看院祗留雙白鶴入門惟見一青松藥爐有火丹應伏雲碓無人水自舂欲問參同契中事未知何日得相從朝元道經云三花聚項五氣朝元闕朝元老君之所蓋太上老君有金闕玄元之闕故云藥爐有火見前注參同契漢魏伯陽作參同契後宫辭淚盡羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚熏籠坐到明熏籠以竹為之所以焚香熏衣者也闕期不至紅燭青樽久延佇出門入門天欲曙星稀月落君不來煙桞籠籠鵲飛去竹枝詞題意見前瞿塘峽口冷煙低白帝城頭月向西唱到竹枝聲咽處寒猿晴鳥一時啼巴東船舫上巴西波面風生雨腳齊水蓼冷花紅簇簇江籬濕葉碧萋萋巴東今重慶府巴西今順慶府唐音卷十二
