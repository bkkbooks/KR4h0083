body:
  text: 唐音卷九元楊士𢎞撰張震注唐音遺響二沈雲卿擬古離别白水東悠悠中有西行舟舟行有返棹水去無還流奈何生别者戚戚懷逺遊逺遊誰當惜所悲會難收自君閴芳屣青陽四五遒皓月掩蘭室光風虛蕙樓相思無明晦長嘆纍冬秋離居人遲暮髙駕何淹留青陽春陽也芳屣履也長門怨月皎風泠泠長門次掖庭玉階聞墜葉羅幌見飛螢清露凝珠綴流塵下翠屏妾心君未察愁嘆處繁星長門掖庭玉階羅幌俱見前注銅雀臺在鄴中今彰德府魏志建安十二年作昔年分鼎地今日望陵臺一旦雄圖盡千秋遺令開綺羅君不見歌舞妾空來恩共漳河水東流無重回分鼎謂魏蜀吳三國鼎立於三方遺令陸機弔魏武文序曰曹操臨終遺令世子丕曰吾殁後媫妤妓女終夢臺上施六尺床張繐帳朝晡設節旌之屬月朝十五日輒向帳作妓女等樂時令登吾銅雀臺以望吾西陵墓田漳河水見前注古歌落葉流風向玉臺夜寒秋思洞房開水精簾外金波下雲母窗前銀漢回王階隂隂苔蘚色君玉履綦難再得璇閨窈窕秋夜長繡户徘徊秋月光燕姬綵帳夫容色秦子金爐蘭麝香北斗七星橫夜半清歌一曲斷君腸玉臺禮樂志遊閶闔觀玉臺水晶杜詩水晶之盤行素鱗又董偃有盤謂水石也又貨原云水晶琉璃之屬入火不焚或云千嵗水為之化雲母本草石也生土石間作片成層可拆明滑光白其大而瑩潔者今人或以飾燈籠亦古屏扇之遺事也金波前漢天文志曰月穆穆以金波注月光如金波之流履綦班媫妤賦思君兮履綦注履迹也燕姬左齊伐北燕人歸燕姬又舞鶴賦燕姬沮色巴童心恥秦子秦之公子也麝香説文獸如小麋臍冇香冬食柏夜食諸蟲為人所迫逐即自投髙崖舉爪剔出其香就縶自死猶拱四足保其臍綵帳夫容容色白詩夫容帳暖度春宵北斗見前注王少伯名昌齡江寧人太白冇闕密王昌齡左遷龍標詩他意未詳闕詩須而思精時謂王江寧昌齡以還四百年內曹劉陸謝風骨頓清須有太原王昌令魯國儲光羲頗從厥逰且兩賢氣同體别而王闕聲峻長歌行曠野饒悲風颼颼多蒿草繫馬倚白楊誰知我懷抱所是同袍者相逄盡衰老况登漢家陵南望長安道上有枯樹根下有石鼠窠高皇子孫盡千載無人過寶玉頻發掘精靈其奈何人生須信命有酒且長歌批云逹者白楊古詩白楊多悲風白楊木名古者墳上多種此木漢家陵前漢帝陵俱在長安西興平縣石鼠石中之鼠也高皇子孫漢髙帝之子孫也寶玉陵中之寶玉也精靈道書三魂亦名哀靈二名胎光一名幽精又言人死則有精靈齋心顔子心齋見前注女蘿覆石壁溪水幽濛朧紫葛蔓黃花娟娟寒露中朝飲花上露夜卧松下風雲英化為水光彩與我同日月蕩精魄寥寥天府空女蘿詩頍辨蔦與女蘿注在木為女蘿在草為兔絲雲英本草云母闕一名雲英抱朴子服五雲之法以桂闕水子玉他之以為水闕而服之三年老公反成童少年行西陵俠少年客過短長亭青槐夾兩路白馬如流星聞道羽書急單于寇井陘氣髙輕赴難誰顧燕山銘短長亭六帖十里一長亭五里一短亭白馬羽書俱見前注井陘史井陘縣韓信勝趙處燕山銘後竇憲降單于兵三十萬登燕然山刻石紀功而還塞上曲蟬鳴空山林八月蕭關道出塞入塞雲處處黃蘆草從來幽并客皆向沙場老莫學逰俠兒矜誇紫騮好空桑綱目云蕭瑀不生於空桑而遵無父之教又列子空桑山名伊尹生處在兾州又前郊祀志空桑琴瑟注地名出善木可為琴瑟蕭關道見前注幽并客幽州并州沙場古戰場也逰俠兒紫騮俱見前注和振上人秋夜懷士會白露傷草木山風吹下寒遙林夢親友髙興發幽巒郭外秋聲急城邉月色殘瑶琴多幽思更為客中彈采蓮越女作桂舟還將桂為楫湖上水渺漫清江初可涉摘取夫容花莫摘夫容葉將歸問夫壻顔色何如妾越女杜詩越女天下白又風俗記天下之女白不如越溪之女白肌晳桂楫元帝鳥栖曲沙棠作船桂為楫城傍曲秋風鳴桑條草白狐兔驕邯鄲飯來酒未消城北原平掣皂雕射殺空營兩騰虎回身却月佩弓弰邯鄲見前注皂雕詩皂雕寒始急又有皂雕賦説文大鷙鳥也弓弰説文弓袋也初日初日淨金閨先照床前暖斜光入羅幕稍稍親絲管雲髮不能梳楊花更吹滿杜詩既通金閨籍又謝眺金閨之諸彥注金閨即金馬門也又閨通作圭記畢門圭戶又特立小戶曰閨選宵月照中訪閨蓋女子未出適所處之户皆曰閨若東坡詩所謂還仙姝欵碧閨是也崔皓贈王威古三十羽林將出身常事邉春風吹淺草獵騎何翩翩插羽兩相顧鳴弓新上弦射麋入深谷飲馬投荒泉馬上共傾酒野中聊割鮮相看未及飲代馬寇幽燕烽火去不息隂山髙際天長驅救東北戰解城亦全報國行赴難古來皆共然事俱見前注贈輕車輕車見前注悠悠逺行歸經春涉長道幽冀桑始青洛陽蠶欲老憶昨戎馬地别時心草草烽火從北來邉城閉常早平生少相遇未得展懷抱今日杯酒間見君交情好遼西見前注燕郊芳歲晚殘雪凍邉城四月青草合遼陽春水生邊人正牧馬漢將日徴兵露重寶刀濕沙虛金鼓鳴寒衣著已盡春服誰為成寄語洛陽使為傳邉塞情燕國名太公所封之地今幽州之域與遼西接境相逄行妾年初二八家住洛橋頭玉户臨馳道朱門近御溝使君何暇問夫壻大長秋女弟新承寵諸兄近拜侯春生百子殿花發五城樓出入千門裏年年樂未休大長秋前百官志景帝更將行為大長秋將行秦官名秋者收成之時長者常久之義皇后之卿也掌宣宫命者百子殿未詳五城樓太白詩五城十二樓千門建章宫中有千門萬户俱見前注長門怨武帝陳皇后事見前注君王寵初歇棄妾長門宫紫殿青苔滿高堂明月空夜愁生枕席春意罷簾籠泣盡無人問容華落鏡中王家少婦未詳十五嫁王昌盈盈入畫堂自矜年最少復倚壻為郎舞愛前溪淥歌憐子夜長間來鬪百草度日不成妝王昌襄陽耆舊傳王昌字公伯為東平相散騎常侍早卒婦任城王曹子文女前溪淥子夜長俱曲名鬬百草歲時紀端午日四民鬬百草故今人亦有鬬百草之戲薊門行古薊州郡名今為遵化府邉城十一月雨雪亂霏霏元戎號令嚴人馬亦輕肥羌氐無盡日征戰幾時歸元戎大將也羌胡俱見前注幽州多騎射結髮重橫行一朝事將軍出入有聲名紛紛獵秋草相向角弓鳴事俱見前注崔國輔又名崔十二天寶中為集賢院學士詩評云其詩婉戀清楚深於諷味其樂府數章古人不及也香風詞洛陽梨花落如霰河陽桃葉生復齊坐怨玉樓春欲盡紅綿粉絮鳥收啼崔曙山下晚晴寥寥遠天淨溪路何空濛斜光照踈雨秋氣生白虹雲盡山色暝蕭條西北風故林歸宿處一葉下梧桐一葉下淮南子梧桐一葉落則天下知秋白虹事見前注古意緑笋總成竹紅花亦成子能當此時好獨自幽閨裏夜夜苦更長愁來劇如死劉方平春怨紗窗日落漸黃昏金屋無人見淚痕寂寞空庭春欲一作又晚梨花滿地不開門批云只一又字寫出春怨要識得他愁思唐音卷九
