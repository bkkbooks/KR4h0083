body:
  text: 唐音卷四元楊士𢎞編張震注唐詩正音三五言律詩臨川吳氏曰律雖始於唐然深逺瀟散不離於古為得非但句工語工字工而可也陳伯玉暉上人獨坐亭上人摩訶般若經佛言若菩薩一心行阿耨多羅三藐三菩提心不散亂是名上人增一經云有過改者名上人人律瓶沙王呼佛弟子為上人又古師云內有知德外有勝行在人之上名曰上人鐘梵經行處香牀坐入禪巖亭交雜樹石瀨瀉鳴泉水月心方寂雲霞思獨𤣥寧知人代裏疲病得攀緣梵浮圖書云清淨此言寂靜又云西域種號禪說文浮圖說靜也又禪有五禪若煩悟自心本來清淨元無煩惱無漏智性本自具足此心即佛依此而修者是為最上乘云禪石瀨說文急流也水月禪定有小定日定故春日登九華觀未詳其處白玉仙臺古丹丘别望遙山川亂雲日樓榭入烟霄鶴舞千年樹虹飛百尺橋還逢赤松子天路坐相邀仙臺長安志在長安西漢文帝作丹丘楚辭仍羽人於丹丘十洲記丹丘之山夜常明乃仙者所居之地虹橋或石橋名虹舒電施蓋謂橋如虹也又幽怪録載開元中正月望日葉仙駕虹橋與𤣥宗往廣陵觀燈赤松子見前注晚次樂鄉縣樂鄉綱目吳以陸抗都督諸軍治樂鄉按抗嘗守荆州到樂鄉或荆州屬又晋伐吳周方等卒兵八百度江襲樂鄉是亦江陵之地也故鄉杳無際日暮且孤征川原迷舊國道路入邉城野戍荒烟斷深山古木平如何此時恨噭噭夜猿鳴春夜别友人銀燭吐青烟金樽對綺筵離堂思琴瑟别路繞山川明月隱髙樹長河沒曉天悠悠落陽去此㑹在何年度荆門望楚荆域志荆門州楚地郡有山峯巒對峙如門故名𢎞之荆門記曰郡西沂江六十里南岸有山名荆門北岸有山名虎牙三山相對楚之西塞遙遙去巫峽望望下章臺巴國山川盡荆門烟霧開城分蒼野外樹斷白雲隈今日狂歌客誰知入楚來巫峽荆州志在夷陵其首尾百六十里章臺即章華臺見前注巴國三巴之地到此而盡荆門即荆州也狂歌論語楚狂接輿歌而過孔子曰鳳兮鳳兮何德之衰入楚古荆州為南楚杜必簡必簡字審言襄州人仕武氏為著作佐郎入為國子監主簿修文館學士少與李嶠崔融蘇味道為文章四友和韋承慶過義陽公王山池承慶韋思經之子武氏敕代父為天官侍郎徑轉孤峯逼橋危缺岸妨玉泉移酒味石髓換粳香綰霧青絲弱牽風紫蔓長猶言宴樂少别向後池塘青絲子美詩天棘蔓青絲注謂天棘今天門冬是也石髓見前秋夜宴臨津鄭明府宅行止皆無地招尋獨有君酒中堪纍月身外即浮雲霜白宵鐘徹風清曉漏聞坐攜餘興往還似未離羣浮雲論語富貴於我如浮雲霜白霄鐘徹今仙樂也喬潭霜鐘賦南陽山有九鐘霜降則鳴送崔融君王行出將書記逺從征祖帳連河闕軍麾動洛城旌旃朝朔氣笳吹夜邉聲坐覺烟塵掃秋風古北平書記翰苑新書魏有太祖以陳琳為司空軍謀祭酒管書記室掌朝覲䀻門慰勞祭祀祈祝之文與號令升絀之事祖帳祖别記張帳幔於途以飲別也河闕洛城河水所經而山有伊闕之名故云河闕也洛城今洛陽縣屬河南府古北平地域志幽州為北平又遵化為古北平早春逰望復齊漫録以為韋蘇州和陸丞逸詩云轉作照古作苦獨有宦遊人偏驚物候新雲霞出海曙梅栁度江春淑氣催黃鳥晴光轉緑蘋忽聞歌古調歸思欲霑巾宦遊王吉曰長卿久宦遊不遂所用雲霞出海曙一聯集云和晋陵丞早春遊望此二句蓋晋陵遊望之景黃鳥一名倉庚齊人謂之搏黍爾雅云蘋萍之大者也本草云謂之芣菜沾巾漢王莽逐王閎閎泣元后以手巾拭之沈雲卿名佺期相州內黃人上元二年鄭益榜進士逰少林寺在洛陽嵩嶽傳燈録達摩禪師集止嵩山少林面壁九年長歌遊寶地徙倚對珠林鴈塔風霜古龍池歲月深紺園澄夕霽碧殿下秋隂歸路烟霞晚山蟬處處吟寶地珠林佛經黃金七寶為地摩尼珠為林徙倚楚詞徙倚而遙思注曰遷移倚之也鴈塔佛在西域有比丘見羣鴈飛乃曰此鴈可充我食鴈即墮地佛曰此鴈王也不可食乃為之瘞鴈建塔又長安城東慈恩寺亦有鴈塔每進士及第俱于此題名以為盛事龍池見前注紺園謂園中樹葉紺碧夕陽照之如水色之澄霽碧殿縹瓦為屑早發平昌島山在海中故曰島平昌未詳所在解纜春風後鳴榔曉漲前陽烏出海樹雲鴈下江烟積氣衝長島浮光溢大川不能懷魏闕心賞獨泠然鳴榔說榔船板也陽烏日也日中有金烏故云魏闕禮正月之吉始和懸治象之法于象魏今闕也又左宫門雙闕懸法象其狀巍然髙大故曰魏闕夜宿七盤嶺七盤嶺在達州永陸縣獨遊千里外髙臥七盤西山月臨忩近天河入戶低芳春平仲緑清夜子規啼浮客空留聽褒城聞曙雞平仲草名褒城見前注被試出塞十年通大漠萬里出長平寒日生戈劍隂雲拂斾旌飢烏啼舊壘疲馬戀空城辛苦臯蘭北邊塵損漢兵長平括地志在上黨泫氏縣即秦坑趙卒四十萬之地臯蘭括地志古西羌地秦置隴西郡漢屬金城郡臯蘭山名郡因山得名戈㦸兵仗之名說文云戈平頭㦸也徐謂㦸小枝上向則為㦸平之則為戈一曰㦸偏距為戈旌說文析羽注旌首也所以精進士卒也又析羽謂之析鳥羽為之其竿頭則綴以旄牛尾斾說文繼旐之旗沛然而垂王摩詰詩評律詩如王維韋應物輩亦自有蕭散氣從岐王過楊氏别業岐王名範𤣥宗之弟也開元二年出刺濟北揚子談經處淮王載酒過興䦨啼鳥緩坐久落花多徑轉回銀燭林開散玉珂嚴城時未啓前路擁笙歌揚子指揚雄也雄家貧嗜酒好事者載灑從逰然揚雄非楊子恐別有所指及淮王皆未詳或云淮王指岐王而言玉珂今說文石次玉者又云瑪瑙又螺屬生海中又爾雅翼云其大者珂黃黑色其骨可以飾馬勒故云玉珂同崔員外秋宵寓直禁中有宿也建禮髙秋夜承明候曉過九門寒漏徹萬井曙鐘多月迥藏珠斗雲消出絳河更慚衰朽質南陌共鳴珂建禮門名漠官典職曰尚書郎晝夜更直五日於建禮門外承明廬名漢嚴助傳君厭承明之廬張晏曰承明廬在石渠門外直宿所止故曰廬也九門關門逺郊門近郊門國門臯門又曰中門雉門應門又曰南門亦曰正門路門又曰畢門又曰虎門早朝柳暗百花明春深五鳳城城鴉睥睨曉宫井轆轤聲方朔金門侍班姫玉輦迎仍聞遣方士東海訪蓬瀛五鳳城太白詩天上白玉京十二樓五城五鳳城者猶言五鳳樓之類也睥睨杜詩睥睨登哀柝注女墻闕前眼處博雅作埤堄轆轤見前注方翔東方翔也本傳字曼倩平原厭次人武帝初即位徴天下賢良文學材力之士朔上書自陳上偉之今待詔金馬門金門楊雄傳歷金門上王堂注今班門後更魯班門為金馬門班姬班媫妤也孝成紀帝初即位選入後宫為媫妤帝逰後庭欲與同輦載媫妤辭不就載上善其言而止輦者步車也司馬法曰夏曰余車殷曰胡奴車周曰輕車言玉輦則以玉飾而言其貴也遣方士漢武元狩二年帝始祀竈遣方士求神仙人始皇二十八年遣徐市入海求神仙方士蓬嬴皆見前注晚春嚴少尹諸公見過松菊荒三徑圖書共五車烹葵邀上客看竹到貧家雀乳先春草鶯啼過落花自憐黃髮暮一倍惜年華三徑三輔决録蔣詡於竹下閒三徑惟與羊仲求仲遊又陶靖莭歸去來辭三徑就荒松菊猶存五車莊子云惠施多方其書五車人漢髙祖紀云何入秦丞相府取文籍圖書藏之葵爾雅承露也大前小葉華紫黃色詩七月烹葵及菽看竹晉王徽之字子猷吳中一士大夫家有好竹欲看之便出坐輿造竹下諷嘯良久主人灑掃請坐不願而去雀乳烏獸孳尾注乳化曰孳人說文人及鳥獸生子曰乳黃髮詩詢兹黃髮又黃髮台背注老也送東川李使君萬壑樹參天千山響杜鵑山中一夜雨樹杪百重泉漢女輸賨布巴人訟芋田文翁翻教授不敢倚先賢漢女潼州漢為廣漢郡故曰漢女賨說文南蠻賦也賨者率其所有不切責之也後漢南蠻傳咸令大人輸布一匹小口二丈謂之賨布又廣安府古為賨成風俗通曰賨人剽勇賨人春秋時屬巴郡故曰巴人訟芋田訟其種芋之田也文翁本傳為蜀郡太守始興學校以化蜀民也送楊長史赴果州果州春秋戰國為巴子國秦滅之立巴郡唐曰果州今紹慶府褒斜不容幰之子去何之鳥道一千里猿聲十二時官橋祭酒客山木女郎祠别後同明月君應聽子規褒斜二谷名見前注幰集韻云車上張繒曰幰史梁鮑泉為通直郎常乘髙幰繖蓋不容幰謂谷險窄不能容車也之子指揚長史也鳥道太白詩西當太白有鳥道注謂道徑微窄止可容鳥過而已又南中八志曰鳥道四百里以其險絶獸猶無蹊特上有飛鳥之道耳祭灑客漢法上客曰祭酒女郎祠者果州志州有金泉山山中有觀乃仙女謝自然上升之處鄉人祠之送友人南歸萬里春應盡三江鴈亦稀連天漢水廣孤客郢城歸郎國稻苗秀楚人菰米肥懸知倚門望遙識老萊衣三江唐仲初吳都賦注松江下七十里分流東北入海者為婁江東南流者為東江并松江為三江其地今亦名三江口吳越春秋范蠡乘舟出三江口者是也郎國地名說文魯亭也春秋桓公及齊人戰于郎人莊公築臺于郎漢水見前注郢城今郢州古荆楚也春秋為郊郢北魏立郢州菰米見前注倚門望左傳齊人淖齒弒王王孫賈失王處及歸其母曰汝朝去晚來吾以倚門而望老萊親衣楚老萊子年七十著五色斑斕衣戲于親前以娛其送丘為下第歸江東金陵古云江左又云江東蓋大江之東也憐君不得意况復柳條春為客黃金盡還家白髮新五湖三畝宅萬里一歸人知爾不能薦羞稱獻納臣黃金盡古詩黃金然桂盡五湖見前注丘為吳人故云知爾謂相知不能薦也一作知禰謂漢孔融薦禰衡事獻納臣漢班固傳注云朝夕論思口月獻納出入諷諌蓋諌官之職貴在獻納終南别業中嵗頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑滯還期批云其資如此故自難及南山陲終南山之址也李肇國史補曰王維好佛得宋之問輞川别業山水絶勝今南山清涼寺是其地也歸嵩山作初學記嵩高山者五嶽之中嶽也其山三十六峯東有太室西有少室嵩其總名也清川帶長薄車馬去閒閒流水如有意暮禽相與還荒城臨古渡落日滿秋山迢遞嵩高下歸來且閉關薄說文林薄也又香材草曰薄閒閒詩桑者閒閒兮注閒閒安閒之意也嵩高下白虎通中央之嶽獨加髙字者何中央居四方之中而高故曰嵩高山終南山雍録終南山長安之南山也橫亘中南面西起秦隴束徹藍田凡八百里太乙近天都連山到海隅白雲回望合青靄入看無分野中峯變隂晴衆壑殊欲投人處宿隔水問樵夫太乙南山中山名人分野天文志天有十二次日月之所躔也地有十二辰王侯之所國周保章氏以星土辨九州所封之域皆有分星以觀妖祥故有分野之說也漢江臨泛漢陽府漢口即漢江所出之水書江漢朝宗于海蓋漢水自此出與江合楚塞三湘接荆門九派通江流天地外山色有無中郡邑浮前浦波瀾動逺空襄陽好風日留醉與山翁三湘寰宇記湘潭湘鄉湘源謂之三湘即今之長沙府也九派通洞庭古之九江所合處故九派通也襄陽仙翁俱見前注送張道士歸山先生何處去王屋訪茅君别帝留丹訣驅雞入白雲人間苦難住天上復離羣當作遼城鶴仙歌使爾聞王屋述異記十大洞天之一洞周回一萬里名小有清虛之天在洛京茅君列仙傳茅濛字初成隱華山修道始皇時龍駕白日升天子三人曰盈曰固曰震得道于金陵句曲山即今之茅山也遼城鶴仙傳丁令威鶴駕也化為白鶴集遼東華表柱上歌曰有鳥有鳥丁今威去家千嵗今來歸送李判官赴江東判官别駕之職太守之佐也聞道皇華使方隨皂蓋臣封章通左語冠冕化文身樹色分揚子潮聲滿富春遙知辨璧吏恩到泣珠人皇華詩皇皇者華注佐也皇皇猶煌煌也華草木之華也此遣使臣之詩也皂蓋臣太守也太守之車朱轓皂蓋故云封章謂封事也左語未詳或謂江束為江左故曰左語文身史記關也吳太伯奔荆蠻文身斷髮示不用耳揚子揚子江也富春今杭州府富春縣也辨璧吏未詳泣珠人見前注送嚴秀才還蜀寧親為令子似舅即賢甥别路經花縣還鄉入錦城山臨青塞斷江向白雲平獻賦何時至明君憶長卿寧親詩害浣害否歸寧父母注歸寧問安也似舅宋桓𤣥聞軍起曰何無忌劉牢之之外甥酷似其舅共舉大事何謂無成花縣晋潘嶽字安仁出為河陽令滿縣種桃李花人謂之花縣錦城蜀郡號錦城獻賦前武紀司馬相如字長卿獻子虛賦帝讀而善之曰朕獨不得與此人同時哉時楊意為狗監侍上因薦之得召見送平淡然判官不識陽關路新從定逺侯黃雲斷春色畫角起邉愁瀚海經年别交河出塞流須令外國使知飲月支頭陽關在雍州城古流沙地又即玉門關名定逺侯漢班超封定逺侯畫角車服儀制云角前世事書所未載或云北方吹以驚中國之馬也又黃帝內傳𤣥女請製角二十四以警衆又通禮儀纂蚩尤帥魑魅與黃帝戰始命吹角作龍鳴以禦之軍中置以司昏曉故角為軍容也瀚海交河見前注月支頭大月氏國治藍氏城冒頓單于攻破之而老上單于殺月氏以其頭為飲器送岐州源長史歸握手一相送心悲安可論秋風正蕭索客散孟嘗門批云曲盡别時悲惋之情故騎通槐里長亭下槿原征西舊旌節從此向河源孟嘗門史孟嘗君齊相田文也封孟嘗門下常有客三千人槐里在長安長安志渭水自桓州郡縣界束過槐里縣南槿原未詳按此詩維與源同在崔常侍幕作贈時常侍巳死故云按崔常侍嘗為河西節度使此云崔常侍毌乃希逸歟山居即事寂寞掩柴扉蒼茫對夕暉鶴巢松樹遍人訪蓽門稀嫩竹含新粉紅蓮落故衣渡頭燈火起處處采菱歸批云自是維詩冬夜書懷獨坐悲雙鬢空堂欲二更雨中山果落燈下草蟲鳴白髮終難變黃金不可成欲知除老病惟有學無生白髮難變度人經云髮白皮黑不能變災危之至天資終不可黑也黃金不成前武紀李少君以祠竈却老方見上尊之少君匿其年言祠竈則致物丹砂可化為黃金違萊仙者可見因之以封禪則不死學無生見前注觀獵風徑角弓鳴批云氣概將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新豐市還歸細柳營回看射鵰處千里暮雲平新豐市渭城俱見前注細柳漢文紀曰地名在長安西三輔黃圖曰細柳倉在渭水北方古徼西張揖曰在昆明池南今柳市是索隱曰在城門外阿房宫西北維括地志云細柳倉在雍州咸陽縣西南即周亞夫次細柳文帝不得入棘門之地也賈幼鄰名至擢明經第杜子美詩注云至先世掌絲綸又至父曾嘗於開元間掌制誥至從𤣥宗幸蜀為中書舍人帝傳位肅宗嘗撰册既進槀帝曰昔先帝誥命乃父為之辭今兹命册人爾為之兩朝盛典出卿家父子可謂繼美矣仕至禮部侍郎南州有贈二首今廣西桂林府也謝靈運山詩南州實炎德桂樹凌寒極浦三春草髙樓萬里心楚山晴靄碧湘水暮流深忽與朝中舊同為澤畔吟停杯試北望還欲淚霑襟楚山湘水見前注澤畔吟楚辭行吟澤畔越井人南去湘川水北流江邉數杯酒海內一孤舟嶺嶠同仙客京華即舊逰春心將别恨萬里共悠悠孫逖博州武水人開元元年舉哲人竒士隱倫屠釣第一人嘗為中書舍人典詔誥為代言言辭最為精密張九齡視其草欲易一字卒不能也宿雲門寺閣雲門寺在今紹興府㑹稽縣南三十一里今名雍熙為州之偉觀王子敬居此有五色祥雲因建寺謂之雲門香閣東山下烟花象外幽懸燈千嶂夕卷幔五湖秋畫壁餘鴻鴈紗忩宿斗牛更疑天路近夢與白雲逰東山在上虞縣西南四十五里即謝安隱處祖詠開元十一年杜綰榜進士顯韓少府水亭梅福幽棲處佳期不忘還鳥啼當戶竹花繞傍池山水氣侵階冷藤隂覆坐閒寧知武陵趣宛在市朝間梅福列仙傳字子真九江人補南昌尉王莽専政一朝棄妻子去變姓名為吳市門卒人傳以為仙去又瑞州圖經載子真故宅在高安之豐安鄉旁有尉山及梅仙觀武陵桃源事見前注此云梅福幽樓處者蓋唐縣尉皆稱少府故以擬梅福也蘇氏别業别業居幽處到來生隱心南山當戶牖灃水映園林竹覆經冬雪庭昏未夕隂寥寥人境外閒坐聽春禽南山即終南山灃水雍州地域志出鄠縣距隂山南入于㴘留别盧象朝來已握手宿别更傷心灞水行人渡商山驛路深故情君且足謫宦我難任直道皆如此誰能淚滿襟灞水古曰滋水雍州地域志秦穆公霸世更名以顯霸功水出藍田縣㑹滻水滻水北入于渭商山在上洛縣西南四皓隱處江南旅情楚山不可極歸路但蕭條海色晴看雨江聲夜聽潮劍留南斗近書寄北風遙為報空潭橘無媒寄洛橋劍留南斗近晋張華傳豐城縣獄有劍其氣常射斗牛儲光羲漢陽即事荆州志春秋時鄭子國今為漢陽府楚國千里逺孰知方寸違春逰歡有客夕寢賦無衣江水帶冰泮桃花隨雨飛九歌有深意捐珮乃言歸有客詩有客有客亦白其馬注此宋公來朝將去而王燕餞之詩也無衣詩三體詩注詩豈曰無衣與子同仇九歌楚辭屈子有九歌朱子序曰九歌者屈原之所作也屈原既逐因楚人祀神之歌而更定之寄其忠君愛國眷戀不忘之意也捐佩九歌湘夫人捐余玦兮江中遺余佩兮澧浦題陸山人樓暮聲雜初鴈夜色涵早秋獨見海中月照君池上樓山雲拂髙棟天漢入雲流不惜朝光滿其如千里遊臨江亭古木嘯寒禽層城帶夕隂梁園多絳樹楚岸盡楓林山際豈為險江流長自深平生何以恨天地本無心梁園見前注天地無心朱子四書天何言哉注云天地無心而成化也詠山泉山中有流水借問不知名映地為天色飛空作雨聲轉來深澗滿分出小池平恬淡人無見年年長自清孟浩然與諸子登峴山峴山寰宇記在襄陽府漢上去襄陽十里人事有代謝批只此一句便見感慨往來成古今江山留勝跡我輩復登臨水落魚梁淺天寒夢澤深羊公碑尚在讀罷一霑襟批不必苦思自然好苦思復不能及代謝髙誘曰代更謝叙也漁染夢澤見前注羊公碑晉羊祜出鎮南夏甚得民心後卒百姓為建碑於峴山望者莫不墮淚杜預名墮淚碑詩評云此詩起得髙古略無粉色而情境俱肖悲慨勝於形容真峴山詩後有能言者亦在下風臨洞庭洞庭湖在巴陵縣西北吞赤沙南連青草橫亘七八百里乂風士記鼎澧沅湘合諸蠻黔南之水匯于洞庭至巴陵與荆江合八月湖水平涵虛混太清氣蒸雲夢澤波撼嶽陽城批云吳楚東南坼乾坤日夜浮非不佳但不知後聫能作麼生道否此是自然髙處欲濟無舟楫端居恥聖明坐觀垂釣者徒有羡魚情批云托興可傷詩評云起得渾然稱題蒸撼偶然不是下字而氣槩橫絶朴不可易端居感興深厚味之言有盡而意無窮歸終南山批云亦其最得意之詩最失意之日故首為明皇誦之北闕休上書南山歸敝廬不才明主棄多病故人踈白髮催年老青陽逼嵗除永懷愁不寐松月夜忩虛批云但人有此起無此結每見短氣宿武陽川川暗夕陽盡孤舟泊岸初嶺猿相叫嘯潭影似空虛就枕滅明燭扣舷聞夜漁雞鳴問何處人物似秦餘批云隨意唱出便無俗意秦餘晋人入桃源見有人家皆云先世避秦入此今不知為何時也宿桐廬江桐廬縣名今屬嚴州山暝聽猿愁滄江急夜流風鳴兩岸葉月照一孤舟建德非吾土維揚憶舊逰還將兩行淚遙寄海西頭批云一孤似病天趣自得建德地域志揚州之境漢立新定等縣後改新安郡隨置睦州改遂安郡唐析桐廬為嚴州宋改建德軍今仍嚴州建德乃帶管縣維揚揚州也禹貢九州之一春秋屬吳越漢為荆王吳王國景帝更為江都國東漢為廣陵郡唐為揚州也夜渡湘川客行貪利涉夜裏渡湘川露氣聞芳杜歌聲識采蓮榜人投岸火漁子宿潭烟行旅時相問涔陽何處邊批云清潤自喜湘川地域志自長沙以南皆為湘水此云湘川不知所指涔陽荆州之域屬楚地今州地即漢武之零陽縣也吳立天門郡晉置南平郡陳廢郡置松州尋改澧明州在水之北故名唐改澧陽郡後為澧州今因之芳杜杜若香草也見前注采蓮曲歌名武陵泛舟武陵川路狹前棹入花林莫測幽源裏仙家信幾深水回青嶂合雲度緑溪隂坐聽猿閒嘯彌清塵外心武陵荆州之域殷國為蠻蛋所居戰國屬楚漢為武陵郡隋改辰州唐為朗州宋改鼎州後升常德府今因之仙家指桃源言永嘉浦逢子容永嘉縣名今屬溫州府浦其在縣之浦也逆旅相逢處江村日暮時衆山遙對酒孤嶼共題詩廨宇鄰鮫室人烟接島夷鄉園萬餘里失路一相悲批云衆山孤嶼且不犯時景句而淘洗欲盡孤嶼鮫室見前注島夷書島夷卉服秦中寄逺上人一丘常欲臥三徑苦無資北上非吾願東林懷我師黃金然桂盡壯志逐年衰日夕涼風至聞蟬但益悲三徑蔣詡三徑見前注東林寺名晉慧逺所造廬山記謝靈運即東林譯涅槃經然桂戰國䇿蘇秦曰楚國之食貴於玉薪貴於桂謁者難見如鬼王難得見如天地今臣食玉灼桂因鬼見帝晚春二月湖水清家家春鳥鳴林花掃更落徑草踏還生酒伴來相命開尊共解酲當杯已入手歌妓莫停聲批云亦自豪宕家家春鳥鳴又别諸語情屬不淺赴京途中遇雪迢遞秦京道蒼茫嵗暮天窮隂連晦朔積雪遍山川决不為小兒語求工者落雁迷寒渚飢烏噪野田客愁空竚立不見有人烟嵗除有懷月令是月日窮于次月窮于紀星回于天嵗且更始故曰除夕迢遞三巴路羇危萬里身亂山殘雪夜孤燭異鄉人漸與骨肉逺轉於僮僕親那堪正漂泊來日嵗華新批云一年將盡夜萬里未歸人非不美後聫餒矣又平生客中除夕誦此不復更作上十字尤和合下十字痛快能言人衆妙集中以為崔塗詩未知孰是但孤獨改孤燭似是也裴司士見尋府僚能枉駕家釀復新開落日池上酌清風松下來厨人具雞黍稚子摘楊梅誰道山翁醉猶能騎馬回批云大巧若拙楊梅果名異物志楊梅大如彈丸五月熟其味酸甜有紅紫白三種紫者最勝山翁即山簡見前注梅道士水亭傲叟非凡叟名流即道流隱居不可見髙論莫能酬水接仙源近山藏鬼谷幽再來迷處所花下問漁舟批好又得語不凡得語故異鬼谷在荆州仙源縣桃源桃源與荆州亦相近故云事見前注過故人莊故人具雞黍邀我至田家緑樹村邊合青山郭外斜開筵面場圃把酒話桑麻待到重陽日還來就菊花批每以自在陵厲者極是雞黍漢書范式與友張元伯别薯秋為期元伯九月十五日殺雞為黍待之果至話桑麻陶詩但道桑麻長重陽九月九日也陶淵明嘗於九日無酒出宅已采菊盈把頃之白衣人送酒至髙達夫送劉評事充朔方判官賦得征馬嘶評事六典宣帝初於廷尉置左右平後光武省左平惟有左平掌平决詔獄魏晋直謂之廷尉評隨置大理評事唐置評事十員掌書移推覆征馬嘶樂府名征馬向邉州蕭蕭嘶未休思深應帶别聲斷為兼秋岐路風將逺關山月共愁贈君從此去何日大刀頭關山月古曲名大刀頭古詩何當大刀頭謂刀頭有環也贈杜二拾遺杜二即子美達時為西川節度故贈拾遺唐武氏置左右拾遺二官以掌供奉諷諫開元以來尤為清選左屬門下省右屬中書省即古司諫之官傳道招提客詩書自討論佛香時入院僧飯屢過門聽法還應難尋經剩欲翻草𤣥今已畢此外復何言招提釋書招提菩薩皆古佛名故寺謂之招提或名伽藍或名道場其實一也草𤣥漢揚雄字子雲蜀郡成都人世以農桑為業至雄少好學其意欲求文章成名於世以為經莫大於易故作太𤣥岑參滻水東店送唐子歸嵩陽滻水在長安出灞陵縣入于灞水嵩陽嵩州也野店臨官路重城壓御堤山開灞水北雨過杜陵西歸夢秋能作鄉書醉懶題橋回忽不見征馬尚聞嘶送張子尉南海南海揚州之域百粵之地趙他自立為南海王至漢武帝始定為南海郡今廣州府是也不擇南州尉髙堂有老親樓臺重蜃氣邑里雜鮫人海暗三山雨花明五嶺春此鄉多寶玉慎莫厭清貧蜃氣說文大蛤也蚌屬月令雀入大水化為蜃乂史天官書蛇為蜃似蛟無足乂海旁蜃氣似樓臺三山番山禺山堯山乂羅浮山三山之總名五嶺州學記五嶺峙其北謂大庾始安臨賀桂陽揭揚也多寶玉謂廣州所産有珠香犀象玳瑁之屬也比詩謂不以官小任逺而為之者蓋在求祿以養親也送張都尉東歸漢趙過為搜粟都尉白羽緑弓弦年年只在邉還家劍鋒盡出塞馬蹄穿逐邊西踰海平胡北到天封侯應不逺燕頷豈徒然西踰海或西域有西海也到天言北地天山也燕頷漢班超虎頭燕頷飛而食肉此萬里侯相也後以功封定逺侯送揚州王司馬隋改治中别駕為長史司馬即漢郡丞之職掌兵馬君家舊淮水水上到揚州海樹青官舍江雲黑郡樓東南隨去鳥人吏待行舟為報吾兄道如今已白頭送王七録事赴虢州録事漢郡主簿也晉為督善郵掌總録諸曹文簿舉彈惡其後刺史有軍而開府者並置之虢州禹貢豫州之域唐改為陕州置録事早嵗即相知嗟君最後時青雲仍未達白髮欲成絲小店關門道長河華嶽祠𢎞農民吏待莫遣馬行遲青雲須賈曰不意君致身青雲之上關門函谷關也長河水經曰歷華山潼關過而曲行華嶽華山乃西嶽嶽在華隂縣五千仞上有西嶽祠字𢎞農地域志虢州靈寶縣古𢎞農故地也送懷州吳别駕懷州兾州之域杜預注云在晉山之南河之北天寶中改為河內郡乾元中復為懷州柳枝古人折柳送别王仁裕開元遺事曰長安東有灞陵橋於此送别灞上柳枝黃壚頭酒正香春流飲去馬暮雨濕行裝驛路通函谷州城接太行覃懷人總喜别駕得王祥灞上長安霸水上壚說文賣酒區也前食貨志令官作酒以三千石為一均率開一壚以賣函谷關有二自陕州至靈寶縣南十里秦函谷也自靈寶三萬餘里至河南府新安縣東一里漢函谷也武帝為楊僕移於此太行山名地域志在河內郡北趨於濟源邑界起懷州河內縣北至幽州凡綿亘十州覃懷書覃懷底繢注覃懷地名地志河內懷郡有懷縣今懷州也又曽氏曰潭懷平地當在孟津之東太行之西王祥字休微晉吕䖍有佩刀相者以為必登三公䖍語别駕王祥曰卿有公輔之量以相與趙少尹南亭送鄭侍御江亭酒甕香白面繡衣郎砌冷蟲喧坐簾疏月到牀鐘催離思急絃逐醉歌長關樹應皆落隨君滿路霜繡衣郎御史也漢武帝謂徐復齊武王演傳注繡衣尊寵之也滿路霜通典御史為風霜之任故云虢宫送河丞市馬關樹晚蒼蒼長安近夕陽回風醒别酒細雨濕行裝習戰邊塵黑防秋塞草黃知君市駿馬不是學燕王防秋胸奴傳伺人出每以鴈為候故邉上戍兵每以秋為防守備燕王史燕昭王即位卑身厚幣以招賢者問郭隗曰古之人君有以千金使㳙人求千里馬者馬已死買其骨五百金而返君怒㳙人曰死馬且買之况于生者乎馬今至矣不期年而千里馬至者三也髙宫谷招鄭鄠谷口來相訪空齊不見君澗花然暮雨潭樹暖春雲門徑稀人跡簷峯下鹿羣衣裳與枕席山靄碧氛氲鄭子真隱谷口此借以比鄭鄠晚發五溪蜀先主於五溪立黔安郡今肇慶府也五溪者酉溪辰溪巫溪武溪元溪客厭巴南地鄉鄰劍北天江村片雨外野寺夕陽邉芋葉藏山徑蘆花間渚田舟行未可住乘月且須牽肇慶府又名黔南且有巴江其曰巴南者或以此得名也劍北古之創州郡漢廣漢郡梓潼縣也後改曰劒州人謂劒陽廣元縣曰劍外五溪必與相連故曰劍北云武威春暮聞宇文判官西使還已到晉昌武威古雍州域即西戎地漢初為胸奴右地後為武威郡唐改涼州今為西涼府片雨過城頭黃鸝上戍樓塞花飄客淚邊柳挂鄉愁白髮悲明鏡青春換敝裘君從萬里去聞已到瓜州瓜州雍州之域亦古西戎地戰國時為鳥縣月支居之漢為晉昌郡隋立為瓜州殷遙潤州人開元中為參軍友人山亭故人從薄宦往往涉清溪鑿牖對山月褰裳拂澗霓逰魚逆水上宿鳥向風栖一見桃花發能令秦漢迷王灣開元二年常無名榜進士江南意三體詩作次北固山下客路青山外行舟渌水前潮平兩岸闊風正一帆懸海日生殘夜江春入舊年鄉書何處達歸鴈洛陽邊常建逰破山寺寺在蘇州府常熟縣清晨入古寺初日照髙林竹徑通幽處禪房花木深山光恱鳥性潭影空人心萬籟此俱寂惟聞鐘磬音米子語録曰歐陽永叔最喜一人送行詩兩句云晚日都門道微凉草樹夭又喜常建詩曰竹徑通幽處禪房花木深公自言平生要道此語不得今人都不識這意思只要鬬事使難字便謂之好泊舟盱眙揚州域西漢時盱眙縣東晉盱眙郡唐西楚州宋昭信軍今屬泗州泊舟淮水次霜降夕流清夜久潮侵岸天寒月近城平沙依鴈宿候館聽雞鳴鄉國雲霄外誰堪羇旅情淮水繞城下過魏晉以來壽陽旴眙為淮南之本原皇甫茂政名冉丹陽人皇甫曽之兄天寶間進士仕至右補闕送韓司直後魏有大理司直位在正監上不署曹事唯覆理御史撿校事置六人掌承制出使推覆若寺有疑獄則參議之逰吳還適越來往住風波復送王孫去其如芳草何岸明殘雪在潮滿夕陽多季子留遺廟停舟試一過王孫蓋言古王者之孫如公孫之類也詳見前注季子季札皇覽冢墓記季子墓在毗陵縣暨陽至今吏氏祠之途中送權曙二兄三體詩以為皇甫曽詩淮海風濤起江關幽思長同悲鵲繞樹獨作鴈隨陽山晚雲和雪汀寒月映霜由來濯纓處漁父愛滄浪淮海揚州郡古名淮海鵲繞樹曹操詩云月明星稀鳥雀南飛繞樹三匝無枝可依應隨陽尚書注云隨陽之鳥鴻鴈之屬滄浪楚詞漁父歌曰滄浪之水清兮可以濯我纓皇甫孝常名曾丹陽人天寶十載成進士送李中丞歸本道上將宜分閫雙旌復出秦關河三晉路賔從五原人孤戍雲通海平沙雪度春酬恩看玉劍何處有烟塵分閫漢文紀閫以內寡人制之閫以外將軍制之又陸贄奏議云選將而往分之以閫雙旌唐淮西用兵劉沔夜行有以雙燭導曰君當大貴後果至大將常有雙燭在雙旌上五原郡名見前注三晉春秋韓趙魏晉之三卿後滅晉分其地故云三晉也五原雍州之域春秋戎狄之地秦為上郡之北境漢屬五原郡人五原本秦九原郡地在榆林漢元初二年更名五原晚至華隂臘盡促歸心行人及華隂雲霞仙掌出松柏古祠深野渡冰生岸寒川燒隔林溫泉看漸近宫樹晚烟沈華隂邑名在華州東六十里仙掌王涯太華仙掌注云西嶽太華之首峯有五崖自下逺望偶為掌形古祠𤣥宗太華銘云壇埸殿宇無代不修一嵗三祠無嵗而缺溫泉即華清宫見前注嚴正文酬劉員外見寄員外劉長卿也蘇耽佐郡時近出白雲司藥補清羸疾忩吟絶妙辭柳塘春水漫花塢夕陽遲欲識懷君意朝朝訪楫師蘇耽神仙傳蘇仙公也得修真之術隱於郴州髙秀之峯後乘鶴仙去以比劉長卿白雲司黃帝時秋官為白雲司也清羸疾晉廣樂有凊嬴疾絶妙詞魏曹操與楊修觀曹娥碑曰黃絹幼婦外孫虀臼修解曰黃絹色絲也幼婦少女也外孫女子也虀臼受辛也蓋絶妙好辭四字也楫師吳都賦曰篙公楫師言舟也李從一名嘉佑趙州人天寶七年進士仕至台袁二州刺史善為詩綺靡婉麗有齊梁之風時以比吳均何遜云仲夏江隂官舍寄裴明府江隂古延陵邑之地梁置江隂郡今為江隂縣屬常州嘉祐常為江隂令故有寄萬室邊江次孤城對海安朝霞晴作雨濕氣晚生寒苔色侵衣桁潮痕上井欄題詩招茂宰思爾欲辭官朝霞說文雲與日氣相薄也又河圖崑崙山有五色水赤水之氣上蒸為霞苔色非真謂岩苔之色也謂梅氣蒸為苔色也衣桁衣架也一日晒衣竿也杜詩翡翠鳴衣桁茂宰謝𤣥暉詩茂宰深遐脊漢卓茂為密令有聲故詩用以比宰邑者也送王牧往吉州謁使君叔吉州禹貢荆揚二州之域東漢置廬陵吳置安城唐為吉州細草緑汀洲王孫耐薄逰年華初冠帶文采舊弓裘野渡花爭發春塘水亂流使君憐小阮應念倚門愁弓裘禮記良弓之子先學為箕良冶之子先學為裘小阮阮咸字仲容與叔阮籍為竹林之遊倚門史王孫賈事齊閔王王出走失王之處其母曰汝朝出而晚來則吾倚門而望汝暮出而不歸則吾倚閭而望至七里灘作在嚴州府桐廬縣與嚴陵瀨相接諺云有風七里無風七十里遷客投於越臨江淚滿衣獨隨流水逺轉覺故人稀萬木迎秋序千峯駐晚暉行舟猶未已惆悵暮潮歸劉文房送李中丞周官小宰之職掌建邦之宫刑凡宫之紀禁即御史中丞之任也漢百官表御史大夫有兩丞一曰御史丞一曰中丞亦謂中丞為中執法以其居殿中故曰中丞流落征南將曽驅十萬師罷歸無舊業老去戀明時獨立三邊靜輕生一劍知茫茫漢江上日暮欲河之三邊漢班固曰武帝廣開三邊注曰三垂也渭東南西三方也人羽獵賦序割其三邊說文垂逺邊也雨中過袁稷巴陵山居巴陵今嶽州府憐君洞庭上白髮向人垂積雨悲幽獨長江對别離牛羊歸故道鳥雀聚寒枝明發遙相望雲山不可知洞庭湖名在巴陵見前注喜皇甫侍御相訪荒村帶晚照落葉亂紛紛古路無行客空山獨見君野橋經雨斷澗水向田分不為憐同病何人到白雲穆陵闕北逢人歸漁陽穆陵益都有穆陵縣漁陽今檀州是逢君穆陵路匹馬向桑乾楚國蒼山古幽州白日寒城池百戰後耆舊幾家殘處處蓬蒿遍歸人掩淚看故桑乾縣在今朔州有桑乾沙人桑乾水晉慕容俊所都在薊縣幽州唐漁陽郡新年作鄉心新嵗切天畔獨潸然老至居人下春歸在客先嶺猿同旦暮江栁共風烟已似長沙傅從今又幾年老至居人下時景新書董勛云正旦飲酒先飲小者以小者得嵗故先飲酒賀之老者失時故後飲乂初學紀載四民月令云正旦進酒次第當從小起長沙傅賈誼也本傳洛陽人河南守吳公薦之召為博士絳灌之徒毁之乃以為長沙王傅尋南溪常道士一路經行處莓苔見履痕白雲依靜渚芳草閉閒門過雨看松色隨山到水源溪花與禪意相對亦忘言松江獨宿松江水自華亭流入松江江在吳江縣今為松江府洞庭初下葉孤客不勝愁明月天涯夜青山江上秋一官成白首萬里寄滄洲久被浮名繫能無愧海鷗洞庭在蘇州府非嶽州洞庭也餘干旅舍餘干邑名今屬饒州府搖落暮天迥青楓霜葉稀孤城向水閉獨鳥背人飛渡口月初上鄰家漁未歸鄉心正欲絶何處搗寒衣漂母墓昔賢懷一飯兹事巳千秋古墓樵人識前朝楚水流渚蘋行客薦山木杜鵑愁春草茫茫緑王孫舊此逰史韓信傳信家貧漂母飯之信後為楚王賜母千金古墓東西二冡俱在淮隂縣北八里莊束冡信母墓西冡漂母墓王孫漢韓信傳吾哀王孫而進食蓋韓信王者之子孫故言王孫又春草年年緑王孫歸不歸古詞韋應物奉送從兄宰晉陵東郊芳草歇千里夏雲生立馬愁將夕看山獨送行依微吳苑樹迢遞晉陵城慰此斷行别邑人多頌聲吳苑即長洲苑在蘇州府吳江縣晉陵縣名屬常州府送汾城王主簿少年初帶印汾上又經過芳草歸時遍情人故郡多批云閒情婉約可愛禁鐘春雨細宫樹野烟和相望東橋别微風起夕波汾上汾水上在汾州宫樹西河縣有臨汾宫隋大業十四年建送榆次林明府榆次縣名屬太原府無嗟千里逺亦是宰王畿策馬雨中去此等語亦味外味也逢人關外稀邑傳榆石在路繞晉山微别思方蕭索新秋一葉飛批云無一句不合路繞晉山微尤極清潤學者可仰王畿地域云懷孟路殷時為畿內周時為畿屬衛地衛遷河南杜預注云在晉山之南河之北以河北考之則太行山亦在河內縣之北則太行山其亦名晉山歟榆石未詳賦得暮雨送李胄楚江微雨裏建業暮鐘時漠漠帆來重冥冥鳥去遲海門深不見浦樹逺含滋相送情無限沾襟比散絲楚江即楊子江也建業今南京秦為金陵晉改秣陵後又分秣陵為建業海門江由此入海故名海門云耿湋河東人寶應二十年洪原榜進士至大厯七年張式榜仕至左拾遺早朝鐘鼓餘聲裏千官向紫微冒寒人語少乘月燭來稀清漏聞馳道輕霞映瑣闈猶看嘶馬處未啓掖垣扉紫微晉天文志紫微天帝之座也馳道瑣闈掖坦俱見前注酬暢當當河東人同遊漆沮後已是十年餘幾度曽相夢何時定得書月髙城影盡霜重柳條疏且對尊中酒千般想未如輿地廣記曰漆沮二水名其在不一惟雍州冨平縣名川河乃禹貢漆沮贈張將軍寥落軍城暮重行反照間鼓鼙經雨暗士馬過秋閒慣守臨邊郡曽營海上山關西舊業在夜夜夢中還韓君平名翃天寶十三年揚紞榜及第題薦福寺衡嶽禪師房薦福寺在饒州府又京兆府亦有薦福寺春城乞食還髙論此中閒僧臘階前樹禪心江上山踈簾看雪卷深戶映花關晚送門人去鐘聲查靄間乞食佛經次第乞食已禪心達摩曰內傳心印以契證人禪學要覽達摩不立文字直指人心見性成佛臘釋法嵗也凡學長幼間夏臘多者為長令釋氏以四月十六日前安居入制至七月十五日為受臘之日若俗嵗除日也階前樹釋氏通鑑曰逸士劉軒入黃山石岩見髙僧問其年以手指桂樹曰毫髮我植今環人體矣題慈恩寺振上人房慈恩寺在長安貞觀二十四年唐髙宗為太子時為文德皇后創披衣聞客至關鎖此時開鳴磬夕陽盡卷簾秋色來名香連竹徑清梵出花臺身在心無住他方到幾回錢仲文名起吳興人天寶十年李巨卿榜進士授祕書郎大厯中為翰林學士詩名與郎士元齊名時人語曰前有沈宋後有錢郎初錢少時寓驛舍聞人吟二句曰曲終人不見江上數峯青後十年就進士試湘靈鼓瑟詩成結句未得遂以二語結之試官李暐批曰神句也遂中首選同梁鍠文宴客到衡門下林香蕙草時好風能自至明月不須期秋水翻荷影清霜脆柳枝微官是何物許可廢言詩三體詩注衡門謂以橫木為門蕙草本草云蕙草生下濕地麻葉方莖赤花黑實如䕷蕪陳藏器云即零陵香爾雅翼蕙似蘭花亦春開蘭先而蕙繼之蘭一葉一花蕙一葉五花山林中十蕙而一蘭漢揚雄傳發蘭蕙與芎藭翻荷影謂荷葉倒水中惟見葉背故曰翻題鄰居齊六司倉沉冥衆所遺咫尺絶佳期始覺衡門下翛然太古時雞聲共林巷燭影隔茅茨坐惜牛羊徑芳蓀白露滋沉冥謝靈運詩沉冥空别理芳蓀說文香草也陶隱居云蓀生溪側名溪蓀者極似菖蒲而葉無脊爾雅翼云楚辭言香草皆以臣喻唯言蓀者喻君蓋蓀於藥性為君故也送僧自吳逰蜀隨緣忽西去何日返東林世路無期别空門不住心人烟一飯少山雪獨行深天外猿聲夜惟聞清梵音東林見前注空門釋氏之教以空虛寂滅為宗故曰空門不住心送僧歸日東日東日本國也在大海之東日出之地故云日束上國隨緣住來途若夢行浮天滄海逺去世法舟輕水月通禪觀魚龍聽梵聲誰憐一燈影萬里眼中明水月通禪觀圭峯禪師序曰念佛求生净土亦須修十六禪觀十六觀中有水觀月觀也不住心禪經曰應無住而生其心一燈影佛經云佛祖相傳以法故云傳燈一燈即云一僧也司空文明名曙廣平人貞元年仕至水部員外郎與盧綸韓翃錢起李端吉中孚雀峒耿湋夏侯審苗發齊云名號大厯十才子喜外弟盧綸見宿靜夜四無鄰荒居舊業貧雨中黃葉樹燈下白頭人以我獨沉久愧君相見頻平生自有分况是霍家親霍家似指霍光而言雲陽館與韓紳宿别雲陽秦屬巴郡今為雲安縣故人江海别幾度隔山川乍見翻疑夢相悲各問年孤燈寒照雨深竹暗浮烟更有明朝恨離杯惜共傳經廢寶慶寺寶慶一作寶炎一作寶光黃葉前朝寺無僧寒殿開池晴龜出曝松暝鶴飛回古砌碑橫草隂廊畫雜苔禪宫亦銷歇塵世轉堪哀郎君胄名士元中山人天寶中進士仕至郢州刺史詩法云士元晚唐人佳句甚多與錢起齊名時人柟為錢郎送彭將軍雙旌漢飛將萬里獨橫戈春色臨關盡黃雲出塞多鼓鼙悲絶漠烽戍隔長河想到隂山路天驕已請和飛將李廣也隂山天驕俱見前注送韋湛判官髙閣晴江上重陽古戍間聊因送歸客更此望鄉關惜别心能醉經秋鬢自斑臨流興不盡惆悵水雲閒送别錢起暮蟬不可聽落葉豈堪聞共是悲秋客那知此路分荒城背流水逺鴈入寒雲陶令門前菊餘花可贈君陶令名元亮在晉名淵明在宋名潜私諡靖節先生侃曽孫也為彭澤令見晉室將亂棄官歸隱于潯陽之柴桑宅邊多種菊每擕酒吟咏其間采菊東籬下秋菊有佳色其詩也送張南史雨餘深巷靜獨酌送殘春車馬雖嫌僻鶯花不棄貧蟲聲粘戶網鼠跡印牀塵借問山陽㑹如今有幾人山陽晉向秀字子期好老莊之學與嵇康善每與吕安灌園於山陽康被害秀入洛聞笛聲思與康逰宴之好感音而作思舊賦李端趙州人大厯五年李搏榜進士端與盧綸等號大厯十子人唐人宴集賦詩必推一人擅場郭曖尚升平公主盛集賦詩李端壇場茂陵山行陪金部金部漢戶部財有金部置尚書郎主帛委輸宿雨朝來歇空山天氣清盤雲雙鶴下隔水一蟬鳴古道黃花落平蕪赤草生茂陵雖有病猶得伴君行茂陵武帝陵名司馬相如嘗卧病茂陵故云雖有病也竇遺直字叔向扶風平陵人春日早朝應制承詔賦詩曰應制紫殿俯千官春松應合歡御爐香焰暖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看漢武帝行幸甘泉郊泰畤神光降集紫殿合歡花樹名玉聲寒言佩聲也珠綴說文旒綴也露盤三輔故事建章宫中承露盤髙二十丈七圍以銅為之戴幼公名叔倫潤州金壇人貞元進士為撫州刺史遷容管經略使除夜宿石頭驛石頭城在金陵人今嶽州府有石頭古馹旅館誰相問寒燈獨可親一年將盡夜萬里未歸人寥落悲前事支離笑此身愁顔與衰鬢明日又逢春支離莊子支離疏者有役則以病不受功上與病者粟則受三鍾支離其形猶可全其天年况支離其德者乎别友人三體詩作汝南别董校書擾擾倦行役相逢陳蔡間如何百年內不見一人閒對酒惜餘景問程愁亂山秋風萬里道又出穆陵關陳庖犧氏所都禹貢為豫州之域周初為陳國秦改潁川郡漢為淮陽郡今為陳州蔡亦豫州之域武王封叔度於蔡即此也秦為三川郡漢為汝南郡南宋為蔡州今為汝寧府穆陵關喪海圖穆陵在淄川西山間所謂南至于穆陵者也早行寄朱山人放山曉旅人去天髙秋氣悲明河川上沒芳草露中衰此别又萬里少年能幾時心知剡溪路聊且寄前期剡溪王子猷雪夜訪戴之所在紹興府㑹稽縣江上别張駕年年五湖上厭見五湖春長醉非關酒多愁不為貧山川迷道路伊洛暗風塵今日扁舟别俱為滄海人五湖見前注伊水名在河南陸渾山入河洛即洛陽也戎昱荆南人仕為節度使詩評戎昱盛唐人而詩絶似晚唐聞笛入夜思歸切笛聲清更哀愁人不願聽自到枕邊來風起塞雲斷夜深關月開平明獨惆悵落盡一庭梅笛曲中有關山月落梅花曲故云王仲初送人逰塞初晴天墮絲晚色上春枝城上路分處邊頭人去時停車數行日勸酒問回期亦是茫茫客還從此别離批云眼前語話得好邊上送故人百戰一身在相逢白髮生何時得家信每日算歸程走馬登寒隴驅羊入廢城羌歌三兩曲人醉海西營羌歌羌人之歌也羌西戎牧羊人也後漢光武紀羌有百五十四種散處三河之地海西西域志蔥嶺以西海西以東為一域皆西域之地也人武紀李廣利封海西侯汴路水驛汴古豫州之域即仲丁遷于囂是也宋為開封府今仍舊晚泊水邊驛柳塘初起風蛙鳴蒲葉下魚入稻花中去舍已云逺問程猶向東近來多怨别不與少年同驛古之待舍也汴路即事千里河烟直青楓夾岸長天涯同此路人語各殊方草市迎江貨津橋稅海商回看故宫柳憔悴不成行故宫漢時梁孝王都于汴醉後憶山中人花開草復秋雲水自悠悠因醉暫無事在生難免愁遇晴須看月聞健且登樓暗想山中伴如今盡白頭南中天南多鳥聲州縣半蕪城野市依蠻姓山村逐水名瘴烟沙上起隂火雨中生獨有求珠客年年入海行蕪城謂荒蕪也隂火鬼火也人海賦隂火潛然注凡水有硫黃其泉則溫故云隂火杜詩隂房鬼火青是也求珠客見前注張文昌薊北旅思薊北兾州之域秦漢為漁陽古北平二郡地唐開元分立薊州今為遵化府久客望鄉國空歌白苧詞長因送人處憶得别家時失意還獨語多愁秪自知客亭門外柳折盡向南枝白苧詞見前注春日留别逰人欲别離醉後對花枝看却春又晚莫輕年少時臨行記分處回首是相思各向天涯去重來未有期望行人秋風忩下起旅鴈向南飛日日出門望家家行客歸無因見邊使空待寄寒衣獨倚青樓暮烟深鳥雀稀薊北春懷渺渺水雲外别來音信稀因逢過江使却寄在家衣問路更愁逺逢人空說歸今朝薊城北又見塞鴻飛薊城古薊州今為遵化府酬韓庶子周太子之官有庶子掌其戒令與其教治庶子猶諸子也周禮諸子之政司馬之屬也秦漢有中庶子唐因之西街幽僻處正與懶相宜尋寺獨行逺借書常送遲家貧無易事身病是閒時寂寞誰相問秪應君自知宿江店野店臨江浦門前有橘花停燈待賈客賣酒與漁家夜靜江水白路回山月斜閒尋泊船處潮落見平沙夜到漁家漁家在江口潮水入柴扉行客欲投宿主人猶未歸竹深村路逺月出釣船稀遙見尋沙岸春風動草衣批云二詩皆夜次之作自然寫得意出送仁弟戴𤣥往蘇州楊桞閶門路悠悠水岸斜乘舟向山寺著屐到漁家夜月紅柑樹秋風白藕花江天詩景好回日莫令賖閶門孫權記曰吳西郭門夫差作以天門通閶闔故名之後春申君改為昌門山中贈日南僧獨向雙峯老松門閉兩涯翻經上蕉葉掛衲落藤花甃石新開井穿林自種茶時逢海南客蠻語問誰家雙峯寺名四祖常居此寺又鎮江府海門有雙峯五言排律附沈雲卿酬蘇員外味道夏晚寓直省中見贈省中尚書省也省有郎中員外並命登仙閣通宵直禮闈大官供宿膳侍史護朝衣卷幔天河入開忩月露微小池殘暑退髙樹早涼歸冠劍無時釋軒車待漏飛明朝題漢柱三署有光輝禮闈說文宫中門也大官光祿寺有大官署掌飲膳題漢柱漢司馬相如往京師過蜀郡升仙橋題其柱曰不乘駟馬車不復過此橋三署官制初秦置郎中令其屬官有三署謂五官中郎將左中郎右中郎也人漢官儀云尚書郎初從三署郎選同韋舍人早朝閶闔連雲起巖廊拂霧開玉珂龍影度珠履鴈行來長樂宵鐘盡明光曉奏催一經傳舊德五字擢英才儼若神仙去紛從霄漢回千春奉休厯分禁喜趨陪閶闔洛陽十二門其西曰閶闔門岩廊漢董仲舒傳遊于岩廊之上晉灼曰堂邊廡岩廊謂岩峻之廊也玉珂龍影度言馬如龍也珠履鴈行來言百辟趨班也長樂明光見前注休厯謂美厯也𤣥宗朱子云唐明資禀英邁只看他做詩出來是甚麼氣魄今唐百家詩首載明皇早度蒲津關多少飄逸氣概便冇帝王氣質越州冇石刻唐朝臣送賀知章詩亦只有明皇一首好有曰豈不惜賢達其如髙尚何早度蒲關蒲津關在同州馮翊縣鐘鼓嚴更曙山河野望通鳴鑾下蒲坂飛斾入秦中地嶮關逾壯天平鎮尚雄春來津樹合月落戍樓空馬色分朝景雞聲逐曉風所希常道泰非復候繻同鳴鑾說文人君乘車駟馬鑣八鑾鈴象鸞鳥和聲人曰馬口銜鑣曰鑾又在車曰鑾在式曰和蒲坂蒲津關之山坂也斾說文旐垂兒言旐以全帛為之續旐末為燕尾者斾也繻說文繒采又帛邊漢以為關門之符信也王摩詰逰感化寺翡翠香烟合琉璃寶殿平龍宫連棟宇虎穴傍簷楹谷靜惟松響山深無鳥聲瓊峯當戶折金澗透林鳴郢路雲端迥秦川雨外晴鴈王銜果獻鹿女踏花行抖擻辭貧里歸依宿化城繞籬生野蕨空館發山櫻香飯青菰米嘉蔬緑芋羹誓陪清梵末端坐學無生翡翠銅香爐也凡古銅器上必冇朱砂翡翠等色故云琉璃說文石出大秦國為器者以自然治之近世銷冶石汁加以藥火成者光澤不滅魏太祖為琉璃行殿容百人鴈王西域記昔有比丘見羣鴈飛翔因思而曰若得此鴈可充飲食作是思惟忽有一鴈投下自殞佛謂比丘曰此鴈王也不可食之乃瘞而立塔於是名曰鴈塔鹿女報恩經云佛告阿難鹿女夫人以其一食清華覆上施辟支佛五百世中尊榮豪貴蓮花垂足化城釋經梵宫雞田化城紀殿皆寺之異名也野蕨說文鱉也爾雅初生無葉時可食陸佃初生似鱉腳故云山櫻爾雅櫻桃果名一名含桃人鬼谷子云一名崖蜜本草一名朱桃菰芋無生俱見前注奉和聖製幸玉霄公主山莊因題石壁十韻之作應制公主網日睿宗即位之十二月以西成隆昌二公主為女官後改為金仙王真今云玉霄未詳碧落風烟外瑤臺道路賖如何連帝苑别自有仙家此地回鸞駕緣溪轉翠華洞中開日月忩裏發雲霞庭養冲天鶴溪留上漢查種田生白玉泥竈化丹砂谷靜泉逾響山深日易斜御羹和石髓香飯進胡麻大道今無外長生詎有涯還瞻九霄上來往五雲車碧落度人經碧空歌大浮黎土即天而言也瑶臺翠華旗名上漢查俱見前注石髓列仙傳印疏者國封史也能行義錬形煮石髓而服之胡麻晉魏夫人字道服胡麻散大道道德經云大道無名強名曰道今無外中庸其大無外其小無內長生延年不死也種玉搜神記陽公雍伯置義漿給行人三年有一人飲訖懷中出石子一升與之曰種此生好玉併得好婦數嵗北平徐氏有女公求之曰得白璧一雙當與婚公至種玉所得白璧五雙以聘遂妻以女因名其地曰玉田泥竈丹砂漢武元光二年李少君以祠竈却老方見言祠竈則致物而丹砂可化為黃金蓬萊仙者可見見之以封禪得不死奉和聖製上己於望春樓觀禊飲應制上巳周禮女巫掌嵗時以祓除疾病禊者潔也故於水上盥潔之也又應劭風俗通曰已者祉也邪疾已去祈介祉也人沈約宋書魏以後但用三月三日不復用已日矣長樂青門外宜春小苑東樓開萬户上輦過百花中畫鷁移仙妓金貂列上公清歌邀落日妙舞向春風渭水明秦甸黃山入漢宫君王來祓禊灞滻亦朝宗長樂青門宜春小苑見前注盡鷁相如賦浮文鷁綵舟也亦曰畫鷁金貂晋阮孚以金貂換酒注貂鼠屬北方寒以貂皮暖額因為侍中冠飾亦取內徑悍外溫潤之意黃山見七言律注內灞滻二水名亦在長安朝宗書江漢朝宗于海注春見曰朝夏見曰宗上公見前注曉行巴峽際曉投巴峽餘春憶帝京晴江一女浣朝日衆雞鳴水國舟中市山橋樹杪行登髙萬井出眺迥二流明人作殊方語鶯為故國聲賴諳山水趣稍解别離情巴峽雍州地域志夔州即巴峽之地夔州郡名三巴乂三峽之所在故名送祕書朝監歸日本積水不可極安知滄海東九州何處逺萬里若乘空向國惟看日歸帆但信風鼇身映天黑魚眼射波紅鄉樹扶桑外主人孤島中别離方異域音信若為通日本國名在大海之東日出之地故曰日本祕書漢桓帝置祕書監一人掌典圖書古今文字考合異同唐改蘭臺又曰麟閣鼇說文海中大鼇也以背負山周回十里扶桑搜神記碧海中有樹長數千丈兩幹同根更相依倚故曰扶桑也孟浩然登總持寺塔在長安唐貞觀十二年釋智實於寺辭衆而逝後三原信士方三十餘里為立塔半空躋寶塔晴望盡京華竹繞渭川遍山連上苑斜四門開帝宅阡陌俯人家纍劫從初地為童憶聚沙坐覺諸天近空香送落花盛選髙曠佛地幻語不具又太白子美皆有登塔詩合而觀之方見妙處躋登也盡遍也渭川上苑俱見前注劫梵書以一世為一劫又楞嚴經度百千劫猶如彈指人度人經惟有元始浩劫之初蓋儒為世釋為劫道為塵初地大乘寶王經云有證初地二地乃至有證十地菩薩摩訶薩位者聚沙法華經云乃至童子戲聚沙為佛塔李頎宿香山寺石樓寺在廬山人白樂天亦嘗於香山構石樓夜宿翠微半髙樓聞暗泉漁舟帶逺火山磬發孤烟衣拂雲松外門清河漢邊峯巒依枕席世界接人天藹藹花出霧輝輝星映川東林曙鶯滿惆悵欲言旋東林寺名在廬山晉惠逺所建唐音卷四
