body:
  text: 唐音卷六元楊士𢎞撰張震注唐詩正音五五言絶句宋之問之問字延清汾州人甫冠武氏召與楊炯分在習藝館又游洛南詔從臣賦詩東方虬詩光成賜錦袍之問俄頃刻獻覽之嗟賞奪袍賜之詩評云魏自建安以來迄江左詩律屢變至沈約庾信以音韻相婉附屬對精密及之問又加美麗四忌聲病約句佳言如錦繡成文學者宗之謂之沈宋途中寒食馬上逢寒食途中屬暮春可憐江浦望不見洛橋人别杜審言卧病人事絶嗟君萬里行河橋不相送江樹逺含情早發韶州漢為始興郡隋改韶州唐因之緑樹秦京道青雲洛水橋故園長在日魂去不須招招魂楚辭有大招小招東方虬武氏時為左史工詩昭君怨三首昭君見前注漢道方全盛朝廷足武臣何須薄命妾辛苦事和親昭君後漢明帝時人故云方全盛妾薄命古樂府名掩淚辭丹鳯銜悲向白龍單于浪驚喜無復舊時容丹鳯宫闕門名白龍堆前胸奴傳注白龍堆如土龍身無頭有尾髙大者二三丈卑者丈餘在西域中邊地無花草春來不似春自然衣帶緩非是為腰身蓋嘉運伊州歌二首伊州深州皆龜節國地名題意見前注打起黃鶯兒莫教枝上啼啼時驚妾夢不得到遼西遼西秦四十郡有遼西郡即孤竹國之地今廣寧華衡是也聞道黃花戍頻年不解兵可憐閨裏月偏照漢家營黃花戍地域志鳯州有黃花驛或古為西征軍戍也王摩詰山中送别山中相送罷日暮掩柴扉春草年年緑王孫歸不歸批云千古斷腸政不在多選詩芳草生兮萋萋王孫逰兮不歸又招隱詩王孫逰兮不歸春草生兮萋萋崔九弟欲往南山馬上口號與別南山洛南山也城隅一分手幾日還相見山中有桂花莫待花如霰鳥鳴澗此以下諸題皆在輞川人間桂花落夜靜春山空月出驚山鳥時鳴春澗中上平田并上二詩本集係皇甫嶽云溪雜詩題朝耕上平田莫耕上平田借問問津者誰知沮溺賢批云語調并髙長沮桀溺語長沮桀溺耦而耕孔子過之使子路問津朱子注曰二人隱者又集釋曰皆楚人也孟城坳本集目序云余別業在輞川山谷其逰止有孟城坳木蘭柴鹿柴南垞欒家瀨白石灘竹里館萍地等與悲迪間賦因賦絶云新家孟城口古木餘衰桞來者復為誰空悲昔人有批云復為兩語如此俯仰曠逺不可得木蘭柴此一首係裴迪詩蒼蒼落日時鳥聲亂溪水緣溪路轉深幽興何時已鹿柴空山不見人但聞人語響返照入深林復照莓苔上批云無言而有盡意南垞輕舟南垞去北垞渺難即隔浦望人家遙遙不相識欒家瀨颯颯秋雨中淺淺石溜㵼跳波自相濺白鷺驚復下白石灘清淺白石灘緑蒲何堪把家住水東西浣紗明月下竹里館獨坐幽篁裏彈琴復長嘯深林人不知明月來相照萍池春池深且廣㑹待輕舟回靡靡緑萍合垂楊掃復開批云每每靜意得之偶然山中寄諸弟山中多法侣禪誦自為羣城郭遙相望惟應禮白雲息夫人息國名今汝寧府息縣是子爵夫人息君之夫人也莫以今時寵能忘舊日恩看花滿眼淚不共楚王言莊十四年蔡哀侯為箤故二繩息媯以語楚子楚子問之對曰吾一婦人而事二夫縱不能死又奚言楚子以蔡侯滅息遂伐蔡班媫妤二首媫妤漢武帝初即位選入後宫為媫妤後稀復進見趙飛燕譛之上善其對令侍太后於東宫媫妤漢武帝制皆有爵位又師古曰媫言接幸於上也妤美稱也宫殿生秋草君王恩幸踈郍堪聞鳳吹門外度金輿批云語好玉窗螢影度金殿人聲絶秋夜守羅帷孤燈耿不滅批云語皆不刻而近雜詩二首家住孟津河門對孟津口常有江南船寄書家中否君自故鄉來應知故鄉事來日綺窗前寒梅著花未王夏鄉名縉王維之弟也別輞川別業維集作維詩山月曉仍在林風涼不絶殷勤如有情惆悵令人別批云清灑頓銼略不動容裴迪孟城坳結廬古城下時登古城上古城非疇昔今人自來往批云來為不佳相去甚逺宫槐陌門前宫槐陌是向欹湖道秋來風雨多葉落無人掃白石灘跂石復臨水弄波情未極日下川上寒浮雲淡無色崔九弟欲往南山馬上口號與別歸山深淺去須盡丘壑美莫學武陵人暫遊桃源裏郭元振名震少有大志十六嵗為太學生唐武氏時上寶劒篇武氏嘉嘆之睿宗朝仕至大業郡封代國公春江曲江水春沉沉上有雙竹林竹葉壞水色郎亦壞人心儲光羲長安道西行一千里暝色生寒樹暗聞歌吹聲知是長安路洛陽道作獻吕四郎中三首吕渭字禮所官至尚書郎洛水春氷開洛城春樹緑朝看大道上落花亂馬足大道正如髮春日佳氣多五陵貴公子雙雙鳴玉珂春風二月時道傍桞堪把上枝覆官閣下枝拂車馬江南曲二首渌江深見底髙浪直翻空慣是湖邊住舟輕不畏風日暮長江裏相邀歸渡頭落花如有意來去逐船流孟浩然春曉春眠不覺曉處處聞啼鳥夜來風雨聲花落知多少批云風流間美政不在多送友之亰君登青雲去豫望青山歸雲山從此别淚濕薜蘿衣宿建德江移舟泊烟渚日暮客愁新野曠天低樹江清月近人送朱大入秦遊人五陵去寶劍直千金分手脫相贈平生一片心五陵見前注劍說文人所帶兵也管子葛天盧之山發而出金蚩尤以為劍鎧此劍之始也洛陽道中珠彈繁華子金羈遊俠人酒酣白日暮走馬入紅塵珠彈莊襄王篇以隋侯之珠彈千仞之雀金羈李白詩送行駐金羈說文羈馬絡也崔皓長千行見前注家臨九江水來去九江側同是長千人生小不相識江南行三首君家何處住妾住在橫塘停船暫借問或恐是同鄉下渚多風浪蓮船漸覺稀那能不相待獨自送潮歸三江潮水急五湖風浪涌由來花信輕莫畏蓮舟重唐仲初吳東賦注松江下七十里分流東北入海者為婁江東南流者為東江并松為三江五湖張勃吳録云五湖者大湖之别名以其周行五百里二萬六千頃故以五湖名之崔國輔怨詞妾有羅衣裳秦王在時作為舞春風多秋來不堪著古意淨揥黃金階飛霜厚如雪下簾彈箜􅔃不忍見秋月流水曲歸來日尚早更欲向芳洲渡口水流急回船不自由少年行遺却珊瑚鞭白馬驕不行章臺折楊桞春日路傍情長信草三輔黃圖漢長信宫太后之宫也武帝五日一朝長信宫又名長樂宫長信宫中草年年愁處生時侵珠履跡不使玉階行魏宫詞此魏宫指鄴中言朝日照紅粧擬上銅雀臺畫眉猶未了魏帝使人催銅雀臺見前注魏帝指曹操言操雖未稱帝曹丕篡位追諡操為武帝湖南曲湖南送君去湖北送君歸湖裏鴛鴦鳥雙雙他自飛采蓮玉溆花爭發金塘水亂流相逄畏相失並著采蓮舟岑參見渭水思秦川渭水東流去何時到雍州憑添兩行淚寄向故園流題三㑹寺蒼頡造字臺三㑹寺未詳所止蒼頡黃帝時人河圖玉版云頡與帝南巡登陽虛之山臨𤣥滬之山靈龜負出丹甲青文以授之𤣥滬水在商州上洛縣野寺荒臺晚寒天古木悲空階有鳥跡猶似造書時鳥跡史記蒼頡觀鳥迹像之以作文字行軍九日思長安故園强欲登髙去無人送酒來遙憐故園菊應傍戰場開登髙汝南桓景從費長房逰學謂景曰九月九日汝家當有災厄令闔家以絳囊盛茱萸繫臂登髙飲酒至暮回家中雞犬皆死送酒淵明九月九日無酒宅邊有菊坐觀久之有白衣人送酒至劉方平河南人與元魯山善隱居不仕采蓮曲落日清江裏荆歌艷楚腰采蓮從小慣十五即乘潮荆歌楚歌也楚腰後馬廖疏楚王好細腰宫中多餓死長信宫夢裏君王近宫中河漢髙秋風能再熱團扇不辭勞團扇班婕妤詩裁為合歡扇團圓似明月常恐秋節至涼颷奪炎熱皇甫孝常婕妤春怨婕妤後漢書皇后之下其職有兩媫妤乃其一也花枝出建章鳳管發昭陽借問承恩者雙娥幾許長建章昭陽俱見前注此媫妤蓋指班媫妤言漢成紀趙后譛媫妤以誣事帝善其言而免乃出侍太后于長信宫也秋怨長信多秋色昭陽借月華那堪閒永巷聞道選良家長信昭陽見前注永巷列女傳宫中長廡相通曰永巷選良家晉武紀帝多選良家子以充內職送王司直西塞雲山逺東風道路長人心勝潮水相送過潯陽潮至潯陽而止故云不如人心直送過潯陽云送人還剡中舊居剡中即剡溪在㑹稽海岸耕殘雪溪沙釣夕陽家中何所有春草漸看長同諸公有懷舊國迷江樹他鄉近海門移家南渡久童稚解方言皇甫孝常丹陽人丹陽今鎮江府在江之下流且近海故云劉文房春草宫懷古君王不可見芳草舊宫春猶帶羅裙色青青向楚人送張起崔載華之閩中閩中越地也後漢為侯官陳始改為閩州今為福州府朝無寒士逹家在舊山貧相送天涯裏憐君更逺人逄雪宿芙蓉山芙蓉山未詳日暮蒼山逺天寒白屋貧柴門聞犬吠風雪夜歸人赴楚州次韻田途中阻淺問張南史三體詩有張南史詩楚城今逺近積靄寒塘莫水淺舟且遲淮潮在何處送友人往揚州渡口發梅花山中動泉脉蕪城春草生君作揚州客送張十八歸桐廬桐廬今屬嚴州府歸人乘野艇帶月過江村正落寒潮水相隨夜到門送方外上人孤雲將野鶴豈向人間住莫買沃州山時人已知處沃州山述異記第十四福地名沃州有峭峯十二二茗翠天在越州今紹興府又與道林與謝安王羲之許詬何充等並一代名流皆與結方外交及投迹剡山於沃州小嶺立寺行道江中對月空洲夕烟斂對月秋江裏歷歷沙上人月中狐渡水聽彈琴泠泠七絃琴靜聽松風寒古調雖自愛今人多不彈韋應物詠夜明從何處去暗從何處來但覺年光老半是此中催詠聲萬物自生聽太空恆寂寥還從靜中起却向靜中銷秋夜寄丘二十二員外懷君屬秋夜散步詠涼天山空松子落幽人應未眠對殘燈獨照碧窗久欲隨寒燼滅幽人將遽眠解帶翻成結同褒子秋齊獨宿山月皎如燭霜風時動竹夜半鳥驚棲窗間人獨宿宿永陽寄璨律師永陽今永州府律師僧異名又鈔解題云佛言善解一宫名律師一字者律字也遙知郡齊夜凍雪封松竹時有山僧來懸鐙獨自宿盧允言酬李益戚戚一西東十年今始同可憐歌酒夜相對兩衰翁贈別司空曙有月曽同賞無秋不共悲如何與君別又是菊花時塞下曲月黑鴈飛髙單于夜遁逃欲將輕騎逐大雪滿弓刀韓君平漢宫曲繡幕珊瑚鈎春關翡翠樓深情不肯道嬌倚鈿箜篌耿湋湋河東人寶應二年進士為大理司法終于左拾遺有詩二首傳于世秋日返照入閭巷憂來與誰語古道少人行秋風動禾黍兵後覩景蕭條憂國憂民人皆無可與語無人行也不言無而言少謂黍離之悲也秋夜髙秋夜分後逺客鴈來時寂寂重門掩無人問所思錢仲文江行無題四首翳日多喬木維舟取束薪靜聽江叟語俱是厭兵人牽路緣江狹沙崩岸不平盡知行處險誰肯載時輕咫尺愁風雨匡廬不可登秪疑香霧窟猶有六朝僧斗轉月未落舟行夜已深有村知不逺風便數聲砧竹間路暗歸草堂靜半入花源去有時載酒來不與清風遇石井片霞照仙井泉底桃花紅那知幽石下不與武陵通宿洞口館野竹通溪冷秋泉入户鳴亂來人不到寒草上階生傷秋嵗去人頭白秋來樹葉黃搔頭向黃葉與爾共悲傷司空文明金陵懷古輦路江風暗宫潮野草春傷心庾開府老作北朝臣庾開府名信字子山仕至開府為文綺麗盛為都下所稱與徐陵齊名梁簡文帝開文德省置學士徐庾並充其選玩花與衛象同醉衰鬢千莖雪他鄉一樹花今朝與君醉忘却在長沙留別盧秦卿知有前期在難分此夜中無將故人酒不及石尤風石尤風戴叔倫詩知君未得去慚愧石尤風容齊隨筆曰石尤風打頭逆風也唐人多用之李端蕪城懷古風吹城上樹草沒城邊路城裏月明時精靈自來去拜新月開簾見新月便即下階拜細語人不聞北風吹裙帶送人下第獻䇿未得意馳車東出秦莫年千里客落日萬家春鳴筝鳴筝金粟柱素手玉房前欲得周郎顧時時誤拂絃周郎即周瑜也解音樂每宴㑹樂人或有誤瑜必回顧之暢當河東人大厯七年張式榜進士宿潭上夜潭有仙舸與月當水中佳賔愛明月遊子驚秋風登樓逈臨飛鳥上髙出世人間天勢圍平野河流入斷山戴幼公字叔倫潤州金壇人仕至容管經略使贈李唐山人蕭宗時人綱目先是李唐山人見上方抱幼女謂唐曰朕念之對曰太上皇思見陛下亦如陛下之念公主於是上朝太上皇於西內即此也此意靜無事閉門風景遲桞條將白髮相對共垂絲留別顧明府江南雨初歇山暗雲猶濕未可動歸橈前程風正急送秦隱居麗句亭北人歸欲盡猶自住蕭山閉户不暫出詩名滿世間蕭山縣名屬紹興府三閭廟三閭楚大夫屈原也朱子離騷序云屈原名平與楚同姓仕於懷王為三閭大夫三閭之職掌圭旌三姓曰照屈景後為上官靳所譛自溺汨羅江而死後人哀之為立廟三在嶽州沅湘流不盡屈子怨何深日暮秋風起蕭蕭楓樹林沅湘二水名此言沅湘之水流不盡如屈子之怨深而不已也李君虞名益李揆祥子大厯四年齊怢榜進士江南曲嫁得瞿塘賈朝朝誤妾期早知潮有信嫁與㺯潮兒瞿塘夔州也古南蠻魚復之國春秋庸國之地庸滅為巴國地蜀昭烈改巴東又改為永安有瞿塘峽潮海潮也太白詩潮水重可信潮日夕二潮依時而至照鏡衰境臨朝鏡將看却自疑慚君明似月照我白如絲惜春畏老身全老逄春解惜春今年看花伴已少去年人批云有此意何得不惜武伯蒼字元衡德宗欽其才嘗對延英上目迸定曰真宰相器元和中拜相夏夜作夜久喧暫息池臺惟月明無因駐清景日出事還生途中即事南征復北還擾擾百年間自笑紅塵裏生涯不暫間權載之字德興四嵗能詩籍為縉紳羽化初結廬江南蓬蒿晏如每遇一勝境得一佳句怡然獨笑如獲貴仕唐德宗朝知制誥元和中同平章事詩評云權詩有似盛唐者又有似韋蘇州劉長卿處又引辭連類窮情盡變宫商相宣金石和諧寂寥乎短章舂容乎大篇如是者閲之纍日而無窮焉玉臺體詩法云玉臺集乃徐陵所叙漢魏六朝之詩皆有之或但謂纎艷者為玉臺體其實不然昨夜裙帶解今朝蟢子飛鉛華不可棄莫是槀砧歸槀砧古詩槀砧今何在山上復有山注謂砧砆也故借言夫云鉛華脂粉也桞子厚江雪千山鳥飛絶萬徑人蹤滅孤舟簑笠翁獨釣寒江雪零陵早春零陵今澧州也問春從此去幾日到秦原憑寄還鄉夢殷勤入故園長沙驛前南樓感舊海鶴一為别存亡三十秋今來數行淚獨上驛南樓登桞州峨山桞州古百粵地梁置龍州唐改桞州峨山在桞州荒山秋日午獨上意悠悠如何望鄉處西北是融州融州古百粵地漢為欎林郡潭中縣蕭齊置齊熙郡梁置東寧南昆州隋改融州唐因之王廣津名涯敬宗朝為平章閨人贈逺二首鶯啼緑樹深燕語雕梁晚不省出門行沙場知近逺逺戍功名薄深閨年貌傷粧成對春樹不語淚千行張文昌野田漠漠野田草草中牛羊道古墓無子孫白楊不得老琵琶臺未詳臺上緑蘿春間登不待人每當休暇日著履戴絃巾宿雲亭未詳清淨當深處虛明向逺開卷簾無俗客應只見雲來繡衣石榻繡衣見前注山城無别味藥草兼魚果時有繡衣人同來石上坐繡衣人謂御史也梅溪未詳自愛新梅好行尋一徑斜不教人掃石愁損落來花惜花山中春已晚處處見花稀明日來無盡林間宿不歸岸花可憐岸邊樹紅藻發青條東風吹度水衝著木蘭橈木蘭橈楊炯詩桂棹蘭橈下長浦又皇甫舟詩縈回槐葉岸留滯木蘭橈木蘭花名寄西峯僧松暗水涓涓夜涼人未眠西峯月猶在遙憶草堂前苕溪酬梁耿別後見寄苕溪在湖州府烏程縣南五十步西岸多生蘆葦故名清川永路何極落日孤舟解攜鳥向平蕪逺近人隨流水東西白雲千里萬里明月前溪後溪惆悵長沙謫謫江潭芳草萋萋長沙江潭見前注顧逋翁名况官至著作郎歸山心事數莖白髮生涯一片青山空山有雪相待古道無人獨還唐音卷六
