body:
  text: 唐音卷十元楊士𢎞撰張震注唐詩遺響三桞中庸名談亰兆人江行繁隂乍隱洲落葉初飛浦蕭蕭楚客帆莫入寒江雨涼州曲題意見前注關山萬里逺征人一望關山淚滿巾青海城頭空有月黃沙磧裏本無春批云空本二字無限哀怨之情青海城在甘州張掖河南至青海黃沙磧説文水渚有石處又沙漠曰磧丘丹蘇州臨平人答韋蘇州蘇州有秋夜寄丘二十二貟外故此有詩答之露滴梧葉鳴秋風桂花發中有學仙侣吹簫弄山月宋濟東鄰美女歌花暖江城斜日隂鶯啼繡户曉雲深春風不道珠簾隔傳得歌聲與客心劉商彭城人後居長安大厯中為檢校禮部郎中合溪送王永歸東郭君去春山誰共逰鳥啼花落水空流如今送别臨溪水他日相思來水頭醉後口號春草秋風老此身一瓢長醉任家貧醒來還愛浮萍草漂寄官河不屬人元使君自楚移越露冕行春向若耶野人懷惠欲移家東風二月淮隂道惟見棠梨一樹花露冕後漢郭賀為荆州刺史帝賜三公之服使去襜惟露冕令百姓見之以彰其德同上鄭宏為臨淮太守春行有白鹿夾轂而行若耶溪在會稽見前注淮隂即臨淮府今為淮安府棠梨陸機草木疏曰棠梨梨也昔召公所訟於甘棠樹下民思其德不伐其樹此乃以召比元也羊士諤泰山人貞元元年鄭全濟榜進士憲宗以其與吕溫善貶資州刺史郡中即事紅衣落盡暗香殘葉上秋光白露寒越女含情已無限莫教長袖倚蘭干紅衣謂蓮花也長袖言美人舞袖也雍裕之五雜爼擬古三言樂府五雜爼刺繡窠往復還織錦梭不得已成交河自君之出矣擬後漢徐幹樂府自君之出矣寶鏡為誰明思君如隴水長聞嗚咽聲江邊桞嫋嫋古堤邊青青一樹煙若為絲不斷留取繫郎船宫人斜西京雜記咸陽舊墻內曰內人斜即宫人斜蓋古葬宫人之處也幾多紅粉委黃泥野鳥如歌又似啼應有春魂化為燕年年飛入未央棲未央宫名髙祖七年蕭何造長孫佐輔朔方人尋山家獨訪山家歇還涉茅屋斜連隔松葉主人聞語未開門繞籬野菜飛黃蝶令狐殼士令狐姓殼士字名楚燉煌人元和中知制誥其為文於箋奏制令尤善每一篇成人皆傳誦後為中書侍郎從軍行孤心眠夜雪滿眼是秋沙萬里猶防塞三年不見家防塞防秋也謂守塞上防邊人邊人每以秋至故曰防秋却望氷河闊前登雪嶺髙征人幾多在又擬戰臨洮臨洮戰國西羌地秦為臨洮縣屬隴西郡惠帝分置狄道郡魏置狄道郡又禹貢西傾之地邊風千里驚漢月五更明縱有還家夢猶聞出塞聲宫中樂月上宫花靜煙含苑樹深銀臺門已閉仙漏夜沉沉銀臺門太白詩承恩初入銀臺門注銀臺門與左右掖及升龍門九重青瑣闥百尺碧雲樓明月秋風起珠簾上玉鈎首句見前注珠簾漢武故事以珠為簾箔玳瑁壓之也思君恩小苑鶯歌歇長門蝶舞多眼看春又去翠輦不曽過紫禁香如霧青天月似霜雲韶何處奏秪是在昭陽雲韶韶樂也書簫韶九成昭陽趙飛燕所居之殿見前注長相思樂録曰樂府怨思二十五曲其一曰長相思云幾度春眠覺紗窗曉望迷朦朧殘夢裏獨自在遼西遊春詞閶闔春風起蓬萊雪水消相將折楊桞爭取最長條閶闔門蓬萊殿折楊桞俱見前注少年行少小邊州慣放狂驏騎蕃馬射黃羊如今年老無筯力獨倚營門數鴈行黃羊後隂方以黃羊祀竈楊中師名衡吳興人盧十五竹亭送姪儞歸山落葉寒擁壁清霜夜霑石正是憶山時復送歸山客殷勤一樽酒曉月當窗白白紵詞玉纓翠佩雜輕羅香汗微漬朱顔酡為君起唱白紵歌清聲裊雲思繁多凝笳哀瑟時相和金壺半傾芳夜促梁塵霏霏暗紅燭令君安坐聽終曲墜葉飄花難再復玉纓左瓊辨玉纓白紵歌見前注躡珠履步瓊筵起身輕舞紅燭前芳恣艷態妖且妍回眸轉袖暗催絃涼風蕭蕭漏水急月華泛艷紅蓮濕牽裙攬帶翻成泣躡珠履史記趙平原君使人於春申君欲夸楚勾劍室􅎖以珠玉春申君客三千餘人上客皆躡珠履以見之趙使大慙坐瓊筵太白詩開瓊筵以坐花張仲素字繪之春遊曲煙桞飛輕絮風榆落小錢濛濛百花裏羅綺竸秋千騁望登香閣爭髙下砌臺林間踏青去席上意錢來行樂三春節林林百和香當年重意氣先占鬬雞場宫中樂江果瑶池實金盤露井氷甘泉將避暑臺殿曉光凝春江曲搖漾越江春相將采白蘋歸時不覺夜出浦月隨人春怨曲裊裊邊城桞青青陌上桑提籠忘采葉昨夜夢漁陽塞下曲士贇曰樂府遺聲五曲中有塞下曲三伐漁陽再渡遼騂弓在臂劍橫腰丐奴似欲知名姓休傍隂山更射雕隂磧茫茫塞草腓桔橰烽上暮煙飛交河北望天連海蘇武曽將漢節歸天馬辭天馬初從渥水來歌曽唱得濯龍媒不知玉塞沙中路苜蓿花殘幾處開前武帝紀元狩三年得神馬於渥窪水中注渥窪在燉煌郡是嵗上方造樂府造為詩賦絃次以合八音之調及得神馬次以為歌龍媒前禮樂志龍媒駿馬也濯龍媒亦必天馬歌之一也又濯龍媒集覽濯龍門上注濯龍殿名苜蓿見前注此詩意謂窮兵黷武以開外國而求天馬至今玉塞之路尚莊而苜蓿常開更無人取馬矣謂之殘花者以為張騫昔求其種歸種為中國今其開者皆其餘者也蹀躞宛駒齒未齊樅金噴玉向風嘶來時行盡金河道獵獵輕風在碧蹄蹀躞説文行兒宛駒大北國出善馬此言宛國馬駒也馬二嵗曰駒齒未齊長未齊也樅金未詳噴玉周穆王傳穆天子東遊黃澤謡曰黃之駝其馬噴沙黃之澤其馬噴玉金河漢雲中郡隋改金河郡漢苑行春風淡淡影悠悠鶯囀髙枝燕入樓千步廊回聞鳳吹珠簾處處上銀鈎回廊阿房宫賦五步一樓十步一閣廊腰縵回簷牙髙啄注廊廡也又顔師古曰堂下門廡也秋閨思碧窗斜月藹深輝愁聽寒螿淚濕衣夢裏分明見關塞不知何路向金微寒螿爾雅蟬屬金微通典羈闕州有金微屬招武軍武軍漢雲中郡也隋改關唐仍雲中郡今為大同府唐音卷十
