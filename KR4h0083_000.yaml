body:
  text: 唐音總集類提要臣等謹案唐音十四卷元楊士𢎞編士𢎞字伯謙襄城人是書成于至正四年虞集為之序凡始音一卷正音六卷遺響七卷而士𢎞自記稱十五卷蓋遺響有一子卷也其始音惟録王楊盧駱四家正音則詩以體分而以初唐盛唐為一類中唐為一類晚唐為一類遺響則諸家之作咸在而附以僧詩女子詩李白杜甫韓愈三家皆不入選其凡例謂三家世多全集故弗録焉其書積十年之力而成去取頗為不茍蘇衡作劉敬伯古詩選序頗以是書所分始音正音餘響為非李東陽懷麓堂詩話則曰選詩誠難必識足以兼諸家者乃能選諸家識足以兼一代者乃能選一代一代不數人一人不數篇而欲以一人選之不亦難乎選唐詩者惟楊士𢎞唐音為庶幾云云其推之可謂至矣明髙柄唐詩品彚即因其例而稍變之馮舒兄弟評章縠才調集深斥柄杜撰排律之非實則排律之名亦因此書非柄創始也曹安讕言長語稱舊有丹陽顔潤卿注今未見其本此本題張震輯注震字文亮新淦人其仕履始末及朝代先後皆未詳注極弇陋唐覲延州筆記嘗摘其注李頎贈劉十詩第五之名齊驃騎一條盧照鄰送鄭司倉入蜀詩潘年三十外一條他如楊炯劉生一首乃樂府古題而震曰劉生不知何許人後篇亦有劉生要皆從軍之士也又炯夜送趙縱一首其詩作于初唐而震曰趙縱郭子儀壻也仕至侍郎如斯之類不可毛舉殆必明人也以原本所有且間有一二可采者姑附存之備一解焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀唐音原序襄城楊伯謙好唐人詩五言七言古詩律詩絶句以盛唐中唐晚唐别之凡幾卷謂之唐音音也者聲之成文者也可以觀世矣其用意之精深豈一日之積哉蓋其所録必也有風雅之遺騷些之變漢魏以來樂府之盛其合作者則録之不合乎此者雖多弗取是以若是其嚴也昔之選唐詩者非一家若伯謙之辨識度越常情遠哉噫先王之德盛而樂作跡熄而詩亡係於世道之升降也風俗頽靡愈趨愈下則其聲文之盛不得不隨之而然必有特起之才卓然之見不係於習俗之所同則君子尚之然亦鮮矣嗚呼唐虞三代其盛矣乎元首股肱之歌見於唐書一遊一豫之歎聞諸夏諺其僅存者亦寥寥廓絶矣若夫十五國風大小雅周之盛衰備矣周頌者多周公之所作也猗那之存太師傳焉駉駜之興魯人作之皆吾夫子之手筆也千載之言詩者孰不本於此哉則吾於伯謙唐音之録安得不歎夫知言之難也虞集序夫詩莫盛於唐李杜文章冠絶萬世後之言詩者皆知李杜之為宗也至如子美所尊許者則楊王盧駱所推重者則薛少保賀知章所讚咏者則孟浩然王摩詰所友善者則髙適岑參所稱道者則王季友若太白登黃鶴樓獨推崔皓為傑作遊郎官湖復歎張謂之逸興擬古之詩則倣佛乎陳伯玉古之人不獨自專其美相與發明斯道者如是故其言皆足以沒世不忘也余自幼喜讀唐詩每慨歎不得諸君子之全詩及觀諸家選本載盛唐詩者獨河嶽英靈集然詳於五言略於七言至於律絶僅存一二極𤣥姚合所選止五言律百篇除王維祖詠亦皆中唐人詩至如中興間氣又𤣥才調等集雖皆唐人所選然亦多主於晚唐矣王介甫百家選唐除髙岑王孟數家之外亦皆晚唐人詩吹萬以世次為編於名家頗無遺漏其所録之詩則又駁雜簡略他如洪容齊曾蒼山趙紫芝周伯弼陳德新諸選非惟所擇不精大抵多略於盛唐而詳於晚唐也後客章貢得劉愛山家諸刻初盛唐詩手自抄録日夕涵泳於是審其音律之正變而擇其精粹分為始音正音遺響總名曰唐音九十五卷共詩一千三百四十一首始於乙亥成於甲申嗟夫詩之為道非惟吟咏情性流通精神而巳其所以奏之郊廟歌之燕射求之音律知其世道豈偶然也哉觀是編者幸恕其僭妄詳其所用心則自見矣至正四年八月朔日襄城楊士𢎞謹志凡例一始音不分類編者以其四家製作初變六朝雖有五七之殊然其音聲則一致故也一正音以五七言古律絶各分類者以見世次不同音律高下雖各成家然體製聲響相類欲以便於觀者一遺響不分類者以其諸家之詩篇章長短參差音律不能諧合故就其所長而采之一李杜韓詩世多全集故不及録一編意各著篇首一詩中字有不安者以諸本校其善者從之疑者闕之庶不誤觀者一古詩及樂府及李杜全集類編續刋以便學者
